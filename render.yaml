services:
  - type: web
    name: coach-toby
    env: docker
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: HERMES_HOME
        value: /opt/data
      - key: HERMES_WRITE_SAFE_ROOT
        value: /opt/data
      - key: WHATSAPP_MODE
        value: bot
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_USERS
        value: "1688731002"
      - key: TELEGRAM_HOME_CHANNEL
        value: "1688731002"
      - key: OPENROUTER_API_KEY
        sync: false
    disk:
      name: hermes-data
      mountPath: /opt/data
      sizeGB: 1
