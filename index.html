<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Singer OS</title>
<style>
:root {
  /* OKLCH Color System - perceptually uniform */
  --bg: oklch(0.10 0.01 260);
  --bg2: oklch(0.13 0.01 260);
  --card: oklch(0.17 0.01 260);
  --card2: oklch(0.20 0.01 260);
  --border: oklch(0.28 0.01 260);
  --border-hi: oklch(0.35 0.02 260);
  
  /* Primary - Indigo */
  --pri: oklch(0.65 0.20 270);
  --pri-hi: oklch(0.72 0.18 270);
  --pri-dim: oklch(0.55 0.22 270);
  --pri-glow: oklch(0.65 0.20 270 / 0.15);
  --pri-glow-hi: oklch(0.65 0.20 270 / 0.30);
  
  /* Semantic */
  --ok: oklch(0.72 0.18 145);
  --ok-dim: oklch(0.60 0.20 145);
  --warn: oklch(0.78 0.16 60);
  --err: oklch(0.65 0.20 25);
  --gold: oklch(0.82 0.16 95);
  
  /* Text */
  --tx: oklch(0.95 0.01 260);
  --tx2: oklch(0.70 0.01 260);
  --tx3: oklch(0.48 0.01 260);
  
  /* Typography Scale */
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --xs: 0.6875rem;
  --sm: 0.8125rem;
  --base: 0.9375rem;
  --md: 1.0625rem;
  --lg: 1.25rem;
  --xl: 1.5rem;
  --2xl: 1.875rem;
  --3xl: 2.25rem;
  
  /* Spacing Scale */
  --s1: 4px;
  --s2: 8px;
  --s3: 12px;
  --s4: 16px;
  --s5: 20px;
  --s6: 24px;
  --s7: 32px;
  --s8: 40px;
  --s9: 48px;
  
  /* Radius */
  --r-sm: 8px;
  --r: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
  --r-full: 9999px;
  
  /* Elevation */
  --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.3);
  --shadow: 0 4px 12px oklch(0 0 0 / 0.4);
  --shadow-lg: 0 8px 24px oklch(0 0 0 / 0.5);
  --shadow-glow: 0 0 20px var(--pri-glow);
  
  /* Motion */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast: 150ms;
  --dur: 250ms;
  --dur-slow: 400ms;
}

/* Font Loading */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  color-scheme: dark;
  -webkit-tap-highlight-color: transparent;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--tx);
  font-size: var(--base);
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: 88px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Reduced Motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--r-full); }

/* Screen System */
.sc { display: none; min-height: calc(100vh - 88px); }
.sc.active { display: block; animation: fadeIn var(--dur) var(--ease-out) both; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

@keyframes glow {
  0%, 100% { box-shadow: 0 0 8px var(--pri-glow); }
  50% { box-shadow: 0 0 20px var(--pri-glow-hi); }
}

@keyframes confetti {
  0% { transform: scale(0) rotate(0deg); opacity: 0; }
  50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
  100% { transform: scale(1) rotate(360deg); opacity: 1; }
}

/* Top Bar */
.tb {
  position: sticky;
  top: 0;
  z-index: 100;
  background: oklch(0.10 0.01 260 / 0.92);
  backdrop-filter: blur(12px) saturate(1.4);
  -webkit-backdrop-filter: blur(12px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  padding: var(--s4) var(--s5);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.tb-t {
  font-size: var(--md);
  font-weight: 800;
  letter-spacing: -0.02em;
}
.tb-r {
  font-size: var(--sm);
  color: var(--gold);
  font-weight: 600;
  font-family: var(--font-mono);
}

/* Screen Padding */
.sp { padding: var(--s5) var(--s4) var(--s9); max-width: 540px; margin: 0 auto; }

/* Bottom Navigation */
.bn {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: oklch(0.12 0.01 260 / 0.95);
  backdrop-filter: blur(16px) saturate(1.6);
  -webkit-backdrop-filter: blur(16px) saturate(1.6);
  border-top: 1px solid var(--border);
  height: 72px;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.bn-in {
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: 100%;
  max-width: 500px;
  margin: 0 auto;
  padding: 0 var(--s2);
}
.bn-i {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: var(--s2) var(--s3);
  color: var(--tx3);
  font-size: var(--xs);
  font-weight: 600;
  text-decoration: none;
  border-radius: var(--r-sm);
  transition: color var(--dur-fast), background var(--dur-fast);
  min-width: 48px;
  min-height: 48px;
  justify-content: center;
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--font);
}
.bn-i:hover { color: var(--tx2); background: oklch(0.20 0.01 260 / 0.5); }
.bn-i.on { color: var(--pri); }
.bn-i.on:hover { background: var(--pri-glow); }
.bn-ic {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1px;
}
.bn-ic svg { width: 22px; height: 22px; stroke-width: 1.8; }

/* Cards */
.c {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--s5);
  margin-bottom: var(--s3);
  transition: border-color var(--dur), box-shadow var(--dur), transform var(--dur-fast);
}
.c:hover {
  border-color: var(--border-hi);
  box-shadow: var(--shadow-sm);
}
.c:active { transform: scale(0.98); }
.c-a { border-color: oklch(0.65 0.20 270 / 0.25); background: linear-gradient(135deg, var(--card), oklch(0.65 0.20 270 / 0.04)); }
.c-a:hover { border-color: oklch(0.65 0.20 270 / 0.4); box-shadow: var(--shadow-glow); }
.c-g { border-color: oklch(0.82 0.16 95 / 0.2); }
.c-g:hover { border-color: oklch(0.82 0.16 95 / 0.35); }
.c-ok { border-color: oklch(0.72 0.18 145 / 0.25); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--s2);
  padding: var(--s3) var(--s5);
  border-radius: var(--r);
  font-weight: 700;
  font-size: var(--sm);
  font-family: var(--font);
  width: 100%;
  margin-bottom: var(--s2);
  cursor: pointer;
  border: none;
  transition: all var(--dur-fast) var(--ease-out);
  min-height: 48px;
  letter-spacing: -0.01em;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, oklch(1 0 0 / 0.08), transparent);
  pointer-events: none;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0) scale(0.98); }
.btn:disabled { opacity: 0.4; pointer-events: none; }

.btn-p {
  background: linear-gradient(135deg, var(--pri), var(--pri-dim));
  color: #fff;
  box-shadow: 0 2px 8px var(--pri-glow);
}
.btn-p:hover { box-shadow: 0 4px 16px var(--pri-glow-hi); }

.btn-s {
  background: linear-gradient(135deg, var(--ok), var(--ok-dim));
  color: oklch(0.15 0.01 260);
  box-shadow: 0 2px 8px oklch(0.72 0.18 145 / 0.2);
}
.btn-s:hover { box-shadow: 0 4px 16px oklch(0.72 0.18 145 / 0.3); }

.btn-g {
  background: transparent;
  color: var(--tx2);
  border: 1px solid var(--border);
}
.btn-g:hover { background: var(--card2); color: var(--tx); border-color: var(--border-hi); }

.btn-w {
  background: transparent;
  color: var(--tx3);
  border: 1px solid var(--border);
  font-weight: 500;
}
.btn-w:hover { color: var(--tx2); }

/* Tags */
.tag {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: var(--r-full);
  font-size: var(--xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.tag-p { background: var(--pri-glow); color: var(--pri-hi); }
.tag-s { background: oklch(0.72 0.18 145 / 0.1); color: var(--ok); }
.tag-g { background: oklch(0.82 0.16 95 / 0.1); color: var(--gold); }
.tag-w { background: oklch(0.78 0.16 60 / 0.1); color: var(--warn); }

/* Progress Bars */
.pr {
  height: 8px;
  background: var(--border);
  border-radius: var(--r-full);
  overflow: hidden;
  position: relative;
}
.pr-f {
  height: 100%;
  background: linear-gradient(90deg, var(--pri-dim), var(--pri));
  border-radius: var(--r-full);
  transition: width var(--dur-slow) var(--ease-out);
  position: relative;
}
.pr-f::after {
  content: '';
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 20px;
  background: linear-gradient(90deg, transparent, oklch(1 0 0 / 0.15));
  border-radius: var(--r-full);
}
.pr-ok .pr-f { background: linear-gradient(90deg, var(--ok-dim), var(--ok)); }
.pr-g .pr-f { background: linear-gradient(90deg, oklch(0.70 0.14 95), var(--gold)); }

/* List Items */
.li {
  display: flex;
  align-items: center;
  gap: var(--s4);
  padding: var(--s4);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: var(--s2);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
  min-height: 56px;
}
.li:hover {
  border-color: var(--border-hi);
  background: var(--card2);
  transform: translateX(2px);
}
.li:active { transform: scale(0.98); }
.li-ic {
  width: 44px;
  height: 44px;
  border-radius: var(--r);
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--pri-glow);
  color: var(--pri);
  flex-shrink: 0;
  font-weight: 800;
  font-size: var(--sm);
}
.li-ic svg { width: 20px; height: 20px; stroke-width: 1.8; }
.li-b { flex: 1; min-width: 0; }
.li-t { font-weight: 700; font-size: var(--sm); letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-sub { font-size: var(--xs); color: var(--tx3); margin-top: 1px; }
.li-r { font-size: var(--xs); color: var(--gold); font-weight: 700; font-family: var(--font-mono); flex-shrink: 0; }

/* Sections */
.sec { margin-bottom: var(--s6); }
.sec-h {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--s3);
}
.sec-t {
  font-size: var(--xs);
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--tx3);
}

/* Hero */
.hero { padding: var(--s5) 0 var(--s6); }
.hero h1 {
  font-size: var(--2xl);
  font-weight: 900;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: var(--s2);
}
.hero p { color: var(--tx2); font-size: var(--sm); }

/* Quiz Options */
.qo {
  display: flex;
  align-items: center;
  gap: var(--s3);
  padding: var(--s4);
  border: 2px solid var(--border);
  border-radius: var(--r);
  margin-bottom: var(--s2);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
  min-height: 52px;
}
.qo:hover { border-color: var(--border-hi); background: var(--card); }
.qo.sel { border-color: var(--pri); background: var(--pri-glow); }
.qo.ok { border-color: var(--ok); background: oklch(0.72 0.18 145 / 0.08); }
.qo.err { border-color: var(--err); background: oklch(0.65 0.20 25 / 0.08); }
.qo.dis { pointer-events: none; opacity: 0.6; }
.qr {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  flex-shrink: 0;
  transition: all var(--dur-fast);
  display: flex;
  align-items: center;
  justify-content: center;
}
.qo.sel .qr { background: var(--pri); border-color: var(--pri); }
.qo.ok .qr { background: var(--ok); border-color: var(--ok); }
.qo.err .qr { background: var(--err); border-color: var(--err); }
.qr::after {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  opacity: 0;
  transition: opacity var(--dur-fast);
}
.qo.sel .qr::after, .qo.ok .qr::after, .qo.err .qr::after { opacity: 1; }

/* Exercise Steps */
.es {
  display: flex;
  gap: var(--s3);
  padding: var(--s4) 0;
  border-bottom: 1px solid var(--border);
  align-items: flex-start;
}
.es:last-child { border-bottom: none; }
.esn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--xs);
  font-weight: 800;
  background: var(--pri-glow);
  color: var(--pri);
  flex-shrink: 0;
  margin-top: 2px;
}
.est { flex: 1; }
.est p { font-size: var(--sm); color: var(--tx2); line-height: 1.5; }

/* Toast / Feedback */
.ft {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-200%);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: var(--s3) var(--s5);
  z-index: 9999;
  font-size: var(--sm);
  font-weight: 600;
  box-shadow: var(--shadow-lg);
  transition: transform var(--dur) var(--ease-spring);
  max-width: 90vw;
  text-align: center;
}
.ft.show { transform: translateX(-50%) translateY(0); }
.ft-ok { border-color: var(--ok); color: var(--ok); }
.ft-err { border-color: var(--err); color: var(--err); }
.ft-info { border-color: var(--pri); color: var(--pri); }

/* Grid helpers */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s2); }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--s2); }

/* Text helpers */
.text-center { text-align: center; }
.text-sm { font-size: var(--sm); }
.text-xs { font-size: var(--xs); }
.text-muted { color: var(--tx3); }
.text-pri { color: var(--pri); }
.text-ok { color: var(--ok); }
.text-gold { color: var(--gold); }
.text-warn { color: var(--warn); }
.text-err { color: var(--err); }
.text-bold { font-weight: 700; }
.text-mono { font-family: var(--font-mono); }
.mb-1 { margin-bottom: var(--s1); }
.mb-2 { margin-bottom: var(--s2); }
.mb-3 { margin-bottom: var(--s3); }
.mb-4 { margin-bottom: var(--s4); }
.mt-2 { margin-top: var(--s2); }
.mt-4 { margin-top: var(--s4); }
.gap-2 { gap: var(--s2); }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.w-full { width: 100%; }

/* Input */
.input {
  width: 100%;
  padding: var(--s3) 0;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--tx);
  font-family: var(--font);
  font-size: var(--base);
  transition: border-color var(--dur-fast);
  outline: none;
}
.input:focus { border-color: var(--pri); }
.input::placeholder { color: var(--tx3); }
label {
  display: block;
  font-size: var(--xs);
  color: var(--tx3);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: var(--s1);
}

/* Badge */
.badge {
  display: inline-flex;
  align-items: center;
  gap: var(--s1);
  padding: var(--s1) var(--s3);
  border-radius: var(--r-full);
  font-size: var(--xs);
  font-weight: 700;
  background: var(--card2);
  border: 1px solid var(--border);
}

/* Level indicator */
.level-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pri), var(--pri-dim));
  color: #fff;
  font-weight: 900;
  font-size: var(--sm);
  box-shadow: 0 2px 8px var(--pri-glow);
}

/* Streak flame */
.streak { display: inline-flex; align-items: center; gap: var(--s1); }

/* Achievement popup */
.achieve {
  position: fixed;
  inset: 0;
  z-index: 10000;
  display: none;
  align-items: center;
  justify-content: center;
  background: oklch(0 0 0 / 0.7);
  backdrop-filter: blur(4px);
}
.achieve.show { display: flex; }
.achieve-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: var(--s7);
  text-align: center;
  max-width: 320px;
  animation: confetti 0.5s var(--ease-spring) both;
}
.achieve-icon { font-size: 3rem; margin-bottom: var(--s3); }
.achieve-title { font-size: var(--lg); font-weight: 800; margin-bottom: var(--s2); }
.achieve-desc { color: var(--tx2); font-size: var(--sm); margin-bottom: var(--s5); }

/* Vocal load bar */
.vocal-load {
  height: 6px;
  background: var(--border);
  border-radius: var(--r-full);
  overflow: hidden;
  margin: var(--s2) 0;
}
.vocal-load-f {
  height: 100%;
  border-radius: var(--r-full);
  transition: width var(--dur-slow) var(--ease-out), background var(--dur);
}
.vocal-load-f.ok { background: var(--ok); }
.vocal-load-f.warn { background: var(--warn); }
.vocal-load-f.danger { background: var(--err); }

/* Divider */
.hr { height: 1px; background: var(--border); margin: var(--s4) 0; }

/* Reference box */
.ref-box {
  background: oklch(0.65 0.20 270 / 0.06);
  border: 1px solid oklch(0.65 0.20 270 / 0.15);
  border-radius: var(--r);
  padding: var(--s4);
  margin: var(--s3) 0;
}
.ref-box-title {
  font-size: var(--xs);
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--pri);
  margin-bottom: var(--s2);
}

/* Song card */
.song-card {
  display: flex;
  align-items: center;
  gap: var(--s4);
  padding: var(--s4);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: var(--s2);
  cursor: pointer;
  transition: all var(--dur-fast);
}
.song-card:hover { border-color: var(--border-hi); background: var(--card2); }
.song-art {
  width: 52px;
  height: 52px;
  border-radius: var(--r-sm);
  background: linear-gradient(135deg, var(--pri-glow), var(--card2));
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: var(--lg);
}
.song-info { flex: 1; min-width: 0; }
.song-title { font-weight: 700; font-size: var(--sm); }
.song-artist { font-size: var(--xs); color: var(--tx3); }
.song-tags { display: flex; gap: var(--s1); margin-top: var(--s1); flex-wrap: wrap; }

/* Difficulty dots */
.dots { display: flex; gap: 3px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
.dot.filled { background: var(--pri); }
.dot.ok { background: var(--ok); }

/* Coach message */

.wa-btn {

  color: oklch(0.15 0.01 260);

  font-weight: 800;
  font-size: var(--sm);
  text-decoration: none;
  transition: transform var(--dur-fast);
}
.wa-btn:hover { transform: scale(1.02); }

/* Millionaire quiz specific */
.millionaire-q {
  background: linear-gradient(180deg, oklch(0.15 0.02 260), oklch(0.12 0.01 260));
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--s6);
  margin-bottom: var(--s4);
}
.millionaire-q-num {

  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: var(--s2);
}
.millionaire-q-text {
  font-size: var(--md);
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: var(--s5);
}
.millionaire-lifeline {
  display: flex;
  gap: var(--s2);
  margin-bottom: var(--s4);
}
.lifeline-btn {
  flex: 1;
  padding: var(--s2);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  font-size: var(--xs);
  font-weight: 700;
  text-align: center;
  cursor: pointer;
  transition: all var(--dur-fast);
}
.lifeline-btn:hover { border-color: var(--pri); background: var(--pri-glow); }
.lifeline-btn.used { opacity: 0.3; pointer-events: none; }

/* Money ladder */
.money-ladder {
  position: fixed;
  right: var(--s3);
  top: 50%;
  transform: translateY(-50%);

  flex-direction: column;
  gap: 2px;
  font-size: var(--xs);
  font-family: var(--font-mono);
}
.money-ladder.show { display: flex; }
.money-step {
  padding: 2px 6px;
  border-radius: var(--r-sm);
  text-align: center;
  color: var(--tx3);
}
.money-step.safe { color: var(--gold); font-weight: 700; }
.money-step.current { background: var(--pri-glow); color: var(--pri); font-weight: 700; }
.money-step.done { color: var(--ok); }

/* Responsive */
@media (min-width: 600px) {
  .sp { padding: var(--s6) var(--s5) var(--s9); }
  .bn-in { max-width: 540px; }
}

<script>
// ============================================================
// STATE
// ============================================================
var U = {
  name: 'Singer',
  email: '',
  xp: 0,
  level: 1,
  sessions: 0,
  streak: 0,
  lastPractice: null,
  skills: {
    airflow: 0, source: 0, resonance: 0, articulation: 0,
    ear: 0, mix: 0, performance: 0, theory: 0,
    sight: 0, style: 0
  },
  completed: [],
  completedSongs: [],
  completedQuizzes: [],
  badges: [],
  vocalLoad: 0,
  maxLoad: 100,
  weaknessHistory: [],
  diagnosticResults: [],
  quizHighScore: 0,
  millionaireLevel: 0
};

try {
  var d = localStorage.getItem('singerOS');
  if (d) {
    var p = JSON.parse(d);
    if (p && p.skills) {
      for (var k in p) U[k] = p[k];
    }
  }
} catch(e) {}

function save() {
  try { localStorage.setItem('singerOS', JSON.stringify(U)); } catch(e) {}
}

// ============================================================
// UTILITIES
// ============================================================
function toast(m, type) {
  var t = document.getElementById('ft');
  t.textContent = m;
  t.className = 'ft show' + (type ? ' ft-' + type : '');
  setTimeout(function() { t.className = 'ft'; }, 2500);
}

function showAchieve(icon, title, desc) {
  document.getElementById('achieve-icon').textContent = icon;
  document.getElementById('achieve-title').textContent = title;
  document.getElementById('achieve-desc').textContent = desc;
  document.getElementById('achieve').classList.add('show');
}

function closeAchieve() {
  document.getElementById('achieve').classList.remove('show');
}

function go(id) {
  var ss = document.querySelectorAll('.sc');
  for (var i = 0; i < ss.length; i++) ss[i].classList.remove('active');
  document.getElementById('s-' + id).classList.add('active');
  var items = document.querySelectorAll('.bn-i');
  for (var j = 0; j < items.length; j++) items[j].classList.remove('on');
  var nav = document.getElementById('n-' + id);
  if (nav) nav.classList.add('on');

  if (id === 'home') renderHome();
  if (id === 'learn') renderLearn();
  if (id === 'practice') renderPractice();
  if (id === 'songs') renderSongs();
  if (id === 'theory') renderTheory();
  if (id === 'quiz') renderQuiz();
  if (id === 'progress') renderProgress();
  if (id === 'profile') renderProfile();
}

function esc(s) {
  if (!s) return '';
  return s.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

// ============================================================
// COACH PERSONALITY
// ============================================================
var COACH = {
  greetings: [
    'Hey {name}. Let us get to work.',
    'Good to see {name} ready to train.',
    '{name}, your voice is waiting. Let us go.'
  ],
  encouragement: [
    'That is the sound I have been waiting to hear.',
    'You just proved you can do this. Remember that feeling.',
    'That is real progress. Not luck. Skill.',
    'Your voice just did something it could not do yesterday.',
    'That is what training sounds like. Keep going.'
  ],
  corrections: [
    'Okay, stop. I hear what is happening. {issue}. Here is the fix: {fix}',
    'I need you to catch that. {issue}. Try this instead: {fix}',
    'Almost. But I hear {issue}. The fix is simple: {fix}'
  ],
  plateaus: [
    '{name}, you have been working on {skill} for a while. This is exactly where a coach saves you months. Let me help.',
    'You are stuck on {name}. That is not failure. That is the edge of your current ability. Time to level up with a coach.'
  ],
  breakthroughs: [
    '{name}, you just broke through on {skill}. This is the moment everything changes. Do not stop now.',
    'That is it. That is the breakthrough. {skill} just clicked. Lock this in.'
  ],
  pick: function(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  },
  say: function(type, data) {
    var msg = this.pick(this[type] || this.encouragement);
    if (data) {
      for (var k in data) {
        msg = msg.replace('{' + k + '}', data[k]);
      }
    }
    return msg;
  },
  whatsapp: function(reason, skill) {
    var msg = encodeURIComponent('Hi Coach Toby! I just ' + reason + ' on ' + skill + ' in Singer OS. I need help taking this to the next level.');
    return 'https://wa.me/2348012345678?text=' + msg;
  }
};

// ============================================================
// OUTCOME-BASED CURRICULUM
// ============================================================
// Every module is written as "Be able to..." — outcome first
// ============================================================

var CURRICULUM = {

  // ===== VOCAL MECHANICS =====
  mechanics: {
    title: 'Vocal Mechanics',
    icon: 'M',
    color: 'pri',
    modules: [
      {
        id: 'm1',
        outcome: 'Be able to sustain a steady note for 20 seconds without running out of air',
        title: 'Breath That Carries You',
        xp: 15,
        content: '<p>Most singers run out of air because they push air out too fast. The trick is not more air — it is <b>controlled escape</b>.</p><p>Your ribs expand on the inhale. While singing, they should stay expanded as long as possible. Think: <b>inflate and hold</b>.</p>',
        exercise: {
          name: 'Rib Cage Hold',
          steps: [
            'Place both hands on your lower ribs (sides of your chest)',
            'Breathe in through your nose — feel ribs push your hands out',
            'Hiss "sss" while keeping ribs pushed out',
            'Goal: 15 seconds without ribs collapsing',
            'Once you hit 15 sec, try 20. Then 25.'
          ],
          skill: 'airflow',
          xp: 15
        }
      },
      {
        id: 'm2',
        outcome: 'Be able to start every note cleanly — no breathy "ha" or hard glottal stop',
        title: 'Clean Note Onset',
        xp: 15,
        content: '<p>Every note starts one of three ways: <b>breathy</b> (air before sound), <b>glottal</b> (hard stop), or <b>clean</b> (instant balanced sound). You want clean.</p><p>The feeling: imagine the note is already vibrating before you "release" it. Like turning on a light switch — instant, no warm-up.</p>',
        exercise: {
          name: 'Light Switch Onset',
          steps: [
            'Hum on "mmm" for 3 seconds — feel the buzz',
            'Now say "ah" with the SAME instant feeling — no "h" before it',
            'If you hear "hah", that is breathy. Try again.',
            'Practice: hum 5 sec → open to "ah" keeping the buzz',
            'Do this 10 times. Every note should feel like it was already there.'
          ],
          skill: 'source',
          xp: 15
        }
      },
      {
        id: 'm3',
        outcome: 'Be able to sing with a clear, ringing tone that projects without shouting',
        title: 'Forward Resonance',
        xp: 20,
        content: '<p>Your voice resonates in different places. <b>Forward</b> (lips, cheekbones, nose bridge) = clear and projecting. <b>Throat</b> = dark but swallowed. You want forward.</p><p>The test: hum and touch your lips. Feel the buzz? That is forward resonance. Now keep that buzz while you open to a vowel.</p>',
        exercise: {
          name: 'Buzz Carrier',
          steps: [
            'Hum on "mmm" — feel buzz on lips and nose',
            'Open to "mah" — the buzz should STAY on your lips',
            'If the buzz drops to your throat, start over',
            'Practice sliding: "mmm" → "mah" → "mmm" → "mah"',
            'Do 10 reps. Every "mah" should feel like it is vibrating in your face.'
          ],
          skill: 'resonance',
          xp: 20
        }
      },
      {
        id: 'm4',
        outcome: 'Be able to sing lyrics so every word is clear — even on fast songs',
        title: 'Crisp Articulation',
        xp: 15,
        content: '<p>Singing is sustained speech. Your lips and tongue must work. Your jaw must stay relaxed. Most singers either mumble (lazy lips) or clamp (tense jaw). You want: <b>active lips, relaxed jaw</b>.</p>',
        exercise: {
          name: 'Lip Gymnastics',
          steps: [
            'Speak "ma-me-mi-mo-mu" — exaggerate every consonant',
            'Now sing it on one pitch — same exaggeration',
            'Try "la-le-li-lo-lu" — feel your tongue working',
            'Now try a fast lyric from a song you know',
            'If any word is unclear, slow it down and exaggerate, then speed up.'
          ],
          skill: 'articulation',
          xp: 15
        }
      },
      {
        id: 'm5',
        outcome: 'Be able to sing high notes without straining — using mix voice',
        title: 'Mix Voice: No More Breaking',
        xp: 25,
        content: '<p>Your voice has a "break" — a spot where chest voice stops and head voice begins. Most singers either flip (yodel) or push (strain). <b>Mix voice</b> bridges the gap.</p><p>The secret: start in head voice (light, floaty) and add weight. Not the other way around.</p>',
        exercise: {
          name: 'Ng Slide',
          steps: [
            'Say "ng" (like the end of "sing") — feel the buzz in your nose',
            'Slide from low to high on "ng" — no break, just a smooth glide',
            'Now try "nah" in the same range — keep the same light feeling',
            'If you feel a crack, go back to "ng" and try again',
            'Practice daily. The break zone gets smoother every week.'
          ],
          skill: 'mix',
          xp: 25
        }
      },
      {
        id: 'm6',
        outcome: 'Be able to belt safely — powerful high notes without damage',
        title: 'Safe Belt Technique',
        xp: 30,
        content: '<p>Belting is not yelling. It is <b>chest-dominant mix with twang</b>. The larynx is slightly high. The sound is forward and brassy. If your throat hurts, you are doing it wrong.</p><p>Start low. Build up. Never force.</p>',
        exercise: {
          name: 'Brassy "Nay"',
          steps: [
            'Say "nay" like a bratty kid — feel the twang?',
            'Sing "nay" on a comfortable mid-range note — keep that bratty quality',
            'Slide up slowly — the twang should stay, the throat should stay relaxed',
            'If you feel strain, stop. Go lower. Try again.',
            'Goal: belt one octave above your speaking voice without throat tension.'
          ],
          skill: 'mix',
          xp: 30
        }
      }
    ]
  },

  // ===== EAR TRAINING =====
  ear: {
    title: 'Ear Training',
    icon: 'E',
    color: 'ok',
    modules: [
      {
        id: 'e1',
        outcome: 'Be able to hear when you are sharp or flat — and correct it instantly',
        title: 'Pitch Awareness',
        xp: 15,
        content: '<p>Most singers who "cannot sing" actually have untrained ears. Pitch is a skill. You can learn to hear it.</p><p><b>Sharp</b> = above the note (tense). <b>Flat</b> = below the note (lazy). <b>In tune</b> = locked in.</p>',
        exercise: {
          name: 'Mirror Pitch',
          steps: [
            'Play a note on a piano app or YouTube',
            'Sing it back. Listen: are you above, below, or on?',
            'If sharp, relax and drop slightly. If flat, add a tiny bit of energy.',
            'Try 5 different notes. Score yourself: how many were in tune?',
            'Repeat daily. Your accuracy will improve fast.'
          ],
          skill: 'ear',
          xp: 15
        }
      },
      {
        id: 'e2',
        outcome: 'Be able to sing intervals — 3rds, 5ths, octaves — on demand',
        title: 'Interval Recognition',
        xp: 20,
        content: '<p>Intervals are the distance between two notes. If you can hear and sing intervals, you can learn any song by ear.</p><p>Start with the easy ones: <b>octave</b> (same note, higher), <b>5th</b> (twinkle twinkle), <b>3rd</b> (first two notes of "When the Saints").</p>',
        exercise: {
          name: 'Interval Flashcards',
          steps: [
            'Play a root note. Then play a 5th above. Sing both.',
            'Play a root note. Then a 3rd above. Sing both.',
            'Play a root note. Then an octave above. Sing both.',
            'Now try without the piano: sing a note, then sing a 5th above from memory.',
            'Do 10 reps of each interval. Use solfege: do-sol (5th), do-mi (3rd), do-do (octave).'
          ],
          skill: 'ear',
          xp: 20
        }
      },
      {
        id: 'e3',
        outcome: 'Be able to hear a chord and identify if it is major, minor, or dominant',
        title: 'Chord Quality',
        xp: 25,
        content: '<p>Chords have colors. <b>Major</b> = happy/bright. <b>Minor</b> = sad/dark. <b>Dominant</b> = tense/wants to resolve. Hearing these is essential for playing by ear and understanding music.</p>',
        exercise: {
          name: 'Chord Color Sort',
          steps: [
            'Play a major chord. Listen. Say "bright."',
            'Play a minor chord. Listen. Say "dark."',
            'Play a dominant 7th. Listen. Say "tense."',
            'Now have someone play random chords. Call out major/minor/dominant.',
            'Goal: 80% accuracy on 20 random chords.'
          ],
          skill: 'ear',
          xp: 25
        }
      }
    ]
  },

  // ===== MUSIC THEORY =====
  theory: {
    title: 'Music Theory',
    icon: 'T',
    color: 'gold',
    modules: [
      {
        id: 't1',
        outcome: 'Be able to read sheet music — notes, rhythms, and time signatures',
        title: 'Read the Page',
        xp: 20,
        content: '<p>Sheet music is a map. Notes tell you <b>what</b> to play. Rhythm tells you <b>when</b>. Time signature tells you <b>how to count</b>.</p><p>Treble clef lines: <b>E</b>very <b>G</b>ood <b>B</b>oy <b>D</b>oes <b>F</b>ine. Spaces: <b>F</b>ACE.</p>',
        exercise: {
          name: 'Note Flash',
          steps: [
            'Write out the treble clef: lines E-G-B-D-F, spaces F-A-C-E',
            'Quiz yourself: point to a random line/space, name the note in 2 seconds',
            'Now add bass clef: lines G-B-D-F-A, spaces A-C-E-G',
            'Practice reading a simple melody from sheet music',
            'Goal: read 20 notes in 60 seconds without mistakes.'
          ],
          skill: 'theory',
          xp: 20
        }
      },
      {
        id: 't2',
        outcome: 'Be able to build any major or minor scale from any starting note',
        title: 'Scale Builder',
        xp: 20,
        content: '<p>Scales are patterns. Major scale pattern: <b>whole-whole-half-whole-whole-whole-half</b> (WWHWWWH). Minor scale: <b>whole-half-whole-whole-half-whole-whole</b>.</p><p>Start on any note. Apply the pattern. You have a scale.</p>',
        exercise: {
          name: 'Scale Construction',
          steps: [
            'Pick a starting note (e.g., C). Apply WWHWWWH. You get C major.',
            'Pick G. Apply the pattern. You get G major (notice the F#).',
            'Pick A. Apply WHWWHWW. You get A minor.',
            'Build 5 major scales and 5 minor scales from random starting notes.',
            'Goal: build any major scale in under 30 seconds.'
          ],
          skill: 'theory',
          xp: 20
        }
      },

function togDiag(id, el) {
  var idx = diagSel.indexOf(id);

    el.classList.add('sel');
  } else {
    diagSel.splice(idx, 1);
    el.classList.remove('sel');
  }
}

function subDiag() {
  if (diagSel.length === 0) { toast('Select at least one', 'err'); return; }

  var sc = {airflow: 0, source: 0, resonance: 0, mix: 0};
  var map = {
    pitch: ['source', 'airflow'],
    strain: ['source', 'mix'],
    breathy: ['source', 'airflow'],
    power: ['airflow', 'resonance'],
    crack: ['source', 'mix'],
    range: ['mix', 'source']
  };
  for (var i = 0; i < diagSel.length; i++) {
    var s = map[diagSel[i]];
    if (s) for (var j = 0; j < s.length; j++) sc[s[j]]++;
  }
  var p = 'source', mx = 0;
  for (var k in sc) if (sc[k] > mx) { mx = sc[k]; p = k; }

  var exercises = {
    airflow: {
      name: 'Rib Cage Hold',
      steps: ['Place hands on lower ribs', 'Breathe in — ribs push out', 'Hiss "sss" — hold ribs out', 'Goal: 15 seconds', 'Rest. Repeat 3 times.'],
      fix: 'You are pushing too much air. Control the escape rate.'

    source: {
      name: 'Clean Onset Drill',
      steps: ['Hum "mmm" for 3 seconds', 'Open to "ah" — no "h" sound', 'If breathy, try again', 'Practice 10 reps', 'Every note should start clean'],
      fix: 'Your vocal folds are not closing fully. Hum first, then open.'

      name: 'Forward Placement',
      steps: ['Hum "mmm" — feel lip buzz', 'Open to "mah" — buzz stays on lips', 'If buzz drops, start over', 'Slide: mmm → mah → mmm → mah', '10 reps'],

  h += '<button class="btn btn-w" style="width:auto;padding:var(--s2) var(--s4);min-height:36px;font-size:var(--xs)" onclick="go(\'practice\')">← Back</button>';

  h += '<h1 style="font-size:var(--lg);font-weight:900;margin:var(--s4) 0 var(--s2)">Your Prescribed Exercise</h1>';

    h += '<div class="es"><div class="esn">' + (i + 1) + '</div><div class="est"><p>' + ex.steps[i] + '</p></div></div>';
  }
  h += '</div>';

  h += '<button class="btn btn-s" onclick="finishDiag(\'' + p + '\')">I Did It (+15 XP)</button>';
  c.innerHTML = h;

// ============================================================
var quizState = { q: 0, score: 0, lifelines: { fifty: true, skip: true, double: true }, over: false };

function startMillionaire() {
  quizState = { q: 0, score: 0, lifelines: { fifty: true, skip: true, double: true }, over: false };
  showQuizQuestion();
}

function showQuizQuestion() {
  var qs = QUIZ_QUESTIONS;
  var qi = quizState.q;

  if (qi >= qs.length) {
    quizWin();
    return;
  }

  var q = qs[qi];
  var c = document.getElementById('q-c');
  var h = '';

  h += '<button class="btn btn-w" style="width:auto;padding:var(--s2) var(--s4);min-height:36px;font-size:var(--xs)" onclick="go(\'quiz\')">← Quit</button>';

  // Prize ladder indicator
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin:var(--s4) 0">';
  h += '<span class="text-xs text-muted">Question ' + (qi + 1) + ' of ' + qs.length + '</span>';
  h += '<span class="text-xs text-gold text-bold">₦' + PRIZE_LADDER[qi].toLocaleString() + '</span></div>';

  // Progress bar
  h += '<div class="pr mb-4"><div class="pr-f" style="width:' + ((qi + 1) / qs.length * 100) + '%"></div></div>';

  // Question
  h += '<div class="millionaire-q">';
  h += '<div class="millionaire-q-num">Question ' + (qi + 1) + '</div>';
  h += '<div class="millionaire-q-text">' + q.q + '</div>';

  // Options
  for (var i = 0; i < q.options.length; i++) {
    h += '<div class="qo" id="qo-' + i + '" onclick="answerQuiz(' + i + ')"><div class="qr"></div><span>' + String.fromCharCode(65 + i) + '. ' + q.options[i] + '</span></div>';
  }
  h += '</div>';

  // Lifelines
  h += '<div class="millionaire-lifelines">';
  h += '<div class="lifeline-btn ' + (quizState.lifelines.fifty ? '' : 'used') + '" onclick="useLifeline(\'fifty\')">50:50</div>';
  h += '<div class="lifeline-btn ' + (quizState.lifelines.skip ? '' : 'used') + '" onclick="useLifeline(\'skip\')">Skip</div>';
  h += '<div class="lifeline-btn ' + (quizState.lifelines.double ? '' : 'used') + '" onclick="useLifeline(\'double\')">Double</div>';
  h += '</div>';

  c.innerHTML = h;
}

function answerQuiz(idx) {
  if (quizState.over) return;
  var q = QUIZ_QUESTIONS[quizState.q];
  var correct = idx === q.answer;

  // Show result
  for (var i = 0; i < 4; i++) {
    var el = document.getElementById('qo-' + i);
    if (i === q.answer) el.classList.add('ok');
    else if (i === idx && !correct) el.classList.add('err');
    el.classList.add('dis');
  }

  if (correct) {
    quizState.score = q.prize;
    toast('Correct! ₦' + q.prize.toLocaleString(), 'ok');
    setTimeout(function() {
      quizState.q++;
      showQuizQuestion();
    }, 1500);
  } else {
    quizState.over = true;
    toast('Wrong! Game over.', 'err');
    setTimeout(function() {
      var safeScore = 0;
      for (var m = 0; m < SAFE_MILESTONES.length; m++) {
        if (quizState.q > SAFE_MILESTONES[m]) safeScore = PRIZE_LADDER[SAFE_MILESTONES[m]];
      }
      if (safeScore > U.quizHighScore) U.quizHighScore = safeScore;
      save();
      showQuizResult(safeScore);
    }, 1500);
  }
}

function useLifeline(type) {
  if (!quizState.lifelines[type] || quizState.over) return;
  var q = QUIZ_QUESTIONS[quizState.q];

  if (type === 'fifty') {
    // Remove 2 wrong answers
    var removed = 0;
    for (var i = 0; i < 4 && removed < 2; i++) {
      if (i !== q.answer) {
        var el = document.getElementById('qo-' + i);
        if (el) { el.style.opacity = '0.2'; el.style.pointerEvents = 'none'; removed++; }
      }
    }
  } else if (type === 'skip') {
    quizState.q++;
    showQuizQuestion();
  } else if (type === 'double') {
    // Double the prize for this question
    q.prize = q.prize * 2;
  }

  quizState.lifelines[type] = false;
  // Update lifeline buttons
  var btns = document.querySelectorAll('.lifeline-btn');
  if (type === 'fifty') btns[0].classList.add('used');
  if (type === 'skip') btns[1].classList.add('used');
  if (type === 'double') btns[2].classList.add('used');
}

function quizWin() {
  var finalPrize = PRIZE_LADDER[PRIZE_LADDER.length - 1];
  if (finalPrize > U.quizHighScore) U.quizHighScore = finalPrize;
  save();
  showQuizResult(finalPrize);
}

function showQuizResult(score) {
  var c = document.getElementById('q-c');
  var h = '';
  h += '<div class="text-center" style="padding:var(--s7) 0">';
  h += '<div style="font-size:3rem;margin-bottom:var(--s3)">' + (score >= 1000000 ? '🏆' : score >= 10000 ? '🎉' : '💪') + '</div>';
  h += '<h1 style="font-size:var(--2xl);font-weight:900;margin-bottom:var(--s2)">₦' + score.toLocaleString() + '</h1>';
  h += '<p class="text-muted mb-4">' + (score >= 1000000 ? 'You are a music genius!' : score >= 10000 ? 'Great job! Keep studying.' : 'Keep learning. You will get there.') + '</p>';
  h += '<button class="btn btn-p" onclick="startMillionaire()">Play Again</button>';
  h += '<button class="btn btn-g" onclick="go(\'quiz\')">Back</button></div>';
  c.innerHTML = h;
}
