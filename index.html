<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Singer OS</title>
<style>

:root {
  /* OKLCH Color System - perceptually uniform */
  --bg: oklch(0.10 0.01 260);
  --bg2: oklch(0.13 0.01 260);
  --card: oklch(0.17 0.01 260);
  --card2: oklch(0.20 0.01 260);
  --border: oklch(0.28 0.01 260);
  --border-hi: oklch(0.35 0.02 260);
  
  /* Primary - Indigo */
  --pri: oklch(0.65 0.20 270);
  --pri-hi: oklch(0.72 0.18 270);
  --pri-dim: oklch(0.55 0.22 270);
  --pri-glow: oklch(0.65 0.20 270 / 0.15);
  --pri-glow-hi: oklch(0.65 0.20 270 / 0.30);
  
  /* Semantic */
  --ok: oklch(0.72 0.18 145);
  --ok-dim: oklch(0.60 0.20 145);
  --warn: oklch(0.78 0.16 60);
  --err: oklch(0.65 0.20 25);
  --gold: oklch(0.82 0.16 95);
  
  /* Text */
  --tx: oklch(0.95 0.01 260);
  --tx2: oklch(0.70 0.01 260);
  --tx3: oklch(0.48 0.01 260);
  
  /* Typography Scale */
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --xs: 0.6875rem;
  --sm: 0.8125rem;
  --base: 0.9375rem;
  --md: 1.0625rem;
  --lg: 1.25rem;
  --xl: 1.5rem;
  --2xl: 1.875rem;
  --3xl: 2.25rem;
  
  /* Spacing Scale */
  --s1: 4px;
  --s2: 8px;
  --s3: 12px;
  --s4: 16px;
  --s5: 20px;
  --s6: 24px;
  --s7: 32px;
  --s8: 40px;
  --s9: 48px;
  
  /* Radius */
  --r-sm: 8px;
  --r: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
  --r-full: 9999px;
  
  /* Elevation */
  --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.3);
  --shadow: 0 4px 12px oklch(0 0 0 / 0.4);
  --shadow-lg: 0 8px 24px oklch(0 0 0 / 0.5);
  --shadow-glow: 0 0 20px var(--pri-glow);
  
  /* Motion */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast: 150ms;
  --dur: 250ms;
  --dur-slow: 400ms;
}

/* Font Loading */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  color-scheme: dark;
  -webkit-tap-highlight-color: transparent;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--tx);
  font-size: var(--base);
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: 88px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Reduced Motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--r-full); }

/* Screen System */
.sc { display: none; min-height: calc(100vh - 88px); }
.sc.active { display: block; animation: fadeIn var(--dur) var(--ease-out) both; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

@keyframes glow {
  0%, 100% { box-shadow: 0 0 8px var(--pri-glow); }
  50% { box-shadow: 0 0 20px var(--pri-glow-hi); }
}

@keyframes confetti {
  0% { transform: scale(0) rotate(0deg); opacity: 0; }
  50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
  100% { transform: scale(1) rotate(360deg); opacity: 1; }
}

/* Top Bar */
.tb {
  position: sticky;
  top: 0;
  z-index: 100;
  background: oklch(0.10 0.01 260 / 0.92);
  backdrop-filter: blur(12px) saturate(1.4);
  -webkit-backdrop-filter: blur(12px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  padding: var(--s4) var(--s5);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.tb-t {
  font-size: var(--md);
  font-weight: 800;
  letter-spacing: -0.02em;
}
.tb-r {
  font-size: var(--sm);
  color: var(--gold);
  font-weight: 600;
  font-family: var(--font-mono);
}

/* Screen Padding */
.sp { padding: var(--s5) var(--s4) var(--s9); max-width: 540px; margin: 0 auto; }

/* Bottom Navigation */
.bn {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: oklch(0.12 0.01 260 / 0.95);
  backdrop-filter: blur(16px) saturate(1.6);
  -webkit-backdrop-filter: blur(16px) saturate(1.6);
  border-top: 1px solid var(--border);
  height: 72px;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.bn-in {
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: 100%;
  max-width: 500px;
  margin: 0 auto;
  padding: 0 var(--s2);
}
.bn-i {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: var(--s2) var(--s3);
  color: var(--tx3);
  font-size: var(--xs);
  font-weight: 600;
  text-decoration: none;
  border-radius: var(--r-sm);
  transition: color var(--dur-fast), background var(--dur-fast);
  min-width: 48px;
  min-height: 48px;
  justify-content: center;
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--font);
}
.bn-i:hover { color: var(--tx2); background: oklch(0.20 0.01 260 / 0.5); }
.bn-i.on { color: var(--pri); }
.bn-i.on:hover { background: var(--pri-glow); }
.bn-ic {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1px;
}
.bn-ic svg { width: 22px; height: 22px; stroke-width: 1.8; }

/* Cards */
.c {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--s5);
  margin-bottom: var(--s3);
  transition: border-color var(--dur), box-shadow var(--dur), transform var(--dur-fast);
}
.c:hover {
  border-color: var(--border-hi);
  box-shadow: var(--shadow-sm);
}
.c:active { transform: scale(0.98); }
.c-a { border-color: oklch(0.65 0.20 270 / 0.25); background: linear-gradient(135deg, var(--card), oklch(0.65 0.20 270 / 0.04)); }
.c-a:hover { border-color: oklch(0.65 0.20 270 / 0.4); box-shadow: var(--shadow-glow); }
.c-g { border-color: oklch(0.82 0.16 95 / 0.2); }
.c-g:hover { border-color: oklch(0.82 0.16 95 / 0.35); }
.c-ok { border-color: oklch(0.72 0.18 145 / 0.25); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--s2);
  padding: var(--s3) var(--s5);
  border-radius: var(--r);
  font-weight: 700;
  font-size: var(--sm);
  font-family: var(--font);
  width: 100%;
  margin-bottom: var(--s2);
  cursor: pointer;
  border: none;
  transition: all var(--dur-fast) var(--ease-out);
  min-height: 48px;
  letter-spacing: -0.01em;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, oklch(1 0 0 / 0.08), transparent);
  pointer-events: none;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0) scale(0.98); }
.btn:disabled { opacity: 0.4; pointer-events: none; }

.btn-p {
  background: linear-gradient(135deg, var(--pri), var(--pri-dim));
  color: #fff;
  box-shadow: 0 2px 8px var(--pri-glow);
}
.btn-p:hover { box-shadow: 0 4px 16px var(--pri-glow-hi); }

.btn-s {
  background: linear-gradient(135deg, var(--ok), var(--ok-dim));
  color: oklch(0.15 0.01 260);
  box-shadow: 0 2px 8px oklch(0.72 0.18 145 / 0.2);
}
.btn-s:hover { box-shadow: 0 4px 16px oklch(0.72 0.18 145 / 0.3); }

.btn-g {
  background: transparent;
  color: var(--tx2);
  border: 1px solid var(--border);
}
.btn-g:hover { background: var(--card2); color: var(--tx); border-color: var(--border-hi); }

.btn-w {
  background: transparent;
  color: var(--tx3);
  border: 1px solid var(--border);
  font-weight: 500;
}
.btn-w:hover { color: var(--tx2); }

/* Tags */
.tag {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: var(--r-full);
  font-size: var(--xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.tag-p { background: var(--pri-glow); color: var(--pri-hi); }
.tag-s { background: oklch(0.72 0.18 145 / 0.1); color: var(--ok); }
.tag-g { background: oklch(0.82 0.16 95 / 0.1); color: var(--gold); }
.tag-w { background: oklch(0.78 0.16 60 / 0.1); color: var(--warn); }

/* Progress Bars */
.pr {
  height: 8px;
  background: var(--border);
  border-radius: var(--r-full);
  overflow: hidden;
  position: relative;
}
.pr-f {
  height: 100%;
  background: linear-gradient(90deg, var(--pri-dim), var(--pri));
  border-radius: var(--r-full);
  transition: width var(--dur-slow) var(--ease-out);
  position: relative;
}
.pr-f::after {
  content: '';
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 20px;
  background: linear-gradient(90deg, transparent, oklch(1 0 0 / 0.15));
  border-radius: var(--r-full);
}
.pr-ok .pr-f { background: linear-gradient(90deg, var(--ok-dim), var(--ok)); }
.pr-g .pr-f { background: linear-gradient(90deg, oklch(0.70 0.14 95), var(--gold)); }

/* List Items */
.li {
  display: flex;
  align-items: center;
  gap: var(--s4);
  padding: var(--s4);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: var(--s2);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
  min-height: 56px;
}
.li:hover {
  border-color: var(--border-hi);
  background: var(--card2);
  transform: translateX(2px);
}
.li:active { transform: scale(0.98); }
.li-ic {
  width: 44px;
  height: 44px;
  border-radius: var(--r);
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--pri-glow);
  color: var(--pri);
  flex-shrink: 0;
  font-weight: 800;
  font-size: var(--sm);
}
.li-ic svg { width: 20px; height: 20px; stroke-width: 1.8; }
.li-b { flex: 1; min-width: 0; }
.li-t { font-weight: 700; font-size: var(--sm); letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-sub { font-size: var(--xs); color: var(--tx3); margin-top: 1px; }
.li-r { font-size: var(--xs); color: var(--gold); font-weight: 700; font-family: var(--font-mono); flex-shrink: 0; }

/* Sections */
.sec { margin-bottom: var(--s6); }
.sec-h {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--s3);
}
.sec-t {
  font-size: var(--xs);
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--tx3);
}

/* Hero */
.hero { padding: var(--s5) 0 var(--s6); }
.hero h1 {
  font-size: var(--2xl);
  font-weight: 900;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: var(--s2);
}
.hero p { color: var(--tx2); font-size: var(--sm); }

/* Quiz Options */
.qo {
  display: flex;
  align-items: center;
  gap: var(--s3);
  padding: var(--s4);
  border: 2px solid var(--border);
  border-radius: var(--r);
  margin-bottom: var(--s2);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
  min-height: 52px;
}
.qo:hover { border-color: var(--border-hi); background: var(--card); }
.qo.sel { border-color: var(--pri); background: var(--pri-glow); }
.qo.ok { border-color: var(--ok); background: oklch(0.72 0.18 145 / 0.08); }
.qo.err { border-color: var(--err); background: oklch(0.65 0.20 25 / 0.08); }
.qo.dis { pointer-events: none; opacity: 0.6; }
.qr {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  flex-shrink: 0;
  transition: all var(--dur-fast);
  display: flex;
  align-items: center;
  justify-content: center;
}
.qo.sel .qr { background: var(--pri); border-color: var(--pri); }
.qo.ok .qr { background: var(--ok); border-color: var(--ok); }
.qo.err .qr { background: var(--err); border-color: var(--err); }
.qr::after {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  opacity: 0;
  transition: opacity var(--dur-fast);
}
.qo.sel .qr::after, .qo.ok .qr::after, .qo.err .qr::after { opacity: 1; }

/* Exercise Steps */
.es {
  display: flex;
  gap: var(--s3);
  padding: var(--s4) 0;
  border-bottom: 1px solid var(--border);
  align-items: flex-start;
}
.es:last-child { border-bottom: none; }
.esn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--xs);
  font-weight: 800;
  background: var(--pri-glow);
  color: var(--pri);
  flex-shrink: 0;
  margin-top: 2px;
}
.est { flex: 1; }
.est p { font-size: var(--sm); color: var(--tx2); line-height: 1.5; }

/* Toast / Feedback */
.ft {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-200%);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: var(--s3) var(--s5);
  z-index: 9999;
  font-size: var(--sm);
  font-weight: 600;
  box-shadow: var(--shadow-lg);
  transition: transform var(--dur) var(--ease-spring);
  max-width: 90vw;
  text-align: center;
}
.ft.show { transform: translateX(-50%) translateY(0); }
.ft-ok { border-color: var(--ok); color: var(--ok); }
.ft-err { border-color: var(--err); color: var(--err); }
.ft-info { border-color: var(--pri); color: var(--pri); }

/* Grid helpers */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s2); }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--s2); }

/* Text helpers */
.text-center { text-align: center; }
.text-sm { font-size: var(--sm); }
.text-xs { font-size: var(--xs); }
.text-muted { color: var(--tx3); }
.text-pri { color: var(--pri); }
.text-ok { color: var(--ok); }
.text-gold { color: var(--gold); }
.text-warn { color: var(--warn); }
.text-err { color: var(--err); }
.text-bold { font-weight: 700; }
.text-mono { font-family: var(--font-mono); }
.mb-1 { margin-bottom: var(--s1); }
.mb-2 { margin-bottom: var(--s2); }
.mb-3 { margin-bottom: var(--s3); }
.mb-4 { margin-bottom: var(--s4); }
.mt-2 { margin-top: var(--s2); }
.mt-4 { margin-top: var(--s4); }
.gap-2 { gap: var(--s2); }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.w-full { width: 100%; }

/* Input */
.input {
  width: 100%;
  padding: var(--s3) 0;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--tx);
  font-family: var(--font);
  font-size: var(--base);
  transition: border-color var(--dur-fast);
  outline: none;
}
.input:focus { border-color: var(--pri); }
.input::placeholder { color: var(--tx3); }
label {
  display: block;
  font-size: var(--xs);
  color: var(--tx3);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: var(--s1);
}

/* Badge */
.badge {
  display: inline-flex;
  align-items: center;
  gap: var(--s1);
  padding: var(--s1) var(--s3);
  border-radius: var(--r-full);
  font-size: var(--xs);
  font-weight: 700;
  background: var(--card2);
  border: 1px solid var(--border);
}

/* Level indicator */
.level-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pri), var(--pri-dim));
  color: #fff;
  font-weight: 900;
  font-size: var(--sm);
  box-shadow: 0 2px 8px var(--pri-glow);
}

/* Streak flame */
.streak { display: inline-flex; align-items: center; gap: var(--s1); }

/* Achievement popup */
.achieve {
  position: fixed;
  inset: 0;
  z-index: 10000;
  display: none;
  align-items: center;
  justify-content: center;
  background: oklch(0 0 0 / 0.7);
  backdrop-filter: blur(4px);
}
.achieve.show { display: flex; }
.achieve-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: var(--s7);
  text-align: center;
  max-width: 320px;
  animation: confetti 0.5s var(--ease-spring) both;
}
.achieve-icon { font-size: 3rem; margin-bottom: var(--s3); }
.achieve-title { font-size: var(--lg); font-weight: 800; margin-bottom: var(--s2); }
.achieve-desc { color: var(--tx2); font-size: var(--sm); margin-bottom: var(--s5); }

/* Vocal load bar */
.vocal-load {
  height: 6px;
  background: var(--border);
  border-radius: var(--r-full);
  overflow: hidden;
  margin: var(--s2) 0;
}
.vocal-load-f {
  height: 100%;
  border-radius: var(--r-full);
  transition: width var(--dur-slow) var(--ease-out), background var(--dur);
}
.vocal-load-f.ok { background: var(--ok); }
.vocal-load-f.warn { background: var(--warn); }
.vocal-load-f.danger { background: var(--err); }

/* Divider */
.hr { height: 1px; background: var(--border); margin: var(--s4) 0; }

/* Reference box */
.ref-box {
  background: oklch(0.65 0.20 270 / 0.06);
  border: 1px solid oklch(0.65 0.20 270 / 0.15);
  border-radius: var(--r);
  padding: var(--s4);
  margin: var(--s3) 0;
}
.ref-box-title {
  font-size: var(--xs);
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--pri);
  margin-bottom: var(--s2);
}

/* Song card */
.song-card {
  display: flex;
  align-items: center;
  gap: var(--s4);
  padding: var(--s4);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: var(--s2);
  cursor: pointer;
  transition: all var(--dur-fast);
}
.song-card:hover { border-color: var(--border-hi); background: var(--card2); }
.song-art {
  width: 52px;
  height: 52px;
  border-radius: var(--r-sm);
  background: linear-gradient(135deg, var(--pri-glow), var(--card2));
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: var(--lg);
}
.song-info { flex: 1; min-width: 0; }
.song-title { font-weight: 700; font-size: var(--sm); }
.song-artist { font-size: var(--xs); color: var(--tx3); }
.song-tags { display: flex; gap: var(--s1); margin-top: var(--s1); flex-wrap: wrap; }

/* Difficulty dots */
.dots { display: flex; gap: 3px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
.dot.filled { background: var(--pri); }
.dot.ok { background: var(--ok); }

/* Coach message */

  mechanics: {

      {

        outcome: 'Be able to sustain a steady note for 20 seconds without running out of air',
        title: 'Breath That Carries You',
        xp: 15,
        content: '<p>Most singers run out of air because they push air out too fast. The trick is not more air — it is <b>controlled escape</b>.</p><p><b>What NYVC teaches:</b> Do NOT say "sing from your diaphragm." The diaphragm is an involuntary muscle — you cannot control it directly. What you CAN control is the <b>muscles around your ribs and abdomen</b> that slow down how fast the air escapes.</p><p>This is called <b>appoggio</b> (Italian for "lean"). Your ribs expand on the inhale. While singing, they should stay expanded as long as possible. Think: <b>inflate and hold</b>.</p><p><b>The NYVC breathing exercise:</b> Hands on ribs. Breathe in — ribs push out. Hiss "sss" — hold ribs out. Goal: 15 seconds without ribs collapsing. The diaphragm descends on the inhale (involuntary). The intercostal muscles and abs control the exhale (voluntary). Train the voluntary muscles.</p><div class="ref-box"><div class="ref-box-title">NYVC Method</div><p>Justin Stoney: "Control the cage — abs, intercostals, lower back. Expand ribs on inhale, maintain while singing." The appoggio is not about pushing air OUT. It is about NOT letting air escape too fast. Think of it as a slow leak, not a burst.</p></div>',
        exercise: {
          name: 'Rib Cage Hold',

        xp: 15,

ont-size="7" text-anchor="middle">H4</text><text x="105" y="100" fill="var(--tx3)" font-size="8" text-anchor="middle">Set by vocal fold vibration</text><rect x="210" y="25" width="170" height="85" rx="6" fill="oklch(0.72 0.18 145 / 0.06)" stroke="var(--ok)" stroke-width="1"/><text x="295" y="42" fill="var(--ok)" font-size="10" text-anchor="middle" font-weight="800">FORMANTS (Adjustable)</text><path d="M230,55 Q260,35 290,55 Q320,75 350,55" fill="none" stroke="var(--ok)" stroke-width="2"/><text x="295" y="75" fill="var(--tx3)" font-size="7" text-anchor="middle">Vocal tract resonance</text><text x="295" y="90" fill="var(--tx3)" font-size="7" text-anchor="middle">Changes with mouth shape</text><text x="295" y="100" fill="var(--tx3)" font-size="8" text-anchor="middle">You control this!</text></svg></div><p><b>How to feel formants without a spectogram:</b></p><p>1. Hum on "mmm" — feel the buzz on your lips? That is a low formant.</p><p>2. Open to "ah" — feel the buzz move to your throat? That is a higher formant.</p><p>3. Say "ee" — feel the buzz move forward and up? That is formant tuning.</p><p>4. Now sing a note and slowly change from "mmm" to "ah" to "ee" — hear the tone color change? THAT is formant control.</p><div class="ref-box"><div class="ref-box-title">NYVC Method</div><p>Justin Stoney: "The larynx is a style changer. The resonators are tone changers. Master both and you can create any sound." Formant tuning is how classical singers project over an orchestra without a microphone — they tune their formants to match their harmonics. You can do the same thing.</p></div>',

  for (var si = 0; si < stages.length; si++) {

    var stageModules = [];

    // Gather all modules for this stage
    for (var s = 0; s < allSections.length; s++) {
      var sec = CURRICULUM[allSections[s]];
      if (!sec || !sec.modules) continue;
      for (var i = 0; i < sec.modules.length; i++) {
        if (sec.modules[i].stage === stage.id) {
          stageModules.push({ module: sec.modules[i], section: allSections[s], index: i, secTitle: sec.title, secIcon: sec.icon });
        }
      }
    }

    if (stageModules.length === 0) continue;

    // Check if stage is unlocked
    var unlocked = true;
    if (stage.id > 1) {
      var prevModules = 0, prevDone = 0;
      for (var s2 = 0; s2 < allSections.length; s2++) {
        var sec2 = CURRICULUM[allSections[s2]];
        if (!sec2 || !sec2.modules) continue;
        for (var j = 0; j < sec2.modules.length; j++) {
          if (sec2.modules[j].stage === stage.id - 1) {
            prevModules++;
            if (U.completed.indexOf(sec2.modules[j].id) !== -1) prevDone++;
          }
        }
      }
      unlocked = prevModules === 0 || (prevDone / prevModules) >= 0.8;
    }

    // Stage header with progress
    var doneCount = 0;
    for (var m = 0; m < stageModules.length; m++) {
      if (U.completed.indexOf(stageModules[m].module.id) !== -1) doneCount++;

    var pct = Math.round(doneCount / stageModules.length * 100);

    h += '<div class="sec">';
    h += '<div class="sec-h">';

    }
    h += '</div>';

    // Progress bar

// ============================================================
// PITCH DETECTION ENGINE — Real-time pitch via Web Audio API
// ============================================================
var PitchEngine = {
  audioCtx: null,
  analyser: null,
  stream: null,
  isRunning: false,
  targetNote: null,
  
  // Note frequencies (A4 = 440Hz standard tuning)
  noteFreqs: {},
  noteNames: ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'],
  
  init: function() {
    // Calculate frequencies for all notes (C0 to B8)
    for (var oct = 0; oct < 9; oct++) {
      for (var n = 0; n < 12; n++) {
        var midi = (oct * 12) + n;
        var freq = 440 * Math.pow(2, (midi - 69) / 12);
        this.noteFreqs[midi] = freq;
      }
    }
  },
  
  // Autocorrelation pitch detection
  detectPitch: function(buffer, sampleRate) {
    var bufLen = buffer.length;
    var correlations = new Float32Array(bufLen);
    
    // RMS check — is there enough signal?
    var rms = 0;
    for (var i = 0; i < bufLen; i++) rms += buffer[i] * buffer[i];
    rms = Math.sqrt(rms / bufLen);
    if (rms < 0.01) return null; // Too quiet
    
    // Autocorrelation
    for (var lag = 0; lag < bufLen; lag++) {
      var sum = 0;
      for (var j = 0; j < bufLen - lag; j++) {
        sum += buffer[j] * buffer[j + lag];
      }
      correlations[lag] = sum;
    }
    
    // Find first peak after initial decay
    var found = false;
    var firstPeak = 0;
    for (var lag = 1; lag < bufLen - 1; lag++) {
      if (correlations[lag] > correlations[lag - 1] && correlations[lag] > correlations[lag + 1]) {
        if (!found) { firstPeak = lag; found = true; }
        if (lag > firstPeak + 10) break;
      }
    }
    
    if (!found || firstPeak < 10) return null;
    return sampleRate / firstPeak;
  },
  
  // Convert frequency to note name + cents
  freqToNote: function(freq) {
    var midi = 12 * Math.log2(freq / 440) + 69;
    var midiRound = Math.round(midi);
    var cents = Math.round((midi - midiRound) * 100);
    var octave = Math.floor(midiRound / 12);
    var noteName = this.noteNames[midiRound % 12];
    return { name: noteName, octave: octave, cents: cents, freq: freq, midi: midiRound };
  },
  
  start: function(targetNoteName) {
    if (this.isRunning) this.stop();
    this.init();
    this.targetNote = targetNoteName;
    
    var self = this;
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
      self.stream = stream;
      self.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      var source = self.audioCtx.createMediaStreamSource(stream);
      self.analyser = self.audioCtx.createAnalyser();
      self.analyser.fftSize = 2048;
      source.connect(self.analyser);
      self.isRunning = true;
      self.loop();
    }).catch(function(err) {
      toast('Microphone access denied. Allow mic to use pitch detector.', 'err');
    });
  },
  
  loop: function() {
    if (!this.isRunning) return;
    var self = this;
    var buffer = new Float32Array(this.analyser.fftSize);
    this.analyser.getFloatTimeDomainData(buffer);
    
    var freq = this.detectPitch(buffer, this.audioCtx.sampleRate);
    if (freq) {
      var note = this.freqToNote(freq);
      onPitchDetected(note);
    }
    
    requestAnimationFrame(function() { self.loop(); });
  },
  
  stop: function() {
    this.isRunning = false;
    if (this.stream) {
      this.stream.getTracks().forEach(function(t) { t.stop(); });
    }
    if (this.audioCtx) {
      this.audioCtx.close();
    }
    this.stream = null;
    this.audioCtx = null;
  }
};

// ============================================================
var SRS = {
  // Intervals in hours: 1h, 4h, 12h, 1d, 3d, 7d, 14d, 30d
  intervals: [1, 4, 12, 24, 72, 168, 336, 720],
  
  init: function() {
    try {
      var stored = localStorage.getItem('singerOS_srs');
      if (stored) U.srsData = JSON.parse(stored);
    } catch(e) {}
    if (!U.srsData) U.srsData = {};
  },
  
  // Record that a skill was practiced
  record: function(skill) {
    if (!U.srsData[skill]) U.srsData[skill] = { level: 0, nextReview: Date.now(), history: [] };
    var item = U.srsData[skill];
    item.level = Math.min(item.level + 1, this.intervals.length - 1);
    item.nextReview = Date.now() + this.intervals[item.level] * 3600000;
    item.history.push(Date.now());
    this.save();
  },
  
  // Get skills due for review
  getDue: function() {
    var now = Date.now();
    var due = [];
    for (var skill in U.srsData) {
      if (U.srsData[skill].nextReview <= now) {
        due.push(skill);
      }
    }
    return due;
  },
  
  // Get recommended next practice
  getRecommendation: function() {
    var due = this.getDue();
    if (due.length === 0) return null;
    // Prioritize lowest level (most urgent)
    due.sort(function(a, b) {
      return U.srsData[a].nextReview - U.srsData[b].nextReview;
    });
    return due[0];
  },
  
  save: function() {
    try { localStorage.setItem('singerOS_srs', JSON.stringify(U.srsData)); } catch(e) {}
  }
};

// ============================================================
// GAMIFICATION — Streaks, Leaderboard, XP Multipliers
// ============================================================
var GAME = {
  init: function() {
    // Check streak
    var today = new Date().toDateString();
    var last = U.lastPractice;
    if (last) {
      var lastDate = new Date(last).toDateString();
      var yesterday = new Date(Date.now() - 86400000).toDateString();
      if (lastDate !== today && lastDate !== yesterday) {
        U.streak = 0; // Streak broken
      }
    }
    U.lastPractice = Date.now();
    if (!U.streak) U.streak = 0;
    save();
  },
  
  // XP multiplier based on streak
  getMultiplier: function() {
    if (U.streak >= 30) return 3.0;
    if (U.streak >= 14) return 2.5;
    if (U.streak >= 7) return 2.0;
    if (U.streak >= 3) return 1.5;
    return 1.0;
  },
  
  // Add XP with multiplier
  addXP: function(amount) {
    var mult = this.getMultiplier();
    var earned = Math.round(amount * mult);
    U.xp += earned;
    // Level up every 100 XP
    U.level = Math.floor(U.xp / 100) + 1;
    SRS.init();
    return { earned: earned, mult: mult, total: U.xp, level: U.level };
  },
  
  // Get leaderboard (local — would be server-based in production)
  getLeaderboard: function() {
    var board = [];
    try {
      var stored = localStorage.getItem('singerOS_leaderboard');
      if (stored) board = JSON.parse(stored);
    } catch(e) {}
    // Add current user
    board.push({ name: U.name, xp: U.xp, level: U.level, streak: U.streak });
    board.sort(function(a, b) { return b.xp - a.xp; });
    return board.slice(0, 10);
  }
};

function fetchLeaderboard(period) {
  var list = document.getElementById('lb-list');
  if (!list) return;
  
  // Try server first
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'http://127.0.0.1:3000/leaderboard', true);
  xhr.timeout = 3000;
  xhr.onload = function() {
    try {
      var data = JSON.parse(xhr.responseText);
      var entries = data[period] || [];
      if (entries.length > 0) {
        renderLBEntries(entries);
        return;
      }
    } catch(e) {}
    // Fall back to local
    showLocalLB(list, period);
  };
  xhr.onerror = function() { showLocalLB(list, period); };
  xhr.ontimeout = function() { showLocalLB(list, period); };
  xhr.send();
}

function showLocalLB(list, period) {
  // Build leaderboard from localStorage data
  var entries = [];
  try {
    var keys = Object.keys(localStorage);
    for (var i = 0; i < keys.length; i++) {
      if (keys[i].indexOf('singerOS_lb_') === 0) {
        var entry = JSON.parse(localStorage.getItem(keys[i]));
        if (entry && entry.period === period) {
          entries.push(entry);
        }
      }
    }
  } catch(e) {}
  
  // Also add current user
  if (U && U.name) {
    entries.push({name: U.name, xp: U.xp || 0, sessions: U.sessions || 0, isYou: true});
  }
  
  // Sort by XP
  entries.sort(function(a, b) { return (b.xp || 0) - (a.xp || 0); });
  entries = entries.slice(0, 10);
  
  if (entries.length === 0) {
    list.innerHTML = '<p class="text-muted" style="padding:var(--s4)">No scores yet. Complete an exercise to appear on the leaderboard!</p>';
    return;
  }
  
  renderLBEntries(entries);
}

  if (skill === 'pitch') {

    var targetNote = targetSelect ? targetSelect.value : 'C4';
    if (targetSelect) {
      targetSelect.onchange = function() { targetNote = this.value; };
    }
    var targetFreq = noteNameToFreq(targetNote);

    onPitchDetected = function(note) {
      var display = document.getElementById('pitch-note');
      var centsDisplay = document.getElementById('pitch-cents');
      var bar = document.getElementById('pitch-bar');
      if (!display) return;

      display.textContent = note.name + note.octave;
      var cents = note.cents;
      centsDisplay.textContent = (cents === 0 ? '✓ Perfect!' : (cents > 0 ? '+' + cents + ' cents (sharp)' : cents + ' cents (flat)'));

      // Meter: -50 to +50 cents mapped to 0-100%
      var pct = Math.max(0, Math.min(100, 50 + (cents / 50) * 50));
      bar.style.width = pct + '%';
      if (Math.abs(cents) < 10) {
        bar.style.background = 'var(--ok)';
        centsDisplay.style.color = 'var(--ok)';
      } else if (Math.abs(cents) < 25) {
        bar.style.background = 'var(--gold)';
        centsDisplay.style.color = 'var(--gold)';
      } else {
        bar.style.background = 'var(--err)';
        centsDisplay.style.color = 'var(--err)';
      }

      // Score tracking
      if (!window.pitchScore) window.pitchScore = { attempts: 0, inTune: 0 };
      window.pitchScore.attempts++;
      if (Math.abs(cents) < 15) window.pitchScore.inTune++;
      var scoreDiv = document.getElementById('pitch-score');
      if (scoreDiv) {
        var accuracy = window.pitchScore.attempts > 0 ? Math.round(window.pitchScore.inTune / window.pitchScore.attempts * 100) : 0;
        scoreDiv.textContent = 'Score: ' + window.pitchScore.inTune + '/' + window.pitchScore.attempts + ' in tune (' + accuracy + '%)';
      }

      // Spectrum analyzer
      if (PitchEngine.analyser) {
        var spBuf = new Float32Array(PitchEngine.analyser.frequencyBinCount);
        PitchEngine.analyser.getFloatFrequencyData(spBuf);
        var spDiv = document.getElementById('pitch-spectrum');
        if (spDiv) {
          var html = '';
          var maxBin = Math.floor(4000 / (PitchEngine.audioCtx.sampleRate / PitchEngine.analyser.fftSize));
          var step = Math.max(1, Math.floor(maxBin / 80));
          for (var i = 1; i < maxBin; i += step) {
            var val = Math.max(0, (spBuf[i] + 60) / 60);
            var h = Math.min(100, val * 100);
            // Color: low freq = purple, mid = indigo, high = gold
            var hue = 260 + (i / maxBin) * 60;
            html += '<div style="flex:1;min-height:2px;height:' + h + '%;background:hsl(' + hue + ',70%,55%);border-radius:1px 1px 0 0;opacity:.8"></div>';
          }
          spDiv.innerHTML = html;
        }
      }
    };
  }
}

function noteNameToFreq(name) {
  var notes = { 'C':0, 'C#':1, 'D':2, 'D#':3, 'E':4, 'F':5, 'F#':6, 'G':7, 'G#':8, 'A':9, 'A#':10, 'B':11 };
  var note = name.replace(/\d/, '');
  var oct = parseInt(name.replace(/\D/g, ''));
  var midi = (oct * 12) + (notes[note] || 0);
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function startPitchDrill() {
  // Initialize PitchTraining engine
  if (typeof PitchTraining === 'undefined') {
    toast('Pitch training module loading... try again in 1 second', 'warn');
    return;
  }
  
  var targetNote = document.getElementById('pitch-target-note');
  var target = targetNote ? targetNote.value : 'C4';
  
  // Start session with level-appropriate exercise
  var session = PitchTraining.startSession('b1');
  PitchTraining.targetFreq = noteNameToFreq(target);
  PitchTraining.targetNote = target;
  
  // Update UI with level info
  var levelLabel = PitchTraining.level.toUpperCase();
  var exName = session ? session.name : 'Pitch Training';
  
  var ui = document.getElementById('pitch-display');
  if (ui) {
    ui.innerHTML = '';
    // Level badge
    ui.innerHTML += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--s3)"><span class="tag tag-p">' + levelLabel + '</span><span id="vl-streak" class="tag tag-g">Streak: 0</span></div>';
    // Exercise name
    ui.innerHTML += '<div style="font-size:var(--sm);color:var(--tx2);margin-bottom:var(--s2)">' + exName + '</div>';
    // Note display
    ui.innerHTML += '<div id="pitch-note" style="font-size:3rem;font-weight:900;color:var(--pri)">—</div>';
    ui.innerHTML += '<div id="pitch-cents" style="font-size:1.2rem;color:var(--tx3);margin-top:var(--s2)">Sing ' + target + '...</div>';
    // Score display
    ui.innerHTML += '<div id="vl-score" style="font-size:2.5rem;font-weight:900;margin:var(--s3) 0">—</div>';
    ui.innerHTML += '<div id="vl-feedback" style="font-size:var(--sm);color:var(--tx2);margin-bottom:var(--s3)">Real-time analysis</div>';
    // Meter
    ui.innerHTML += '<div style="height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;margin-bottom:var(--s2)"><div id="pitch-bar" style="width:50%;height:100%;background:var(--pri);border-radius:4px;transition:all 0.1s"></div></div>';
    ui.innerHTML += '<div style="display:flex;justify-content:space-between;font-size:0.65rem;color:var(--tx3)"><span>♭ Flat</span><span>In Tune</span><span>♯ Sharp</span></div>';
    // Spectrum
    ui.innerHTML += '<div id="pitch-spectrum" style="margin-top:var(--s3);height:48px;background:var(--bg2);border-radius:var(--r);display:flex;align-items:flex-end;gap:1px;padding:var(--s1);overflow:hidden"></div>';
    ui.innerHTML += '<div style="font-size:0.6rem;color:var(--tx3);margin-top:2px">Spectrum — harmonics in real-time</div>';
    // Stats row
    ui.innerHTML += '<div id="vl-stats" style="display:flex;justify-content:space-between;margin-top:var(--s3);font-size:0.7rem;color:var(--tx3)"><span>Accuracy: —</span><span>Stability: —</span><span>Closure: —</span></div>';
  }
  
  // Override onPitchDetected with full analysis
  onPitchDetected = function(note) {
    if (!PitchTraining.session) return;
    
    // Get full analysis from PitchEngine
    var buffer = new Float32Array(PitchEngine.analyser.fftSize);
    PitchEngine.analyser.getFloatTimeDomainData(buffer);
    var analysis = PitchTraining.analyze(buffer, PitchEngine.audioCtx.sampleRate, PitchEngine.analyser);
    if (!analysis) return;
    
    // Record and score
    var levelResult = PitchTraining.recordAnalysis(analysis);
    var score = PitchTraining.score(analysis);
    
    // Update display
    var noteEl = document.getElementById('pitch-note');
    var centsEl = document.getElementById('pitch-cents');
    var barEl = document.getElementById('pitch-bar');
    var scoreEl = document.getElementById('vl-score');
    var fbEl = document.getElementById('vl-feedback');
    var streakEl = document.getElementById('vl-streak');
    var statsEl = document.getElementById('vl-stats');
    var spEl = document.getElementById('pitch-spectrum');
    
    if (noteEl) noteEl.textContent = note.name + note.octave;
    if (centsEl) {
      var absCents = Math.abs(analysis.cents);
      if (absCents < 10) centsEl.textContent = '✓ In tune!';
      else if (analysis.cents < 0) centsEl.textContent = '↑ Flat ' + Math.abs(analysis.cents) + ' cents';
      else centsEl.textContent = '↓ Sharp ' + analysis.cents + ' cents';
    }
    if (barEl) {
      var pct = Math.max(0, Math.min(100, 50 + (analysis.cents / 50) * 50));
      barEl.style.width = pct + '%';
      barEl.style.background = absCents < 10 ? 'var(--ok)' : absCents < 25 ? 'var(--gold)' : 'var(--err)';
    }
    if (scoreEl) {
      scoreEl.textContent = score.overall + '%';
      scoreEl.style.color = score.color;
    }
    if (fbEl) {
      fbEl.textContent = score.feedback;
      fbEl.style.color = score.color;
    }
    if (streakEl) streakEl.textContent = 'Streak: ' + PitchTraining.scores.streak;
    if (statsEl) {
      statsEl.innerHTML = '<span>Pitch: ' + Math.round(score.pitch) + '%</span><span>Stability: ' + Math.round(score.stability) + '%</span><span>Closure: ' + Math.round(score.closure) + '%</span>';
    }
    
    // Spectrum
    if (spEl && PitchEngine.analyser) {
      var spBuf = new Float32Array(PitchEngine.analyser.frequencyBinCount);
      PitchEngine.analyser.getFloatFrequencyData(spBuf);
      var html = '', maxBin = Math.floor(4000 / (PitchEngine.audioCtx.sampleRate / PitchEngine.analyser.fftSize));
      var step = Math.max(1, Math.floor(maxBin / 80));
      for (var i = 1; i < maxBin; i += step) {
        var val = Math.max(0, (spBuf[i] + 60) / 60);
        var h = Math.min(100, val * 100);
        var hue = 260 + (i / maxBin) * 60;
        html += '<div style="flex:1;min-height:2px;height:' + h + '%;background:hsl(' + hue + ',70%,55%);border-radius:1px 1px 0 0;opacity:.8"></div>';
      }
      spEl.innerHTML = html;
    }
    
    // Level up notification
    if (levelResult && levelResult.leveledUp) {
      toast('🎉 Level up! You\'re now ' + levelResult.newLevel + '!', 'ok');
    }
  };
  
  PitchEngine.start(target);
  toast('🎤 Listening... sing ' + target + '!', 'ok');
}

function stopPitchDrill() {
  PitchEngine.stop();
  
  // Show session summary
  if (typeof PitchTraining !== 'undefined') {
    var summary = PitchTraining.getSessionSummary();
    if (summary) {
      var msg = 'Session complete! Accuracy: ' + summary.accuracy + '% | Avg deviation: ' + summary.avgCents + ' cents | Best streak: ' + summary.bestStreak;
      if (summary.recommendation && summary.recommendation.length > 0) {
        msg += '\\n\\n' + summary.recommendation[0];
      }
      toast(msg, 'info');
    }
  }
}

function subDiag() {
  if (diagSel.length === 0) { toast('Select at least one', 'err'); return; }
  var sc = {airflow: 0, source: 0, resonance: 0, mix: 0};
  var map = {pitch: ['source', 'airflow'], strain: ['source', 'mix'], breathy: ['source', 'airflow'], power: ['airflow', 'resonance'], crack: ['source', 'mix'], range: ['mix', 'source']};
  for (var i = 0; i < diagSel.length; i++) { var s = map[diagSel[i]]; if (s) for (var j = 0; j < s.length; j++) sc[s[j]]++; }
  var p = 'source', mx = 0;
  for (var k in sc) if (sc[k] > mx) { mx = sc[k]; p = k; }

  var exercises = {
    airflow: {name: 'Rib Cage Hold', steps: ['Place hands on lower ribs', 'Breathe in — ribs push out', 'Hiss "sss" — hold ribs out', 'Goal: 15 seconds', 'Rest. Repeat 3 times.'], fix: 'You are pushing too much air. Control the escape rate.'},
    source: {name: 'Clean Onset Drill', steps: ['Hum "mmm" for 3 seconds', 'Open to "ah" — no "h" sound', 'If breathy, try again', 'Practice 10 reps', 'Every note should start clean'], fix: 'Your vocal folds are not closing fully. Hum first, then open.'},
    resonance: {name: 'Forward Placement', steps: ['Hum "mmm" — feel lip buzz', 'Open to "mah" — buzz stays on lips', 'If buzz drops, start over', 'Slide: mmm → mah → mmm → mah', '10 reps'], fix: 'Your sound is falling back into your throat. Keep it forward.'},
    mix: {name: 'Ng Slide', steps: ['Say "ng" — feel nose buzz', 'Slide low to high on "ng"', 'Try "nah" — same light feeling', 'If you crack, go back to "ng"', '10 smooth slides'], fix: 'You are pushing chest voice too high. Lighten up and slide through the break.'}
  };

  var ex = exercises[p] || exercises.source;
  var c = document.getElementById('v-c');
  var h = '';
  h += '<button class="btn btn-w" style="width:auto;padding:var(--s2) var(--s4);min-height:36px;font-size:var(--xs)" onclick="go(\'practice\')">← Back</button>';

  h += '<p class="text-muted text-sm mb-4">' + ex.name + '</p>';

  }
  h += '</div>';
  h += '<button class="btn btn-s" onclick="finishDiag(\'' + p + '\')">I Did It (+15 XP)</button>';

  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin:var(--s4) 0">';
  h += '<span class="text-xs text-muted">Question ' + (qi + 1) + ' of ' + qs.length + '</span>';
  h += '<span class="text-xs text-gold text-bold">₦' + PRIZE_LADDER[qi].toLocaleString() + '</span></div>';
  h += '<div class="pr mb-4"><div class="pr-f" style="width:' + ((qi + 1) / qs.length * 100) + '%"></div></div>';
  h += '<div class="millionaire-q">';
  h += '<div class="millionaire-q-num">Question ' + (qi + 1) + '</div>';
  h += '<div class="millionaire-q-text">' + q.q + '</div>';
  for (var i = 0; i < q.options.length; i++) {
    h += '<div class="qo" id="qo-' + i + '" onclick="answerQuiz(' + i + ')"><div class="qr"></div><span>' + String.fromCharCode(65 + i) + '. ' + q.options[i] + '</span></div>';
  }
  h += '</div>';
  h += '<div class="millionaire-lifelines">';
  h += '<div class="lifeline-btn ' + (quizState.lifelines.fifty ? '' : 'used') + '" onclick="useLifeline(\'fifty\')">50:50</div>';
  h += '<div class="lifeline-btn ' + (quizState.lifelines.skip ? '' : 'used') + '" onclick="useLifeline(\'skip\')">Skip</div>';
  h += '<div class="lifeline-btn ' + (quizState.lifelines.double ? '' : 'used') + '" onclick="useLifeline(\'double\')">Double</div>';
  h += '</div>';
  c.innerHTML = h;
}

function answerQuiz(idx) {
  if (quizState.over) return;
  var q = QUIZ_QUESTIONS[quizState.q];
  var correct = idx === q.answer;
  for (var i = 0; i < 4; i++) {
    var el = document.getElementById('qo-' + i);
    if (i === q.answer) el.classList.add('ok');
    else if (i === idx && !correct) el.classList.add('err');
    el.classList.add('dis');
  }
  if (correct) {
    quizState.score = q.prize;
    toast('Correct! ₦' + q.prize.toLocaleString(), 'ok');
    setTimeout(function() { quizState.q++; showQuizQuestion(); }, 1500);
  } else {
    quizState.over = true;
    toast('Wrong! Game over.', 'err');
    setTimeout(function() {
      var safeScore = 0;
      for (var m = 0; m < SAFE_MILESTONES.length; m++) {
        if (quizState.q > SAFE_MILESTONES[m]) safeScore = PRIZE_LADDER[SAFE_MILESTONES[m]];
      }
      if (safeScore > U.quizHighScore) U.quizHighScore = safeScore;
      save();
      showQuizResult(safeScore);
    }, 1500);
  }
}

function useLifeline(type) {
  if (!quizState.lifelines[type] || quizState.over) return;
  var q = QUIZ_QUESTIONS[quizState.q];
  if (type === 'fifty') {
    var removed = 0;
    for (var i = 0; i < 4 && removed < 2; i++) {
      if (i !== q.answer) {
        var el = document.getElementById('qo-' + i);
        if (el) { el.style.opacity = '0.2'; el.style.pointerEvents = 'none'; removed++; }
      }
    }
  } else if (type === 'skip') {
    quizState.q++;
    showQuizQuestion();
  } else if (type === 'double') {
    q.prize = q.prize * 2;
  }
  quizState.lifelines[type] = false;
  var btns = document.querySelectorAll('.lifeline-btn');
  if (type === 'fifty') btns[0].classList.add('used');
  if (type === 'skip') btns[1].classList.add('used');
  if (type === 'double') btns[2].classList.add('used');
}

function quizWin() {
  var finalPrize = PRIZE_LADDER[PRIZE_LADDER.length - 1];
  if (finalPrize > U.quizHighScore) U.quizHighScore = finalPrize;
  save();
  showQuizResult(finalPrize);
}

function showQuizResult(score) {
  var c = document.getElementById('q-c');
  var h = '';
  h += '<div class="text-center" style="padding:var(--s7) 0">';
  h += '<div style="font-size:3rem;margin-bottom:var(--s3)">' + (score >= 1000000 ? '🏆' : score >= 10000 ? '🎉' : '💪') + '</div>';
  h += '<h1 style="font-size:var(--2xl);font-weight:900;margin-bottom:var(--s2)">₦' + score.toLocaleString() + '</h1>';
  h += '<p class="text-muted mb-4">' + (score >= 1000000 ? 'You are a music genius!' : score >= 10000 ? 'Great job! Keep studying.' : 'Keep learning. You will get there.') + '</p>';
  h += '<button class="btn btn-p" onclick="startMillionaire()">Play Again</button>';
  h += '<button class="btn btn-g" onclick="go(\'quiz\')">Back</button></div>';
  c.innerHTML = h;
}

// Audio engine
var _audioCtx = null;
function _getAC(){if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext);return _audioCtx;}
function _playNote(midi,delay){
  try{
    var c=_getAC();var f=440*Math.pow(2,(midi-69)/12);
    var o=c.createOscillator();var g=c.createGain();
    o.type='sine';o.frequency.value=f;
    g.gain.value=0.3;
    g.gain.exponentialRampToValueAtTime(0.01,c.currentTime+0.6+(delay||0)/1000);
    o.connect(g);g.connect(c.destination);
    o.start(c.currentTime+(delay||0)/1000);
    o.stop(c.currentTime+0.7+(delay||0)/1000);
  }catch(e){}
}
function _noteToMidi(name){
  var m={'C':0,'C#':1,'D':2,'D#':3,'E':4,'F':5,'F#':6,'G':7,'G#':8,'A':9,'A#':10,'B':11};
  return 12+parseInt(name.replace(/\D/g,''))*12+m[name.replace(/\d/,'')];
}

var _srl=[
  {n:['C4','E4','G4'],name:'Level 1: C, E, G (3 notes)'},

  {n:['C4','D4','E4','F4','G4','A4','B4'],name:'Level 3: C to B (7 notes)'},
  {n:['C4','D4','E4','F4','G4','A4','B4','C5','D5'],name:'Level 4: add high C,D (9 notes)'},
  {n:['B3','C4','D4','E4','F4','G4','A4','B4','C5','D5'],name:'Level 5: add low B (10 notes)'},
  {n:['A3','B3','C4','D4','E4','F4','G4','A4','B4','C5','D5','E5'],name:'Level 6: add low A, high E (12 notes)'},
  {n:['G3','A3','B3','C4','D4','E4','F4','G4','A4','B4','C5','D5','E5','G5'],name:'Level 7: add low G, high G (14 notes)'},
  {n:['E3','F3','G3','A3','B3','C4','D4','E4','F4','G4','A4','B4','C5','D5','E5','G5','C6'],name:'Level 8: Full staff (17 notes)'}
];
var _sp={'E3':4.5,'F3':4,'G3':3.5,'A3':3,'B3':2.5,'C4':2,'D4':1.5,'E4':1,'F4':0.5,'G4':0,'A4':-0.5,'B4':-1,'C5':-1.5,'D5':-2,'E5':-2.5,'G5':-3.5,'C6':-5};

function startSightReading(){_sr={lvl:1,ok:0,stk:0,tot:0};_drawSR();}

function _drawSR(){
  var c=document.getElementById('sr-staff-container');
  var fb=document.getElementById('sr-feedback');
  var sc=document.getElementById('sr-score');
  var ld=document.getElementById('sr-level');
  if(!c)return;
  var lv=_srl[_sr.lvl-1];
  if(ld)ld.textContent=lv.name;
  var tgt=lv.n[Math.floor(Math.random()*lv.n.length)];
  _sr.tgt=tgt;
  var pos=_sp[tgt];var y=70+(4-pos)*6;
  var s='<svg viewBox="0 0 300 110" style="max-width:100%;height:auto">';
  for(var i=0;i<5;i++)s+='<line x1="20" y1="'+(30+i*12)+'" x2="280" y2="'+(30+i*12)+'" stroke="var(--border)" stroke-width="1"/>';
  s+='<text x="25" y="65" fill="var(--pri)" font-size="32">G</text>';
  s+='<ellipse cx="150" cy="'+y+'" rx="9" ry="6" fill="var(--pri)"/>';
  s+='<ellipse cx="150" cy="'+y+'" rx="13" ry="9" fill="none" stroke="var(--gold)" stroke-width="2"/>';
  if(pos>4){for(var l=5;l<=pos;l+=1){var ly=70+(4-l)*6;s+='<line x1="135" y1="'+ly+'" x2="165" y2="'+ly+'" stroke="var(--border)" stroke-width="1"/>';}}
  else if(pos<-1){for(var l=-2;l>=pos;l-=1){var ly=70+(4-l)*6;s+='<line x1="135" y1="'+ly+'" x2="165" y2="'+ly+'" stroke="var(--border)" stroke-width="1"/>';}}
  s+='</svg>';
  var b='<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:8px">';
  for(var i=0;i<lv.n.length;i++){var n=lv.n[i];b+='<button class="btn btn-w" style="min-width:36px;padding:5px 8px;font-size:0.8rem" onclick="checkSR(\''+n.replace(/'/g,"\\'")+'\')">'+n.replace(/\d/,'')+'<sub style="font-size:0.55rem">'+n.replace(/\D/g,'')+'</sub></button>';}
  b+='</div>';
  c.innerHTML=s+b;
  if(fb){fb.textContent='What note is highlighted?';fb.style.color='var(--tx)';}
  if(sc)sc.textContent='Score: '+_sr.ok+'/'+_sr.tot+' | Streak: '+_sr.stk;
}

function checkSR(g){
  var fb=document.getElementById('sr-feedback');
  _sr.tot++;
  var tn=_sr.tgt.replace(/\d/,'');
  if(g===_sr.tgt){
    _sr.ok++;_sr.stk++;
    if(fb){fb.textContent='Correct! '+tn;fb.style.color='var(--ok)';}
    if(_sr.ok>=10&&_sr.lvl<_srl.length){_sr.lvl++;_sr.ok=0;if(fb)fb.textContent+=' Level Up!';}
  }else{_sr.stk=0;if(fb){fb.textContent='Wrong. It was '+tn+'.';fb.style.color='var(--err)';}}
  _playNote(_noteToMidi(_sr.tgt),0);
  setTimeout(function(){_drawSR();},1200);
}

// Interval Trainer
var _int={ok:0,stk:0,tot:0,cur:null};
var _inm=['Minor 2nd','Major 2nd','Minor 3rd','Major 3rd','Perfect 4th','Tritone','Perfect 5th','Octave'];
var _ism=[1,2,3,4,5,6,7,12];

function playInterval(){
  var root=60+Math.floor(Math.random()*12);
  var idx=Math.floor(Math.random()*_ism.length);
  _int.cur=idx;
  _playNote(root,0);
  setTimeout(function(){_playNote(root+_ism[idx],400);},500);
  var fb=document.getElementById('int-feedback');
  if(fb){fb.textContent='Listen... What interval?';fb.style.color='var(--tx)';}
}

function guessInterval(idx){
  var fb=document.getElementById('int-feedback');
  _int.tot++;
  if(idx===_int.cur){_int.ok++;_int.stk++;if(fb){fb.textContent='Correct! '+_inm[idx];fb.style.color='var(--ok)';}}
  else{_int.stk=0;if(fb){fb.textContent='Wrong. It was '+_inm[_int.cur];fb.style.color='var(--err)';}}
  document.getElementById('int-score').textContent=_int.ok;
  document.getElementById('int-streak').textContent=_int.stk;
  document.getElementById('int-acc').textContent=Math.round(_int.ok/_int.tot*100)+'%';
}

// Chord Builder
var _ch=[];
function renderChordBuilder(){
  var c=document.getElementById('chord-piano-container');
  if(!c)return;
  var s='<svg viewBox="0 0 280 80" style="max-width:100%;height:auto">';
  var wk=[0,2,4,5,7,9,11,12,14,16,17,19,21,23];
  var bk=[1,3,6,8,10,13,15,18,20,22];
  for(var i=0;i<14;i++){var m=48+wk[i];var sel=_ch.indexOf(m)!==-1;s+='<rect x="'+(i*20)+'" y="0" width="19" height="75" rx="2" fill="'+(sel?'oklch(0.65 0.20 270 / 0.3)':'var(--card2)')+'" stroke="var(--border)" stroke-width="1" onclick="toggleChordNote('+m+')"/>';}
  for(var i=0;i<9;i++){var m=48+bk[i];var sel=_ch.indexOf(m)!==-1;var xp=(i<2)?(i*20+14):(i<5)?(i*20+24):(i*20+34);s+='<rect x="'+xp+'" y="0" width="13" height="45" rx="2" fill="'+(sel?'var(--pri)':'var(--bg)')+'" stroke="var(--border)" stroke-width="1" onclick="toggleChordNote('+m+')"/>';}
  s+='</svg>';c.innerHTML=s;_updChord();
}
function toggleChordNote(m){var i=_ch.indexOf(m);if(i===-1)_ch.push(m);else _ch.splice(i,1);_ch.sort(function(a,b){return a-b;});renderChordBuilder();}
function _updChord(){
  var ne=document.getElementById('chord-name');if(!ne)return;
  if(_ch.length===0){ne.textContent='\u2014';return;}
  var ints=[];var root=_ch[0];
  for(var i=0;i<_ch.length;i++)ints.push((_ch[i]-root)%12);
  ints.sort(function(a,b){return a-b;});
  var fm={'0,4,7':'Major','0,3,7':'Minor','0,3,6':'Dim','0,4,8':'Aug','0,4,7,10':'Dom7','0,3,7,10':'m7','0,4,7,11':'Maj7'};
  ne.textContent=fm[ints.join(',')]||'Unknown';
}
function playChord(){for(var i=0;i<_ch.length;i++)_playNote(_ch[i],i*50);}
function clearChord(){_ch=[];renderChordBuilder();}

}

function vlPitch(){
  var buf=new Float32Array(VL.analyser.fftSize);
  VL.analyser.getFloatTimeDomainData(buf);
  return vlAutocorrelate(buf,VL.ctx.sampleRate);
}

function vlAutocorrelate(buf,sr){
  var n=buf.length,rms=0;
  for(var i=0;i<n;i++)rms+=buf[i]*buf[i];
  rms=Math.sqrt(rms/n);
  if(rms<0.01)return -1;
  var maxOff=Math.floor(sr/50),minOff=Math.floor(sr/500),bestOff=-1,bestCor=-1;
  for(var off=minOff;off<maxOff;off++){
    var cor=0;
    for(var i=0;i<n-off;i++)cor+=Math.abs(buf[i]-buf[i+off]);
    cor=1-cor/(n-off);
    if(cor>bestCor){bestCor=cor;bestOff=off;}
  }
  if(bestCor<0.5)return -1;
  return sr/bestOff;
}

function vlRMS(){
  var buf=new Float32Array(VL.analyser.fftSize);
  VL.analyser.getFloatTimeDomainData(buf);
  var sum=0;
  for(var i=0;i<buf.length;i++)sum+=buf[i]*buf[i];
  return Math.sqrt(sum/buf.length);
}

function vlFormants(){
  var sp=new Float32Array(VL.analyser.frequencyBinCount);
  VL.analyser.getFloatFrequencyData(sp);
  var bw=VL.ctx.sampleRate/VL.analyser.fftSize;
  var f1m=Math.floor(200/bw),f1x=Math.floor(900/bw),f2m=Math.floor(800/bw),f2x=Math.floor(2800/bw);
  var p1=f1m,v1=-999,p2=f2m,v2=-999;
  for(var i=f1m;i<f1x;i++){if(sp[i]>v1){v1=sp[i];p1=i;}}
  for(var i=f2m;i<f2x;i++){if(sp[i]>v2){v2=sp[i];p2=i;}}
  return {f1:p1*bw,f2:p2*bw};
}

function vlH1H2(f0){
  var sp=new Float32Array(VL.analyser.frequencyBinCount);
  VL.analyser.getFloatFrequencyData(sp);
  var bw=VL.ctx.sampleRate/VL.analyser.fftSize;
  return (sp[Math.round(f0/bw)]||-100)-(sp[Math.round(2*f0/bw)]||-100);
}

function vlNote(f){
  var nn=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  var m=69+12*Math.log2(f/440);
  return nn[Math.round(m)%12]+Math.floor(Math.round(m)/12)-1;
}

function vlLow(){
  vlInitMic().then(function(){
    VL.results.f0=[];VL.running=true;
    document.getElementById('vl-ui').innerHTML='<div style="text-align:center;padding:var(--s6)"><div style="font-size:2rem;margin-bottom:var(--s3)">🎤 Sing lowest note...</div><div id="vl-disp" style="font-size:2rem;font-weight:800;color:var(--pri)">—</div><div class="text-muted" style="margin-top:var(--s3)">Hold steady...</div></div>';
    var t0=Date.now();
    (function loop(){
      if(!VL.running)return;
      var f=vlPitch(),r=vlRMS();
      if(f>50&&f<500&&r>0.01){VL.results.f0.push(f);document.getElementById('vl-disp').textContent=vlNote(f)+" ("+Math.round(f)+" Hz)";}
      if(Date.now()-t0>=4000){VL.running=false;vlStep(2);return;}
      VL.raf=requestAnimationFrame(loop);
    })();
  }).catch(function(){toast("Microphone needed","err");});
}

function vlHigh(){
  VL.results.f0=[];VL.running=true;
  document.getElementById('vl-ui').innerHTML='<div style="text-align:center;padding:var(--s6)"><div style="font-size:2rem;margin-bottom:var(--s3)">🎵 Sing highest note...</div><div id="vl-disp" style="font-size:2rem;font-weight:800;color:var(--pri)">—</div></div>';
  var t0=Date.now();
  (function loop(){
    if(!VL.running)return;
    var f=vlPitch(),r=vlRMS();
    if(f>100&&f<1200&&r>0.01){VL.results.f0.push(f);document.getElementById('vl-disp').textContent=vlNote(f)+" ("+Math.round(f)+" Hz)";}
    if(Date.now()-t0>=4000){VL.running=false;vlStep(3);return;}
    VL.raf=requestAnimationFrame(loop);
  })();
}

function vlMid(){
  VL.results.f0=[];VL.results.f1=[];VL.results.f2=[];VL.results.h1h2=[];VL.running=true;
  document.getElementById('vl-ui').innerHTML='<div style="text-align:center;padding:var(--s6)"><div style="font-size:2rem;margin-bottom:var(--s3)">🗣️ Sing "ahhh"...</div><div id="vl-disp" style="font-size:1.5rem;font-weight:800;color:var(--pri)">—</div><div id="vl-f" class="text-xs text-muted" style="margin-top:var(--s2)"></div></div>';
  var t0=Date.now();
  (function loop(){
    if(!VL.running)return;
    var f=vlPitch(),r=vlRMS();
    if(f>80&&f<600&&r>0.01){
      VL.results.f0.push(f);
      var fm=vlFormants();
      VL.results.f1.push(fm.f1);VL.results.f2.push(fm.f2);
      VL.results.h1h2.push(vlH1H2(f));
      document.getElementById('vl-disp').textContent=vlNote(f);
      document.getElementById('vl-f').textContent="F1:"+Math.round(fm.f1)+" F2:"+Math.round(fm.f2);
    }
    if(Date.now()-t0>=5000){VL.running=false;vlStep(4);return;}
    VL.raf=requestAnimationFrame(loop);
  })();
}

function vlSlide(){
  VL.results.slide=[];VL.running=true;
  document.getElementById('vl-ui').innerHTML='<div style="text-align:center;padding:var(--s6)"><div style="font-size:2rem;margin-bottom:var(--s3)">🔄 Slide up...</div><div id="vl-disp" style="font-size:1.5rem;font-weight:800;color:var(--pri)">—</div></div>';
  var t0=Date.now();
  (function loop(){
    if(!VL.running)return;
    var f=vlPitch(),r=vlRMS();
    if(f>80&&f<1000&&r>0.01){VL.results.slide.push({f:f,t:Date.now()-t0});document.getElementById('vl-disp').textContent=vlNote(f);}
    if(Date.now()-t0>=7000){VL.running=false;vlStep(5);return;}
    VL.raf=requestAnimationFrame(loop);
  })();
}

function vlDynamic(){
  VL.results.loudRMS=0;VL.results.softRMS=999;VL.running=true;
  document.getElementById('vl-ui').innerHTML='<div style="text-align:center;padding:var(--s6)"><div style="font-size:2rem;margin-bottom:var(--s3)">💪 LOUD then soft...</div><div id="vl-disp" style="font-size:1.2rem;font-weight:700;color:var(--pri)">Sing loud!</div></div>';
  var t0=Date.now(),phase="loud";
  (function loop(){
    if(!VL.running)return;
    var r=vlRMS();
    if(r>0.005){
      if(phase==="loud"&&r>VL.results.loudRMS)VL.results.loudRMS=r;
      if(phase==="soft"&&r<VL.results.softRMS&&r>0.003)VL.results.softRMS=r;
    }
    var e=Date.now()-t0;
    if(e>2500&&phase==="loud"){phase="soft";document.getElementById('vl-disp').textContent="Now soft...";}
    if(e>=5000){VL.running=false;vlFinish();return;}
    VL.raf=requestAnimationFrame(loop);
  })();
}

function vlFinish(){
  if(VL.stream){VL.stream.getTracks().forEach(function(t){t.stop();});VL.stream=null;}
  var s=VL.results;
  // Process results
  if(s.f0.length>0){s.lowF0=Math.min.apply(null,s.f0);s.hiF0=Math.max.apply(null,s.f0);}
  if(s.f1.length>0){s.avgF1=Math.round(s.f1.reduce(function(a,b){return a+b;},0)/s.f1.length);s.avgF2=Math.round(s.f2.reduce(function(a,b){return a+b;},0)/s.f2.length);s.avgH1H2=Math.round(s.h1h2.reduce(function(a,b){return a+b;},0)/s.h1h2.length);s.avgF0=Math.round(s.f0.reduce(function(a,b){return a+b;},0)/s.f0.length);}
  // Gender: F0 + F1 + F2 + H1-H2 combined scoring
  var m=0,f=0;
  if(s.avgF0<165)f+=2;else if(s.avgF0>180)m+=2;else{m++;f++;}
  if(s.avgF1<400)m+=2;else if(s.avgF1>550)f+=2;else{m++;f++;}
  if(s.avgF2<1500)m+=1;else if(s.avgF2>2000)f+=1;
  if(s.avgH1H2<8)m+=1;else if(s.avgH1H2>12)f+=1;
  s.gender=m>=f?"male":"female";
  s.gConf=Math.round(Math.abs(m-f)/(m+f)*100);
  // Passaggio from slide
  var maxJ=0,pp=0;
  for(var i=1;i<s.slide.length;i++){var j=Math.abs(1200*Math.log2(s.slide[i].f/s.slide[i-1].f));if(j>maxJ){maxJ=j;pp=69+12*Math.log2(s.slide[i].f/440);}}
  if(pp>0){var nn=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];s.passaggio=nn[Math.round(pp)%12]+Math.floor(Math.round(pp)/12)-1;}
  // Artist match
  var best=null,bs=999;
  for(var i=0;i<ARTIST_PROFILES.length;i++){
    var a=ARTIST_PROFILES[i];if(a.gender!==s.gender)continue;
    var sc=Math.abs(s.avgF1-a.f1)/100+Math.abs(s.avgF2-a.f2)/200+Math.abs(s.avgH1H2-a.h1h2)/5;
    if(sc<bs){bs=sc;best=a;}
  }
  s.artist=best;
  // Exercises
  s.ex=vlExercises();
  vlStep(6);
}

function vlExercises(){
  var s=VL.results,g=s.gender,ex=[];
  if(g==="male"){
    ex.push({name:"Lip Trill Sirens",why:"SOVT — strengthens CT muscles, improves head-voice coordination",how:"Buzz lips. Slide from chest through passaggio ("+s.passaggio+") and back. Keep buzz going. 3×5.",ref:"SOVTE increases reactive inertance (Journal of Voice 2025)"});
    ex.push({name:"'NG' Through Passaggio",why:"Keeps folds connected through transition — avoids the flip",how:"Sing 'ng' below passaggio. Slide up through "+s.passaggio+". Keep nasal resonance. 5 reps.",ref:"Vowel modification reduces laryngeal strain (Roubeau et al. 2008)"});
    ex.push({name:"Light 'Mee' Descending",why:"Descending from head voice teaches gradual weight addition — builds mix",how:"Start head voice high. Sing 'mee' descending. Keep light, connected feeling. 5 reps."});
  }else{
    ex.push({name:"Straw Phonation",why:"SOVT — back-pressure strengthens head-voice fold closure",how:"Straw in water. Blow bubbles singing 'oo' from passaggio ("+s.passaggio+") up. Steady bubbles. 3×5.",ref:"SOVTE improves fold closure efficiency (Journal of Voice 2025)"});
    ex.push({name:"'Oo' Through Break",why:"'Oo' lowers F1, eases chest-to-head transition",how:"Sing 'oo' below passaggio. Slide up through "+s.passaggio+". Keep round, dark. 5 reps.",ref:"Lip rounding lowers F1, easing register transition (J-STAGE 2023)"});
    ex.push({name:"Descending 'Mee'",why:"Teaches cord connection adding weight — builds female mix",how:"Head voice. Sing 'mee' descending through passaggio. Stay connected — no breathy flip. 5 reps."});
  }
  if(s.avgF2>2000) ex.push({name:"Darken Your Sound",why:"F2 is high — voice is naturally bright. Learn to darken for versatility",how:"Sing 'oo'. Round lips. Feel resonance drop from cheekbones to throat. Alternate 'ee'/'oo'.",ref:"F2-F3 decrease with lip rounding — J-STAGE 2023"});
  else ex.push({name:"Brighten Your Sound",why:"F2 is low — voice leans dark. Learn brightness for cutting power",how:"Sing 'ee'. Spread lips. Feel buzz forward to lips/cheekbones. Alternate 'oo'/'ee'.",ref:"Lip spreading raises F2-F3 — J-STAGE 2023"});
  return ex;
}

function vlResults(){
  var s=VL.results,c=document.getElementById('vl-ui'),h='';
  h+='<div class="hero" style="text-align:center"><div style="font-size:3rem;margin-bottom:var(--s3)">🔬</div><h2>Your Voice Fingerprint</h2></div>';
  
  h+='<div class="sec"><div class="sec-h"><span class="sec-t">Profile</span></div>';
  h+='<div class="c"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span>Gender</span><strong>'+(s.gender==="male"?"Male":"Female")+' ('+s.gConf+'% confidence)</strong></div>';
  h+='<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span>Range</span><strong>'+vlNote(s.lowF0)+' – '+vlNote(s.hiF0)+'</strong></div>';
  h+='<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span>Passaggio</span><strong>'+(s.passaggio||"—")+'</strong></div>';
  h+='<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span>F1 (vowel color)</span><strong>'+s.avgF1+' Hz</strong></div>';
  h+='<div style="display:flex;justify-content:space-between"><span>F2 (brightness)</span><strong>'+s.avgF2+' Hz</strong></div></div></div>';
  
  if(s.artist){
    var a=s.artist;
    h+='<div class="sec"><div class="sec-h"><span class="sec-t">Artist Match</span></div>';
    h+='<div class="c c-g" style="text-align:center"><div style="font-size:2rem;margin-bottom:var(--s2)">🎤</div><h3>'+a.name+'</h3><p class="text-xs text-muted" style="line-height:1.6">'+a.character+'</p><p class="text-xs text-muted" style="margin-top:var(--s2)">Tessitura: '+a.tessitura[0]+' – '+a.tessitura[1]+'</p></div></div>';
  }
  
  h+='<div class="sec"><div class="sec-h"><span class="sec-t">Tailored Exercises</span></div>';
  h+='<p class="text-xs text-muted" style="margin-bottom:var(--s3)">Based on your measurements. Each targets a specific gap.</p>';
  for(var i=0;i<s.ex.length;i++){
    var e=s.ex[i];
    h+='<div class="c" style="margin-bottom:6px"><div class="text-bold" style="margin-bottom:2px">'+(i+1)+'. '+e.name+'</div><div class="text-xs text-muted" style="margin-bottom:4px">'+e.why+'</div><div style="font-size:var(--xs);margin-bottom:4px"><b>How:</b> '+e.how+'</div><div style="font-size:10px;color:var(--tx3);font-style:italic">📚 '+e.ref+'</div></div>';
  }
  h+='</div>';
  h+='<button class="btn btn-p" onclick="startVoiceLab()">Re-Assess</button>';
  h+='<button class="btn btn-g" onclick="go(\'practice\')">Back to Practice</button>';
  c.innerHTML=h;
}
