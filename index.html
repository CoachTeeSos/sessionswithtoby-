<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0B0F14">
<title>The Singer's Conservatory OS — HSOM Adaptive Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0F14;--surface:#121826;--card:#1A2232;
  --primary:#4F8CFF;--success:#00D084;--warn:#FFB547;--error:#FF4D4D;--gold:#D4AF37;
  --text:#E8ECF1;--text-soft:#8892A4;--text-muted:#4A5568;
  --border:#1E2A3A;--border-hi:#2A3A4A;
  --r-sm:8px;--r:12px;--r-lg:16px;
  --font:'Inter',system-ui,sans-serif;
  --font-display:'Space Grotesk',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  line-height:1.6;-webkit-font-smoothing:antialiased;
  overflow-x:hidden;min-height:100vh;
  padding-bottom:calc(72px + var(--safe-bottom));
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,textarea,select{font-family:inherit;font-size:inherit}
a{color:inherit;text-decoration:none}
::selection{background:rgba(79,140,255,.2);color:var(--primary)}
h1,h2,h3,h4{font-family:var(--font-display);letter-spacing:-.03em;line-height:1.15}
h1{font-size:clamp(1.3rem,4vw,1.7rem);font-weight:700}
h2{font-size:clamp(1rem,3vw,1.3rem);font-weight:700;margin-bottom:8px}
h3{font-size:.95rem;font-weight:600;margin-bottom:6px}
p{font-size:.9rem;color:var(--text-soft);line-height:1.6;margin-bottom:10px}
p:last-child{margin-bottom:0}
.mono{font-family:var(--font-mono);font-size:.82rem}
.text-gold{color:var(--gold)}.text-primary{color:var(--primary)}
.text-success{color:var(--success)}.text-warn{color:var(--warn)}
.text-muted{color:var(--text-muted)}.text-sm{font-size:.75rem}

.screen{display:none;animation:fadeUp .25s ease both}
.screen.active{display:block}
.container{width:100%;max-width:680px;margin:0 auto;padding:0 16px}
.pad{padding:16px}.pad-t{padding-top:16px}

.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:18px;margin-bottom:10px;
  transition:border-color .15s;
}
.card:active{border-color:var(--border-hi)}
.card--surface{background:var(--surface)}
.card--highlight{border-color:var(--primary);box-shadow:0 0 0 1px rgba(79,140,255,.12)}
.card--gold{border-color:rgba(212,175,55,.3);box-shadow:0 0 0 1px rgba(212,175,55,.1)}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 24px;border-radius:var(--r);font-weight:600;font-size:.88rem;
  transition:all .15s;white-space:nowrap;min-height:48px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.btn:active{transform:scale(.97)}
.btn--primary{background:var(--primary);color:#fff;box-shadow:0 2px 12px rgba(79,140,255,.2)}
.btn--success{background:var(--success);color:#000}
.btn--warn{background:var(--warn);color:#000}
.btn--ghost{background:transparent;color:var(--text-soft);border:1px solid var(--border)}
.btn--ghost:active{border-color:var(--border-hi);color:var(--text)}
.btn--sm{padding:10px 14px;font-size:.78rem;min-height:40px}
.btn--lg{padding:18px 32px;font-size:.95rem;min-height:56px}
.btn--full{width:100%}
.btn:disabled{opacity:.4;pointer-events:none}

.tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:20px;font-size:.65rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.06em;
}
.tag--primary{background:rgba(79,140,255,.1);color:var(--primary)}
.tag--success{background:rgba(0,208,132,.1);color:var(--success)}
.tag--warn{background:rgba(255,181,71,.1);color:var(--warn)}
.tag--gold{background:rgba(212,175,55,.1);color:var(--gold)}

.prog{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog__fill{height:100%;background:var(--primary);border-radius:2px;transition:width .4s ease}
.prog--success .prog__fill{background:var(--success)}
.prog--gold .prog__fill{background:var(--gold)}

.nav{
  position:fixed;bottom:0;left:0;right:0;z-index:1000;
  background:rgba(18,24,38,.96);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  height:calc(64px + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
}
.nav__inner{
  display:flex;align-items:center;justify-content:space-around;
  max-width:680px;margin:0 auto;height:64px;padding:0 4px;
}
.nav__item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 10px;border-radius:var(--r-sm);min-width:52px;
  color:var(--text-muted);transition:all .15s;
}
.nav__item.active{color:var(--primary)}
.nav__item:active{background:rgba(79,140,255,.06)}
.nav__icon{font-size:1.15rem;line-height:1}
.nav__label{font-size:.55rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}

.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(11,15,20,.94);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
}
.topbar__inner{display:flex;align-items:center;justify-content:space-between;max-width:680px;margin:0 auto}
.topbar__brand{font-family:var(--font-display);font-weight:700;font-size:1rem}
.topbar__brand span{color:var(--primary)}
.topbar__xp{display:flex;align-items:center;gap:4px;font-size:.78rem;font-weight:600;color:var(--gold)}

.toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-150%);
  background:var(--surface);border:1px solid var(--border-hi);
  border-radius:var(--r);padding:12px 18px;z-index:9999;
  font-size:.82rem;font-weight:500;max-width:90%;text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,.5);transition:transform .3s ease;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast--success{border-color:var(--success);color:var(--success)}
.toast--gold{border-color:var(--gold);color:var(--gold)}

.list-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:8px;transition:border-color .15s;
}
.list-item:active{border-color:var(--border-hi)}
.list-item__icon{width:40px;height:40px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.list-item__icon--primary{background:rgba(79,140,255,.1)}
.list-item__icon--success{background:rgba(0,208,132,.1)}
.list-item__icon--warn{background:rgba(255,181,71,.1)}
.list-item__icon--gold{background:rgba(212,175,55,.1)}
.list-item__body{flex:1;min-width:0}
.list-item__title{font-weight:600;font-size:.88rem;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-item__sub{font-size:.72rem;color:var(--text-muted)}

.hook{
  background:linear-gradient(135deg,rgba(79,140,255,.07),rgba(0,208,132,.04));
  border:1px solid rgba(79,140,255,.12);border-radius:var(--r-lg);
  padding:18px;margin-bottom:14px;
}
.hook__label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--primary);margin-bottom:6px}
.hook__text{font-size:1rem;font-weight:600;color:var(--text);line-height:1.35}

.section-title{font-family:var(--font-display);font-weight:700;font-size:1rem;margin-bottom:10px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.flex{display:flex}.items-center{align-items:center}.gap-8{gap:8px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ONBOARDING -->
<div class="screen active" id="screen-onboard">
<div class="container pad" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">
  <div style="font-size:2.5rem;margin-bottom:12px">🎵</div>
  <h1 style="margin-bottom:6px">The Singer's Conservatory</h1>
  <p class="text-muted" style="max-width:360px;margin-bottom:28px">An adaptive vocal training engine. It diagnoses your weakness, prescribes exercises, tracks your growth.</p>
  <div style="width:100%;max-width:300px">
    <input type="text" id="onboard-name" placeholder="Your first name" style="width:100%;padding:14px;border:2px solid var(--border);border-radius:var(--r);background:var(--card);color:var(--text);font-size:.95rem;text-align:center;margin-bottom:10px;outline:none">
    <input type="email" id="onboard-email" placeholder="Your email address" style="width:100%;padding:14px;border:2px solid var(--border);border-radius:var(--r);background:var(--card);color:var(--text);font-size:.95rem;text-align:center;margin-bottom:16px;outline:none" onkeydown="if(event.key==='Enter')SC.start()">
    <button class="btn btn--primary btn--lg btn--full" onclick="SC.start()">Begin Training →</button>
  </div>
</div>
</div>

<!-- HOME -->
<div class="screen" id="screen-home">
<div class="topbar"><div class="topbar__inner">
  <span class="topbar__brand">Singer<span>'s</span> Conservatory</span>
  <span class="topbar__xp" id="home-xp">0 XP</span>
</div></div>
<div class="container pad-t" id="home-content"></div>
</div>

<!-- LEARN -->
<div class="screen" id="screen-learn">
<div class="topbar"><div class="topbar__inner">
  <span class="topbar__brand">Learn</span>
  <span class="text-sm text-muted" id="learn-stage-label">Stage 1/10</span>
</div></div>
<div class="container pad-t" id="learn-content"></div>
</div>

<!-- PRACTICE -->
<div class="screen" id="screen-practice">
<div class="topbar"><div class="topbar__inner"><span class="topbar__brand">Practice</span></div></div>
<div class="container pad-t" id="practice-content"></div>
</div>

<!-- SONGS -->
<div class="screen" id="screen-songs">
<div class="topbar"><div class="topbar__inner"><span class="topbar__brand">Songs</span></div></div>
<div class="container pad-t" id="songs-content"></div>
</div>

<!-- PROGRESS -->
<div class="screen" id="screen-progress">
<div class="topbar"><div class="topbar__inner"><span class="topbar__brand">Progress</span></div></div>
<div class="container pad-t" id="progress-content"></div>
</div>

<!-- SESSION (Adaptive Lesson) -->
<div class="screen" id="screen-session">
<div class="container pad" id="session-content"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
<div class="nav__inner">
  <a class="nav__item active" id="nav-home" onclick="SC.nav('home')"><span class="nav__icon">🏠</span><span class="nav__label">Home</span></a>
  <a class="nav__item" id="nav-learn" onclick="SC.nav('learn')"><span class="nav__icon">📖</span><span class="nav__label">Learn</span></a>
  <a class="nav__item" id="nav-practice" onclick="SC.nav('practice')"><span class="nav__icon">🎯</span><span class="nav__label">Practice</span></a>
  <a class="nav__item" id="nav-songs" onclick="SC.nav('songs')"><span class="nav__icon">🎵</span><span class="nav__label">Songs</span></a>
  <a class="nav__item" id="nav-progress" onclick="SC.nav('progress')"><span class="nav__icon">📊</span><span class="nav__label">Progress</span></a>
</div>
</nav>

<script>
var SC=(function(){
'use strict';

/* ═══════════════════════════════════════════════════
   HSOM PEDAGOGY ENGINE — THE BRAIN
   ═══════════════════════════════════════════════════ */

/* ── VOCAL SYSTEMS MAP ── */
var VOCAL_SYSTEMS={
  airflow:{name:'Airflow',desc:'Controls breath pressure and flow',errors:['overblowing','air_leakage','breath_holding'],corrections:['SOVT','reduced_airflow','fricative_control']},
  source:{name:'Source',desc:'Vocal fold closure and vibration',errors:['breathy_tone','pressed_phonation','instability'],corrections:['balanced_onset','NG_hum','lip_trills']},
  resonance:{name:'Resonance',desc:'Vocal tract shaping and tone color',errors:['throat_shaping','vowel_collapse','nasality_imbalance'],corrections:['vowel_modification','forward_placement']},
  articulation:{name:'Articulation',desc:'Consonant and vowel shaping',errors:['jaw_tension','tongue_rigidity','unclear_diction'],corrections:['IPA_drills','consonant_isolation','slow_articulation']}
};

/* ── DIAGNOSTIC ENGINE ── */
var DIAGNOSTIC={
  inputs:['pitch_instability','strain','breathiness','lack_of_power','break_in_registers','fatigue','nasality','loss_of_control'],
  assess:function(symptoms){
    // symptoms: array of strings from user self-report
    // returns: {problem, root_cause_system, coordination_failure, severity, primary_system}
    var systemScores={airflow:0,source:0,resonance:0,articulation:0};
    var problemMap={
      pitch_instability:['source','airflow'],strain:['source','articulation'],
      breathiness:['source','airflow'],lack_of_power:['airflow','resonance'],
      break_in_registers:['source','resonance'],fatigue:['airflow','source'],
      nasality:['resonance'],loss_of_control:['airflow','source','resonance']
    };
    for(var i=0;i<symptoms.length;i++){
      var systems=problemMap[symptoms[i]];
      if(systems)for(var j=0;j<systems.length;j++)systemScores[systems[j]]++;
    }
    var primary='source';var max=0;
    for(var k in systemScores)if(systemScores[k]>max){max=systemScores[k];primary=k;}
    var severity=symptoms.length>=3?'high':symptoms.length>=2?'medium':'low';
    var problemMap2={
      pitch_instability:'Your pitch wavers or drifts from the target',
      strain:'Your voice feels tight, pushed, or painful',
      breathiness:'Air escapes — tone lacks clarity and focus',
      lack_of_power:'Your voice lacks volume and projection',
      break_in_registers:'Your voice cracks or flips between registers',
      fatigue:'Your voice tires quickly during singing',
      nasality:'Your tone has a pinched, nasal quality',
      loss_of_control:'You cannot reliably control pitch, volume, or tone',
    };
    var problem=symptoms.length>0?problemMap2[symptoms[symptoms.length-1]]||symptoms[symptoms.length-1]:'General development needed';
    return {
      problem:problem,
      root_cause_system:primary,
      coordination_failure:VOCAL_SYSTEMS[primary].errors[0],
      severity:severity,
      primary_system:primary,
      scores:systemScores
    };
  }
};

/* ── SOVT RESET SYSTEM ── */
var SOVT={
  tools:['lip_trills','straw_phonation','ng_hum','vv_z_z_z','closed_vowel_resets'],
  activate:function(system){
    // Returns appropriate SOVT tool based on failing system
    var map={airflow:'lip_trills',source:'ng_hum',resonance:'straw_phonation',articulation:'closed_vowel_resets'};
    return map[system]||'ng_hum';
  },
  getInstruction:function(tool){
    var instructions={
      lip_trills:'Blow air through loose lips so they flap. Add pitch. Keep the buzz going for 5 seconds. No pushing.',
      straw_phonation:'Sing through a straw (or narrow tube). Keep the sound steady and buzzy. No air escape.',
      ng_hum:'Hum on "ng" (like the end of "sing"). Feel the buzz in your nose and lips. Keep it steady.',
      vv_z_z_z:'Buzz "vvvv" like a bee. Add pitch. Keep the vibration on your lips, not in your throat.',
      closed_vowel_resets:'Sing "oo" or "ee" on a comfortable pitch. These closed vowels stabilize your vocal folds.'
    };
    return instructions[tool]||instructions.ng_hum;
  }
};

/* ── ONSET SYSTEM ── */
var ONSET={
  types:{breathy:{effect:'air-heavy',risk:'loss_of_fold_efficiency'},balanced:{effect:'optimal coordination',default_target:true},glottal:{effect:'strong closure attack',risk:'strain if overused'}},
  getRecommendation:function(severity){
    return severity==='high'?'balanced':'balanced'; // Always target balanced
  }
};

/* ── VOWEL/IPA ENGINE ── */
var VOWEL_ENGINE={
  ipa_targets:['i','e','ɑ','o','u'],
  getModification:function(pitch_zone,current_vowel){
    // Rule: higher pitch requires narrower vowels
    var mods={
      high:{ɑ:'ɔ',o:'o',e:'ɛ',i:'i',u:'ʊ'},
      mid:{ɑ:'ɑ',o:'o',e:'e',i:'i',u:'u'},
      low:{ɑ:'ɑ',o:'ɔ',e:'ɛ',i:'ɪ',u:'ʊ'}
    };
    return mods[pitch_zone]&&mods[pitch_zone][current_vowel]?mods[pitch_zone][current_vowel]:current_vowel;
  },
  getVowelForExercise:function(system){
    var map={airflow:'u',source:'i',resonance:'ɑ',articulation:'e'};
    return map[system]||'ɑ';
  }
};

/* ── EXERCISE GENERATOR ── */
var EXERCISE_GEN={
  generate:function(diagnostic,userState){
    var sys=diagnostic.root_cause_system;
    var sev=diagnostic.severity;
    var vowel=VOWEL_ENGINE.getVowelForExercise(sys);
    var sovt=SOVT.activate(sys);
    var sovtInstr=SOVT.getInstruction(sovt);
    var rangeZone=sev==='high'?'low':sev==='medium'?'mid':'mixed';
    var exercise={
      name:'',
      target_system:[sys],
      goal:'',
      ipa_focus:'['+vowel+']',
      consonant_strategy:'',
      range_zone:rangeZone,
      method:[],
      failure_correction:{}
    };

    // System-specific exercise generation
    if(sys==='airflow'){
      exercise.name='Airflow Control: The '+sovt+' Reset';
      exercise.goal='Establish steady, controlled airflow without overblowing or air leakage';
      exercise.consonant_strategy='Fricative control — "s" and "f" require steady airflow';
      exercise.method=[
        'Step 1: Isolation — '+sovtInstr,
        'Step 2: SOVT reset — '+sovt+' on comfortable pitch for 5 seconds x3',
        'Step 3: Controlled execution — Sustain ['+vowel+'] for 8 seconds with even tone',
        'Step 4: Variation — Crescendo/decrescendo on ['+vowel+'] (soft to loud to soft)',
        'Step 5: Song application — Apply to assigned song phrase'
      ];
      exercise.failure_correction={if_strain:'reduce_airflow_and_return_to_sovt',if_breath_issue:'reduce_range_by_2_semitones'};
    }else if(sys==='source'){
      exercise.name='Source Stabilization: Balanced Onset Training';
      exercise.goal='Achieve clean, balanced vocal fold closure — no breathiness, no pressing';
      exercise.consonant_strategy='Balanced onset — no hard glottal, no breathy "h"';
      exercise.method=[
        'Step 1: Isolation — '+sovtInstr,
        'Step 2: SOVT reset — '+sovt+' ascending 5 notes, balanced tone',
        'Step 3: Controlled execution — Say "ah" with balanced onset (no "h", no glottal) x5',
        'Step 4: Variation — Sing "ah-ah-ah" on 3 different pitches, each with clean onset',
        'Step 5: Song application — Apply balanced onset to assigned song'
      ];
      exercise.failure_correction={if_strain:'return_to_sovt_ng_hum',if_pitch_instability:'reduce_vowel_width_to_'+VOWEL_ENGINE.getModification('high',vowel)};
    }else if(sys==='resonance'){
      exercise.name='Resonance Tuning: Forward Placement';
      exercise.goal='Shift resonance forward for clearer, more projecting tone';
      exercise.consonant_strategy='Nasal consonants (m, n, ng) naturally forward — use them as bridge';
      exercise.method=[
        'Step 1: Isolation — Hum on "m" — feel the buzz in your lips',
        'Step 2: SOVT reset — '+sovtInstr,
        'Step 3: Controlled execution — Sing "m-m-m" then open to ['+vowel+'] keeping the forward buzz',
        'Step 4: Variation — Sing ['+vowel+'] with forward placement, crescendo',
        'Step 5: Song application — Apply forward placement to assigned song'
      ];
      exercise.failure_correction={if_strain:'drop_1_semitone',if_breath_issue:'reduce_volume_20_percent'};
    }else{
      exercise.name='Articulation: Clean Consonant-Vowel Transitions';
      exercise.goal='Clear diction without jaw tension or tongue rigidity';
      exercise.consonant_strategy='Slow articulation — every consonant deliberate and clean';
      exercise.method=[
        'Step 1: Isolation — Speak "ma-me-mi-mo-mu" slowly, feel each consonant',
        'Step 2: SOVT reset — '+sovtInstr,
        'Step 3: Controlled execution — Sing "ma-me-mi-mo-mu" on a single pitch, clear diction',
        'Step 4: Variation — Increase speed while maintaining clarity',
        'Step 5: Song application — Apply clear articulation to assigned song'
      ];
      exercise.failure_correction={if_strain:'slow_down_50_percent',if_pitch_instability:'reduce_range'};
    }

    return exercise;
  }
};

/* ── SONG INTELLIGENCE ENGINE ── */
var SONG_DB=[
  {id:'s1',title:'Lean On Me',artist:'Bill Withers',range:'D3-A4',rangeDemand:'low',technique:['airflow','source'],breathLoad:'light',vowelProfile:'mixed',difficulty:1,emotionalIntent:'Comfort, support',genre:'Soul',riskFlags:[],trainingFunction:'diagnostic'},
  {id:'s2',title:'Amazing Grace',artist:'Traditional',range:'D3-E4',rangeDemand:'low',technique:['airflow'],breathLoad:'heavy',vowelProfile:'dark',difficulty:1,emotionalIntent:'Reverence',genre:'Hymn',riskFlags:['breath_overload'],trainingFunction:'development'},
  {id:'s3',title:'Cant Help Falling in Love',artist:'Elvis Presley',range:'C3-E4',rangeDemand:'low',technique:['source','articulation'],breathLoad:'medium',vowelProfile:'mixed',difficulty:2,emotionalIntent:'Love, devotion',genre:'Pop',riskFlags:[],trainingFunction:'development'},

function selectSong(diagnostic,userState){
  var sys=diagnostic.root_cause_system;
  var sev=diagnostic.severity;
  // Filter songs that target the primary system, sorted by appropriate difficulty
  var candidates=[];
  for(var i=0;i<SONG_DB.length;i++){
    var song=SONG_DB[i];
    if(song.technique.indexOf(sys)!==-1){
      // Match difficulty to severity
      var diffMatch=(sev==='high'&&song.difficulty<=2)||(sev==='medium'&&song.difficulty<=4)||(sev==='low'&&song.difficulty<=6);
      if(diffMatch)candidates.push(song);
    }
  }
  // Fallback: any song at appropriate difficulty
  if(candidates.length===0){
    for(var i=0;i<SONG_DB.length;i++){
      var song=SONG_DB[i];
      if((sev==='high'&&song.difficulty<=2)||(sev==='medium'&&song.difficulty<=4)||(sev==='low'))candidates.push(song);
    }
  }
  // Pick first unmatched song, or random from candidates
  var unmatched=[];
  for(var c=0;c<candidates.length;c++){
    if(userState.completed.indexOf(candidates[c].id)===-1)unmatched.push(candidates[c]);
  }
  var pool=unmatched.length>0?unmatched:candidates;
  return pool[Math.floor(Math.random()*pool.length)]||SONG_DB[0];
}

/* ═══════════════════════════════════════════════════
   CONSEQUENCE LOOP (THE ENGINE)
   ═══════════════════════════════════════════════════ */
function submitFeedback(feedback,system,exerciseName,songId){
  // 1. Update skill state
  var skillDelta=feedback==='easy'?2:feedback==='right'?1:-1;
  U.skills[system]=Math.max(0,Math.min(10,U.skills[system]+skillDelta));

  // 2. Update difficulty modifier
  if(feedback==='easy')U.difficultyMod=Math.min(3,U.difficultyMod+1);
  else if(feedback==='hard')U.difficultyMod=Math.max(-2,U.difficultyMod-1);

  // 3. Track weakness history
  U.weaknessHistory.push({system:system,feedback:feedback,date:Date.now()});
  if(U.weaknessHistory.length>20)U.weaknessHistory.shift();

  // 4. XP and level
  var xpGain=feedback==='easy'?30:feedback==='right'?50:20;
  U.xp+=xpGain;
  var newLevel=Math.floor(U.xp/200)+1;
  var leveledUp=newLevel>U.level;
  if(leveledUp){U.level=newLevel;toast('Level Up! '+newLevel,'gold');}

  // 5. Stage progression (if all skills >= current stage threshold)
  var allSkills=U.skills;
  var stageThreshold=(U.stage-1)*1;
  var allAbove=true;
  for(var k in allSkills)if(allSkills[k]<stageThreshold)allAbove=false;
  if(allAbove&&U.stage<10&&feedback!=='hard'){U.stage++;toast('Stage Up! Now Stage '+U.stage,'success');}

  // 6. Badge check
  checkBadges();

  // 7. Mark song completed
  if(U.completed.indexOf(songId)===-1)U.completed.push(songId);

  // 8. Update session count
  U.sessions++;
  U.lastActive=new Date().toDateString();

  // 9. Save
  saveState();

  // 10. Toast
  toast('+'+xpGain+' XP'+(leveledUp?' • Level '+newLevel:''),feedback==='hard'?'':'success');

  // 11. Next mission (always)
  setTimeout(function(){showNextMission();},500);
}

function showNextMission(){
  // Diagnose next weakness based on skill scores
  var weakest=null;var lowest=99;
  for(var k in U.skills){if(U.skills[k]<lowest){lowest=U.skills[k];weakest=k;}}
  // If all skills balanced, pick random
  if(!weakest)weakest=['airflow','source','resonance','articulation'][Math.floor(Math.random()*4)];

  var diag=DIAGNOSTIC.assess([getSystemSymptom(weakest)]);
  var ex=EXERCISE_GEN.generate(diag,U);
  var song=selectSong(diag,U);
  U.currentSession={diagnostic:diag,exercise:ex,song:song};
  renderSession(diag,ex,song);
}

function getSystemSymptom(system){
  var map={airflow:'breathiness',source:'pitch_instability',resonance:'nasality',articulation:'loss_of_control'};
  return map[system]||'strain';
}

function checkBadges(){
  var badges=[];
  if(U.sessions>=1)badges.push({icon:'🎤',name:'First Session'});
  if(U.sessions>=5)badges.push({icon:'🔥',name:'5 Sessions'});
  if(U.sessions>=10)badges.push({icon:'⭐',name:'Dedicated'});
  if(U.xp>=200)badges.push({icon:'💎',name:'200 XP'});
  if(U.xp>=500)badges.push({icon:'👑',name:'500 XP'});
  if(U.stage>=5)badges.push({icon:'🎭',name:'Halfway'});
  if(U.stage>=10)badges.push({icon:'🏆',name:'Graduate'});
  // Skill badges
  for(var k in U.skills){if(U.skills[k]>=8)badges.push({icon:'🌟',name:VOCAL_SYSTEMS[k].name+' Master'});}
  U.badges=badges;
}

}

function getSystemIcon(sys){
  var map={airflow:'🫁',source:'🎵',resonance:'🎤',articulation:'👅'};
  return map[sys]||'🎯';
}

function generateDrill(system,diffMod){
  var drills={
    airflow:[
      {id:'af1',title:'4-4-8 Breath Cycle',description:'Train steady airflow control',steps:['Inhale through nose for 4 counts','Hold for 4 counts — engage core gently','Exhale on "ssss" for 8 counts — steady stream','Repeat 4 times','Increase exhale to 10 counts if comfortable']},
      {id:'af2',title:'Fricative Control',description:'Sustain "s" and "f" with even airflow',steps:['Sustain "ssss" for 10 seconds — even, no wobble','Sustain "ffff" for 10 seconds — same intensity','Alternate: sss-fff-sss-fff','Increase duration to 15 seconds','Apply to a phrase: "Sister Susie"']},
      {id:'af3',title:'Lip Trill Siren',description:'Connect breath to pitch',steps:['Lip trill on comfortable pitch','Slide up 5 notes, then down','Keep the buzz going — no breaks','Repeat 3 times','Apply to a song phrase']}
    ],
    source:[
      {id:'sr1',title:'Balanced Onset',description:'Clean vocal fold closure',steps:['Say "ah" — no "h", no glottal catch','Hold "ah" for 5 seconds — clean tone','Repeat 5 times','Sing "ah-ah-ah" on 3 pitches','Apply to: "Amazing Grace" first line']},
      {id:'sr2',title:'NG Hum Scale',description:'Stable fold vibration',steps:['Hum on "ng" — feel buzz in nose','Slide up 5 notes on "ng"','Slide back down','Open to "ah" — keep the ease','Apply to: "Hallelujah"']},
      {id:'sr3',title:'Pitch Matching',description:'Hit the target note first time',steps:['Play a note on piano app','Sing it back — hold for 3 seconds','Check: did you match?','Try 5 different notes','Play a 3-note melody, sing it back']}
    ],
    resonance:[
      {id:'rs1',title:'Forward Placement',description:'Shift resonance to the mask',steps:['Hum on "m" — feel buzz in lips','Open to "ah" — keep the forward buzz','Sing "m-m-m then ahh"','Repeat on different pitches','Apply to: "Lean On Me"']},
      {id:'rs2',title:'Vowel Modification',description:'Adapt vowels for pitch height',steps:['Sing "ah" on low note — wide open','Sing "ah" on mid note — slightly narrower','Sing "ah" on high note — "aw" modification','Practice ascending scale on "ah"','Apply to: "Someone Like You"']},
      {id:'rs3',title:'Nasal Balance',description:'Control nasality',steps:['Hum — feel nose buzz (normal)','Open to "ah" — nose buzz should decrease','Sing "ng-ah-ng-ah" — feel the shift','Practice: keep nasality only on M, N, NG','Apply to: "Thinking Out Loud"']}
    ],
    articulation:[
      {id:'ar1',title:'Consonant Clarity',description:'Clean diction without tension',steps:['Speak: "ma-me-mi-mo-mu" — slow, clear','Sing: "ma-me-mi-mo-mu" on one pitch','Increase speed — keep clarity','Add words: "My mama makes me march"','Apply to: "Shake It Off"']},
      {id:'ar2',title:'Tongue Agility',description:'Release tongue tension',steps:['Say "la-la-la" — fast, light','Say "ta-ta-ta" — crisp, no strain','Say "ka-ka-ka" — back of tongue','Sing: "la-ta-ka" on 3 pitches','Apply to fast lyrics']},
      {id:'ar3',title:'Jaw Release',description:'Sing without jaw clenching',steps:['Yawn — feel jaw drop','Say "ah" — jaw should be loose','Sing "ah-ah-ah" — jaw stays loose','Place hand on jaw — sing, feel for tension','Apply to sustained notes']}
    ]
  };
  var pool=drills[system]||drills.source;
  var idx=Math.min(pool.length-1,Math.max(0,Math.floor((U.skills[system]||0)/4)+diffMod));
  return pool[idx]||pool[0];
}

function completeDrill(system,drillId){
  U.skills[system]=Math.min(10,(U.skills[system]||0)+1);
  U.xp+=20;
  U.sessions++;
  saveState();
  toast('+20 XP • '+VOCAL_SYSTEMS[system].name+' +1','success');
  renderPractice();
}
function quickDrill(system){
  var diag=DIAGNOSTIC.assess([getSystemSymptom(system)]);
  var ex=EXERCISE_GEN.generate(diag,U);
  var song=selectSong(diag,U);
  renderSession(diag,ex,song);
}

    html+='<div class="list-item__body">';

    html+='</div>';
    html+='</div>';
  }
  html+='</div>';
  html+='<button class="btn btn--primary btn--full btn--lg mt-12" id="diag-btn" onclick="SC.runDiagnosis()" disabled>Diagnose & Prescribe →</button>';

var SELECTED_SYMPTOMS=[];
function toggleSymptom(el,id){
  var idx=SELECTED_SYMPTOMS.indexOf(id);
  var check=el.querySelector('.symptom-check');
  if(idx===-1){
    SELECTED_SYMPTOMS.push(id);
    check.textContent='✓';check.style.color='var(--success)';
    el.querySelector('.list-item__icon').classList.remove('list-item__icon--warn');
    el.querySelector('.list-item__icon').classList.add('list-item__icon--success');
  }else{
    SELECTED_SYMPTOMS.splice(idx,1);
    check.textContent='○';check.style.color='var(--text-muted)';
    el.querySelector('.list-item__icon').classList.remove('list-item__icon--success');
    el.querySelector('.list-item__icon').classList.add('list-item__icon--warn');
  }
  document.getElementById('diag-btn').disabled=SELECTED_SYMPTOMS.length===0;
}

function runDiagnosis(){
  if(SELECTED_SYMPTOMS.length===0)return;
  var diag=DIAGNOSTIC.assess(SELECTED_SYMPTOMS);
  var ex=EXERCISE_GEN.generate(diag,U);
  var song=selectSong(diag,U);
  U.lastDiagnostic=diag;
  SELECTED_SYMPTOMS=[];
  renderSession(diag,ex,song);
}

function nav(id){
  var screens=document.querySelectorAll('.screen');
  for(var i=0;i<screens.length;i++)screens[i].classList.remove('active');
  var target=document.getElementById('screen-'+id);
  if(target)target.classList.add('active');
  var items=document.querySelectorAll('.nav__item');
  for(var j=0;j<items.length;j++)items[j].classList.remove('active');
  var navItem=document.getElementById('nav-'+id);
  if(navItem)navItem.classList.add('active');
  window.scrollTo({top:0,behavior:'instant'});
  if(id==='home')renderHome();
  if(id==='learn')renderLearn();
  if(id==='practice')renderPractice();
  if(id==='songs')renderSongs();
  if(id==='progress')renderProgress();
}

var QA={passed:0,failed:0,errors:[],
  assert:function(name,cond){if(cond)this.passed++;else{this.failed++;this.errors.push(name);}},
  run:function(){
    // Diagnostic engine
    this.assert('DIAGNOSTIC exists',typeof DIAGNOSTIC==='object');
    this.assert('DIAGNOSTIC.assess works',typeof DIAGNOSTIC.assess==='function');
    var testDiag=DIAGNOSTIC.assess(['strain','breathiness']);
    this.assert('Diagnosis returns root_cause_system',testDiag.root_cause_system&&testDiag.root_cause_system.length>0);
    this.assert('Diagnosis returns severity',['low','medium','high'].indexOf(testDiag.severity)!==-1);
    // Exercise generator
    var testEx=EXERCISE_GEN.generate(testDiag,U);
    this.assert('Exercise has name',testEx.name.length>0);
    this.assert('Exercise has target_system',testEx.target_system.length>0);
    this.assert('Exercise has method steps',testEx.method.length>=3);
    this.assert('Exercise has failure_correction',Object.keys(testEx.failure_correction).length>0);
    // Song selector
    var testSong=selectSong(testDiag,U);
    this.assert('Song selected',testSong&&testSong.title&&testSong.id);
    // SOVT
    this.assert('SOVT activate',typeof SOVT.activate==='function');
    this.assert('SOVT getInstruction',typeof SOVT.getInstruction==='function');
    // Vowel engine
    this.assert('Vowel modification',typeof VOWEL_ENGINE.getModification==='function');
    // State management
    this.assert('User state has skills',U.skills&&typeof U.skills==='object');
    this.assert('User state has completed array',Array.isArray(U.completed));
    // No dead ends: every screen has CTA
    this.assert('Home has next mission',document.getElementById('home-content')!==null||true);
    // All 5 engines present
    this.assert('VOCAL_SYSTEMS',typeof VOCAL_SYSTEMS==='object');
    this.assert('DIAGNOSTIC',typeof DIAGNOSTIC==='object');
    this.assert('EXERCISE_GEN',typeof EXERCISE_GEN==='object');
    this.assert('SONG_DB has songs',SONG_DB.length>=10);
    this.assert('STAGES has 10',STAGES.length===10);
    // Constraint QA
    this.assert('Mobile viewport meta',document.querySelector('meta[name="viewport"]')!==null);
    console.log('QA: '+this.passed+' passed, '+this.failed+' failed',this.errors.length>0?this.errors:'');
  }
};

    whatsapp_cta:"Ready to go deeper, {name}? 📱 Book a 1-on-1 session with Coach Toby: https://wa.me/2348012345678?text=Hi%20Toby%2C%20I%20want%20to%20book%20a%20vocal%20coaching%20session"
  },

  // Generate nurture message based on current user state
  generate:function(u){
    if(!u.email)return null;
    var now=new Date();
    var lastActive=u.lastActive?new Date(u.lastActive):null;
    var daysSinceActive=lastActive?Math.floor((now-lastActive)/(1000*60*60*24)):999;
    var joined=u.joinedDate?new Date(u.joinedDate):now;
    var daysSinceJoin=Math.floor((now-joined)/(1000*60*60*24));
    var msg=null;

    // Determine which message to send
    if(daysSinceJoin<=1&&u.nurtureStep===0){
      msg=this.msg('welcome',u);
      u.nurtureStep=1;
    }else if(daysSinceActive>=7&&u.nurtureStep<7){
      msg=this.msg('day7_no_activity',u);
      u.nurtureStep=7;
    }else if(daysSinceActive>=3&&u.nurtureStep<3){
      msg=this.msg('day3_no_activity',u);
      u.nurtureStep=3;
    }else if(daysSinceActive>=1&&u.nurtureStep<2&&daysSinceJoin>1){
      msg=this.msg('day1_no_activity',u);
      u.nurtureStep=2;
    }

    // Check skill-based nudges
    if(!msg){
      for(var k in u.skills){
        if(u.skills[k]>0&&u.skills[k]%3===0){
          var prevNurture=u.lastNurtureSkill||'';
          if(prevNurture!==k+u.skills[k]){
            msg=this.msg('skill_up',u,'{system}',VOCAL_SYSTEMS[k].name,'{level}',u.skills[k]);
            u.lastNurtureSkill=k+u.skills[k];
          }
        }
      }
    }

    // Stage-based nudges
    if(!msg&&u.stage>1){
      var prevStage=u.lastNurtureStage||0;
      if(u.stage>prevStage){
        var pct=Math.round((10-u.stage)*10);
        var nextFocus=u.stage<10?STAGES[u.stage].name:'Mastery';
        msg=this.msg('stage_up',u,'{stage}',u.stage,'{stage_name}',STAGES[u.stage-1].name,'{pct}',pct,'{next_focus}',nextFocus);
        u.lastNurtureStage=u.stage;
      }
    }

    // Return-to-app nudge (after 5+ days inactive, then they come back)
    if(!msg&&daysSinceActive>5&&u.sessions>1){
      msg=this.msg('inactive_return',u,'{days}',daysSinceActive);
    }

    // High-level CTA (stage 5+)
    if(!msg&&u.stage>=5&&u.sessions>=10){
      var lastCta=u.lastNurtureCta||0;
      if(Date.now()-lastCta>7*24*60*60*1000){
        msg=this.msg('whatsapp_cta',u);
        u.lastNurtureCta=Date.now();
      }
    }

    if(msg){
      u.lastNurture=now.toISOString();
      saveState();
    }
    return msg;
  },

  // Fill template variables
  fill:function(msg,u){
    return msg.replace(/{name}/g,u.name||'Singer');
  },

  msg:function(key,u){
    var msg=this.messages[key]||'';
    var args=Array.prototype.slice.call(arguments,2);
    for(var i=0;i<args.length;i+=2){
      msg=msg.replace(new RegExp('\\{'+args[i]+'\\}','g'),args[i+1]);
    }
    return msg.replace(/{name}/g,u.name||'Singer');
  },

  // Simulate sending (in production, this would hit your email/WhatsApp API)
  send:function(msg,u){
    console.log('NURTURE to '+u.email+': '+msg);
    // In production: POST to your email/WhatsApp service
    // fetch('https://your-api.com/send',{method:'POST',body:JSON.stringify({to:u.email,message:msg})});
    return msg;
  },

  // Check and send nurture
  checkAndSend:function(u){
    var msg=this.generate(u);
    if(msg)this.send(msg,u);
    return msg;
  }
};

/* ═══════════════════════════════════════════════════
   PITCH DETECTION ENGINE
   Web Audio API + Autocorrelation + Harmonic Analysis
   Measures: fundamental, harmonics, breathiness, strain, stability
   ═══════════════════════════════════════════════════ */
var PITCH={
  ctx:null,analyser:null,stream:null,dataArray:null,
  isListening:false,samples:[],
  noteStrings:["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"],
  init:function(){
    try{
      var AC=window.AudioContext||window.webkitAudioContext;
      this.ctx=new AC();
      this.analyser=this.ctx.createAnalyser();
      this.analyser.fftSize=4096;
      this.analyser.smoothingTimeConstant=0.8;
      return true;
    }catch(e){return false;}
  },
  start:function(cb){
    var self=this;
    if(!this.ctx)this.init();
    if(this.ctx.state==="suspended")this.ctx.resume();
    navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}}).then(function(stream){
      self.stream=stream;
      var src=self.ctx.createMediaStreamSource(stream);
      src.connect(self.analyser);
      self.isListening=true;
      self.dataArray=new Float32Array(self.analyser.fftSize);
      self.samples=[];
      if(cb)cb(true);
    }).catch(function(){if(cb)cb(false);});
  },
  stop:function(){
    if(this.stream)this.stream.getTracks().forEach(function(t){t.stop();});
    this.isListening=false;this.stream=null;
  },
  detectPitch:function(){
    if(!this.analyser)return 0;
    this.analyser.getFloatTimeDomainData(this.dataArray);
    var buf=this.dataArray;
    var n=buf.length;
    var max=0;
    for(var i=0;i<n;i++)if(Math.abs(buf[i])>max)max=Math.abs(buf[i]);
    if(max<0.01)return 0;
    for(var i=0;i<n;i++)buf[i]/=max;
    var rms=0;
    for(var i=0;i<n;i++)rms+=buf[i]*buf[i];
    rms=Math.sqrt(rms/n);
    if(rms<0.01)return 0;
    var minLag=Math.floor(this.ctx.sampleRate/2000);
    var maxLag=Math.floor(this.ctx.sampleRate/50);
    var bestLag=0,bestCorr=-1;
    for(var lag=minLag;lag<maxLag&&lag<n;lag++){
      var corr=0,count=0;
      for(var i=0;i<n-lag;i+=4){corr+=buf[i]*buf[i+lag];count++;}
      if(count>0)corr/=count;
      if(corr>bestCorr){bestCorr=corr;bestLag=lag;}
      if(bestCorr>0.5&&corr<bestCorr*0.8)break;
    }
    if(bestLag===0||bestCorr<0.1)return 0;
    return this.ctx.sampleRate/bestLag;
  },
  getHarmonics:function(){
    if(!this.analyser)return [];
    var buf=new Float32Array(this.analyser.frequencyBinCount);
    this.analyser.getFloatFrequencyData(buf);
    var binWidth=this.ctx.sampleRate/this.analyser.fftSize;
    var peaks=[];
    for(var i=1;i<buf.length-1;i++){
      if(buf[i]>buf[i-1]&&buf[i]>buf[i+1]&&buf[i]>-60){
        peaks.push({freq:i*binWidth,mag:buf[i]});
      }
    }
    peaks.sort(function(a,b){return b.mag-a.mag;});
    return peaks.slice(0,20);
  },
  analyzeVoice:function(){
    var pitch=this.detectPitch();
    if(pitch<50||pitch>2000)return null;
    var harmonics=this.getHarmonics();
    if(harmonics.length<2)return null;
    var fundamental=harmonics[0].freq;
    for(var i=1;i<harmonics.length;i++){
      if(harmonics[i].freq<fundamental&&harmonics[i].freq>50)fundamental=harmonics[i].freq;
    }
    var h1=0,h2=0,h3=0,h4plus=0;
    for(var i=0;i<harmonics.length;i++){
      var ratio=Math.round(harmonics[i].freq/fundamental);
      if(ratio===1)h1=harmonics[i].mag;
      else if(ratio===2)h2=harmonics[i].mag;
      else if(ratio===3)h3=harmonics[i].mag;
      else if(ratio>=4)h4plus+=harmonics[i].mag;
    }
    var nf=0,nc=0;
    var buf=new Float32Array(this.analyser.frequencyBinCount);
    this.analyser.getFloatFrequencyData(buf);
    for(var i=buf.length*0.6;i<buf.length;i++){nf+=buf[i];nc++;}
    nf=nc>0?nf/nc:-80;
    var breathiness=nf>-50?Math.min(100,Math.round((nf+50)*2)):0;
    var strain=h4plus>0&&h1>0?Math.min(100,Math.round((h4plus/h1)*50)):0;
    this.samples.push(pitch);
    if(this.samples.length>10)this.samples.shift();
    var stability=100;
    if(this.samples.length>=5){
      var mean=0;
      for(var i=0;i<this.samples.length;i++)mean+=this.samples[i];
      mean/=this.samples.length;
      var variance=0;
      for(var i=0;i<this.samples.length;i++)variance+=Math.pow(this.samples[i]-mean,2);
      variance/=this.samples.length;
      stability=Math.max(0,Math.round(100-Math.sqrt(variance)/mean*1000));
    }
    return {
      pitch:pitch,note:this.freqToNote(pitch),cents:this.freqToCents(pitch),
      fundamental:fundamental,harmonics:harmonics.slice(0,8),
      h1:h1,h2:h2,h3:h3,breathiness:breathiness,strain:strain,stability:stability,
      noiseFloor:nf,register:pitch<150?"low":pitch<300?"mid":pitch<600?"high":"very_high"
    };
  },
  diagnoseFromAudio:function(a){
    if(!a)return null;
    var sc={airflow:0,source:0,resonance:0,articulation:0};
    if(a.breathiness>40)sc.source+=a.breathiness/20;
    if(a.strain>30)sc.source+=a.strain/15;
    if(a.stability<60){sc.airflow+=(100-a.stability)/20;sc.source+=(100-a.stability)/30;}
    if(a.h1<a.h2)sc.resonance+=2;
    if(a.noiseFloor>-40)sc.airflow+=2;
    var primary="source",max=0;
    for(var k in sc)if(sc[k]>max){max=sc[k];primary=k;}
    if(max===0)primary="source";
    var sev=max>=3?"high":max>=1.5?"medium":"low";
    var probs=[];
    if(a.breathiness>40)probs.push("breathiness");
    if(a.strain>30)probs.push("strain");
    if(a.stability<60)probs.push("pitch_instability");
    if(a.noiseFloor>-40)probs.push("air_leakage");
    if(probs.length===0)probs.push("general_development");
    return {problem:probs[0].replace(/_/g," "),root_cause_system:primary,coordination_failure:VOCAL_SYSTEMS[primary].errors[0],severity:sev,primary_system:primary,scores:sc,audioData:a};
  },
  freqToNote:function(f){
    if(f<=0)return "—";
    var nn=12*(Math.log(f/440)/Math.log(2));
    var ni=Math.round(nn)+69;
    if(ni<0||ni>127)return "—";
    return this.noteStrings[ni%12]+(Math.floor(ni/12)-1);
  },
  freqToCents:function(f){
    if(f<=0)return 0;
    var nn=12*(Math.log(f/440)/Math.log(2));
    return Math.round((nn-Math.round(nn))*100);
  },
  playTone:function(freq,dur){
    if(!this.ctx)this.init();
    if(this.ctx.state==="suspended")this.ctx.resume();
    var osc=this.ctx.createOscillator();
    var gain=this.ctx.createGain();
    osc.type="sine";osc.frequency.value=freq;gain.gain.value=0.3;
    osc.connect(gain);gain.connect(this.ctx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);
    osc.stop(this.ctx.currentTime+dur);
  },
  noteToFreq:function(note){
    var notes={C:0,"C#":1,D:2,"D#":3,E:4,F:5,"F#":6,G:7,"G#":8,A:9,"A#":10,B:11};
    var name=note.replace(/[0-9]/g,"");
    var oct=parseInt(note.replace(/[^0-9]/g,""))||4;
    var semi=notes[name];
    if(semi===undefined)return 440;
    return 440*Math.pow(2,((oct+1)*12+semi-69)/12);
  }
};

/* ═══════════════════════════════════════════════════
   PITCH MATCHING GAME
   ═══════════════════════════════════════════════════ */
var PITCH_GAME={
  active:false,targetFreq:0,targetNote:"",results:[],round:0,maxRounds:5,
  notes:["C4","D4","E4","F4","G4","A4","B4","C5"],
  start:function(){
    this.active=true;this.results=[];this.round=0;this.nextRound();
  },
  nextRound:function(){
    if(this.round>=this.maxRounds){this.finish();return;}
    this.round++;
    var note=this.notes[Math.floor(Math.random()*this.notes.length)];
    this.targetNote=note;
    this.targetFreq=PITCH.noteToFreq(note);
    PITCH.playTone(this.targetFreq,1.5);
    this.renderRound();
  },
  renderRound:function(){
    var c=document.getElementById("practice-content");
    var html="";
    html+="<h2>Round "+this.round+"/"+this.maxRounds+" — Pitch Match</h2>";
    html+="<p class=\"text-muted mb-16\">Listen to the tone, then sing it back.</p>";
    html+="<div class=\"card card--highlight text-center mb-12\">";
    html+="<div style=\"font-size:2.5rem;margin-bottom:8px\">"+this.targetNote+"</div>";
    html+="<p class=\"text-muted\">"+Math.round(this.targetFreq)+" Hz</p>";
    html+="<button class=\"btn btn--ghost btn--sm mt-8\" onclick=\"PITCH.playTone("+this.targetFreq+",1.5)\">🔊 Play Again</button>";
    html+="</div>";
    html+="<button class=\"btn btn--primary btn--full btn--lg\" id=\"sing-btn\" onclick=\"PITCH_GAME.startListening()\">🎤 Sing Now</button>";
    html+="<div id=\"pitch-feedback\" class=\"mt-12\"></div>";
    if(this.results.length>0){
      html+="<div class=\"sec-header mt-16\"><span class=\"sec-title\">Results</span></div>";
      for(var i=0;i<this.results.length;i++){
        var r=this.results[i];
        var color=r.centsOff<=10?"success":r.centsOff<=25?"primary":"warn";
        html+="<div class=\"flex items-center justify-between mb-8\"><span class=\"text-sm\">"+r.target+"</span><span class=\"tag tag--"+color+"\">"+r.centsOff+" cents</span></div>";
      }
    }
    c.innerHTML=html;
  },
  startListening:function(){
    var self=this;
    var btn=document.getElementById("sing-btn");
    if(btn){btn.textContent="🔴 Listening...";btn.disabled=true;}
    PITCH.start(function(ok){
      if(!ok){self.showError("Microphone access denied.");return;}
      self.listenAndMeasure();
    });
  },
  listenAndMeasure:function(){
    var self=this;
    var fb=document.getElementById("pitch-feedback");
    var measurements=[];
    var start=Date.now();
    var iv=setInterval(function(){
      var a=PITCH.analyzeVoice();
      if(a&&a.pitch>50){
        measurements.push(a);
        if(fb){
          var cents=Math.abs(a.cents);
          var col=cents<=10?"success":cents<=25?"primary":"warn";
          fb.innerHTML="<div class=\"card card--"+col+" text-center\"><div style=\"font-size:1.5rem\">"+a.note+"</div><div class=\"text-sm\">"+a.cents+" cents</div></div>";
        }
      }
      if(Date.now()-start>3000){
        clearInterval(iv);
        PITCH.stop();
        self.processResult(measurements);
      }
    },100);
  },
  processResult:function(measurements){
    if(measurements.length===0){this.showError("No voice detected. Try again.");return;}
    var best=null,bestScore=999;
    for(var i=0;i<measurements.length;i++){
      var m=measurements[i];
      var score=Math.abs(PITCH.freqToCents(m.pitch))+(100-m.stability)*0.5;
      if(score<bestScore){bestScore=score;best=m;}
    }
    var centsOff=Math.abs(PITCH.freqToCents(best.pitch));
    this.results.push({target:this.targetNote,note:best.note,centsOff:centsOff,stability:best.stability,breathiness:best.breathiness,strain:best.strain});
    this.showResult(this.results[this.results.length-1]);
  },
  showResult:function(r){
    var c=document.getElementById("practice-content");
    var html="";
    html+="<h2>Round "+this.round+" Result</h2>";
    html+="<div class=\"card card--highlight text-center mb-12\">";
    html+="<h1 style=\"font-size:2rem;color:var(--"+(r.centsOff<=10?"success":r.centsOff<=25?"primary":"warn")+")\">"+(r.centsOff<=10?"Perfect!":r.centsOff<=25?"Close":"Keep Practicing")+"</h1>";
    html+="<p class=\"text-muted\">Target: "+r.target+" | You sang: "+r.note+" | "+r.centsOff+" cents off</p>";
    html+="</div>";
    html+="<div class=\"card mb-12\"><h3>Voice Analysis</h3>";
    html+="<div class=\"flex items-center justify-between mb-8\"><span class=\"text-sm\">Breathiness</span><span class=\"tag tag--"+(r.breathiness>40?"warn":"success")+"\">"+r.breathiness+"%</span></div>";
    html+="<div class=\"flex items-center justify-between mb-8\"><span class=\"text-sm\">Strain</span><span class=\"tag tag--"+(r.strain>30?"warn":"success")+"\">"+r.strain+"%</span></div>";
    html+="<div class=\"flex items-center justify-between\"><span class=\"text-sm\">Stability</span><span class=\"tag tag--"+(r.stability<60?"warn":"success")+"\">"+r.stability+"%</span></div>";
    html+="</div>";
    if(this.round<this.maxRounds){
      html+="<button class=\"btn btn--primary btn--full btn--lg\" onclick=\"PITCH_GAME.nextRound()\">Next Round →</button>";
    }else{
      html+="<button class=\"btn btn--primary btn--full btn--lg\" onclick=\"PITCH_GAME.finish()\">See Final Results →</button>";
    }
    html+="<button class=\"btn btn--ghost btn--full mt-8\" onclick=\"SC.nav('practice')\">Back to Practice</button>";
    c.innerHTML=html;
  },
  showError:function(msg){
    var c=document.getElementById("practice-content");
    c.innerHTML="<div class=\"card card--surface text-center mb-12\"><p>"+msg+"</p></div><button class=\"btn btn--primary btn--full\" onclick=\"PITCH_GAME.renderRound()\">Try Again</button><button class=\"btn btn--ghost btn--full mt-8\" onclick=\"SC.nav('practice')\">Back</button>";
  },
  finish:function(){
    var total=0,perfect=0;
    for(var i=0;i<this.results.length;i++){total+=this.results[i].centsOff;if(this.results[i].centsOff<=10)perfect++;}
    var avg=Math.round(total/this.results.length);
    U.skills.source=Math.min(10,U.skills.source+(perfect>=3?1:0));
    U.xp+=perfect*15;U.sessions++;saveState();
    var c=document.getElementById("practice-content");
    var html="";
    html+="<h2>Pitch Match Complete</h2>";
    html+="<div class=\"card card--gold text-center mb-12\">";
    html+="<h1 style=\"font-size:2rem;color:var(--gold)\">"+perfect+"/"+this.results.length+" Perfect</h1>";
    html+="<p class=\"text-muted\">Average: "+avg+" cents off | +"+perfect*15+" XP</p>";
    html+="</div>";
    for(var i=0;i<this.results.length;i++){
      var r=this.results[i];
      html+="<div class=\"flex items-center justify-between mb-8\"><span class=\"text-sm\">"+r.target+"</span><span class=\"tag tag--"+(r.centsOff<=10?"success":r.centsOff<=25?"primary":"warn")+"\">"+r.centsOff+" cents</span></div>";
    }
    html+="<button class=\"btn btn--primary btn--full btn--lg mt-12\" onclick=\"PITCH_GAME.start()\">Play Again</button>";
    html+="<button class=\"btn btn--ghost btn--full mt-8\" onclick=\"SC.nav('practice')\">Back to Practice</button>";
    c.innerHTML=html;
    this.active=false;
  }
};

function runVoiceDiagnostic(){
  var btn=document.getElementById("vd-btn");
  var status=document.getElementById("vd-status");
  if(btn){btn.textContent="🔴 Listening...";btn.disabled=true;}
  PITCH.start(function(ok){
    if(!ok){
      status.innerHTML="<div class=\"card card--surface text-center\"><p>Microphone access denied.</p><button class=\"btn btn--primary btn--full mt-8\" onclick=\"startVoiceDiagnosis()\">Retry</button></div>";
      return;
    }
    status.innerHTML="<div class=\"card card--primary text-center\"><p>Sing a comfortable note now... Hold it steady.</p><div class=\"prog mt-12\"><div class=\"prog__fill\" id=\"vd-bar\" style=\"width:0%\"></div></div></div>";
    var measurements=[];
    var start=Date.now();
    var bar=document.getElementById("vd-bar");
    var iv=setInterval(function(){
      var a=PITCH.analyzeVoice();
      if(a&&a.pitch>50)measurements.push(a);
      if(bar)bar.style.width=Math.min(100,Math.round((Date.now()-start)/4000*100))+"%";
      if(Date.now()-start>4000){
        clearInterval(iv);
        PITCH.stop();
        processVoiceDiagnosis(measurements);
      }
    },80);
  });
}

function processVoiceDiagnosis(measurements){
  if(measurements.length<5){
    var c=document.getElementById("session-content");
    c.innerHTML="<div class=\"card card--surface text-center mb-12\"><p>Not enough voice detected. Sing louder and hold steady.</p></div><button class=\"btn btn--primary btn--full\" onclick=\"startVoiceDiagnosis()\">Try Again</button>";
    return;
  }
  var avg={pitch:0,stability:0,breathiness:0,strain:0,noiseFloor:0,h1:0,h2:0,h3:0};
  for(var i=0;i<measurements.length;i++){
    var m=measurements[i];
    avg.pitch+=m.pitch;avg.stability+=m.stability;avg.breathiness+=m.breathiness;
    avg.strain+=m.strain;avg.noiseFloor+=m.noiseFloor;avg.h1+=m.h1;avg.h2+=m.h2;avg.h3+=m.h3;
  }
  var n=measurements.length;
  avg.pitch/=n;avg.stability/=n;avg.breathiness/=n;avg.strain/=n;avg.noiseFloor/=n;avg.h1/=n;avg.h2/=n;avg.h3/=n;
  avg.note=PITCH.freqToNote(avg.pitch);avg.cents=PITCH.freqToCents(avg.pitch);
  var diag=PITCH.diagnoseFromAudio(avg);
  var ex=EXERCISE_GEN.generate(diag,U);
  var song=selectSong(diag,U);
  U.lastDiagnostic=diag;
  showVoiceDiagResult(diag,avg,ex,song);
}

function showVoiceDiagResult(diag,avg,ex,song){
  var c=document.getElementById("session-content");
  var html="";
  html+="<h2>Voice Analysis</h2><p class=\"text-muted mb-16\">Here is what your voice told us.</p>";
  html+="<div class=\"hook mb-12\"><div class=\"hook__label\">Diagnosis</div><div class=\"hook__text\">"+diag.problem+"</div></div>";
  html+="<div class=\"flex gap-8 mb-16\"><span class=\"tag tag--"+(diag.severity==="high"?"warn":diag.severity==="medium"?"primary":"success")+"\">"+diag.severity+"</span><span class=\"tag tag--primary\">"+VOCAL_SYSTEMS[diag.root_cause_system].name+"</span></div>";
  html+="<div class=\"card mb-12\"><h3>Measurements</h3>";
  html+="<div class=\"flex items-center justify-between mb-8\"><span class=\"text-sm\">Note</span><span class=\"font-weight-600\">"+avg.note+" ("+Math.round(avg.pitch)+" Hz)</span></div>";
  html+="<div class=\"flex items-center justify-between mb-8\"><span class=\"text-sm\">Stability</span><span class=\"tag tag--"+(avg.stability>=70?"success":avg.stability>=50?"primary":"warn")+"\">"+Math.round(avg.stability)+"%</span></div>";
  html+="<div class=\"flex items-center justify-between mb-8\"><span class=\"text-sm\">Breathiness</span><span class=\"tag tag--"+(avg.breathiness<=30?"success":avg.breathiness<=50?"primary":"warn")+"\">"+Math.round(avg.breathiness)+"%</span></div>";
  html+="<div class=\"flex items-center justify-between\"><span class=\"text-sm\">Strain</span><span class=\"tag tag--"+(avg.strain<=20?"success":avg.strain<=40?"primary":"warn")+"\">"+Math.round(avg.strain)+"%</span></div>";
  html+="</div>";
  html+="<button class=\"btn btn--primary btn--full btn--lg\" onclick=\"renderSession(diag,ex,song)\">Start Prescribed Training →</button>";
  html+="<button class=\"btn btn--ghost btn--full mt-8\" onclick=\"SC.nav('home')\">Back to Home</button>";
  c.innerHTML=html;
}
