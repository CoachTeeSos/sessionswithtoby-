<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>The Singer's Conservatory</title>
<style>
:root{
  --bg:#0a0a0a;--surface:#111;--card:#1a1a1a;--border:#2a2a2a;
  --primary:#6366f1;--success:#22c55e;--warn:#f59e0b;--error:#ef4444;--gold:#eab308;
  --text:#f5f5f5;--text2:#a3a3a3;--text3:#737373;
  --r:12px;--r-lg:16px;--r-xl:20px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;min-height:100vh;padding-bottom:88px;font-size:16px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit;outline:none}
a{color:inherit;text-decoration:none}
input,textarea{font-family:inherit;font-size:inherit;border:none;outline:none;background:none;color:inherit}

/* ── SCREENS ── */
.screen{display:none;min-height:calc(100vh - 88px)}
.screen.active{display:block}
.screen-pad{padding:20px 16px 40px}

/* ── TOP BAR ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:1.1rem;font-weight:700;letter-spacing:-.02em}
.topbar-sub{font-size:.7rem;color:var(--text3);margin-top:1px}
.topbar-right{font-size:.85rem;color:var(--gold);font-weight:600}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:1000;background:rgba(17,17,17,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);height:72px;padding-bottom:env(safe-area-inset-bottom,0)}
.bnav-inner{display:flex;align-items:center;justify-content:space-around;height:100%;max-width:500px;margin:0 auto}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 12px;color:var(--text3);border-radius:var(--r);transition:all .15s;min-width:56px}
.bnav-item.active{color:var(--primary)}
.bnav-item:active{background:rgba(99,102,241,.08)}
.bnav-icon{font-size:1.3rem;line-height:1}
.bnav-label{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;margin-bottom:12px;transition:border-color .15s}
.card:active{border-color:#3a3a3a}
.card--accent{border-color:rgba(99,102,241,.3);background:linear-gradient(135deg,rgba(99,102,241,.06),transparent)}
.card--success{border-color:rgba(34,197,94,.3)}
.card--gold{border-color:rgba(234,179,8,.3)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:16px 24px;border-radius:var(--r);font-weight:600;font-size:.95rem;min-height:52px;width:100%;border:2px solid transparent;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn--primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn--primary:active{background:#4f46e5}
.btn--ghost{background:transparent;color:var(--text2);border-color:var(--border)}
.btn--ghost:active{border-color:#3a3a3a;color:var(--text)}
.btn--success{background:var(--success);color:#000;border-color:var(--success)}
.btn--sm{padding:10px 16px;font-size:.8rem;min-height:40px;width:auto}
.btn--block{width:100%}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1}

/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.tag--primary{background:rgba(99,102,241,.12);color:var(--primary)}
.tag--success{background:rgba(34,197,94,.12);color:var(--success)}
.tag--gold{background:rgba(234,179,8,.12);color:var(--gold)}
.tag--warn{background:rgba(245,158,11,.12);color:var(--warn)}

/* ── PROGRESS BAR ── */
.prog{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .5s ease}
.prog--success .prog-fill{background:var(--success)}
.prog--gold .prog-fill{background:var(--gold)}

/* ── LIST ITEM ── */
.li{display:flex;align-items:center;gap:14px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.li:active{border-color:#3a3a3a}
.li-icon{width:44px;height:44px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;background:rgba(99,102,241,.08)}
.li-icon--success{background:rgba(34,197,94,.08)}
.li-icon--gold{background:rgba(234,179,8,.08)}
.li-body{flex:1;min-width:0}
.li-title{font-weight:600;font-size:.95rem;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:.75rem;color:var(--text3)}
.li-right{flex-shrink:0;color:var(--text3);font-size:.8rem}

/* ── SECTION ── */
.sec{margin-bottom:28px}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3)}

/* ── HERO ── */
.hero{padding:24px 0 20px}
.hero h1{font-size:1.6rem;font-weight:800;letter-spacing:-.03em;line-height:1.15;margin-bottom:6px}
.hero p{color:(--text2);font-size:.9rem}

/* ── LESSON CARD ── */
.lesson-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;background:var(--primary);color:#fff;flex-shrink:0}
.lesson-num--done{background:var(--success);color:#000}
.lesson-num--lock{background:var(--border);color:var(--text3)}

/* ── QUIZ ── */
.q-option{display:flex;align-items:center;gap:12px;padding:16px;background:var(--card);border:2px solid var(--border);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:all .15s}
.q-option:active{border-color:#3a3a3a}
.q-option.selected{border-color:var(--primary);background:rgba(99,102,241,.06)}
.q-option.correct{border-color:var(--success);background:rgba(34,197,94,.06)}
.q-option.wrong{border-color:var(--error);background:rgba(239,68,68,.06)}
.q-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.q-option.selected .q-radio{border-color:var(--primary);background:var(--primary)}
.q-option.selected .q-radio::after{content:'';width:8px;height:8px;background:#fff;border-radius:50%}

/* ── EXERCISE ── */
.ex-step{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--border)}
.ex-step:last-child{border-bottom:none}
.ex-step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;background:rgba(99,102,241,.1);color:var(--primary);flex-shrink:0;margin-top:2px}
.ex-step-text{flex:1}
.ex-step-text h4{font-size:.9rem;font-weight:600;margin-bottom:4px}
.ex-step-text p{font-size:.8rem;color:var(--text3)}

/* ── TOAST ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-120%);background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 20px;z-index:9999;font-size:.85rem;font-weight:500;max-width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.6);transition:transform .3s ease;border-left:3px solid var(--primary)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast--success{border-left-color:var(--success)}
.toast--gold{border-left-color:var(--gold)}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.screen.active{animation:fadeUp .25s ease both}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
var U={
  name:'Singer',xp:0,level:1,stage:1,sessions:0,
  skills:{airflow:0,source:0,resonance:0,articulation:0},
  completedLessons:[],completedSongs:[],badges:[],
  lastActive:null,totalPracticeMinutes:0
};
try{var _d=localStorage.getItem('sc2');if(_d){var _p=JSON.parse(_d);if(_p&&_p.skills)for(var _k in _p)U[_k]=_p[_k];}}catch(e){}
function save(){try{localStorage.setItem('sc2',JSON.stringify(U))}catch(e){}}

// ═══════════════════════════════════════════════════
// CURRICULUM — The actual learning content
// ═══════════════════════════════════════════════════
var CURRICULUM={
  stages:[
    {
      id:1,name:"Foundation",subtitle:"How your voice works",
      lessons:[
        {
          id:"l1-1",title:"Your Voice Is an Instrument",type:"lesson",
          content:"<p>Your voice has four systems working together: <strong>Airflow</strong> (breath), <strong>Source</strong> (vocal folds), <strong>Resonance</strong> (throat/mouth shaping), and <strong>Articulation</strong> (tongue/lips for words).</p><p>Most singers only think about hitting notes. Great singers train each system independently, then coordinate them.</p>",
          quiz:[
            {q:"What are the four vocal systems?",options:["Lungs, throat, mouth, nose","Airflow, source, resonance, articulation","Pitch, volume, tone, speed","Breathing, singing, speaking, shouting"],answer:1},
            {q:"Why train systems independently?",options:["It's easier","Each system has different exercises","You can skip the hard ones","It sounds better"],answer:1}
          ]
        },
        {
          id:"l1-2",title:"Breath: The Engine",type:"lesson",
          content:"<p>Everything starts with breath. Not big breaths — <strong>controlled</strong> breaths. Think of your airflow like a steady stream from a hose, not a fire hydrant blast.</p><p>The muscle that matters most: your <strong>diaphragm</strong>. It's a dome-shaped muscle under your ribs. When it flattens, your lungs fill. When it relaxes, air flows out.</p>",
          exercise:{name:"Diaphragm Check",steps:["Lie on your back, one hand on chest, one on belly","Breathe in — belly hand should rise, chest hand stays still","Breathe out with a steady 'ssss' sound — aim for 15 seconds","Repeat 5 times, keeping the airflow even"],skill:"airflow",xp:15}
        },
        {
          id:"l1-3",title:"Vocal Folds: The Source",type:"lesson",
          content:"<p>Your vocal folds are two small muscles inside your throat. When air passes through them, they vibrate — that's sound. The faster they vibrate, the higher the pitch.</p><p><strong>Breathy tone</strong> = folds not closing fully. <strong>Strained tone</strong> = folds squeezing too hard. <strong>Balanced tone</strong> = clean closure, no excess tension.</p>",
          exercise:{name:"Finding Balanced Onset",steps:["Say 'ah' — notice if there's a breathy 'h' at the start","Now say 'ah' with a slight glottal stop (like 'uh-oh') — too hard","Now find the middle: clean 'ah' with no extra breath or squeeze","Hum on 'm' for 5 seconds — that balanced feeling is your target"],skill:"source",xp:15}
        },
        {
          id:"l1-4",title:"Resonance: Your Natural Amplifier",type:"lesson",
          content:"<p>Your vocal folds make a tiny sound. Your <strong>resonators</strong> — throat, mouth, nasal passages — amplify and shape it. That's why your voice sounds different from everyone else's.</p><p><strong>Forward resonance</strong> (buzz in lips/cheekbones) = clear, projecting tone. <strong>Throat resonance</strong> (buzz in throat) = darker but can sound swallowed.</p>",
          exercise:{name:"Forward Placement",steps:["Hum on 'm' — feel the buzz in your lips","Keep the buzz, open to 'mah' — the buzz should stay forward","Slide up and down on 'mee' keeping lip buzz throughout","If buzz moves to your throat, start over — forward is the goal"],skill:"resonance",xp:15}
        },
        {
          id:"l1-5",title:"Articulation: Clear Words",type:"lesson",
          content:"<p>Singing is sustained speech. If your words are unclear, the emotion doesn't land. Your <strong>tongue, lips, and jaw</strong> shape vowels and consonants.</p><p>Most singers have <strong>jaw tension</strong> — they open too wide and lock up. The fix: let your lips and tongue do the work, jaw stays relaxed.</p>",
          exercise:{name:"Consonant Clarity",steps:["Say 'ma-me-mi-mo-mu' slowly — feel each consonant","Now say it fast — keep every consonant crisp","Sing 'ma-me-mi-mo-mu' on one pitch — same clarity","Try 'la-le-li-lo-lo' — tongue tip touches behind teeth"],skill:"articulation",xp:15}
        }
      ]
    },
    {
      id:2,name:"Control",subtitle:"Making your voice obey",
      lessons:[
        {
          id:"l2-1",title:"Pitch Accuracy",type:"lesson",
          content:"<p>Pitch accuracy isn't about having a 'good ear' — it's about <strong>muscle memory</strong>. Your vocal folds need to learn exactly how much tension each note requires.</p><p>The exercise: sing intervals (two notes in a row). Start with small intervals (2 notes apart), then expand.</p>",
          exercise:{name:"Interval Training",steps:["Play or imagine C-D-C (do-re-do)","Sing it slowly — C, then D, back to C","Repeat 5 times, matching pitch exactly","Now try C-E-C (bigger jump) — same precision","If you're off, slow down — accuracy before speed"],skill:"source",xp:20}
        },
        {
          id:"l2-2",title:"Breath Management",type:"lesson",
          content:"<p>Running out of breath mid-phrase isn't about lung capacity — it's about <strong>air efficiency</strong>. You're either letting too much air escape (breathy tone) or gripping too tight (strained).</p><p>The goal: sustain a phrase evenly from start to finish, with a little air left over.</p>",
          exercise:{name:"Sustained 'Zzz'",steps:["Take a comfortable breath","Buzz 'zzz' on a steady pitch — like a bee","Goal: 20 seconds of even, steady sound","Notice: if it wavers, your airflow is uneven","Repeat 3 times, trying to beat your time"],skill:"airflow",xp:20}
        },
        {
          id:"l2-3",title:"Vowel Shaping",type:"lesson",
          content:"<p>Your mouth shape changes your tone. Same note, different vowel = different resonance. As you go higher, vowels need to <strong>narrow</strong> slightly to stay resonant.</p><p>Try it: sing 'ah' up high — it feels tight. Now sing 'uh' — easier. That's vowel modification.</p>",
          exercise:{name:"Vowel Slides",steps:['Sing "ah" sliding from low to high — notice where it gets tight',"Now sing 'uh' up the same range — smoother, right?",'Try "ee" — even narrower, works well high',"Practice: 'ah-uh-ee' on one pitch, feeling mouth shape change"],skill:"resonance",xp:20}
        },
        {
          id:"l2-4",title:"Register Transitions",type:"lesson",
          content:"<p>Your voice has <strong>registers</strong> — chest voice (low, thick folds), head voice (high, stretched folds), and the messy middle called <strong>mix</strong> or <strong>break</strong>.</p><p>The crack/flip happens when your folds suddenly change configuration. The fix: practice the transition zone slowly until it's smooth.</p>",
          exercise:{name:"Smoothing the Break",steps:["Find your break: slide up from chest voice — where does it flip?","Go to that note and sing 'ng' (like end of 'sing') — keeps folds connected","Slide through the break on 'ng' — no flip, just a smooth shift","Now try 'mee' through the same zone — keep it connected"],skill:"source",xp:25}
        }
      ]
    },
    {
      id:3,name:"Expression",subtitle:"Making people feel something",
      lessons:[
        {
          id:"l3-1",title:"Dynamics: Loud and Soft",type:"lesson",
          content:"<p>Volume isn't just 'more air.' <strong>Loud</strong> = more breath pressure + more resonance. <strong>Soft</strong> = less pressure but <em>maintained</em> resonance (don't go breathy).</p><p>Great singers use dynamics like a conversation — some words loud, some whispered. That's what makes you lean in.</p>",
          exercise:{name:"Crescendo Drill",steps:["Pick a comfortable note","Start very soft (but NOT breathy — keep the buzz)","Gradually get louder over 8 seconds","Gradually get softer over 8 seconds","The tone quality should stay the same — only volume changes"],skill:"airflow",xp:25}
        },
        {
          id:"l3-2",title:"Vibrato: Controlled Wobble",type:"lesson",
          content:"<p>Vibrato is a slight, regular pitch variation that makes sustained notes sound alive. It happens naturally when your voice is <strong>balanced</strong> — not too tight, not too breathy.</p><p>Forced vibrato sounds like a wobble. Natural vibrato is a slight, even oscillation — about 5-7 wobbles per second.</p>",
          exercise:{name:"Finding Natural Vibrato",steps:["Sing a comfortable note, hold it straight (no wobble) for 5 seconds","Relax — let the note 'breathe' — don't force it","If vibrato appears, that's your natural one","If not, try a gentle 'wah-wah-wah' to feel the motion","Practice on different notes — it should appear naturally"],skill:"source",xp:30}
        },
        {
          id:"l3-3",title:"Emotional Intent",type:"lesson",
          content:"<p>Two singers can sing the same song with the same notes. One moves you to tears. The other is forgettable. The difference: <strong>emotional intent</strong>.</p><p>Before you sing a phrase, ask: <em>What am I saying? Who am I saying it to? What do I want them to feel?</em> Then sing the answer.</p>",
          quiz:[
            {q:"What makes one singer more moving than another?",options:["Better technique","Louder voice","Emotional intent","More practice"],answer:2},
            {q:"Before singing a phrase, you should know:",options:["The exact pitch","What you're saying and who you're saying it to","How long the note is","What key you're in"],answer:1}
          ]
        }
      ]
    }
  ]
};

var SONGS=[
  {id:'g1',title:"Breathe On Me",artist:"Worship",diff:1,sys:['airflow'],stage:1,
   notes:"Focus: steady breath. Sing each phrase on one breath. Don't gasp between lines.",
   exercises:["Sing phrase 1 on one breath — mark where you run out","Practice breathing at that spot — quick, low breath","Sing full song breathing only at your marked spots"]},
  {id:'g2',title:"Great Are You Lord",artist:"Worship",diff:2,sys:['airflow','source'],stage:1,
   notes:"Focus: sustained phrases. The long notes need even airflow, not a blast at the start.",
   exercises:["Sing the chorus — hold 'breath of every living thing' on steady airflow","Practice the high note: approach it with forward resonance, not force","Full run-through: focus on phrase endings — don't let tone collapse"]},
  {id:'g3',title:"Hallelujah",artist:"Cohen/Buckley",diff:3,sys:['source','resonance'],stage:2,
   notes:"Focus: register transitions. The 'hallelujah' jumps need smooth mixing, not flipping.",
   exercises:["Sing 'hal-le-LU-jah' — practice the LU transition on 'ng' first","Work the verse: keep chest voice connected through the chorus jump","Full song: dynamic control — verses intimate, chorus opens up"]},
  {id:'g4',title:"Essence",artist:"Wizkid ft. Tems",diff:2,sys:['articulation','source'],stage:2,
   notes:"Focus: clear diction at speed. Every consonant must be crisp even in fast passages.",
   exercises:["Speak the lyrics fast — every word clear","Sing verse 1 slowly — match the spoken clarity","Gradually speed up — never lose the consonants"]},
  {id:'g5',title:"Someone Like You",artist:"Adele",diff:4,sys:['source','resonance','airflow'],stage:3,
   notes:"Focus: emotional dynamics. This song lives in the contrast between intimate verses and powerful chorus.",
   exercises:["Verse 1: sing it like you're talking to one person — soft, close","Chorus: open up — more resonance, more breath, more emotion","Bridge: the climax — full voice, full feeling, but controlled"]},
  {id:'g6',title:"Fight Song",artist:"Platten",diff:3,sys:['airflow','source'],stage:2,
   notes:"Focus: power without strain. The chorus needs strong airflow but relaxed throat.",
   exercises:["Sing chorus on 'ng' first — feel the power without the words","Add words — same energy, but jaw stays loose","Full chorus: if throat tightens, go back to 'ng' and try again"]}
];

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
function go(id){
  var screens=document.querySelectorAll('.screen');
  for(var i=0;i<screens.length;i++)screens[i].classList.remove('active');
  document.getElementById('s-'+id).classList.add('active');
  var items=document.querySelectorAll('.bnav-item');
  for(var j=0;j<items.length;j++)items[j].classList.remove('active');
  var ni=document.getElementById('n-'+id);
  if(ni)ni.classList.add('active');
  window.scrollTo({top:0,behavior:'instant'});
  if(id==='home')renderHome();
  if(id==='learn')renderLearn();
  if(id==='practice')renderPractice();

function findNextLesson(){
  for(var s=0;s<CURRICULUM.stages.length;s++){
    var stage=CURRICULUM.stages[s];
    if(stage.id>U.stage)break;
    for(var l=0;l<stage.lessons.length;l++){
      var lesson=stage.lessons[l];
      if(U.completedLessons.indexOf(lesson.id)===-1){
        return {id:lesson.id,title:lesson.title,type:lesson.type,stage:stage.id,index:l};
      }
    }
  }
  return null;
}

function findNextSong(){
  for(var i=0;i<SONGS.length;i++){
    if(SONGS[i].stage<=U.stage&&U.completedSongs.indexOf(SONGS[i].id)===-1)return SONGS[i];
  }
  return SONGS[0];
}

var currentLesson=null;
var quizAnswers=[];

function openLesson(id){
  // Find lesson
  var lesson=null,stageId=1;
  for(var s=0;s<CURRICULUM.stages.length;s++){
    for(var l=0;l<CURRICULUM.stages[s].lessons.length;l++){
      if(CURRICULUM.stages[s].lessons[l].id===id){
        lesson=CURRICULUM.stages[s].lessons[l];
        stageId=CURRICULUM.stages[s].id;
        break;
      }
    }
    if(lesson)break;
  }
  if(!lesson)return;
  currentLesson=lesson;
  var c=document.getElementById('v-content');
  var h='';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">';
  h+='<button class="btn btn--ghost btn--sm" onclick="go(\'learn\')">← Back</button>';
  h+='<span class="tag tag--primary">Stage '+stageId+'</span></div>';
  h+='<h1 style="font-size:1.4rem;margin-bottom:6px">'+lesson.title+'</h1>';

  if(lesson.type==='lesson'){
    h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;margin-bottom:16px;font-size:.95rem;line-height:1.7">';
    h+=lesson.content;
    h+='</div>';
    if(lesson.quiz&&lesson.quiz.length>0){
      h+='<button class="btn btn--primary" onclick="startQuiz()">Take Quiz →</button>';
    }else if(lesson.exercise){
      h+='<button class="btn btn--primary" onclick="startExercise()">Start Exercise →</button>';
    }else{
      h+='<button class="btn btn--success" onclick="completeLesson()">Mark Complete ✓</button>';
    }
  }
  c.innerHTML=h;
  showSession();
}

function startQuiz(){
  if(!currentLesson||!currentLesson.quiz)return;
  quizAnswers=[];
  var c=document.getElementById('v-content');
  var h='';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">';
  h+='<button class="btn btn--ghost btn--sm" onclick="openLesson(\''+currentLesson.id+'\')">← Back</button>';
  h+='<span class="tag tag--gold">Quiz</span></div>';
  h+='<h2 style="margin-bottom:16px">Check Your Understanding</h2>';
  for(var q=0;q<currentLesson.quiz.length;q++){
    var qq=currentLesson.quiz[q];
    h+='<div style="margin-bottom:20px" id="q-block-'+q+'">';
    h+='<p style="font-weight:600;margin-bottom:10px">'+(q+1)+'. '+qq.q+'</p>';
    for(var o=0;o<qq.options.length;o++){
      h+='<div class="q-option" id="q-'+q+'-'+o+'" onclick="selectAnswer('+q+','+o+','+qq.answer+')">';
      h+='<div class="q-radio"></div>';
      h+='<span style="font-size:.9rem">'+qq.options[o]+'</span></div>';
    }
    h+='</div>';
  }
  h+='<button class="btn btn--primary" id="quiz-submit" onclick="submitQuiz()" style="opacity:.5;pointer-events:none">Submit Answers</button>';
  c.innerHTML=h;
}

function selectAnswer(q,o,correct){
  var block=document.getElementById('q-block-'+q);
  var opts=block.querySelectorAll('.q-option');
  for(var i=0;i<opts.length;i++)opts[i].classList.remove('selected');
  document.getElementById('q-'+q+'-'+o).classList.add('selected');
  quizAnswers[q]={selected:o,correct:correct};
  // Enable submit if all answered
  var allAnswered=true;
  for(var i=0;i<currentLesson.quiz.length;i++){
    if(!quizAnswers[i]){allAnswered=false;break;}
  }
  var btn=document.getElementById('quiz-submit');
  if(allAnswered){btn.style.opacity='1';btn.style.pointerEvents='auto';}
}

function submitQuiz(){
  var correct=0,total=currentLesson.quiz.length;
  for(var q=0;q<total;q++){
    var block=document.getElementById('q-block-'+q);
    var opts=block.querySelectorAll('.q-option');
    for(var o=0;o<opts.length;o++){
      opts[o].style.pointerEvents='none';
      if(o===quizAnswers[q].correct)opts[o].classList.add('correct');
      if(o===quizAnswers[q].selected&&o!==quizAnswers[q].correct)opts[o].classList.add('wrong');
    }
    if(quizAnswers[q].selected===quizAnswers[q].correct)correct++;
  }
  var passed=correct>=Math.ceil(total*0.5);
  var xp=passed?20:5;
  U.xp+=xp;
  U.sessions++;
  save();
  var c=document.getElementById('v-content');
  var h='';
  h+='<div class="card card--'+(passed?'success':'accent')+'" style="text-align:center;padding:32px;margin-bottom:16px">';
  h+='<div style="font-size:2.5rem;margin-bottom:8px">'+(passed?'🎉':'📚')+'</div>';
  h+='<h2>'+(passed?'Passed!':'Keep Learning')+'</h2>';
  h+='<p style="color:var(--text3)">'+correct+'/'+total+' correct. +'+xp+' XP</p></div>';
  if(passed){
    h+='<button class="btn btn--success" onclick="completeLesson()">Continue →</button>';
  }else{
    h+='<button class="btn btn--primary" onclick="startQuiz()">Try Again</button>';
    h+='<button class="btn btn--ghost" onclick="openLesson(\''+currentLesson.id+'\')">Review Lesson</button>';
  }
  c.innerHTML=h;
}

function startExercise(){
  if(!currentLesson||!currentLesson.exercise)return;
  var ex=currentLesson.exercise;
  var c=document.getElementById('v-content');
  var h='';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">';
  h+='<button class="btn btn--ghost btn--sm" onclick="openLesson(\''+currentLesson.id+'\')">← Back</button>';
  h+='<span class="tag tag--gold">Exercise • +'+ex.xp+' XP</span></div>';
  h+='<h1 style="font-size:1.3rem;margin-bottom:6px">'+ex.name+'</h1>';
  h+='<p style="color:var(--text3);margin-bottom:20px">Follow each step. Take your time.</p>';
  for(var s=0;s<ex.steps.length;s++){
    h+='<div class="ex-step"><div class="ex-step-num">'+(s+1)+'</div>';
    h+='<div class="ex-step-text"><h4>Step '+(s+1)+'</h4><p>'+ex.steps[s]+'</p></div></div>';
  }
  h+='<button class="btn btn--success btn--block" style="margin-top:16px" onclick="finishExercise()">I Completed This ✓</button>';
  c.innerHTML=h;
}

function finishExercise(){
  var ex=currentLesson.exercise;
  U.xp+=ex.xp;
  U.skills[ex.skill]=Math.min(10,U.skills[ex.skill]+1);
  U.sessions++;
  save();
  toast('Exercise complete! +'+ex.xp+' XP, '+ex.skill+' skill up!','success');
  completeLesson();
}

function completeLesson(){
  if(U.completedLessons.indexOf(currentLesson.id)===-1)U.completedLessons.push(currentLesson.id);
  // Check if stage complete
  var allDone=true;
  for(var s=0;s<CURRICULUM.stages.length;s++){
    if(CURRICULUM.stages[s].id===U.stage){
      for(var l=0;l<CURRICULUM.stages[s].lessons.length;l++){
        if(U.completedLessons.indexOf(CURRICULUM.stages[s].lessons[l].id)===-1){allDone=false;break;}
      }
      break;
    }
  }
  if(allDone&&U.stage<CURRICULUM.stages.length){
    U.stage++;
    toast('Stage '+(U.stage-1)+' complete! Stage '+U.stage+' unlocked!','gold');
  }
  save();
  go('learn');
}

var diagSelected=[];
function toggleDiag(id){
  var el=document.getElementById('diag-'+id);
  var idx=diagSelected.indexOf(id);
  if(idx===-1){diagSelected.push(id);el.classList.add('selected');}
  else{diagSelected.splice(idx,1);el.classList.remove('selected');}
}

function submitDiagnostic(){
  if(diagSelected.length===0){toast('Select at least one');return;}
  var scores={airflow:0,source:0,resonance:0,articulation:0};
  var map={pitch:['source','airflow'],strain:['source'],breathy:['source','airflow'],power:['airflow'],crack:['source'],tired:['airflow','source'],nasal:['resonance']};
  for(var i=0;i<diagSelected.length;i++){
    var s=map[diagSelected[i]];
    if(s)for(var j=0;j<s.length;j++)scores[s[j]]++;
  }
  var primary='source',max=0;
  for(var k in scores)if(scores[k]>max){max=scores[k];primary=k;}
  var exercises={
    airflow:{name:'Breath Reset',steps:['Stand tall, shoulders relaxed','Breathe in for 4 counts — belly expands','Blow out on "sss" for 15 seconds — even and steady','Repeat 3 times','Now sing a phrase — notice the improved airflow'],xp:20},
    source:{name:'Balanced Onset',steps:['Hum on "m" for 5 seconds — feel the buzz','Open to "mah" — keep the same easy feeling','Sing "ah" 5 times — clean start, no breathy "h", no hard attack','Sing a scale — balanced onset on every note','Sing a phrase from a song — carry that balance into lyrics'],xp:20},
    resonance:{name:'Forward Placement',steps:['Hum on "ng" — feel buzz in nose/lips','Slide up and down on "ng" — keep buzz forward','Sing "mee" — lips should tingle','Sing "mah" — same forward feeling','Sing a phrase — resonance stays forward, not in throat'],xp:20},
    articulation:{name:'Clear Diction',steps:['Speak: "ma-me-mi-mo-mu" — slow, every consonant clear','Say it faster — keep clarity','Sing it on one pitch — same precision','Sing a lyric — every word understandable','Record yourself — can you hear every word?'],xp:20}
  };
  var ex=exercises[primary];
  var c=document.getElementById('v-content');
  var h='';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">';
  h+='<button class="btn btn--ghost btn--sm" onclick="go(\'practice\')">← Back</button>';
  h+='<span class="tag tag--gold">Your Exercise • +'+ex.xp+' XP</span></div>';
  h+='<h1 style="font-size:1.3rem;margin-bottom:6px">'+ex.name+'</h1>';
  h+='<p style="color:var(--text3);margin-bottom:20px">Based on your answers, this is your priority.</p>';
  for(var s=0;s<ex.steps.length;s++){
    h+='<div class="ex-step"><div class="ex-step-num">'+(s+1)+'</div>';
    h+='<div class="ex-step-text"><h4>Step '+(s+1)+'</h4><p>'+ex.steps[s]+'</p></div></div>';
  }
  h+='<button class="btn btn--success btn--block" style="margin-top:16px" onclick="finishDiagDrill(\''+primary+'\','+ex.xp+')">I Completed This ✓</button>';
  c.innerHTML=h;
  diagSelected=[];
}

function finishDiagDrill(skill,xp){
  U.xp+=xp;
  U.skills[skill]=Math.min(10,U.skills[skill]+1);
  U.sessions++;
  save();
  toast('Exercise complete! +'+xp+' XP','success');
  go('practice');
}

// ═══════════════════════════════════════════════════
// RENDER: SONGS
// ═══════════════════════════════════════════════════
function renderSongs(){
  var c=document.getElementById('g-content');
  var h='';
  h+='<h2 style="margin-bottom:4px">Song Library</h2>';
  h+='<p style="color:var(--text3);margin-bottom:20px">Apply your training to real songs.</p>';
  for(var i=0;i<SONGS.length;i++){
    var s=SONGS[i];
    var locked=s.stage>U.stage;
    var done=U.completedSongs.indexOf(s.id)!==-1;
    h+='<div class="li" style="opacity:'+(locked?'0.4':'1')+';pointer-events:'+(locked?'none':'auto')+'" onclick="openSong(\''+s.id+'\')">';
    h+='<div class="li-icon '+(done?'li-icon--success':'li-icon--gold')+'">'+(done?'✓':'🎵')+'</div>';
    h+='<div class="li-body"><div class="li-title">'+s.title+'</div>';
    h+='<div class="li-sub">'+s.artist+' • Diff '+s.diff+'/4 • '+s.sys.join(', ')+'</div></div>';
    if(done)h+='<span class="tag tag--success">Done</span>';
    if(locked)h+='<span class="tag" style="background:rgba(255,255,255,.05);color:var(--text3)">🔒</span>';
    if(!locked&&!done)h+='<span class="tag tag--primary">Sing →</span>';
    h+='</div>';
  }
  c.innerHTML=h;
}

function openSong(id){
  var song=null;
  for(var i=0;i<SONGS.length;i++)if(SONGS[i].id===id)song=SONGS[i];
  if(!song)return;
  var c=document.getElementById('v-content');
  var h='';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">';
  h+='<button class="btn btn--ghost btn--sm" onclick="go(\'songs\')">← Back</button>';
  h+='<span class="tag tag--gold">Song Practice</span></div>';
  h+='<h1 style="font-size:1.4rem;margin-bottom:4px">'+song.title+'</h1>';
  h+='<p style="color:var(--text3);margin-bottom:20px">'+song.artist+'</p>';
  h+='<div class="card mb-12"><h3 style="margin-bottom:8px">Training Focus</h3>';
  h+='<p style="margin-bottom:8px">'+song.notes+'</p>';
  h+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
  for(var s=0;s<song.sys.length;s++)h+='<span class="tag tag--primary">'+song.sys[s]+'</span>';
  h+='</div></div>';
  h+='<div class="card mb-12"><h3 style="margin-bottom:12px">Pre-Flight Exercises</h3>';
  for(var e=0;e<song.exercises.length;e++){
    h+='<div class="ex-step"><div class="ex-step-num">'+(e+1)+'</div>';
    h+='<div class="ex-step-text"><p>'+song.exercises[e]+'</p></div></div>';
  }
  h+='</div>';
  h+='<button class="btn btn--primary" onclick="practiceSong(\''+song.id+'\')">I Sang It ✓</button>';
  c.innerHTML=h;
  showSession();
}

function practiceSong(id){
  var song=null;
  for(var i=0;i<SONGS.length;i++)if(SONGS[i].id===id)song=SONGS[i];
  U.xp+=50;
  U.sessions++;
  for(var s=0;s<song.sys.length;s++)U.skills[song.sys[s]]=Math.min(10,U.skills[song.sys[s]]+1);
  if(U.completedSongs.indexOf(id)===-1)U.completedSongs.push(id);
  save();
  var c=document.getElementById('v-content');
  var h='';
  h+='<div class="card card--gold text-center" style="padding:32px;margin-bottom:16px">';
  h+='<div style="font-size:3rem;margin-bottom:8px">🏆</div>';
  h+='<h2>Song Complete!</h2>';
  h+='<p style="color:var(--text3)">+50 XP. Skills improved.</p></div>';
  h+='<button class="btn btn--primary" onclick="go(\'songs\')">Back to Songs</button>';
  c.innerHTML=h;
}

// ═══════════════════════════════════════════════════
// RENDER: PROGRESS
// ═══════════════════════════════════════════════════
function renderProgress(){
  var c=document.getElementById('r-content');
  var h='';
  h+='<h2 style="margin-bottom:4px">Your Progress</h2>';
  h+='<p style="color:var(--text3);margin-bottom:20px">Track your vocal growth.</p>';

  h+='<div class="card card--gold text-center" style="padding:28px;margin-bottom:20px">';
  h+='<div style="font-size:2.5rem;margin-bottom:8px">⭐</div>';
  h+='<h2 style="font-size:1.8rem;margin-bottom:4px">'+U.xp+' XP</h2>';
  h+='<p style="color:var(--text3)">Level '+U.level+' • '+U.sessions+' sessions • '+U.completedSongs.length+' songs • '+U.totalPracticeMinutes+' min practiced</p></div>';

  h+='<div class="sec"><div class="sec-header"><span class="sec-title">Voice Systems</span></div>';
  var sys=['airflow','source','resonance','articulation'];
  var sysNames={airflow:'Airflow',source:'Source',resonance:'Resonance',articulation:'Articulation'};
  for(var s=0;s<sys.length;s++){
    var sk=sys[s],lvl=U.skills[sk],pct=lvl*10;
    h+='<div style="margin-bottom:14px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    h+='<span style="font-size:.85rem;font-weight:600">'+sysNames[sk]+'</span>';
    h+='<span style="font-size:.75rem;color:var(--text3)">'+lvl+'/10</span></div>';
    h+='<div class="prog"><div class="prog-fill" style="width:'+pct+'%"></div></div></div>';
  }
  h+='</div>';

  h+='<div class="sec"><div class="sec-header"><span class="sec-title">Stage Progress</span></div>';
  h+='<div class="card card--accent text-center" style="padding:24px">';
  h+='<h2 style="font-size:1.5rem;margin-bottom:4px">Stage '+U.stage+': '+CURRICULUM.stages[U.stage-1].name+'</h2>';
  h+='<p style="color:var(--text3);margin-bottom:12px">'+CURRICULUM.stages[U.stage-1].subtitle+'</p>';
  var stagePct=Math.round((U.stage-1)/CURRICULUM.stages.length*100);
  h+='<div class="prog prog--gold"><div class="prog-fill" style="width:'+stagePct+'%"></div></div>';
  h+='<p style="font-size:.7rem;color:var(--text3);margin-top:6px">'+stagePct+'% through curriculum</p></div></div>';

  h+='<div class="sec"><div class="sec-header"><span class="sec-title">Songs Completed ('+U.completedSongs.length+'/'+SONGS.length+')</span></div>';
  if(U.completedSongs.length===0){
    h+='<p style="color:var(--text3)">No songs completed yet.</p>';
  }else{
    for(var i=0;i<U.completedSongs.length;i++){
      var song=null;
      for(var j=0;j<SONGS.length;j++)if(SONGS[j].id===U.completedSongs[i])song=SONGS[j];
      if(song)h+='<div class="card" style="padding:12px 16px;margin-bottom:6px"><span style="font-weight:600">'+song.title+'</span> <span style="color:var(--text3);font-size:.8rem">— '+song.artist+'</span></div>';
    }
  }
  h+='</div>';

  h+='<div class="sec"><div class="sec-header"><span class="sec-title">Lessons Completed</span></div>';
  h+='<p style="color:var(--text3)">'+U.completedLessons.length+' lessons completed</p></div>';

  h+='<button class="btn btn--ghost" style="margin-top:20px" onclick="resetAll()">Reset All Progress</button>';
  c.innerHTML=h;
}

function resetAll(){
  U={name:'Singer',xp:0,level:1,stage:1,sessions:0,completedLessons:[],completedSongs:[],badges:[],skills:{airflow:0,source:0,resonance:0,articulation:0},lastActive:null,totalPracticeMinutes:0};
  save();
  toast('Progress reset');
  go('home');
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
go('home');
</script>
</body>
</html>
