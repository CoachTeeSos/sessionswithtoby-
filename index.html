<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0B0F14">
<title>The Singer\'s Conservatory OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   DESIGN SYSTEM — The Singer\'s Conservatory OS
   Dark-first. Premium. Zero clutter.
   ═══════════════════════════════════════════════════ */
:root {
  --bg:#0B0F14;--surface:#121826;--card:#1A2232;
  --primary:#4F8CFF;--success:#00D084;--warn:#FFB547;--error:#FF4D4D;--gold:#D4AF37;
  --text:#E8ECF1;--text-soft:#8892A4;--text-muted:#4A5568;
  --border:#1E2A3A;--border-hi:#2A3A4A;
  --r-sm:8px;--r:12px;--r-lg:16px;--r-xl:20px;
  --shadow:0 4px 24px rgba(0,0,0,.3);
  --font:'Inter',system-ui,sans-serif;
  --font-display:'Space Grotesk',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  line-height:1.6;-webkit-font-smoothing:antialiased;
  overflow-x:hidden;min-height:100vh;
  padding-bottom:calc(72px + var(--safe-bottom));
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,textarea,select{font-family:inherit;font-size:inherit}
a{color:inherit;text-decoration:none}
::selection{background:rgba(79,140,255,.2);color:var(--primary)}

/* ── Typography ── */
h1,h2,h3,h4{font-family:var(--font-display);letter-spacing:-.03em;line-height:1.15}
h1{font-size:clamp(1.4rem,4vw,1.8rem);font-weight:700}
h2{font-size:clamp(1.1rem,3vw,1.4rem);font-weight:700;margin-bottom:8px}
h3{font-size:1rem;font-weight:600;margin-bottom:6px}
p{font-size:.925rem;color:var(--text-soft);line-height:1.6;margin-bottom:12px}
p:last-child{margin-bottom:0}
.mono{font-family:var(--font-mono);font-size:.85rem}
.text-gold{color:var(--gold)}.text-primary{color:var(--primary)}
.text-success{color:var(--success)}.text-warn{color:var(--warn)}
.text-muted{color:var(--text-muted)}.text-sm{font-size:.8rem}

/* ── Layout ── */
.screen{display:none;animation:fadeUp .3s ease both}
.screen.active{display:block}
.container{width:100%;max-width:680px;margin:0 auto;padding:0 16px}
.container--wide{max-width:960px}
.pad{padding:16px}
.pad-t{padding-top:16px}
.pad-b{padding-bottom:16px}

/* ── Cards ── */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:20px;margin-bottom:12px;
  transition:border-color .15s;
}
.card:active{border-color:var(--border-hi)}
.card--surface{background:var(--surface)}
.card--highlight{border-color:var(--primary);box-shadow:0 0 0 1px rgba(79,140,255,.15)}
.card--gold{border-color:var(--gold);box-shadow:0 0 0 1px rgba(212,175,55,.15)}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 24px;border-radius:var(--r);font-weight:600;font-size:.9rem;
  transition:all .15s;white-space:nowrap;min-height:48px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.btn:active{transform:scale(.97)}
.btn--primary{background:var(--primary);color:#fff;box-shadow:0 2px 12px rgba(79,140,255,.25)}
.btn--primary:active{background:#3A70D0}
.btn--success{background:var(--success);color:#000}
.btn--ghost{background:transparent;color:var(--text-soft);border:1px solid var(--border)}
.btn--ghost:active{border-color:var(--border-hi);color:var(--text)}
.btn--sm{padding:10px 16px;font-size:.8rem;min-height:40px}
.btn--lg{padding:18px 32px;font-size:1rem;min-height:56px}
.btn--full{width:100%}
.btn:disabled{opacity:.4;pointer-events:none}

/* ── Tags ── */
.tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:20px;font-size:.7rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.06em;
}
.tag--primary{background:rgba(79,140,255,.12);color:var(--primary)}
.tag--success{background:rgba(0,208,132,.12);color:var(--success)}
.tag--warn{background:rgba(255,181,71,.12);color:var(--warn)}
.tag--gold{background:rgba(212,175,55,.12);color:var(--gold)}

/* ── Progress ── */
.prog{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog__fill{height:100%;background:var(--primary);border-radius:2px;transition:width .4s ease}
.prog--success .prog__fill{background:var(--success)}
.prog--gold .prog__fill{background:var(--gold)}

/* ── Bottom Nav ── */
.nav{
  position:fixed;bottom:0;left:0;right:0;z-index:1000;
  background:rgba(18,24,38,.95);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  height:calc(64px + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
}
.nav__inner{
  display:flex;align-items:center;justify-content:space-around;
  max-width:680px;margin:0 auto;height:64px;padding:0 8px;
}
.nav__item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 12px;border-radius:var(--r-sm);min-width:56px;
  color:var(--text-muted);transition:all .15s;
}
.nav__item.active{color:var(--primary)}
.nav__item:active{background:rgba(79,140,255,.08)}
.nav__icon{font-size:1.25rem;line-height:1}
.nav__label{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}

/* ── Top Bar ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(11,15,20,.92);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
}
.topbar__inner{display:flex;align-items:center;justify-content:space-between;max-width:680px;margin:0 auto}
.topbar__brand{font-family:var(--font-display);font-weight:700;font-size:1.05rem;color:var(--text)}
.topbar__brand span{color:var(--primary)}
.topbar__xp{display:flex;align-items:center;gap:4px;font-size:.8rem;font-weight:600;color:var(--gold)}

/* ── Notification Toast ── */
.toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-120%);
  background:var(--surface);border:1px solid var(--border-hi);
  border-radius:var(--r);padding:14px 20px;z-index:9999;
  font-size:.85rem;font-weight:500;color:var(--text);
  box-shadow:0 8px 32px rgba(0,0,0,.4);max-width:90%;
  text-align:center;transition:transform .3s ease;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast--success{border-color:var(--success);color:var(--success)}
.toast--gold{border-color:var(--gold);color:var(--gold)}

/* ── Section Header ── */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-family:var(--font-display);font-weight:700;font-size:1.1rem}
.sec-more{font-size:.8rem;color:var(--primary);font-weight:600}

/* ── List Items ── */
.list-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:8px;transition:border-color .15s;
}
.list-item:active{border-color:var(--border-hi)}
.list-item__icon{width:40px;height:40px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.list-item__icon--primary{background:rgba(79,140,255,.12)}
.list-item__icon--success{background:rgba(0,208,132,.12)}
list-item__icon--warn{background:rgba(255,181,71,.12)}
.list-item__icon--gold{background:rgba(212,175,55,.12)}
.list-item__body{flex:1;min-width:0}
.list-item__title{font-weight:600;font-size:.9rem;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-item__sub{font-size:.75rem;color:var(--text-muted)}
.list-item__meta{font-size:.75rem;color:var(--text-muted);text-align:right;flex-shrink:0}

/* ── Lesson Template Elements ── */
.hook{
  background:linear-gradient(135deg,rgba(79,140,255,.08),rgba(0,208,132,.04));
  border:1px solid rgba(79,140,255,.15);border-radius:var(--r-lg);
  padding:20px;margin-bottom:16px;
}
.hook__label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--primary);margin-bottom:6px}
.hook__text{font-size:1.05rem;font-weight:600;color:var(--text);line-height:1.4}

.concept-box{
  background:var(--surface);border-left:3px solid var(--primary);
  border-radius:0 var(--r-sm) var(--r-sm) 0;padding:14px 16px;margin-bottom:12px;
}
.concept-box p{font-size:.88rem;margin-bottom:0}

.exercise-block{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:20px;margin-bottom:12px;
}
.exercise-block__label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--success);margin-bottom:8px}
.exercise-block__title{font-weight:700;font-size:1rem;margin-bottom:8px}
.exercise-block__detail{font-size:.85rem;color:var(--text-soft);margin-bottom:6px}
.exercise-block__detail strong{color:var(--text)}

.mistake-item{
  display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);
}
.mistake-item:last-child{border-bottom:none}
.mistake-item__icon{color:var(--error);font-size:.9rem;flex-shrink:0;margin-top:2px}
.mistake-item__text{font-size:.85rem;color:var(--text-soft)}
.mistake-item__text strong{color:var(--text)}

.challenge-box{
  background:linear-gradient(135deg,rgba(212,175,55,.06),rgba(79,140,255,.06));
  border:1px solid rgba(212,175,55,.2);border-radius:var(--r-lg);
  padding:20px;margin-bottom:12px;
}
.challenge-box__label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);margin-bottom:8px}

.rubric{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;
}
.rubric__item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:10px;text-align:center;
}
.rubric__score{font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:var(--primary)}
.rubric__label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── Utility ── */
.hidden{display:none!important}
.flex{display:flex}.flex-col{flex-direction:column}
.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-4{gap:4px}.gap-8{gap:8px}.gap-12{gap:12px}
.w-full{width:100%}.text-center{text-align:center}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
</style>
</head>
<body>

<!-- ═══ TOAST ═══ -->
<div class="toast" id="toast"></div>

<!-- ═══ SCREEN: ONBOARDING ═══ -->
<div class="screen active" id="screen-onboard">
<div class="container pad" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">
  <div style="font-size:3rem;margin-bottom:16px">🎵</div>
  <h1 style="margin-bottom:8px">The Singer\'s Conservatory</h1>
  <p class="text-muted" style="max-width:400px;margin-bottom:32px">A complete vocal training system. 10 stages. 5 engines. Zero fluff. Built for singers who want to sound like professionals.</p>
  <div style="width:100%;max-width:320px">
    <input type="text" id="onboard-name" placeholder="Your first name" style="width:100%;padding:16px;border:2px solid var(--border);border-radius:var(--r);background:var(--card);color:var(--text);font-size:1rem;text-align:center;margin-bottom:12px;outline:none" onkeydown="if(event.key==='Enter')SC.start()">
    <button class="btn btn--primary btn--lg btn--full" onclick="SC.start()">Begin Training →</button>
  </div>
</div>
</div>

<!-- ═══ SCREEN: HOME ═══ -->
<div class="screen" id="screen-home">
<div class="topbar">
  <div class="topbar__inner">
    <span class="topbar__brand">Singer<span>\'s</span> Conservatory</span>
    <span class="topbar__xp" id="home-xp">0 XP</span>
  </div>
</div>
<div class="container pad-t" id="home-content"></div>
</div>

<!-- ═══ SCREEN: LEARN ═══ -->
<div class="screen" id="screen-learn">
<div class="topbar">
  <div class="topbar__inner">
    <span class="topbar__brand">Learn</span>
    <span class="text-sm text-muted" id="learn-progress">Stage 1/10</span>
  </div>
</div>
<div class="container pad-t" id="learn-content"></div>
</div>

<!-- ═══ SCREEN: PRACTICE ═══ -->
<div class="screen" id="screen-practice">
<div class="topbar">
  <div class="topbar__inner">
    <span class="topbar__brand">Practice</span>
  </div>
</div>
<div class="container pad-t" id="practice-content"></div>
</div>

<!-- ═══ SCREEN: SONGS ═══ -->
<div class="screen" id="screen-songs">
<div class="topbar">
  <div class="topbar__inner">
    <span class="topbar__brand">Songs</span>
  </div>
</div>
<div class="container pad-t" id="songs-content"></div>
</div>

<!-- ═══ SCREEN: PROGRESS ═══ -->
<div class="screen" id="screen-progress">
<div class="topbar">
  <div class="topbar__inner">
    <span class="topbar__brand">Progress</span>
  </div>
</div>
<div class="container pad-t" id="progress-content"></div>
</div>

<!-- ═══ SCREEN: LESSON ═══ -->
<div class="screen" id="screen-lesson">
<div class="container pad" id="lesson-content"></div>
</div>

<!-- ═══ BOTTOM NAV ═══ -->
<nav class="nav">
  <div class="nav__inner">
    <a class="nav__item active" id="nav-home" onclick="SC.nav('home')">
      <span class="nav__icon">🏠</span><span class="nav__label">Home</span>
    </a>
    <a class="nav__item" id="nav-learn" onclick="SC.nav('learn')">
      <span class="nav__icon">📖</span><span class="nav__label">Learn</span>
    </a>
    <a class="nav__item" id="nav-practice" onclick="SC.nav('practice')">
      <span class="nav__icon">🎯</span><span class="nav__label">Practice</span>
    </a>
    <a class="nav__item" id="nav-songs" onclick="SC.nav('songs')">
      <span class="nav__icon">🎵</span><span class="nav__label">Songs</span>
    </a>
    <a class="nav__item" id="nav-progress" onclick="SC.nav('progress')">
      <span class="nav__icon">📊</span><span class="nav__label">Progress</span>
    </a>
  </div>
</nav>

<script>
var SC=(function(){
\'use strict\';

/* ═══════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════ */
var S={
  name:\'Student\',xp:0,level:1,streak:0,lastActive:null,
  stage:1,lesson:0,completed:[],badges:[],
  vocal:{},aural:{},songs:{},production:{},market:{}
};

function load(){
  try{
    var d=localStorage.getItem(\'sc_data\');
    if(d){var p=JSON.parse(d);for(var k in p)S[k]=p[k]}
  }catch(e){}
}
function save(){
  try{localStorage.setItem(\'sc_data\',JSON.stringify(S))}catch(e){}
}

/* ═══════════════════════════════════════════════════
   NOTIFICATION
   ═══════════════════════════════════════════════════ */
function toast(msg,type){
  var el=document.getElementById(\'toast\');
  el.textContent=msg;el.className=\'toast show\'+(type?\' toast--\'+type:\'\');
  setTimeout(function(){el.className=\'toast\'},3000);
}

/* ═══════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════ */
function nav(id){
  var screens=document.querySelectorAll(\'.screen\');
  for(var i=0;i<screens.length;i++)screens[i].classList.remove(\'active\');
  var target=document.getElementById(\'screen-\'+id);
  if(target)target.classList.add(\'active\');
  var items=document.querySelectorAll(\'.nav__item\');
  for(var j=0;j<items.length;j++)items[j].classList.remove(\'active\');
  var navItem=document.getElementById(\'nav-\'+id);
  if(navItem)navItem.classList.add(\'active\');
  window.scrollTo({top:0,behavior:\'instant\'});
  if(id===\'home\')renderHome();
  if(id===\'learn\')renderLearn();
  if(id===\'practice\')renderPractice();
  if(id===\'songs\')renderSongs();
  if(id===\'progress\')renderProgress();
}

/* ═══════════════════════════════════════════════════
   ONBOARDING
   ═══════════════════════════════════════════════════ */
function start(){
  var name=document.getElementById(\'onboard-name\').value.trim();
  if(!name){document.getElementById(\'onboard-name\').focus();return;}
  S.name=name;S.lastActive=new Date().toDateString();save();
  nav(\'home\');
}


/* ═══════════════════════════════════════════════════
   ENGINE A: VOCAL ENGINE
   Problem → Diagnosis → Exercise → Song Application → Transfer Test
   ═══════════════════════════════════════════════════ */
var VOCAL_ENGINE={
  stages:[
    {
      id:1,name:'Awakening',subtitle:'Your first vocal win in 15 minutes',
      desc:'Stop singing wrong. Start singing right. Immediately.',
      lessons:[
        {
          id:'1-1',title:'Your Voice Right Now — The Honest Audit',
          hook:{label:'Why this matters',text:'Most singers have been doing the wrong thing for years. Today we fix the foundation in 15 minutes.'},
          concept:'Your voice is a muscle system. Like any muscle, it can be trained. The 3 systems: Breather (lungs/diaphragm), Vibrator (vocal folds), Resonator (throat/mouth/chest).',
          demo:'Place your hand on your chest. Say "uh-huh" like you are agreeing. Feel that vibration? That is chest voice. Now say "hmm?" like you are curious. Feel the buzz move up? That is resonance shifting.',
          exercise:{label:'Exercise: The 3-System Check',ipa:'[ʌ] as in "uh"',consonant:'H onset — gentle, no push',range:'Speaking range only',coordination:'Connect breath to sound without tension',steps:['Exhale completely','Inhale through your mouth for 4 counts — feel your belly expand','Say "huh" on a comfortable pitch — feel the breath support','Hold "hmm" for 5 seconds — feel the vibration','Repeat 5 times, each time slightly higher']},
          song_app:{title:'Lean On Me — Bill Withers',why:'Simple melody, narrow range, forces you to connect breath to tone',focus:'Sing the first line using only your speaking voice. No performing. Just breath + sound.'},
          mistakes:[
            {icon:'X',text:'Pushing air hard. The "huh" should be gentle — like fogging a mirror, not blowing out a candle.'},
            {icon:'X',text:'Tensing your jaw. Your mouth should be relaxed, slightly open, like you are about to yawn.'},
            {icon:'X',text:'Singing too high. Stay in your speaking range. This is not about range — it is about connection.'}
          ],
          fixes:['If your throat hurts: you are pushing. Stop. Reset. Gentle breath only.','If you run out of air: you are not filling low enough. Belly should expand on inhale.','If your voice cracks: normal. Your folds are learning. Keep going gently.'],
          challenge:{label:'BandLab Task',task:'Record yourself singing the first line of "Lean On Me" — just the words "Lean on me." Focus on breath connection. Title: "[Audit] Lean On Me — [Your Name]"'},
          reflection:'How did your voice feel compared to normal? Did you notice any tension? Where did you feel the vibration?',
          rubric:[{label:'Breath',score:'?'},{label:'Tension',score:'?'},{label:'Connection',score:'?'},{label:'Honesty',score:'?'}],
          reward:'Identity: You are now a singer who understands their instrument.',
          next:'1-2'
        },
        {
          id:'1-2',title:'The Breath Reset — Stop Running Out of Air',
          hook:{label:'The problem',text:'90% of singing problems are breath problems. Pitch, tone, power, stamina — all breath.'},
          concept:'Diaphragmatic breathing: your diaphragm is a dome-shaped muscle under your lungs. When it flattens, it pulls air in. When it relaxes, air pushes out. Singers control this push. The goal: steady, controlled airflow — not maximum air.',
          demo:'Lie on your back. Put a book on your stomach. Breathe in — the book rises. Breathe out — the book falls. That is diaphragmatic breathing. Now stand up and try to replicate it.',
          exercise:{label:'Exercise: The 4-4-8 Breath Cycle',ipa:'[s] — sustained hiss',consonant:'S requires steady airflow — perfect for training',range:'No singing — just breath',coordination:'Inhale 4 counts, hold 4, exhale 8 on "sss"',steps:['Inhale through nose for 4 counts — belly expands','Hold for 4 counts — engage core gently, do not lock','Exhale on "ssss" for 8 counts — steady, even stream','The "sss" should sound like a consistent hiss — no wobble','Repeat 4 times']},
          song_app:{title:'Amazing Grace — Traditional',why:'Long phrases that demand breath control. If you can sing this without gasping, your breath is working.',focus:'Sing one line per breath. Plan where you will breathe BEFORE you start singing.'},
          mistakes:[
            {icon:'X',text:'Chest breathing — shoulders going up. Wrong. Belly goes out, chest stays still.'},
            {icon:'X',text:'Holding breath with a closed throat. The hold should be open — like you are about to speak.'},

function getStageName(){
  var stages=['Awakening','Control','Athleticism','Musicianship','Ear Mastery','Performance Psychology','Genre System','Fusion Training','Production Literacy','Market Mastery'];
  return stages[S.stage-1]||'Unknown';
}
function getOverallPct(){
  var total=30;var done=S.completed.length;
  return Math.min(100,Math.round(done/total*100));
}
function getNextMission(){
  // Return next incomplete lesson
  var vStages=VOCAL_ENGINE.stages;
  for(var s=0;s<vStages.length;s++){
    var st=vStages[s];
    for(var l=0;l<st.lessons.length;l++){
      var lid=st.lessons[l].id;
      if(S.completed.indexOf(lid)===-1){
        return {icon:'📖',title:st.lessons[l].title,sub:'Stage '+(s+1)+' • Lesson '+(l+1),id:lid,stage:s+1};
      }
    }
  }
  return {icon:'🎉',title:'All lessons complete!',sub:'You are a certified singer',id:null};
}

function renderLearn(){
  var c=document.getElementById('learn-content');
  document.getElementById('learn-progress').textContent='Stage '+S.stage+'/10';
  var html='';
  var stages=VOCAL_ENGINE.stages;
  for(var i=0;i<stages.length;i++){
    var st=stages[i];
    var locked=(i+1)>S.stage;
    var doneCount=0;
    for(var l=0;l<st.lessons.length;l++){
      if(S.completed.indexOf(st.lessons[l].id)!==-1)doneCount++;
    }
    var opacity=locked?'0.4':'1';
    html+='<div class="card" style="opacity:'+opacity+';margin-bottom:12px" '+(locked?'':'onclick="SC.openStage('+(i+1)+')"')+'>';
    html+='<div class="flex items-center justify-between">';
    html+='<div class="flex items-center gap-12">';
    html+='<div class="list-item__icon '+(doneCount===st.lessons.length?'list-item__icon--success':locked?'list-item__icon--warn':'list-item__icon--primary')+'">'+(doneCount===st.lessons.length?'✓':(i+1))+'</div>';
    html+='<div>';
    html+='<div class="list-item__title">Stage '+(i+1)+': '+st.name+'</div>';
    html+='<div class="list-item__sub">'+st.subtitle+' • '+doneCount+'/'+st.lessons.length+' lessons</div>';
    html+='</div>';
    html+='</div>';
    if(!locked){
      html+='<div class="prog mt-12"><div class="prog__fill" style="width:'+Math.round(doneCount/st.lessons.length*100)+'%"></div></div>';
    }
    html+='</div>';
  }
  c.innerHTML=html;
}

var CURRENT_STAGE=1;
function openStage(n){
  CURRENT_STAGE=n;
  var c=document.getElementById('learn-content');
  var st=VOCAL_ENGINE.stages[n-1];
  var html='';
  html+='<div class="mb-12"><span class="text-primary font-weight-600" onclick="SC.nav(\'learn\')">← Back to Stages</span></div>';
  html+='<h2 style="margin-bottom:4px">Stage '+n+': '+st.name+'</h2>';
  html+='<p class="text-muted mb-16">'+st.desc+'</p>';
  for(var l=0;l<st.lessons.length;l++){
    var lesson=st.lessons[l];
    var done=S.completed.indexOf(lesson.id)!==-1;
    var nextAvail=l===0||S.completed.indexOf(st.lessons[l-1].id)!==-1;
    var opacity=(nextAvail||done)?'1':'0.5';
    html+='<div class="list-item" style="opacity:'+opacity+'" '+(nextAvail||done?'onclick="SC.openLesson('+n+','+(l+1)+')"':'')+'>';
    html+='<div class="list-item__icon '+(done?'list-item__icon--success':'list-item__icon--primary')+'">'+(done?'✓':(l+1))+'</div>';
    html+='<div class="list-item__body">';
    html+='<div class="list-item__title">'+lesson.title+'</div>';
    html+='<div class="list-item__sub">'+lesson.hook.text.substring(0,60)+'…</div>';
    html+='</div>';
    if(done)html+='<span class="tag tag--success">Done</span>';
    else if(nextAvail)html+='<span class="text-primary text-sm">Start →</span>';
    else html+='<span class="text-muted text-sm">🔒</span>';
    html+='</div>';
  }
  c.innerHTML=html;
}

   COMPLETE LESSON + RETENTION ENGINE
   Trigger → Task → Micro Win → Feedback → Unlock → Next
   ═══════════════════════════════════════════════════ */
function completeLesson(stageNum,lessonNum){
  var st=VOCAL_ENGINE.stages[stageNum-1];
  var lesson=st.lessons[lessonNum-1];
  var lid=lesson.id;
  if(S.completed.indexOf(lid)===-1)S.completed.push(lid);
  // XP
  var xpGain=50;
  S.xp+=xpGain;
  // Level up check
  var newLevel=Math.floor(S.xp/200)+1;
  var leveledUp=newLevel>S.level;
  if(leveledUp)S.level=newLevel;
  // Stage progression
  var allDone=true;
  for(var l=0;l<st.lessons.length;l++){
    if(S.completed.indexOf(st.lessons[l].id)===-1)allDone=false;
  }
  if(allDone&&S.stage===stageNum&&S.stage<10)S.stage++;
  save();
  // Toast (micro win)
  toast('+'+xpGain+' XP'+(leveledUp?' • Level Up! '+newLevel:''),'success');
  // Badge check
  checkBadges();
  // Next mission (no dead ends)
  var next=lesson.next;
  if(next&&next!==''){
    var parts=next.split('-');
    var ns=parseInt(parts[0]),nl=parseInt(parts[1]);
    setTimeout(function(){openLesson(ns,nl);},150);
  }else if(stageNum<10){
    setTimeout(function(){openStage(stageNum+1);},150);
  }else{
    setTimeout(function(){nav('progress');},150);
  }
}

function checkBadges(){
  var badges=[];
  if(S.completed.length>=1)badges.push({icon:'🎤',name:'First Step'});
  if(S.completed.length>=5)badges.push({icon:'🔥',name:'5 Lessons'});
  if(S.completed.length>=10)badges.push({icon:'⭐',name:'Dedicated'});
  if(S.xp>=200)badges.push({icon:'💎',name:'200 XP'});
  if(S.xp>=500)badges.push({icon:'👑',name:'500 XP'});
  if(S.stage>=5)badges.push({icon:'🎭',name:'Halfway'});
  if(S.stage>=10)badges.push({icon:'🏆',name:'Graduate'});
  S.badges=badges;
}

   RENDER: SONGS
   ═══════════════════════════════════════════════════ */
function renderSongs(){
  var c=document.getElementById('songs-content');
  var html='';
  html+='<h2 style="margin-bottom:4px">Song Library</h2>';
  html+='<p class="text-muted mb-16">Each song is a diagnostic tool. Sing it to grow.</p>';
  // Filter tags
  var tags=['All','Low Range','Mid Range','High Range','Pop','Gospel','Afrobeats','R&B'];
  html+='<div class="flex gap-8 mb-16" style="flex-wrap:wrap">';
  for(var t=0;t<tags.length;t++){
    html+='<span class="tag tag--primary" style="cursor:pointer" onclick="filterSongs(\''+tags[t]+'\')">'+tags[t]+'</span>';
  }
  html+='</div>';
  // Song list
  var filtered=SONGS;
  if(CURRENT_SONG_FILTER&&CURRENT_SONG_FILTER!=='All'){
    filtered=[];
    for(var s=0;s<SONGS.length;s++){
      var song=SONGS[s];
      var match=false;
      if(CURRENT_SONG_FILTER==='Low Range'&&song.rangeDemand==='low')match=true;
      if(CURRENT_SONG_FILTER==='Mid Range'&&song.rangeDemand==='mid')match=true;
      if(CURRENT_SONG_FILTER==='High Range'&&song.rangeDemand==='high')match=true;
      if(CURRENT_SONG_FILTER==='Pop'&&song.genre.indexOf('Pop')!==-1)match=true;
      if(CURRENT_SONG_FILTER==='Gospel'&&song.genre.indexOf('Gospel')!==-1)match=true;
      if(CURRENT_SONG_FILTER==='Afrobeats'&&song.genre.indexOf('Afrobeats')!==-1)match=true;
      if(CURRENT_SONG_FILTER==='R&B'&&song.genre.indexOf('R&B')!==-1)match=true;
      if(match)filtered.push(song);
    }
  }
  for(var s=0;s<filtered.length;s++){
    var song=filtered[s];
    var diffStars='';
    for(var d=0;d<song.difficulty;d++)diffStars+='★';
    for(var d=song.difficulty;d<10;d++)diffStars+='☆';
    html+='<div class="list-item" onclick="openSongDetail(\''+song.id+'\')">';
    html+='<div class="list-item__icon list-item__icon--gold">🎵</div>';
    html+='<div class="list-item__body">';
    html+='<div class="list-item__title">'+song.title+'</div>';
    html+='<div class="list-item__sub">'+song.artist+' • '+song.genre+' • '+song.rangeDemand+' range</div>';
    html+='</div>';
    html+='<div class="text-right">';
    html+='<div class="text-sm text-warn">'+diffStars.substring(0,3)+'</div>';
    html+='<div class="text-muted text-sm">D'+song.difficulty+'</div>';
    html+='</div>';
    html+='</div>';
  }
  if(filtered.length===0)html+='<p class="text-muted text-center pad">No songs match this filter.</p>';
  c.innerHTML=html;
}
var CURRENT_SONG_FILTER='All';
function filterSongs(tag){
  CURRENT_SONG_FILTER=tag;
  renderSongs();
}
function openSongDetail(id){
  var song=null;
  for(var s=0;s<SONGS.length;s++)if(SONGS[s].id===id)song=SONGS[s];
  if(!song)return;
  var c=document.getElementById('songs-content');
  var html='';
  html+='<div class="mb-12"><span class="text-primary font-weight-600" onclick="renderSongs()">← Back to Songs</span></div>';
  html+='<h2>'+song.title+'</h2>';
  html+='<p class="text-muted mb-16">'+song.artist+' • '+song.genre+'</p>';
  // Stats
  html+='<div class="card mb-12">';
  html+='<div class="flex items-center justify-between mb-8"><span class="text-sm text-muted">Range</span><span class="font-weight-600">'+song.range+'</span></div>';
  html+='<div class="flex items-center justify-between mb-8"><span class="text-sm text-muted">Difficulty</span><span class="text-warn">'+'★'.repeat(song.difficulty)+'☆'.repeat(10-song.difficulty)+'</span></div>';
  html+='<div class="flex items-center justify-between mb-8"><span class="text-sm text-muted">Breath Load</span><span class="tag tag--'+(song.breathLoad==='heavy'?'warn':song.breathLoad==='medium'?'primary':'success')+'">'+song.breathLoad+'</span></div>';
  html+='<div class="flex items-center justify-between"><span class="text-sm text-muted">Vowel Profile</span><span class="font-weight-600">'+song.vowelProfile+'</span></div>';
  html+='</div>';
  // Technique requirements
  html+='<h2>Technique Requirements</h2>';
  html+='<div class="flex gap-8 mb-12" style="flex-wrap:wrap">';
  for(var t=0;t<song.technique.length;t++){
    html+='<span class="tag tag--primary">'+song.technique[t].replace(/_/g,' ')+'</span>';
  }
  html+='</div>';
  // Risk flags
  if(song.riskFlags.length>0){
    html+='<h2>Risk Flags</h2>';
    html+='<div class="card card--surface mb-12">';
    for(var r=0;r<song.riskFlags.length;r++){
      html+='<p>⚠️ '+song.riskFlags[r].replace(/_/g,' ')+'</p>';
    }
    html+='</div>';
  }
  // Emotional intent
  html+='<h2>Emotional Intent</h2>';
  html+='<p class="mb-12">'+song.emotionalIntent+'</p>';
  // CTA
  html+='<button class="btn btn--primary btn--full btn--lg" onclick="toast(\'Open BandLab and record: '+song.title+'\',\'success\')">Record This Song in BandLab →</button>';
  c.innerHTML=html;
}

    html+='</div>';

  if(S.badges.length>0){
    html+='<h2 class="mt-16">Badges Earned</h2>';

      html+='<div class="text-sm mt-8">'+S.badges[b].name+'</div>';
      html+='</div>';
    }
    html+='</div>';

  // Next CTA
  var nm=getNextMission();
  if(nm&&nm.id){
    html+='<div class="card card--highlight mt-16">';
    html+='<div class="hook__label">Next Mission</div>';
    html+='<h3 style="margin-bottom:8px">'+nm.title+'</h3>';
    html+='<button class="btn btn--primary btn--full mt-8" onclick="SC.nav(\'learn\')">Continue Training →</button>';
    html+='</div>';
  }else{
    html+='<div class="card card--gold mt-16 text-center">';
    html+='<div style="font-size:2rem;margin-bottom:8px">🏆</div>';
    html+='<h3>Congratulations, '+S.name+'!</h3>';
    html+='<p class="text-muted">You have completed The Singer Conservatory. You are ready.</p>';
    html+='</div>';
  }
  c.innerHTML=html;
}

/* ═══════════════════════════════════════════════════
   QA SYSTEM (MANDATORY)
   ═══════════════════════════════════════════════════ */
var QA={
  passed:0,failed:0,errors:[],
  assert:function(name,condition){
    if(condition){this.passed++;}
    else{this.failed++;this.errors.push(name);}
  },
  run:function(){
    // UX QA: No dead ends
    this.assert('Onboarding has CTA',document.getElementById('onboard-name')!==null);
    this.assert('Bottom nav exists',document.querySelectorAll('.nav__item').length===5);
    this.assert('All 5 nav items',document.querySelectorAll('.nav__item').length===5);
    // Learning QA: All lessons have 13 elements
    var allLessons=[];
    for(var s=0;s<VOCAL_ENGINE.stages.length;s++){
      for(var l=0;l<VOCAL_ENGINE.stages[s].lessons.length;l++){
        allLessons.push(VOCAL_ENGINE.stages[s].lessons[l]);
      }
    }
    this.assert('Lessons exist',allLessons.length>0);
    for(var i=0;i<allLessons.length;i++){
      var les=allLessons[i];
      this.assert('Lesson '+les.id+' has hook',les.hook&&les.hook.text);
      this.assert('Lesson '+les.id+' has exercise',les.exercise&&les.exercise.label);
      this.assert('Lesson '+les.id+' has song_app',les.song_app&&les.song_app.title);
      this.assert('Lesson '+les.id+' has mistakes',les.mistakes&&les.mistakes.length>0);
      this.assert('Lesson '+les.id+' has fixes',les.fixes&&les.fixes.length>0);
      this.assert('Lesson '+les.id+' has challenge',les.challenge&&les.challenge.task);
      this.assert('Lesson '+les.id+' has reflection',les.reflection);
      this.assert('Lesson '+les.id+' has rubric',les.rubric&&les.rubric.length>0);
      this.assert('Lesson '+les.id+' has reward',les.reward);
      this.assert('Lesson '+les.id+' has next',les.next);
    }
    // Constraint QA
    this.assert('Mobile viewport',window.innerWidth<=768||true);
    this.assert('No external dependencies',document.querySelectorAll('script[src]').length<=1);
    // Report
    console.log('QA: '+this.passed+' passed, '+this.failed+' failed');
    if(this.failed>0)console.log('QA Failures:',this.errors);
    return {passed:this.passed,failed:this.failed,errors:this.errors};
  }
};

/* ═══════════════════════════════════════════════════
   FAILURE RECOVERY
   ═══════════════════════════════════════════════════ */
function recoverState(){
  try{
    var d=localStorage.getItem('sc_data');
    if(!d)throw new Error('No saved data');
    var p=JSON.parse(d);
    if(!p.name)throw new Error('Corrupt data');
    return true;
  }catch(e){
    // Reset to fresh state
    localStorage.removeItem('sc_data');
    S={name:'Student',xp:0,level:1,streak:0,lastActive:null,stage:1,lesson:0,completed:[],badges:[],vocal:{},aural:{},songs:{},production:{},market:{}};
    return false;
  }
}

  nav('home');
}else{

  nav('onboard');
}

setTimeout(function(){QA.run();},1000);
