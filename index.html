<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#080808">
<title>Singer OS</title>
<style>
:root{--bg:#080808;--surf:#111;--card:#181818;--bd:#282828;--pri:#6366f1;--ok:#22c55e;--warn:#f59e0b;--err:#ef4444;--gold:#eab308;--tx:#f0f0f0;--tx2:#a0a0a0;--tx3:#6a6a6a;--r:12px;--rl:16px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);line-height:1.6;overflow-x:hidden;min-height:100vh;padding-bottom:80px;font-size:15px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit;outline:none}
a{color:inherit;text-decoration:none}
screen{display:none;min-height:calc(100vh - 80px)}screen.active{display:block}
.sp{padding:20px 16px 40px}
.tb{position:sticky;top:0;z-index:100;background:rgba(8,8,8,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.tb-t{font-size:1rem;font-weight:700}.tb-s{font-size:.65rem;color:var(--tx3);margin-top:1px}.tb-r{font-size:.8rem;font-weight:600;color:var(--gold)}
.bn{position:fixed;bottom:0;left:0;right:0;z-index:1000;background:rgba(17,17,17,.97);backdrop-filter:blur(20px);border-top:1px solid var(--bd);height:68px}
.bn-in{display:flex;align-items:center;justify-content:space-around;height:100%;max-width:500px;margin:0 auto}
.bn-i{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;color:var(--tx3);border-radius:var(--r);min-width:52px;font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.bn-i.on{color:var(--pri)}.bn-i:active{background:rgba(99,102,241,.07)}.bn-ic{font-size:1.2rem;line-height:1}
.c{background:var(--card);border:1px solid var(--bd);border-radius:var(--rl);padding:18px;margin-bottom:10px}
.c:active{border-color:#3a3a3a}.c-a{border-color:rgba(99,102,241,.3);background:linear-gradient(135deg,rgba(99,102,241,.05),transparent)}
.c-g{border-color:rgba(234,179,8,.3)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:var(--r);font-weight:600;font-size:.9rem;min-height:48px;width:100%;border:2px solid transparent;margin-bottom:8px}
.btn:active{transform:scale(.97)}.btn-p{background:var(--pri);color:#fff;border-color:var(--pri)}
.btn-g{background:transparent;color:var(--tx2);border-color:var(--bd)}.btn-g:active{border-color:#3a3a3a;color:var(--tx)}
.btn-s{background:var(--ok);color:#000;border-color:var(--ok)}.btn-sm{padding:8px 14px;font-size:.75rem;min-height:36px;width:auto}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.tag-p{background:rgba(99,102,241,.1);color:var(--pri)}.tag-s{background:rgba(34,197,94,.1);color:var(--ok)}
.tag-g{background:rgba(234,179,8,.1);color:var(--gold)}.tag-w{background:rgba(245,158,11,.1);color:var(--warn)}
.pr{height:5px;background:var(--bd);border-radius:3px;overflow:hidden}.pr-f{height:100%;background:var(--pri);border-radius:3px;transition:width .5s}
.li{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:6px;cursor:pointer}
.li:active{border-color:#3a3a3a}.li-ic{width:40px;height:40px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;background:rgba(99,102,241,.08)}
.li-b{flex:1;min-width:0}.li-t{font-weight:600;font-size:.88rem;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:.7rem;color:var(--tx3)}.sec{margin-bottom:24px}.sec:last-child{margin-bottom:0}
.sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-t{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3)}
.hero{padding:20px 0 16px}.hero h1{font-size:1.5rem;font-weight:800;letter-spacing:-.03em;line-height:1.15;margin-bottom:4px}
.hero p{color:var(--tx2);font-size:.85rem}
.qo{display:flex;align-items:center;gap:10px;padding:14px;background:var(--card);border:2px solid var(--bd);border-radius:var(--r);margin-bottom:6px;cursor:pointer}
.qo:active{border-color:#3a3a3a}.qo.sel{border-color:var(--pri);background:rgba(99,102,241,.05)}
.qo.ok{border-color:var(--ok);background:rgba(34,197,94,.05)}.qo.bad{border-color:var(--err);background:rgba(239,68,68,.05)}
.qr{width:18px;height:18px;border-radius:50%;border:2px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.qo.sel .qr{border-color:var(--pri);background:var(--pri)}.qo.sel .qr::after{content:'';width:7px;height:7px;background:#fff;border-radius:50%}
.es{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--bd)}.es:last-child{border-bottom:0}
.esn{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;background:rgba(99,102,241,.1);color:var(--pri);flex-shrink:0;margin-top:2px}
.est{flex:1}.est h4{font-size:.85rem;font-weight:600;margin-bottom:3px}.est p{font-size:.78rem;color:var(--tx3)}
.ft{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-130%);background:var(--surf);border:1px solid var(--bd);border-left:3px solid var(--pri);border-radius:var(--r);padding:12px 18px;z-index:9999;font-size:.8rem;font-weight:500;max-width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.7);transition:transform .3s}
.ft.show{transform:translateX(-50%) translateY(0)}.ft-s{border-left-color:var(--ok)}.ft-g{border-left-color:var(--gold)}
@keyframes fin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
screen.active{animation:fin .2s ease both}
</style>
</head>
<body>
<screen class="active" id="s-home"><div class="tb"><div><div class="tb-t">Singer OS</div><div class="tb-s">Vocal Training</div></div><div class="tb-r" id="h-xp">0 XP</div></div><div class="sp" id="h-c"></div></screen>
<screen id="s-learn"><div class="tb"><div><div class="tb-t">Learn</div><div class="tb-s" id="l-lbl">Curriculum</div></div></div><div class="sp" id="l-c"></div></screen>
<screen id="s-practice"><div class="tb"><div><div class="tb-t">Practice</div><div class="tb-s">Drills</div></div></div><div class="sp" id="p-c"></div></screen>
<screen id="s-songs"><div class="tb"><div><div class="tb-t">Songs</div><div class="tb-s">Apply Training</div></div></div><div class="sp" id="g-c"></div></screen>
<screen id="s-progress"><div class="tb"><div><div class="tb-t">Progress</div><div class="tb-s">Growth</div></div></div><div class="sp" id="r-c"></div></screen>
<screen id="s-session"><div class="sp" id="v-c"></div></screen>
<screen id="s-profile"><div class="tb"><div><div class="tb-t">Profile</div><div class="tb-s">Account</div></div></div><div class="sp" id="f-c"></div></screen>
<nav class="bn"><div class="bn-in">
<a class="bn-i on" id="n-home" href="#" onclick="go('home');return false;"><span class="bn-ic">🏠</span><span style="font-size:.55rem;font-weight:600">Home</span></a>
<a class="bn-i" id="n-learn" href="#" onclick="go('learn');return false;"><span class="bn-ic">📖</span><span style="font-size:.55rem;font-weight:600">Learn</span></a>
<a class="bn-i" id="n-practice" href="#" onclick="go('practice');return false;"><span class="bn-ic">🎯</span><span style="font-size:.55rem;font-weight:600">Practice</span></a>
<a class="bn-i" id="n-songs" href="#" onclick="go('songs');return false;"><span class="bn-ic">🎵</span><span style="font-size:.55rem;font-weight:600">Songs</span></a>
<a class="bn-i" id="n-progress" href="#" onclick="go('progress');return false;"><span class="bn-ic">📊</span><span style="font-size:.55rem;font-weight:600">Progress</span></a>
<a class="bn-i" id="n-profile" href="#" onclick="go('profile');return false;"><span class="bn-ic">👤</span><span style="font-size:.55rem;font-weight:600">Me</span></a>
</div></nav>
<div class="ft" id="ft"></div>
<script>
var U={name:'Singer',email:'',xp:0,level:1,stage:1,sessions:0,skills:{airflow:0,source:0,resonance:0,articulation:0,ear:0,mix:0,performance:0},completed:[],completedSongs:[],badges:[],vocalLoad:0,maxLoad:100,lastPractice:null,weaknessHistory:[],diagnosticResults:[],preferences:{}};
try{var _d=localStorage.getItem('singerOS');if(_d){var p=JSON.parse(_d);if(p&&p.skills){for(var k in p)U[k]=p[k];}}}catch(e){}
function save(){try{localStorage.setItem('singerOS',JSON.stringify(U))}catch(e){}}
function toast(msg,type){var t=document.getElementById('ft');t.textContent=msg;t.className='ft show'+(type?' ft-'+type:'');setTimeout(function(){t.className='ft';},3000);}
function go(id){var ss=document.querySelectorAll('screen');for(var i=0;i<ss.length;i++)ss[i].classList.remove('active');document.getElementById('s-'+id).classList.add('active');var items=document.querySelectorAll('.bn-i');for(var j=0;j<items.length;j++)items[j].classList.remove('on');var ni=document.getElementById('n-'+id);if(ni)ni.classList.add('on');window.scrollTo({top:0,behavior:'instant'});if(id==='home')renderHome();if(id==='learn')renderLearn();if(id==='practice')renderPractice();if(id==='songs')renderSongs();if(id==='progress')renderProgress();if(id==='profile')renderProfile();}
function renderHome(){var c=document.getElementById('h-c');document.getElementById('h-xp').textContent=U.xp+' XP';var h='';h+='<div class="hero"><h1>Welcome, '+U.name+'</h1><p>Your vocal training starts now.</p></div>';h+='<div class="sec"><div class="sec-h"><span class="sec-t">Quick Practice</span></div>';h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';var dp=[{ic:'💨',n:'Breath',sk:'airflow'},{ic:'🎵',n:'Onset',sk:'source'},{ic:'🗣️',n:'Words',sk:'articulation'},{ic:'🔔',n:'Place',sk:'resonance'}];for(var i=0;i<dp.length;i++){var d=dp[i];h+='<div class="c" style="text-align:center;padding:14px 8px;cursor:pointer" onclick="quickDrill(\\''+d.sk+'\\')"><div style="font-size:1.5rem;margin-bottom:4px">'+d.ic+'</div><div style="font-size:.75rem;font-weight:600">'+d.n+'</div></div>';}h+='</div></div>';h+='<div class="sec"><div class="sec-h"><span class="sec-t">Learn</span></div>';h+='<div class="li" onclick="go(\\''learn\\')"><div class="li-ic">📖</div><div class="li-b"><div class="li-t">Full Curriculum</div><div class="li-sub">12+ lessons</div></div></div></div>';h+='<div class="sec"><div class="sec-h"><span class="sec-t">Songs</span></div>';h+='<div class="li" onclick="go(\\''songs\\')"><div class="li-ic li-g">🎵</div><div class="li-b"><div class="li-t">Song Library</div><div class="li-sub">8 songs</div></div></div></div>';h+='<div class="sec"><div class="sec-h"><span class="sec-t">Diagnostic</span></div>';h+='<div class="li" onclick="startDiag()"><div class="li-ic li-p">🔍</div><div class="li-b"><div class="li-t">Voice Check</div><div class="li-sub">Get a targeted exercise</div></div></div></div>';c.innerHTML=h;}
function renderLearn(){var c=document.getElementById('l-c');var h='<h2>Curriculum</h2><p style="color:var(--tx3);font-size:.85rem;margin-bottom:16px">Complete lessons to level up.</p>';var sections=[{t:'Vocal Mechanics',l:[{id:'vm1',title:'How Your Voice Works',xp:10},{id:'vm2',title:'Breath Appoggio',xp:15},{id:'vm3',title:'Vocal Fold Closure',xp:15},{id:'vm4',title:'Resonance',xp:15},{id:'vm5',title:'Articulation',xp:15},{id:'vm6',title:'Mix Voice',xp:20}]},{t:'Ear Training',l:[{id:'et1',title:'Pitch Matching',xp:10},{id:'et2',title:'Intervals',xp:10}]},{t:'Vocal Health',l:[{id:'vl1',title:'Load Management',xp:10}]}];for(var s=0;s<sections.length;s++){var sec=sections[s];h+='<div class="sec"><div class="sec-h"><span class="sec-t">'+sec.t+'</span></div>';for(var l=0;l<sec.l.length;l++){var ls=sec.l[l];var done=U.completed.indexOf(ls.id)!==-1;h+='<div class="li" onclick="openLesson(\\''+ls.id+'\\')"><div class="esn">'+(done?'✓':(l+1))+'</div><div class="li-b"><div class="li-t">'+ls.title+'</div><div class="li-sub">+'+ls.xp+' XP</div></div>';if(done)h+='<span class="tag tag-s">Done</span>';h+='</div>';}h+='</div>';}c.innerHTML=h;}
function renderPractice(){var c=document.getElementById('p-c');var h='<h2>Practice</h2><p style="color:var(--tx3);margin-bottom:16px">Repetition builds mastery.</p>';var drills=[{ic:'💨',n:'Breath',sk:'airflow',d:'Hiss 20s'},{ic:'🎵',n:'Onset',sk:'source',d:'Clean ah'},{ic:'🗣️',n:'Diction',sk:'articulation',d:'ma-me-mi-mo-mu'},{ic:'🔔',n:'Hum',sk:'resonance',d:'Feel buzz'}];for(var i=0;i<drills.length;i++){var d=drills[i];h+='<div class="li" onclick="quickDrill(\\''+d.sk+'\\')"><div class="li-ic">'+d.ic+'</div><div class="li-b"><div class="li-t">'+d.n+'</div><div class="li-sub">'+d.d+'</div></div><span class="li-r">+10</span></div>';}h+='<div class="c c-a" onclick="startDiag()"><div class="flex items-center gap-12"><div class="li-ic li-g">🔍</div><div><div style="font-weight:600">Voice Diagnostic</div><div style="font-size:.75rem;color:var(--tx3)">Get prescribed exercise</div></div></div></div>';c.innerHTML=h;}
function renderSongs(){var c=document.getElementById('g-c');var h='<h2>Songs</h2><p style="color:var(--tx3);margin-bottom:16px">Apply your training.</p>';var songs=[{id:'s1',t:'Breathe On Me',a:'Worship',d:1},{id:'s2',t:'Great Are You Lord',a:'Worship',d:2},{id:'s3',t:'Hallelujah',a:'Buckley',d:3},{id:'s4',t:'Essence',a:'Wizkid',d:2},{id:'s5',t:'Someone Like You',a:'Adele',d:4},{id:'s6',t:'Thinking Out Loud',a:'Sheeran',d:2}];for(var i=0;i<songs.length;i++){var s=songs[i];var done=U.completedSongs.indexOf(s.id)!==-1;h+='<div class="li" onclick="openSong(\\''+s.id+'\\')"><div class="li-ic '+(done?'li-s':'li-g')+'">'+(done?'✓':'🎵')+'</div><div class="li-b"><div class="li-t">'+s.t+'</div><div class="li-sub">'+s.a+' D'+s.d+'</div></div>';if(done)h+='<span class="tag tag-s">Done</span>';h+='</div>';}c.innerHTML=h;}
function renderProgress(){var c=document.getElementById('r-c');var h='<h2>Progress</h2>';h+='<div class="c c-g text-center" style="padding:24px;margin-bottom:16px"><div style="font-size:2.5rem;margin-bottom:8px">⭐</div><h2>'+U.xp+' XP</h2><p style="color:var(--tx3);font-size:.8rem">Lvl '+U.level+' · '+U.sessions+' sessions</p></div>';h+='<div class="sec"><div class="sec-h"><span class="sec-t">Skills</span></div>';var sys=['airflow','source','resonance','articulation','mix','ear'];var sn={airflow:'Airflow',source:'Source',resonance:'Resonance',articulation:'Articulation',mix:'Mix',ear:'Ear'};for(var s=0;s<sys.length;s++){var sk=sys[s],lvl=U.skills[sk]||0,pct=lvl*10;h+='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:.8rem">'+sn[sk]+'</span><span style="font-size:.7rem;color:var(--tx3)">'+lvl+'/10</span></div><div class="pr"><div class="pr-f" style="width:'+pct+'%"></div></div></div>';}h+='</div>';h+='<p style="color:var(--tx3);font-size:.8rem">'+U.completed.length+' lessons · '+U.completedSongs.length+' songs</p>';h+='<button class="btn btn-g" style="margin-top:16px" onclick="resetAll()">Reset All</button>';c.innerHTML=h;}
function renderProfile(){var c=document.getElementById('f-c');var h='<h2>Profile</h2>';h+='<div class="c"><label style="font-size:.75rem;color:var(--tx3)">Name</label><input type="text" value="'+U.name+'" style="width:100%;padding:8px 0;border-bottom:1px solid var(--bd)" onchange="U.name=this.value;save();"></div>';h+='<div class="c"><label style="font-size:.75rem;color:var(--tx3)">Email</label><input type="email" value="'+U.email+'" placeholder="your@email.com" style="width:100%;padding:8px 0;border-bottom:1px solid var(--bd)" onchange="U.email=this.value;save();"></div>';h+='<div class="c"><div style="display:flex;justify-content:space-between"><span>XP</span><strong>'+U.xp+'</strong></div><div style="display:flex;justify-content:space-between"><span>Sessions</span><strong>'+U.sessions+'</strong></div></div>';c.innerHTML=h;}
function openLesson(id){var c=document.getElementById('v-c');var L={vm1:{t:'How Your Voice Works',b:'<p>Four systems: <strong>Airflow</strong> (breath muscles), <strong>Source</strong> (vocal folds), <strong>Resonance</strong> (vocal tract), <strong>Articulation</strong> (tongue/lips/jaw). Great singers train each separately, then coordinate.</p>',e:'<p>Hum on m for 5 sec. Feel the buzz. Open to ah keeping that feeling. Repeat 5x.</p>',sk:'airflow',xp:10},vm2:{t:'Breath Appoggio',b:'<p>You cannot control your diaphragm directly. Control the cage: abs, intercostals, lower back. <strong>Appoggio:</strong> expand ribs on inhale, maintain while singing.</p>',e:'<p>Hands on ribs. Breathe in — ribs push out. Hiss sss holding ribs open. Goal: 20 sec.</p>',sk:'airflow',xp:15},vm3:{t:'Vocal Fold Closure',b:'<p>Three states: <strong>Breathy</strong> (leaky), <strong>Strained</strong> (squeezed), <strong>Balanced</strong> (clean). Target: balanced.</p>',e:'<p>Say ah — notice breathy h. Find the middle: clean ah. Hum 5 sec first.</p>',sk:'source',xp:15},vm4:{t:'Resonance',b:'<p>Forward placement (buzz in lips/cheekbones) = clear, projecting. Resonance is about WHERE vibration is felt, not volume.</p>',e:'<p>Hum m, feel buzz in lips. Open to mah — buzz stays forward. Slide on mee.</p>',sk:'resonance',xp:15},vm5:{t:'Articulation',b:'<p>Singing is sustained speech. Let lips and tongue work, jaw stays relaxed.</p>',e:'<p>Speak ma-me-mi-mo-mu — crisp. Sing it on one pitch. Record yourself.</p>',sk:'articulation',xp:15},vm6:{t:'Mix Voice',b:'<p>Voice is a continuous gradient. The break is a coordination you have not learned. Mix = TA + CT both engaged.</p>',e:'<p>Find your break. Sing that note on ng. Slide through the zone on ng — no flip.</p>',sk:'mix',xp:20},et1:{t:'Pitch Matching',b:'<p>Trainable skill. Listen BEFORE you sing. Most beginners sing then listen. Reverse it.</p>',e:'<p>Think of a note. Sing it, hold 4 sec. Imagine it higher. Sing that. Expand over days.</p>',sk:'ear',xp:10},et2:{t:'Intervals',b:'<p>Distance between notes. Associate with songs: Twinkle Twinkle = perfect 5th.</p>',e:'<p>Sing do-re-mi-fa-sol-fa-mi-re-do. Go up by half steps. Time yourself.</p>',sk:'ear',xp:10},vl1:{t:'Vocal Load',b:'<p>Vocal folds are muscles. They fatigue. Budget: beginners ~30 min. If it hurts, stop.</p>',e:'<p>Track practice time today. Notice when voice feels tired. That is your budget.</p>',sk:'source',xp:10}};var ls=L[id];if(!ls)return;var h='';h+='<button class="btn btn-g btn-sm" onclick="go(\\''learn\\')">Back</button>';h+='<h1 style="font-size:1.3rem;margin:12px 0">'+ls.t+'</h1>';h+='<div style="background:var(--card);border:1px solid var(--bd);border-radius:var(--rl);padding:18px;margin-bottom:12px;line-height:1.7">'+ls.b+'</div>';h+='<div style="background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.15);border-radius:var(--rl);padding:16px;margin-bottom:12px"><h3 style="margin-bottom:8px">Exercise <span class="tag tag-g">+'+ls.xp+' XP</span></h3>'+ls.e+'</div>';h+='<button class="btn btn-s" onclick="finishLesson(\\''+id+'\\','+ls.xp+')">I Completed This</button>';c.innerHTML=h;go('session');}
function finishLesson(id,xp){U.xp+=xp;U.sessions++;if(U.completed.indexOf(id)===-1)U.completed.push(id);save();toast('Complete! +'+xp+' XP','s');go('learn');}
function quickDrill(skill){var n={airflow:'Breath',source:'Onset',resonance:'Placement',articulation:'Diction'};var c=document.getElementById('v-c');var h='';h+='<button class="btn btn-g btn-sm" onclick="go(\\''home\\')">Back</button>';h+='<div class="c c-a text-center" style="padding:28px;margin:12px 0"><div style="font-size:3rem;margin-bottom:12px">🎤</div><h2>'+(n[skill]||skill)+' Drill</h2><p style="color:var(--tx3);margin-top:8px">Do this now. Tap when done.</p></div>';h+='<button class="btn btn-s" onclick="finishQD(\\''+skill+'\\')">I Did It</button>';c.innerHTML=h;go('session');}
function finishQD(skill){U.xp+=10;U.skills[skill]=Math.min(10,U.skills[skill]+1);U.sessions++;save();toast('Done! +10 XP','s');go('home');}
function openSong(id){var S={s1:{t:'Breathe On Me',a:'Worship',n:'Sing each phrase on one breath.'},s2:{t:'Great Are You Lord',a:'Worship',n:'Steady airflow on sustained notes.'},s3:{t:'Hallelujah',a:'Buckley',n:'Work jumps on ng first.'},s4:{t:'Essence',a:'Wizkid',n:'Speak lyrics fast first.'},s5:{t:'Someone Like You',a:'Adele',n:'Intimate verses, powerful chorus.'},s6:{t:'Thinking Out Loud',a:'Sheeran',n:'Soft and clear.'}};var s=S[id];if(!s)return;var c=document.getElementById('v-c');c.innerHTML='<button class="btn btn-g btn-sm" onclick="go(\\''songs\\')">Back</button><h1 style="font-size:1.3rem;margin:12px 0 4px">'+s.t+'</h1><p style="color:var(--tx3);margin-bottom:16px">'+s.a+'</p><div class="c"><h3 style="margin-bottom:8px">Focus</h3><p>'+s.n+'</p></div><button class="btn btn-p" onclick="practiceSong(\\''+id+'\\')">I Sang It</button>';go('session');}
function practiceSong(id){U.xp+=50;U.sessions++;if(U.completedSongs.indexOf(id)===-1)U.completedSongs.push(id);save();document.getElementById('v-c').innerHTML='<div class="c c-g text-center" style="padding:28px"><div style="font-size:3rem;margin-bottom:8px">🏆</div><h2>Complete!</h2><p style="color:var(--tx3)">+50 XP</p></div><button class="btn btn-p" onclick="go(\\''songs\\')">Back</button>';}
function startDiag(){var syms=[{id:'pitch',l:'Pitch wavers'},{id:'strain',l:'Voice tight'},{id:'breathy',l:'Breathy'},{id:'power',l:'Low volume'},{id:'crack',l:'Cracks'},{id:'tired',l:'Tires fast'}];var c=document.getElementById('v-c');var h='';h+='<button class="btn btn-g btn-sm" onclick="go(\\''practice\\')">Back</button>';h+='<h1 style="font-size:1.2rem;margin:12px 0 6px">Voice Check</h1>';h+='<p style="color:var(--tx3);margin-bottom:16px">Select all that apply.</p>';for(var i=0;i<syms.length;i++){h+='<div class="qo" id="dg-'+syms[i].id+'" onclick="togDiag(\\''+syms[i].id+'\\')"><div class="qr"></div><span>'+syms[i].l+'</span></div>';}h+='<button class="btn btn-p" style="margin-top:16px" onclick="subDiag()">Get Exercise</button>';c.innerHTML=h;go('session');}
var diagSel=[];function togDiag(id){var el=document.getElementById('dg-'+id);var i=diagSel.indexOf(id);if(i===-1){diagSel.push(id);el.classList.add('sel');}else{diagSel.splice(i,1);el.classList.remove('sel');}}
function subDiag(){if(diagSel.length===0){toast('Select one');return;}var ex={airflow:{n:'Breath Reset',s:['Hands on ribs','Breathe in — ribs push','Hiss sss, hold ribs','Sing phrase — ribs stay'],sk:'airflow',xp:20},source:{n:'Balanced Closure',s:['Hum m 5 sec','Say ah — no breathy h','Find clean ah','Scale — balanced'],sk:'source',xp:20},resonance:{n:'Forward Place',s:['Hum m — lip buzz','Open to mah — forward','Slide on mee','Phrase — stays forward'],sk:'resonance',xp:20},articulation:{n:'Clear Diction',s:['Speak ma-me-mi-mo-mu','Fast — keep clarity','Sing on one pitch','Lyric — every word'],sk:'articulation',xp:20}};var p='source',mx=0;var sc={airflow:0,source:0,resonance:0};var map={pitch:['source','airflow'],strain:['source'],breathy:['source','airflow'],power:['airflow'],crack:['source'],tired:['airflow','source']};for(var i=0;i<diagSel.length;i++){var s=map[diagSel[i]];if(s)for(var j=0;j<s.length;j++)sc[s[j]]++;}for(var k in sc)if(sc[k]>mx){mx=sc[k];p=k;}var e=ex[p]||ex.source;var c=document.getElementById('v-c');c.innerHTML='<button class="btn btn-g btn-sm" onclick="go(\\''practice\\')">Back</button><h1 style="font-size:1.2rem;margin:12px 0 6px">'+e.n+'</h1><p style="color:var(--tx3);margin-bottom:16px">Based on your answers.</p>'+e.s.map(function(s,i){return '<div class="es"><div class="esn">'+(i+1)+'</div><div class="est"><p>'+s+'</p></div></div>';}).join('')+'<button class="btn btn-s" onclick="finishDiag(\\''+e.sk+'\\','+e.xp+')">I Completed This</button>';diagSel=[];}
function finishDiag(skill,xp){U.xp+=xp;U.skills[skill]=Math.min(10,U.skills[skill]+1);U.sessions++;save();toast('Complete! +'+xp+' XP','s');go('practice');}
function resetAll(){U={name:'Singer',email:'',xp:0,level:1,stage:1,sessions:0,skills:{airflow:0,source:0,resonance:0,articulation:0,ear:0,mix:0,performance:0},completed:[],completedSongs:[],badges:[],vocalLoad:0,maxLoad:100,lastPractice:null,weaknessHistory:[],diagnosticResults:[],preferences:{}};save();toast('Reset');go('home');}
go('home');
</script>
