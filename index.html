<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Singer OS</title>
<style>
:root {
  /* OKLCH Color System - perceptually uniform */
  --bg: oklch(0.10 0.01 260);
  --bg2: oklch(0.13 0.01 260);
  --card: oklch(0.17 0.01 260);
  --card2: oklch(0.20 0.01 260);
  --border: oklch(0.28 0.01 260);
  --border-hi: oklch(0.35 0.02 260);
  
  /* Primary - Indigo */
  --pri: oklch(0.65 0.20 270);
  --pri-hi: oklch(0.72 0.18 270);
  --pri-dim: oklch(0.55 0.22 270);
  --pri-glow: oklch(0.65 0.20 270 / 0.15);
  --pri-glow-hi: oklch(0.65 0.20 270 / 0.30);
  
  /* Semantic */
  --ok: oklch(0.72 0.18 145);
  --ok-dim: oklch(0.60 0.20 145);
  --warn: oklch(0.78 0.16 60);
  --err: oklch(0.65 0.20 25);
  --gold: oklch(0.82 0.16 95);
  
  /* Text */
  --tx: oklch(0.95 0.01 260);
  --tx2: oklch(0.70 0.01 260);
  --tx3: oklch(0.48 0.01 260);
  
  /* Typography Scale */
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --xs: 0.6875rem;
  --sm: 0.8125rem;
  --base: 0.9375rem;
  --md: 1.0625rem;
  --lg: 1.25rem;
  --xl: 1.5rem;
  --2xl: 1.875rem;
  --3xl: 2.25rem;
  
  /* Spacing Scale */
  --s1: 4px;
  --s2: 8px;
  --s3: 12px;
  --s4: 16px;
  --s5: 20px;
  --s6: 24px;
  --s7: 32px;
  --s8: 40px;
  --s9: 48px;
  
  /* Radius */
  --r-sm: 8px;
  --r: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
  --r-full: 9999px;
  
  /* Elevation */
  --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.3);
  --shadow: 0 4px 12px oklch(0 0 0 / 0.4);
  --shadow-lg: 0 8px 24px oklch(0 0 0 / 0.5);
  --shadow-glow: 0 0 20px var(--pri-glow);
  
  /* Motion */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast: 150ms;
  --dur: 250ms;
  --dur-slow: 400ms;
}

/* Font Loading */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  color-scheme: dark;
  -webkit-tap-highlight-color: transparent;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--tx);
  font-size: var(--base);
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: 88px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Reduced Motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--r-full); }

/* Screen System */
.sc { display: none; min-height: calc(100vh - 88px); }
.sc.active { display: block; animation: fadeIn var(--dur) var(--ease-out) both; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

@keyframes glow {
  0%, 100% { box-shadow: 0 0 8px var(--pri-glow); }
  50% { box-shadow: 0 0 20px var(--pri-glow-hi); }
}

@keyframes confetti {
  0% { transform: scale(0) rotate(0deg); opacity: 0; }
  50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
  100% { transform: scale(1) rotate(360deg); opacity: 1; }
}

/* Top Bar */
.tb {
  position: sticky;
  top: 0;
  z-index: 100;
  background: oklch(0.10 0.01 260 / 0.92);
  backdrop-filter: blur(12px) saturate(1.4);
  -webkit-backdrop-filter: blur(12px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  padding: var(--s4) var(--s5);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.tb-t {
  font-size: var(--md);
  font-weight: 800;
  letter-spacing: -0.02em;
}
.tb-r {
  font-size: var(--sm);
  color: var(--gold);
  font-weight: 600;
  font-family: var(--font-mono);
}

/* Screen Padding */
.sp { padding: var(--s5) var(--s4) var(--s9); max-width: 540px; margin: 0 auto; }

/* Bottom Navigation */
.bn {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: oklch(0.12 0.01 260 / 0.95);
  backdrop-filter: blur(16px) saturate(1.6);
  -webkit-backdrop-filter: blur(16px) saturate(1.6);
  border-top: 1px solid var(--border);
  height: 72px;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.bn-in {
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: 100%;
  max-width: 500px;
  margin: 0 auto;
  padding: 0 var(--s2);
}
.bn-i {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: var(--s2) var(--s3);
  color: var(--tx3);
  font-size: var(--xs);
  font-weight: 600;
  text-decoration: none;
  border-radius: var(--r-sm);
  transition: color var(--dur-fast), background var(--dur-fast);
  min-width: 48px;
  min-height: 48px;
  justify-content: center;
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--font);
}
.bn-i:hover { color: var(--tx2); background: oklch(0.20 0.01 260 / 0.5); }
.bn-i.on { color: var(--pri); }
.bn-i.on:hover { background: var(--pri-glow); }
.bn-ic {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1px;
}
.bn-ic svg { width: 22px; height: 22px; stroke-width: 1.8; }

/* Cards */
.c {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--s5);
  margin-bottom: var(--s3);
  transition: border-color var(--dur), box-shadow var(--dur), transform var(--dur-fast);
}
.c:hover {
  border-color: var(--border-hi);
  box-shadow: var(--shadow-sm);
}
.c:active { transform: scale(0.98); }
.c-a { border-color: oklch(0.65 0.20 270 / 0.25); background: linear-gradient(135deg, var(--card), oklch(0.65 0.20 270 / 0.04)); }
.c-a:hover { border-color: oklch(0.65 0.20 270 / 0.4); box-shadow: var(--shadow-glow); }
.c-g { border-color: oklch(0.82 0.16 95 / 0.2); }
.c-g:hover { border-color: oklch(0.82 0.16 95 / 0.35); }
.c-ok { border-color: oklch(0.72 0.18 145 / 0.25); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--s2);
  padding: var(--s3) var(--s5);
  border-radius: var(--r);
  font-weight: 700;
  font-size: var(--sm);
  font-family: var(--font);
  width: 100%;
  margin-bottom: var(--s2);
  cursor: pointer;
  border: none;
  transition: all var(--dur-fast) var(--ease-out);
  min-height: 48px;
  letter-spacing: -0.01em;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, oklch(1 0 0 / 0.08), transparent);
  pointer-events: none;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0) scale(0.98); }
.btn:disabled { opacity: 0.4; pointer-events: none; }

.btn-p {
  background: linear-gradient(135deg, var(--pri), var(--pri-dim));
  color: #fff;
  box-shadow: 0 2px 8px var(--pri-glow);
}
.btn-p:hover { box-shadow: 0 4px 16px var(--pri-glow-hi); }

.btn-s {
  background: linear-gradient(135deg, var(--ok), var(--ok-dim));
  color: oklch(0.15 0.01 260);
  box-shadow: 0 2px 8px oklch(0.72 0.18 145 / 0.2);
}
.btn-s:hover { box-shadow: 0 4px 16px oklch(0.72 0.18 145 / 0.3); }

.btn-g {
  background: transparent;
  color: var(--tx2);
  border: 1px solid var(--border);
}
.btn-g:hover { background: var(--card2); color: var(--tx); border-color: var(--border-hi); }

.btn-w {
  background: transparent;
  color: var(--tx3);
  border: 1px solid var(--border);
  font-weight: 500;
}
.btn-w:hover { color: var(--tx2); }

/* Tags */
.tag {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: var(--r-full);
  font-size: var(--xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.tag-p { background: var(--pri-glow); color: var(--pri-hi); }
.tag-s { background: oklch(0.72 0.18 145 / 0.1); color: var(--ok); }
.tag-g { background: oklch(0.82 0.16 95 / 0.1); color: var(--gold); }
.tag-w { background: oklch(0.78 0.16 60 / 0.1); color: var(--warn); }

/* Progress Bars */
.pr {
  height: 8px;
  background: var(--border);
  border-radius: var(--r-full);
  overflow: hidden;
  position: relative;
}
.pr-f {
  height: 100%;
  background: linear-gradient(90deg, var(--pri-dim), var(--pri));
  border-radius: var(--r-full);
  transition: width var(--dur-slow) var(--ease-out);
  position: relative;
}
.pr-f::after {
  content: '';
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 20px;
  background: linear-gradient(90deg, transparent, oklch(1 0 0 / 0.15));
  border-radius: var(--r-full);
}
.pr-ok .pr-f { background: linear-gradient(90deg, var(--ok-dim), var(--ok)); }
.pr-g .pr-f { background: linear-gradient(90deg, oklch(0.70 0.14 95), var(--gold)); }

/* List Items */
.li {
  display: flex;
  align-items: center;
  gap: var(--s4);
  padding: var(--s4);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: var(--s2);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
  min-height: 56px;
}
.li:hover {
  border-color: var(--border-hi);
  background: var(--card2);
  transform: translateX(2px);
}
.li:active { transform: scale(0.98); }
.li-ic {
  width: 44px;
  height: 44px;
  border-radius: var(--r);
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--pri-glow);
  color: var(--pri);
  flex-shrink: 0;
  font-weight: 800;
  font-size: var(--sm);
}
.li-ic svg { width: 20px; height: 20px; stroke-width: 1.8; }
.li-b { flex: 1; min-width: 0; }
.li-t { font-weight: 700; font-size: var(--sm); letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-sub { font-size: var(--xs); color: var(--tx3); margin-top: 1px; }
.li-r { font-size: var(--xs); color: var(--gold); font-weight: 700; font-family: var(--font-mono); flex-shrink: 0; }

/* Sections */
.sec { margin-bottom: var(--s6); }
.sec-h {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--s3);
}
.sec-t {
  font-size: var(--xs);
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--tx3);
}

/* Hero */
.hero { padding: var(--s5) 0 var(--s6); }
.hero h1 {
  font-size: var(--2xl);
  font-weight: 900;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: var(--s2);
}
.hero p { color: var(--tx2); font-size: var(--sm); }

/* Quiz Options */
.qo {
  display: flex;
  align-items: center;
  gap: var(--s3);
  padding: var(--s4);
  border: 2px solid var(--border);
  border-radius: var(--r);
  margin-bottom: var(--s2);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
  min-height: 52px;
}
.qo:hover { border-color: var(--border-hi); background: var(--card); }
.qo.sel { border-color: var(--pri); background: var(--pri-glow); }
.qo.ok { border-color: var(--ok); background: oklch(0.72 0.18 145 / 0.08); }
.qo.err { border-color: var(--err); background: oklch(0.65 0.20 25 / 0.08); }
.qo.dis { pointer-events: none; opacity: 0.6; }
.qr {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  flex-shrink: 0;
  transition: all var(--dur-fast);
  display: flex;
  align-items: center;
  justify-content: center;
}
.qo.sel .qr { background: var(--pri); border-color: var(--pri); }
.qo.ok .qr { background: var(--ok); border-color: var(--ok); }
.qo.err .qr { background: var(--err); border-color: var(--err); }
.qr::after {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  opacity: 0;
  transition: opacity var(--dur-fast);
}
.qo.sel .qr::after, .qo.ok .qr::after, .qo.err .qr::after { opacity: 1; }

/* Exercise Steps */
.es {
  display: flex;
  gap: var(--s3);
  padding: var(--s4) 0;
  border-bottom: 1px solid var(--border);
  align-items: flex-start;
}
.es:last-child { border-bottom: none; }
.esn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--xs);
  font-weight: 800;
  background: var(--pri-glow);
  color: var(--pri);
  flex-shrink: 0;
  margin-top: 2px;
}
.est { flex: 1; }
.est p { font-size: var(--sm); color: var(--tx2); line-height: 1.5; }

/* Toast / Feedback */
.ft {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-200%);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: var(--s3) var(--s5);
  z-index: 9999;
  font-size: var(--sm);
  font-weight: 600;
  box-shadow: var(--shadow-lg);
  transition: transform var(--dur) var(--ease-spring);
  max-width: 90vw;
  text-align: center;
}
.ft.show { transform: translateX(-50%) translateY(0); }
.ft-ok { border-color: var(--ok); color: var(--ok); }
.ft-err { border-color: var(--err); color: var(--err); }
.ft-info { border-color: var(--pri); color: var(--pri); }

/* Grid helpers */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s2); }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--s2); }

/* Text helpers */
.text-center { text-align: center; }
.text-sm { font-size: var(--sm); }
.text-xs { font-size: var(--xs); }
.text-muted { color: var(--tx3); }
.text-pri { color: var(--pri); }
.text-ok { color: var(--ok); }
.text-gold { color: var(--gold); }
.text-warn { color: var(--warn); }
.text-err { color: var(--err); }
.text-bold { font-weight: 700; }
.text-mono { font-family: var(--font-mono); }
.mb-1 { margin-bottom: var(--s1); }
.mb-2 { margin-bottom: var(--s2); }
.mb-3 { margin-bottom: var(--s3); }
.mb-4 { margin-bottom: var(--s4); }
.mt-2 { margin-top: var(--s2); }
.mt-4 { margin-top: var(--s4); }
.gap-2 { gap: var(--s2); }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.w-full { width: 100%; }

/* Input */
.input {
  width: 100%;
  padding: var(--s3) 0;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--tx);
  font-family: var(--font);
  font-size: var(--base);
  transition: border-color var(--dur-fast);
  outline: none;
}
.input:focus { border-color: var(--pri); }
.input::placeholder { color: var(--tx3); }
label {
  display: block;
  font-size: var(--xs);
  color: var(--tx3);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: var(--s1);
}

/* Badge */
.badge {
  display: inline-flex;
  align-items: center;
  gap: var(--s1);
  padding: var(--s1) var(--s3);
  border-radius: var(--r-full);
  font-size: var(--xs);
  font-weight: 700;
  background: var(--card2);
  border: 1px solid var(--border);
}

/* Level indicator */
.level-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pri), var(--pri-dim));
  color: #fff;
  font-weight: 900;
  font-size: var(--sm);
  box-shadow: 0 2px 8px var(--pri-glow);
}

/* Streak flame */
.streak { display: inline-flex; align-items: center; gap: var(--s1); }

/* Achievement popup */
.achieve {
  position: fixed;
  inset: 0;
  z-index: 10000;
  display: none;
  align-items: center;
  justify-content: center;
  background: oklch(0 0 0 / 0.7);
  backdrop-filter: blur(4px);
}
.achieve.show { display: flex; }
.achieve-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: var(--s7);
  text-align: center;
  max-width: 320px;
  animation: confetti 0.5s var(--ease-spring) both;
}
.achieve-icon { font-size: 3rem; margin-bottom: var(--s3); }
.achieve-title { font-size: var(--lg); font-weight: 800; margin-bottom: var(--s2); }
.achieve-desc { color: var(--tx2); font-size: var(--sm); margin-bottom: var(--s5); }

/* Vocal load bar */
.vocal-load {
  height: 6px;
  background: var(--border);
  border-radius: var(--r-full);
  overflow: hidden;
  margin: var(--s2) 0;
}
.vocal-load-f {
  height: 100%;
  border-radius: var(--r-full);
  transition: width var(--dur-slow) var(--ease-out), background var(--dur);
}
.vocal-load-f.ok { background: var(--ok); }
.vocal-load-f.warn { background: var(--warn); }
.vocal-load-f.danger { background: var(--err); }

/* Divider */
.hr { height: 1px; background: var(--border); margin: var(--s4) 0; }

/* Reference box */
.ref-box {
  background: oklch(0.65 0.20 270 / 0.06);
  border: 1px solid oklch(0.65 0.20 270 / 0.15);
  border-radius: var(--r);
  padding: var(--s4);
  margin: var(--s3) 0;
}
.ref-box-title {
  font-size: var(--xs);
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--pri);
  margin-bottom: var(--s2);
}

/* Song card */
.song-card {
  display: flex;
  align-items: center;
  gap: var(--s4);
  padding: var(--s4);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: var(--s2);
  cursor: pointer;
  transition: all var(--dur-fast);
}
.song-card:hover { border-color: var(--border-hi); background: var(--card2); }
.song-art {
  width: 52px;
  height: 52px;
  border-radius: var(--r-sm);
  background: linear-gradient(135deg, var(--pri-glow), var(--card2));
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: var(--lg);
}
.song-info { flex: 1; min-width: 0; }
.song-title { font-weight: 700; font-size: var(--sm); }
.song-artist { font-size: var(--xs); color: var(--tx3); }
.song-tags { display: flex; gap: var(--s1); margin-top: var(--s1); flex-wrap: wrap; }

/* Difficulty dots */
.dots { display: flex; gap: 3px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
.dot.filled { background: var(--pri); }
.dot.ok { background: var(--ok); }

/* Coach message */

<script>
// ============================================================
// AUTH GATE — Email + WhatsApp collection before access
// ============================================================
var AUTH = {
  isAuthed: false,
  email: '',
  whatsapp: '',
  ip: '',
  token: '',

  init: function() {
    // Check if already registered on this device
    try {
      var stored = localStorage.getItem('singerOS_auth');
      if (stored) {
        var d = JSON.parse(stored);
        if (d.email && d.token) {
          this.isAuthed = true;
          this.email = d.email;
          this.whatsapp = d.whatsapp || '';
          this.token = d.token;
          return true;
        }
      }
    } catch(e) {}
    return false;
  },

  register: function(email, whatsapp, name) {
    if (!email || email.indexOf('@') === -1) {
      toast('Enter a valid email address', 'err');
      return false;
    }
    if (!whatsapp || whatsapp.length < 10) {
      toast('Enter your WhatsApp number (with country code)', 'err');
      return false;
    }
    if (!name || name.length < 2) {
      toast('Enter your name', 'err');
      return false;
    }

    // Generate unique token
    var raw = email + Date.now() + Math.random().toString(36).slice(2);
    this.token = btoa(raw).slice(0, 24);
    this.email = email;
    this.whatsapp = whatsapp;
    this.isAuthed = true;

    // Store locally
    try {
      localStorage.setItem('singerOS_auth', JSON.stringify({
        email: email,
        whatsapp: whatsapp,
        name: name,
        token: this.token,
        registered: new Date().toISOString()
      }));
    } catch(e) {}

    // Submit to Google Sheet
    this.submitToSheet(name, email, whatsapp);

    // Get IP
    this.fetchIP();

    return true;
  },

  submitToSheet: function(name, email, whatsapp) {
    // Submit registration data to Google Sheet via Sheets API
    var self = this;
    var xhr = new XMLHttpRequest();
    xhr.open('POST', 'https://sheets.googleapis.com/v4/spreadsheets/1P9zZYOwKDaARmyGsfEyEhcwMoMX-tW0yTPAHNiMHB18/values/Registrations!A:F:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.timeout = 10000;
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4) {
        if (xhr.status === 200) {
          console.log('Registration saved to sheet');
        } else {
          console.log('Sheet save failed, storing locally for retry');
          // Store in localStorage for later retry
          try {
            var pending = JSON.parse(localStorage.getItem('singerOS_pending_regs') || '[]');
            pending.push({name: name, email: email, whatsapp: whatsapp, token: self.token, timestamp: new Date().toISOString()});
            localStorage.setItem('singerOS_pending_regs', JSON.stringify(pending));
          } catch(e) {}
        }
      }
    };
    var now = new Date().toISOString();
    xhr.send(JSON.stringify({
      values: [[now, name, email, whatsapp, this.ip || 'unknown', this.token]]
    }));
  },

  fetchIP: function() {
    // Use a free IP API — best effort, non-blocking
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://api.ipify.org?format=json', true);
    xhr.timeout = 5000;
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4 && xhr.status === 200) {
        try {
          var d = JSON.parse(xhr.responseText);
          AUTH.ip = d.ip;
          // Store IP with auth
          var stored = JSON.parse(localStorage.getItem('singerOS_auth') || '{}');
          stored.ip = d.ip;
          localStorage.setItem('singerOS_auth', JSON.stringify(stored));
        } catch(e) {}
      }
    };
    xhr.send();
  },

  logout: function() {
    this.isAuthed = false;
    this.email = '';
    this.whatsapp = '';
    this.token = '';
    try { localStorage.removeItem('singerOS_auth'); } catch(e) {}
  },

  // Generate a shareable link with token embedded
  getLink: function() {
    var base = window.location.origin + window.location.pathname;
    return base + '?t=' + this.token + '&e=' + encodeURIComponent(this.email);
  },

  // Check if URL has a token (shared link)
  checkURLToken: function() {
    var params = new URLSearchParams(window.location.search);
    var t = params.get('t');
    var e = params.get('e');
    if (t && e) {
      // Someone visited via shared link — require their OWN registration
      // Do NOT auto-login with shared token
      return { shared: true, token: t, email: decodeURIComponent(e) };
    }
    return { shared: false };
  }
};

try {

function toast(m, type) {
  var t = document.getElementById('ft');
  t.textContent = m;
  t.className = 'ft show' + (type ? ' ft-' + type : '');
  setTimeout(function() { t.className = 'ft'; }, 2500);
}

function showAchieve(icon, title, desc) {
  document.getElementById('achieve-icon').textContent = icon;
  document.getElementById('achieve-title').textContent = title;
  document.getElementById('achieve-desc').textContent = desc;
  document.getElementById('achieve').classList.add('show');
}

function closeAchieve() {
  document.getElementById('achieve').classList.remove('show');
}

function esc(s) {
  if (!s) return '';
  return s.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

function go(id) {
  // Auth gate: if not authed, only show auth screen
  if (!AUTH.isAuthed && id !== 'auth') {
    id = 'auth';
  }

  var ss = document.querySelectorAll('.sc');
  for (var i = 0; i < ss.length; i++) ss[i].classList.remove('active');
  var screen = document.getElementById('s-' + id);
  if (screen) screen.classList.add('active');

  var items = document.querySelectorAll('.bn-i');
  for (var j = 0; j < items.length; j++) items[j].classList.remove('on');
  var nav = document.getElementById('n-' + id);
  if (nav) nav.classList.add('on');

  if (id === 'home') renderHome();
  if (id === 'learn') renderLearn();
  if (id === 'practice') renderPractice();
  if (id === 'songs') renderSongs();
  if (id === 'theory') renderTheory();
  if (id === 'quiz') renderQuiz();
  if (id === 'progress') renderProgress();
  if (id === 'profile') renderProfile();
  if (id === 'auth') renderAuth();
}

// ============================================================
// COMPREHENSIVE CURRICULUM — Outcome-based, research-backed
// ============================================================
// Every module: outcome first, then deep content, then exercise
// Content drawn from NYVC method, exercise science research, and practical pedagogy
// ============================================================

var CURRICULUM = {

  // ===== VOCAL MECHANICS =====
  mechanics: {
    title: 'Vocal Mechanics',
    icon: 'M',
    modules: [
      {
        id: 'm1',
        stage: 1,
        outcome: 'Be able to sustain a steady note for 20 seconds without running out of air',
        title: 'Breath That Carries You',
        xp: 15,
        content: '<p>Most singers run out of air because they push air out too fast. The trick is not more air — it is <b>controlled escape</b>.</p><p><b>What NYVC teaches:</b> Do NOT say "sing from your diaphragm." The diaphragm is an involuntary muscle — you cannot control it directly. What you CAN control is the <b>muscles around your ribs and abdomen</b> that slow down how fast the air escapes.</p><p>This is called <b>appoggio</b> (Italian for "lean"). Your ribs expand on the inhale. While singing, they should stay expanded as long as possible. Think: <b>inflate and hold</b>.</p><p><b>The NYVC breathing exercise:</b> Hands on ribs. Breathe in — ribs push out. Hiss "sss" — hold ribs out. Goal: 15 seconds without ribs collapsing. The diaphragm descends on the inhale (involuntary). The intercostal muscles and abs control the exhale (voluntary). Train the voluntary muscles.</p><div class="ref-box"><div class="ref-box-title">NYVC Method</div><p>Justin Stoney: "Control the cage — abs, intercostals, lower back. Expand ribs on inhale, maintain while singing." The appoggio is not about pushing air OUT. It is about NOT letting air escape too fast. Think of it as a slow leak, not a burst.</p></div>',
        exercise: {
          name: 'Rib Cage Hold',
          steps: [
            'Place both hands on your lower ribs (sides of your chest, where your ribcage is widest)',
            'Breathe in through your nose for 4 counts — feel ribs push your hands outward',
            'Hiss "sss" while keeping ribs pushed out. Do NOT let them collapse.',
            'Goal: 15 seconds without ribs collapsing inward',
            'Once you hit 15 sec, try 20. Then 25. Track your best time.',
            'Advanced: hiss on a steady pitch. The tone should not waver.'
          ],
          skill: 'airflow',
          xp: 15
        }
      },
      {
        id: 'm2',
        stage: 1,
        outcome: 'Be able to start every note cleanly — no breathy "ha" or hard glottal stop',
        title: 'Clean Note Onset',
        xp: 15,
        content: '<p>Every note starts one of three ways:</p><p><b>1. Breathy onset:</b> air escapes before the vocal folds close. Sounds like "haa" — you hear the "h" before the note. Wastes air, weak tone.</p><p><b>2. Glottal onset:</b> vocal folds slam together before air flows. Sounds like a hard "ah" with a stop. Can strain the voice over time.</p><p><b>3. Clean onset (target):</b> vocal folds close and air flows at the same instant. The note just appears — like turning on a light switch.</p><p>The feeling: imagine the note is already vibrating before you "release" it. The hum is your best teacher — when you hum, your vocal folds are already touching. Open from the hum.</p>',
        exercise: {
          name: 'Light Switch Onset',
          steps: [
            'Hum on "mmm" for 3 seconds — feel the buzz on your lips',
            'Now say "ah" with the SAME instant feeling — no "h" before it',
            'If you hear "hah", that is breathy. Try again.',
            'Test: place your hand in front of your mouth. On a clean onset, you should feel minimal air.',
            'Practice: hum 5 sec → open to "ah" keeping the buzz. Do 10 reps.',
            'Advanced: try it on different pitches. Every note should start the same way.'
          ],
          skill: 'source',
          xp: 15
        }
      },
      {
        id: 'm3',
        stage: 1,
        outcome: 'Be able to sing with a clear, ringing tone that projects without shouting',
        title: 'Forward Resonance',
        xp: 20,
        content: '<p>Your voice resonates in different places depending on where you direct the vibration. Think of it like a guitar — the same string sounds different depending on the body of the guitar.</p><p><b>Forward resonance</b> (buzz in lips, cheekbones, nose bridge) = clear, projecting, cuts through a mix. This is what you want for most contemporary singing.</p><p><b>Throat resonance</b> (buzz in the back of the throat) = dark but swallowed. Sounds muddy in a band.</p><p><b>Nasal resonance</b> (buzz in the nose) = twangy, bright. Useful for belt and country.</p><p>The test: hum and touch your lips. Feel the buzz? That is forward resonance. Now keep that buzz while you open to a vowel. The buzz should stay on your lips, not drop to your throat.</p><div class="ref-box"><div class="ref-box-title">NYVC Method</div><p>Justin Stoney teaches: "The larynx is a style changer." A slightly higher larynx = brighter, twangier sound. A slightly lower larynx = darker, warmer sound. The larynx is NOT fixed — it is your primary tool for style variation.</p></div>',
        exercise: {
          name: 'Buzz Carrier',
          steps: [
            'Hum on "mmm" — feel buzz on lips and nose bridge',
            'Open to "mah" — the buzz should STAY on your lips',
            'If the buzz drops to your throat, start over',
            'Practice sliding: "mmm" → "mah" → "mmm" → "mah"',
            'Do 10 reps. Every "mah" should feel like it is vibrating in your face.',
            'Advanced: try "ng" → "ah". The "ng" keeps the resonance forward.'
          ],
          skill: 'resonance',
          xp: 20
        }
      },
      {
        id: 'm4',
        stage: 2,
        outcome: 'Be able to sing lyrics so every word is clear — even on fast songs',
        title: 'Crisp Articulation',
        xp: 15,
        content: '<p>Singing is sustained speech. Your lips and tongue must work. Your jaw must stay relaxed.</p><p>Most singers either mumble (lazy lips) or clamp (tense jaw). You want: <b>active lips, active tongue, relaxed jaw</b>.</p><p>The jaw should drop open for vowels. The lips and tongue shape the consonants. If your jaw is doing all the work, you will sound muddy and tire quickly.</p><p>Try this: say "la-la-la-la-la" fast. Feel your tongue tip tapping behind your upper teeth? That is the workhorse. Now try "ma-ma-ma-ma-ma" — feel your lips closing? That is the other workhorse. The jaw barely moves.</p>',
        exercise: {
          name: 'Lip Gymnastics',
          steps: [
            'Speak "ma-me-mi-mo-mu" — exaggerate every consonant',
            'Now sing it on one pitch — same exaggeration',
            'Try "la-le-li-lo-lu" — feel your tongue tip working',
            'Try "ba-be-bi-bo-bu" — feel your lips popping',
            'Now try a fast lyric from a song you know. Every consonant must be clear.',
            'Record yourself. If any word is unclear, slow it down and exaggerate, then speed up.'
          ],
          skill: 'articulation',
          xp: 15
        }
      },
      {
        id: 'm5',
        stage: 3,
        outcome: 'Be able to sing high notes without straining — using mix voice',
        title: 'Mix Voice: No More Breaking',
        xp: 25,
        content: '<p>Your voice has a "break" — a spot where chest voice stops and head voice begins. Most singers either flip (yodel into a weak falsetto) or push (strain chest voice too high). Both are wrong.</p><p><b>Mix voice</b> bridges the gap. It is not a third register — it is a <b>coordination</b> between chest and head. Think of it as a gradient, not a switch.</p><p>The secret: start in head voice (light, floaty) and add weight. Not the other way around. If you start heavy and try to go high, you will strain. If you start light and add weight, you will mix.</p><div class="ref-box"><div class="ref-box-title">Exercise Science</div><p>The "break" is a coordination gap, not a wall. Research shows it is caused by a sudden shift in which muscles are dominant. Training smooth transitions (glides, slides) retrains the coordination so the gap disappears.</p></div>',
        exercise: {
          name: 'Ng Slide',
          steps: [
            'Say "ng" (like the end of "sing") — feel the buzz in your nose',
            'Slide from your lowest comfortable note to your highest on "ng" — no break, just a smooth glide',
            'Now try "nah" in the same range — keep the same light feeling',
            'If you feel a crack, go back to "ng" and try again',
            'Practice daily. The break zone gets smoother every week.',
            'Advanced: try the slide on "mee" — keep the sound forward and light.'
          ],
          skill: 'mix',
          xp: 25
        }
      },
      {
        id: 'm6',
        stage: 4,
        outcome: 'Be able to belt safely — powerful high notes without damage',
        title: 'Safe Belt Technique',
        xp: 30,
        content: '<p>Belting is not yelling. It is <b>chest-dominant mix with twang</b>. The larynx is slightly high. The sound is forward and brassy. If your throat hurts, you are doing it wrong.</p><p>Three things must happen for safe belt:</p><p><b>1. Twang:</b> Narrow the epilarynx (the space above your vocal folds). This creates a brassy, cutting sound without needing more air pressure. Think of a bratty kid saying "nay!"</p><p><b>2. Chest dominance:</b> Keep some chest voice coordination even on high notes. Do not flip into head voice.</p><p><b>3. Forward placement:</b> The buzz stays in your face. If it drops to your throat, you are pushing.</p><p>Start low. Build up. Never force. If you feel strain, stop immediately.</p>',
        exercise: {
          name: 'Brassy "Nay"',
          steps: [
            'Say "nay" like a bratty kid — feel the twang? That is the sound.',
            'Sing "nay" on a comfortable mid-range note — keep that bratty quality',
            'Slide up slowly — the twang should stay, the throat should stay relaxed',
            'If you feel strain, stop. Go lower. Try again.',
            'Goal: belt one octave above your speaking voice without throat tension.',
            'Advanced: try "nay-nay-nay" on a 5-note scale, getting louder each time.'
          ],
          skill: 'mix',
          xp: 30
        }
      },
      {
        id: 'm7',
        stage: 4,
        outcome: 'Be able to diagnose your own vocal problems — know what is wrong and how to fix it',

ently.</p></div><div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:var(--s4);margin:var(--s3) 0;text-align:center"><svg viewBox="0 0 400 160" style="max-width:100%;height:auto"><text x="200" y="20" fill="var(--tx)" font-size="12" text-anchor="middle" font-weight="800">Self-Diagnosis Flowchart</text><rect x="10" y="35" width="120" height="30" rx="4" fill="var(--pri-glow)" stroke="var(--pri)" stroke-width="1"/><text x="70" y="55" fill="var(--tx)" font-size="9" text-anchor="middle">What do you hear?</text><rect x="140" y="35" width="120" height="30" rx="4" fill="oklch(0.78 0.16 60 / 0.1)" stroke="var(--warn)" stroke-width="1"/><text x="200" y="55" fill="var(--tx)" font-size="9" text-anchor="middle">What is the symptom?</text><rect x="270" y="35" width="120" height="30" rx="4" fill="oklch(0.65 0.20 25 / 0.1)" stroke="var(--err)" stroke-width="1"/><text x="330" y="55" fill="var(--tx)" font-size="9" text-anchor="middle">What is the cause?</text><line x1="130" y1="50" x2="140" y2="50" stroke="var(--border)" stroke-width="1"/><line x1="260" y1="50" x2="270" y2="50" stroke="var(--border)" stroke-width="1"/><rect x="10" y="75" width="380" height="30" rx="4" fill="oklch(0.72 0.18 145 / 0.08)" stroke="var(--ok)" stroke-width="1"/><text x="200" y="95" fill="var(--tx)" font-size="9" text-anchor="middle">Apply the RIGHT exercise for THAT specific problem</text><rect x="10" y="115" width="380" height="30" rx="4" fill="var(--card2)" stroke="var(--border)" stroke-width="1"/><text x="200" y="135" fill="var(--tx)" font-size="9" text-anchor="middle">Track progress → Reassess → Adjust → Improve</text><text x="200" y="155" fill="var(--tx3)" font-size="8" text-anchor="middle">This is the HSOM loop: Diagnose → Prescribe → Practice → Reassess</text></svg></div><p><b>The NYVC Sound Palette:</b> Justin Stoney teaches that your voice can produce many sounds depending on four settings:</p><p><b>Larynx height:</b> High = bright/twangy. Low = dark/warm.   // Autocorrelation pitch detection
  detectPitch: function(buffer, sampleRate) {
    var bufLen = buffer.length;
    var correlations = new Float32Array(bufLen);
    
    // RMS check — is there enough signal?
    var rms = 0;
    for (var i = 0; i < bufLen; i++) rms += buffer[i] * buffer[i];
    rms = Math.sqrt(rms / bufLen);
    if (rms < 0.01) return null; // Too quiet
    
    // Autocorrelation
    for (var lag = 0; lag < bufLen; lag++) {
      var sum = 0;
      for (var j = 0; j < bufLen - lag; j++) {
        sum += buffer[j] * buffer[j + lag];
      }
      correlations[lag] = sum;
    }
    
    // Find first peak after initial decay
    var found = false;
    var firstPeak = 0;
    for (var lag = 1; lag < bufLen - 1; lag++) {
      if (correlations[lag] > correlations[lag - 1] && correlations[lag] > correlations[lag + 1]) {
        if (!found) { firstPeak = lag; found = true; }
        if (lag > firstPeak + 10) break;
      }
    }
    
    if (!found || firstPeak < 10) return null;
    return sampleRate / firstPeak;
  },
  
  // Convert frequency to note name + cents
  freqToNote: function(freq) {
    var midi = 12 * Math.log2(freq / 440) + 69;
    var midiRound = Math.round(midi);
    var cents = Math.round((midi - midiRound) * 100);
    var octave = Math.floor(midiRound / 12);
    var noteName = this.noteNames[midiRound % 12];
    return { name: noteName, octave: octave, cents: cents, freq: freq, midi: midiRound };
  },
  
  start: function(targetNoteName) {
    if (this.isRunning) this.stop();
    this.init();
    this.targetNote = targetNoteName;
    
    var self = this;
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
      self.stream = stream;
      self.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      var source = self.audioCtx.createMediaStreamSource(stream);
      self.analyser = self.audioCtx.createAnalyser();
      self.analyser.fftSize = 2048;
      source.connect(self.analyser);
      self.isRunning = true;
      self.loop();
    }).catch(function(err) {
      toast('Microphone access denied. Allow mic to use pitch detector.', 'err');
    });
  },
  
  loop: function() {
    if (!this.isRunning) return;
    var self = this;
    var buffer = new Float32Array(this.analyser.fftSize);
    this.analyser.getFloatTimeDomainData(buffer);
    
    var freq = this.detectPitch(buffer, this.audioCtx.sampleRate);
    if (freq) {
      var note = this.freqToNote(freq);
      onPitchDetected(note);
    }
    
    requestAnimationFrame(function() { self.loop(); });
  },
  
  stop: function() {
    this.isRunning = false;
    if (this.stream) {
      this.stream.getTracks().forEach(function(t) { t.stop(); });
    }
    if (this.audioCtx) {
      this.audioCtx.close();
    }
    this.stream = null;
    this.audioCtx = null;
  }
};

var SRS = {
  // Intervals in hours: 1h, 4h, 12h, 1d, 3d, 7d, 14d, 30d
  intervals: [1, 4, 12, 24, 72, 168, 336, 720],
  
  init: function() {
    try {
      var stored = localStorage.getItem('singerOS_srs');
      if (stored) U.srsData = JSON.parse(stored);
    } catch(e) {}
    if (!U.srsData) U.srsData = {};
  },
  
  // Record that a skill was practiced
  record: function(skill) {
    if (!U.srsData[skill]) U.srsData[skill] = { level: 0, nextReview: Date.now(), history: [] };
    var item = U.srsData[skill];
    item.level = Math.min(item.level + 1, this.intervals.length - 1);
    item.nextReview = Date.now() + this.intervals[item.level] * 3600000;
    item.history.push(Date.now());
    this.save();
  },
  
  // Get skills due for review
  getDue: function() {
    var now = Date.now();
    var due = [];
    for (var skill in U.srsData) {
      if (U.srsData[skill].nextReview <= now) {
        due.push(skill);
      }
    }
    return due;
  },
  
  // Get recommended next practice
  getRecommendation: function() {
    var due = this.getDue();
    if (due.length === 0) return null;
    // Prioritize lowest level (most urgent)
    due.sort(function(a, b) {
      return U.srsData[a].nextReview - U.srsData[b].nextReview;
    });
    return due[0];
  },
  
  save: function() {
    try { localStorage.setItem('singerOS_srs', JSON.stringify(U.srsData)); } catch(e) {}
  }
};

// GAMIFICATION — Streaks, Leaderboard, XP Multipliers
// ============================================================
var GAME = {
  init: function() {
    // Check streak
    var today = new Date().toDateString();
    var last = U.lastPractice;
    if (last) {
      var lastDate = new Date(last).toDateString();
      var yesterday = new Date(Date.now() - 86400000).toDateString();
      if (lastDate !== today && lastDate !== yesterday) {
        U.streak = 0; // Streak broken
      }
    }
    U.lastPractice = Date.now();
    if (!U.streak) U.streak = 0;
    save();
  },
  
  // XP multiplier based on streak
  getMultiplier: function() {
    if (U.streak >= 30) return 3.0;
    if (U.streak >= 14) return 2.5;
    if (U.streak >= 7) return 2.0;
    if (U.streak >= 3) return 1.5;
    return 1.0;
  },
  
  // Add XP with multiplier
  addXP: function(amount) {
    var mult = this.getMultiplier();
    var earned = Math.round(amount * mult);
    U.xp += earned;
    // Level up every 100 XP
    U.level = Math.floor(U.xp / 100) + 1;
    SRS.init();
    return { earned: earned, mult: mult, total: U.xp, level: U.level };
  },
  
  // Get leaderboard (local — would be server-based in production)
  getLeaderboard: function() {
    var board = [];
    try {
      var stored = localStorage.getItem('singerOS_leaderboard');
      if (stored) board = JSON.parse(stored);
    } catch(e) {}
    // Add current user
    board.push({ name: U.name, xp: U.xp, level: U.level, streak: U.streak });
    board.sort(function(a, b) { return b.xp - a.xp; });
    return board.slice(0, 10);
  }
};

}

function quickDrill(skill) {
  var c = document.getElementById('v-c');
  var drills = {
    airflow: {name: 'Breath Hold', steps: ['Place hands on ribs', 'Breathe in — ribs expand', 'Hiss "sss" — hold ribs out', 'Goal: 15 seconds', 'Rest. Repeat 3 times.']},
    source: {name: 'Clean Onset', steps: ['Hum "mmm" for 3 seconds', 'Open to "ah" — no "h" sound', 'If breathy, try again', 'Practice 10 reps', 'Every note should start clean']},
    resonance: {name: 'Forward Hum', steps: ['Hum "mmm" — feel lip buzz', 'Open to "mah" — buzz stays on lips', 'If buzz drops, start over', 'Slide: mmm → mah → mmm → mah', '10 reps']},
    articulation: {name: 'Lip Gymnastics', steps: ['Speak: ma-me-mi-mo-mu', 'Sing it on one pitch', 'Exaggerate every consonant', 'Try a fast lyric', 'Every word must be clear']},
    mix: {name: 'Ng Slide', steps: ['Say "ng" — feel nose buzz', 'Slide low to high on "ng"', 'Try "nah" — same light feeling', 'If you crack, go back to "ng"', '10 smooth slides']},
    ear: {name: 'Pitch Match', steps: ['Play a note (piano/YouTube)', 'Sing it back', 'Listen: sharp, flat, or in tune?', 'Adjust and try again', '5 notes. How many in tune?']},
    pitch: {name: 'Live Pitch Detector', steps: []}
  };
  var d = drills[skill] || drills.airflow;

  var h = '';
  h += '<button class="btn btn-w" style="width:auto;padding:var(--s2) var(--s4);min-height:36px;font-size:var(--xs)" onclick="go(\'practice\')">← Back</button>';
  h += '<h1 style="font-size:var(--lg);font-weight:900;margin:var(--s4) 0 var(--s2)">' + d.name + '</h1>';

  if (skill === 'pitch') {
    // Pitch detection UI
    h += '<p class="text-muted text-sm mb-4">Sing into your mic. Watch your pitch in real-time.</p>';
    h += '<div id="pitch-display" style="text-align:center;padding:var(--s6);background:var(--bg);border:2px solid var(--border);border-radius:var(--r);margin-bottom:var(--s4)">';
    h += '<div id="pitch-note" style="font-size:3rem;font-weight:900;color:var(--pri)">—</div>';
    h += '<div id="pitch-cents" style="font-size:1.2rem;color:var(--tx3);margin-top:var(--s2)">Sing a note...</div>';
    h += '<div id="pitch-meter" style="margin-top:var(--s3);height:8px;background:var(--bg2);border-radius:4px;overflow:hidden">';
    h += '<div id="pitch-bar" style="width:50%;height:100%;background:var(--pri);border-radius:4px;transition:width 0.1s,background 0.3s"></div>';
    h += '</div>';
    h += '<div style="display:flex;justify-content:space-between;font-size:0.7rem;color:var(--tx3);margin-top:4px"><span>♭ Flat</span><span>In Tune</span><span>♯ Sharp</span></div>';
    h += '</div>';
    h += '<div class="text-center mb-4">';
    h += '<button class="btn btn-s" onclick="startPitchDrill()">🎤 Start Listening</button> ';
    h += '<button class="btn btn-w" onclick="stopPitchDrill()">⏹ Stop</button>';
    h += '</div>';
    h += '<div id="pitch-target" class="c c-a text-center" style="padding:var(--s4);margin-bottom:var(--s4)">';
    h += '<div class="text-xs text-muted mb-2">Target Note</div>';
    h += '<select id="pitch-target-note" style="background:var(--bg2);color:var(--tx);border:1px solid var(--border);border-radius:var(--r);padding:var(--s2);font-size:1rem">';
    h += '<option value="C4">C4 (Middle C)</option>';
    h += '<option value="D4">D4</option>';
    h += '<option value="E4">E4</option>';
    h += '<option value="F4">F4</option>';
    h += '<option value="G4">G4</option>';
    h += '<option value="A4">A4 (440Hz)</option>';
    h += '<option value="B4">B4</option>';
    h += '</select></div>';
    h += '<div id="pitch-score" class="text-sm mt-2"></div>';
    h += '</div>';
    h += '<button class="btn btn-s" onclick="finishQD(\'pitch\')">Done (+10 XP)</button>';
  } else {
    h += '<p class="text-muted text-sm mb-4">Do this now. Tap when done.</p>';
    h += '<div class="c c-a">';
    for (var i = 0; i < d.steps.length; i++) {
      h += '<div class="es"><div class="esn">' + (i + 1) + '</div><div class="est"><p>' + d.steps[i] + '</p></div></div>';
    }
    h += '</div>';
    h += '<button class="btn btn-s" onclick="finishQD(\'' + skill + '\')">I Did It (+10 XP)</button>';
  }
  c.innerHTML = h;
  go('session');

  if (skill === 'pitch') {
    // Set up pitch detection callback
    var targetSelect = document.getElementById('pitch-target-note');
    var targetNote = targetSelect ? targetSelect.value : 'C4';
    if (targetSelect) {
      targetSelect.onchange = function() { targetNote = this.value; };
    }
    var targetFreq = noteNameToFreq(targetNote);

    onPitchDetected = function(note) {
      var display = document.getElementById('pitch-note');
      var centsDisplay = document.getElementById('pitch-cents');
      var bar = document.getElementById('pitch-bar');
      if (!display) return;

      display.textContent = note.name + note.octave;
      var cents = note.cents;
      centsDisplay.textContent = (cents === 0 ? '✓ Perfect!' : (cents > 0 ? '+' + cents + ' cents (sharp)' : cents + ' cents (flat)'));

      // Meter: -50 to +50 cents mapped to 0-100%
      var pct = Math.max(0, Math.min(100, 50 + (cents / 50) * 50));
      bar.style.width = pct + '%';
      if (Math.abs(cents) < 10) {
        bar.style.background = 'var(--ok)';
        centsDisplay.style.color = 'var(--ok)';
      } else if (Math.abs(cents) < 25) {
        bar.style.background = 'var(--gold)';
        centsDisplay.style.color = 'var(--gold)';
      } else {
        bar.style.background = 'var(--err)';
        centsDisplay.style.color = 'var(--err)';
      }

      // Score tracking
      if (!window.pitchScore) window.pitchScore = { attempts: 0, inTune: 0 };
      window.pitchScore.attempts++;
      if (Math.abs(cents) < 15) window.pitchScore.inTune++;
      var scoreDiv = document.getElementById('pitch-score');
      if (scoreDiv) {
        var accuracy = window.pitchScore.attempts > 0 ? Math.round(window.pitchScore.inTune / window.pitchScore.attempts * 100) : 0;
        scoreDiv.textContent = 'Score: ' + window.pitchScore.inTune + '/' + window.pitchScore.attempts + ' in tune (' + accuracy + '%)';
      }
    };
  }
}

function noteNameToFreq(name) {
  var notes = { 'C':0, 'C#':1, 'D':2, 'D#':3, 'E':4, 'F':5, 'F#':6, 'G':7, 'G#':8, 'A':9, 'A#':10, 'B':11 };
  var note = name.replace(/\d/, '');
  var oct = parseInt(name.replace(/\D/g, ''));
  var midi = (oct * 12) + (notes[note] || 0);
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function startPitchDrill() {
  window.pitchScore = { attempts: 0, inTune: 0 };
  var targetNote = document.getElementById('pitch-target-note');
  PitchEngine.start(targetNote ? targetNote.value : 'C4');
  toast('Listening... sing into your mic!', 'ok');
}

function stopPitchDrill() {
  PitchEngine.stop();
  toast('Stopped. Score: ' + (window.pitchScore ? window.pitchScore.inTune + '/' + window.pitchScore.attempts : '0/0'), 'info');
}

function finishQD(skill) {
  var result = GAME.addXP(10);
  U.vocalLoad = Math.min(U.maxLoad, U.vocalLoad + 5);
  if (U.skills[skill] !== undefined) U.skills[skill] = Math.min(10, U.skills[skill] + 1);
  U.sessions++;
  SRS.record(skill);
  U.streak++;
  save();
  var multText = result.mult > 1 ? ' (x' + result.mult + ' streak bonus!)' : '';
  toast('Done! +' + result.earned + ' XP' + multText + ' Level ' + result.level, 'ok');
  go('home');
}

var diagSel = [];

function togDiag(id, el) {

  if (idx === -1) { diagSel.push(id); el.classList.add('sel'); }
  else { diagSel.splice(idx, 1); el.classList.remove('sel'); }
}

function subDiag() {
  if (diagSel.length === 0) { toast('Select at least one', 'err'); return; }
  var sc = {airflow: 0, source: 0, resonance: 0, mix: 0};
  var map = {pitch: ['source', 'airflow'], strain: ['source', 'mix'], breathy: ['source', 'airflow'], power: ['airflow', 'resonance'], crack: ['source', 'mix'], range: ['mix', 'source']};
  for (var i = 0; i < diagSel.length; i++) { var s = map[diagSel[i]]; if (s) for (var j = 0; j < s.length; j++) sc[s[j]]++; }
  var p = 'source', mx = 0;
  for (var k in sc) if (sc[k] > mx) { mx = sc[k]; p = k; }

  var exercises = {
    airflow: {name: 'Rib Cage Hold', steps: ['Place hands on lower ribs', 'Breathe in — ribs push out', 'Hiss "sss" — hold ribs out', 'Goal: 15 seconds', 'Rest. Repeat 3 times.'], fix: 'You are pushing too much air. Control the escape rate.'},
    source: {name: 'Clean Onset Drill', steps: ['Hum "mmm" for 3 seconds', 'Open to "ah" — no "h" sound', 'If breathy, try again', 'Practice 10 reps', 'Every note should start clean'], fix: 'Your vocal folds are not closing fully. Hum first, then open.'},
    resonance: {name: 'Forward Placement', steps: ['Hum "mmm" — feel lip buzz', 'Open to "mah" — buzz stays on lips', 'If buzz drops, start over', 'Slide: mmm → mah → mmm → mah', '10 reps'], fix: 'Your sound is falling back into your throat. Keep it forward.'},
    mix: {name: 'Ng Slide', steps: ['Say "ng" — feel nose buzz', 'Slide low to high on "ng"', 'Try "nah" — same light feeling', 'If you crack, go back to "ng"', '10 smooth slides'], fix: 'You are pushing chest voice too high. Lighten up and slide through the break.'}
  };

  var ex = exercises[p] || exercises.source;
  var c = document.getElementById('v-c');
  var h = '';
  h += '<button class="btn btn-w" style="width:auto;padding:var(--s2) var(--s4);min-height:36px;font-size:var(--xs)" onclick="go(\'practice\')">← Back</button>';

  h += '<h1 style="font-size:var(--lg);font-weight:900;margin:var(--s4) 0 var(--s2)">Your Prescribed Exercise</h1>';
  h += '<p class="text-muted text-sm mb-4">' + ex.name + '</p>';
  h += '<div class="c c-a">';
  for (var i = 0; i < ex.steps.length; i++) {
    h += '<div class="es"><div class="esn">' + (i + 1) + '</div><div class="est"><p>' + ex.steps[i] + '</p></div></div>';
  }
  h += '</div>';
  h += '<button class="btn btn-s" onclick="finishDiag(\'' + p + '\')">I Did It (+15 XP)</button>';
  c.innerHTML = h;
}

// MILLIONAIRE QUIZ
// ============================================================
var quizState = { q: 0, score: 0, lifelines: { fifty: true, skip: true, double: true }, over: false };

function startMillionaire() {
  quizState = { q: 0, score: 0, lifelines: { fifty: true, skip: true, double: true }, over: false };
  showQuizQuestion();
}

function showQuizQuestion() {
  var qs = QUIZ_QUESTIONS;
  var qi = quizState.q;
  if (qi >= qs.length) { quizWin(); return; }
  var q = qs[qi];
  var c = document.getElementById('q-c');
  var h = '';
  h += '<button class="btn btn-w" style="width:auto;padding:var(--s2) var(--s4);min-height:36px;font-size:var(--xs)" onclick="go(\'quiz\')">← Quit</button>';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin:var(--s4) 0">';
  h += '<span class="text-xs text-muted">Question ' + (qi + 1) + ' of ' + qs.length + '</span>';
  h += '<span class="text-xs text-gold text-bold">₦' + PRIZE_LADDER[qi].toLocaleString() + '</span></div>';
  h += '<div class="pr mb-4"><div class="pr-f" style="width:' + ((qi + 1) / qs.length * 100) + '%"></div></div>';
  h += '<div class="millionaire-q">';
  h += '<div class="millionaire-q-num">Question ' + (qi + 1) + '</div>';
  h += '<div class="millionaire-q-text">' + q.q + '</div>';
  for (var i = 0; i < q.options.length; i++) {
    h += '<div class="qo" id="qo-' + i + '" onclick="answerQuiz(' + i + ')"><div class="qr"></div><span>' + String.fromCharCode(65 + i) + '. ' + q.options[i] + '</span></div>';
  }
  h += '</div>';
  h += '<div class="millionaire-lifelines">';
  h += '<div class="lifeline-btn ' + (quizState.lifelines.fifty ? '' : 'used') + '" onclick="useLifeline(\'fifty\')">50:50</div>';
  h += '<div class="lifeline-btn ' + (quizState.lifelines.skip ? '' : 'used') + '" onclick="useLifeline(\'skip\')">Skip</div>';
  h += '<div class="lifeline-btn ' + (quizState.lifelines.double ? '' : 'used') + '" onclick="useLifeline(\'double\')">Double</div>';
  h += '</div>';
  c.innerHTML = h;
}

function answerQuiz(idx) {
  if (quizState.over) return;
  var q = QUIZ_QUESTIONS[quizState.q];
  var correct = idx === q.answer;
  for (var i = 0; i < 4; i++) {
    var el = document.getElementById('qo-' + i);
    if (i === q.answer) el.classList.add('ok');
    else if (i === idx && !correct) el.classList.add('err');
    el.classList.add('dis');
  }
  if (correct) {
    quizState.score = q.prize;
    toast('Correct! ₦' + q.prize.toLocaleString(), 'ok');
    setTimeout(function() { quizState.q++; showQuizQuestion(); }, 1500);
  } else {
    quizState.over = true;
    toast('Wrong! Game over.', 'err');
    setTimeout(function() {
      var safeScore = 0;
      for (var m = 0; m < SAFE_MILESTONES.length; m++) {
        if (quizState.q > SAFE_MILESTONES[m]) safeScore = PRIZE_LADDER[SAFE_MILESTONES[m]];
      }
      if (safeScore > U.quizHighScore) U.quizHighScore = safeScore;
      save();
      showQuizResult(safeScore);
    }, 1500);
  }
}

function useLifeline(type) {
  if (!quizState.lifelines[type] || quizState.over) return;
  var q = QUIZ_QUESTIONS[quizState.q];
  if (type === 'fifty') {
    var removed = 0;
    for (var i = 0; i < 4 && removed < 2; i++) {
      if (i !== q.answer) {
        var el = document.getElementById('qo-' + i);
        if (el) { el.style.opacity = '0.2'; el.style.pointerEvents = 'none'; removed++; }
      }
    }
  } else if (type === 'skip') {
    quizState.q++;
    showQuizQuestion();
  } else if (type === 'double') {
    q.prize = q.prize * 2;
  }
  quizState.lifelines[type] = false;
  var btns = document.querySelectorAll('.lifeline-btn');
  if (type === 'fifty') btns[0].classList.add('used');
  if (type === 'skip') btns[1].classList.add('used');
  if (type === 'double') btns[2].classList.add('used');
}

function quizWin() {
  var finalPrize = PRIZE_LADDER[PRIZE_LADDER.length - 1];
  if (finalPrize > U.quizHighScore) U.quizHighScore = finalPrize;
  save();
  showQuizResult(finalPrize);
}

function showQuizResult(score) {
  var c = document.getElementById('q-c');
  var h = '';
  h += '<div class="text-center" style="padding:var(--s7) 0">';
  h += '<div style="font-size:3rem;margin-bottom:var(--s3)">' + (score >= 1000000 ? '🏆' : score >= 10000 ? '🎉' : '💪') + '</div>';
  h += '<h1 style="font-size:var(--2xl);font-weight:900;margin-bottom:var(--s2)">₦' + score.toLocaleString() + '</h1>';
  h += '<p class="text-muted mb-4">' + (score >= 1000000 ? 'You are a music genius!' : score >= 10000 ? 'Great job! Keep studying.' : 'Keep learning. You will get there.') + '</p>';
  h += '<button class="btn btn-p" onclick="startMillionaire()">Play Again</button>';
  h += '<button class="btn btn-g" onclick="go(\'quiz\')">Back</button></div>';
  c.innerHTML = h;
}

  <div class="tb"><div class="tb-t">Progress</div></div>
  <div class="sp" id="r-c"></div>
</div>

<!-- SESSION (Lesson/Exercise viewer) -->
<div class="sc" id="s-session">
  <div class="sp" id="v-c"></div>
</div>

<!-- PROFILE -->
<div class="sc" id="s-profile">
  <div class="tb"><div class="tb-t">Profile</div></div>
  <div class="sp" id="f-c"></div>
</div>


<!-- BOTTOM NAV -->
<nav class="bn">
  <div class="bn-in">
    <button class="bn-i on" id="n-home" onclick="go('home')">
      <span class="bn-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
      Home
    </button>
    <button class="bn-i" id="n-learn" onclick="go('learn')">
      <span class="bn-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg></span>
      Learn
    </button>
    <button class="bn-i" id="n-practice" onclick="go('practice')">
      <span class="bn-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></span>
      Practice
    </button>
    <button class="bn-i" id="n-songs" onclick="go('songs')">
      <span class="bn-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></span>
      Songs
    </button>
    <button class="bn-i" id="n-theory" onclick="go('theory')">
      <span class="bn-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg></span>
      Theory
    </button>
    <button class="bn-i" id="n-quiz" onclick="go('quiz')">
      <span class="bn-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>
      Quiz
    </button>
    <button class="bn-i" id="n-progress" onclick="go('progress')">
      <span class="bn-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
      Progress
    </button>
  </div>
</nav>

<!-- TOAST -->
<div class="ft" id="ft"></div>

<!-- ACHIEVEMENT POPUP -->
<div class="achieve" id="achieve">
  <div class="achieve-box">
    <div class="achieve-icon" id="achieve-icon"></div>
    <div class="achieve-title" id="achieve-title"></div>
    <div class="achieve-desc" id="achieve-desc"></div>
    <button class="btn btn-p" onclick="closeAchieve()">Continue</button>
  </div>
</div>

</body>
