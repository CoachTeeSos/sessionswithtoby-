<meta name="description" content="Personalized digital music conservatory, artist incubator, and AI vocal mentor.">

<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&family=Clash+Display:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
#pageLoader{position:fixed;inset:0;background:#0D0E12;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s ease}
#pageLoader.fade-out{opacity:0;pointer-events:none}
.loader-text{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.25rem;color:#F4F5F7;letter-spacing:-0.02em}
.loader-bar{width:180px;height:3px;background:#242838;border-radius:3px;margin-top:16px;overflow:hidden}
.loader-bar-fill{height:100%;background:#E4B34F;width:0;transition:width .3s ease}
.lms-panel{display:none}
.lms-panel.active{display:block}
.hidden{display:none!important}
</style>
</head>
<body style="background:#0D0E12;color:#F4F5F7;font-family:'Inter',sans-serif;margin:0">

<div id="pageLoader"><div class="text-center"><div class="loader-text" id="loaderText"></div><div class="loader-bar"><div class="loader-bar-fill" id="loaderFill"></div></div></div></div>

<div id="emailGate" class="lms-panel active" style="min-height:100vh;display:flex;align-items:center;justify-content:center">
  <div style="max-width:420px;width:90%;text-align:center">
    <h1 style="margin-top:0;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.6rem">Enter your email to continue</h1>
    <div class="email-gate" style="display:flex;flex-direction:column;gap:10px">
      <input type="email" id="gateEmail" placeholder="you@example.com" style="padding:12px;background:#161820;color:#F4F5F7;border:1px solid #242838;border-radius:10px;min-width:100%">
      <button onclick="app.submitGateEmail()" style="padding:12px;background:#E4B34F;color:#0D0E12;border:none;border-radius:10px;font-weight:700;cursor:pointer">Continue</button>
    </div>
    <p class="funnel-note" style="color:#6b7280;font-size:0.75rem;margin-top:14px">We’ll track your progress privately in this browser.</p>
  </div>
</div>

<div id="lmsMain" class="lms-panel" style="display:none">
  <div class="lms-nav" style="display:flex;gap:8px;flex-wrap:wrap;padding:12px">
    <button onclick="app.lmsNav('dashboard')" style="padding:10px 12px;background:#161820;color:#F4F5F7;border:1px solid #242838;border-radius:10px;cursor:pointer">Dashboard</button>
    <button onclick="app.lmsNav('learn')" style="padding:10px 12px;background:#161820;color:#F4F5F7;border:1px solid #242838;border-radius:10px;cursor:pointer">Learn</button>
    <button onclick="app.lmsNav('practice')" style="padding:10px 12px;background:#161820;color:#F4F5F7;border:1px solid #242838;border-radius:10px;cursor:pointer">Practice</button>
    <button onclick="app.lmsNav('assessments')" style="padding:10px 12px;background:#161820;color:#F4F5F7;border:1px solid #242838;border-radius:10px;cursor:pointer">Assessments</button>
    <button onclick="app.lmsNav('mentor')" style="padding:10px 12px;background:#161820;color:#F4F5F7;border:1px solid #242838;border-radius:10px;cursor:pointer">Mentor</button>
    <button onclick="app.lmsNav('community')" style="padding:10px 12px;background:#161820;color:#F4F5F7;border:1px solid #242838;border-radius:10px;cursor:pointer">Community</button>
    <button onclick="app.lmsNav('coach')" style="padding:10px 12px;background:#161820;color:#F4F5F7;border:1px solid #242838;border-radius:10px;cursor:pointer">Coach</button>
  </div>
  <div id="statsContent" data-page="dashboard" class="hidden" style="margin-top:14px"></div>
  <div id="learnContent" data-page="learn" class="hidden" style="margin-top:14px"></div>
  <div id="assessmentsContent" data-page="assessments" class="hidden" style="margin-top:14px"></div>
  <div id="mentorMessages" data-page="mentor" class="hidden" style="margin-top:14px;min-height:140px"></div>
  <div id="practiceContent" data-page="practice" class="hidden" style="margin-top:14px"></div>
  <div id="communityContent" data-page="community" class="hidden" style="margin-top:14px"></div>
  <div id="coachContent" data-page="coach" class="hidden" style="margin-top:14px"></div>
  <input id="mentorInput" style="width:calc(100% - 28px);margin:0 14px 14px;padding:10px;background:#161820;color:#F4F5F7;border:1px solid #242838;border-radius:10px" placeholder="Ask Mentor...">
</div>

<script src="services/store.js"></script>
<script src="lms/bootstrap.js"></script>
<script src="lms/router.js"></script>
<script src="lms/pages.js"></script>

if (window.Store) {
  Store.formsubmitUrl = location.hostname ? 'https://formsubmit.co/prosperolumotobi@gmail.com' : '';

}
</script>
</body>
</html>
