<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0B0F14">
<title>The Singer's Conservatory</title>
<style>
:root{--bg:#0B0F14;--surface:#121826;--card:#1A2232;--primary:#4F8CFF;--success:#00D084;--warn:#FFB547;--error:#FF4D4D;--gold:#D4AF37;--text:#E8ECF1;--text-soft:#8892A4;--text-muted:#4A5568;--border:#1E2A3A;--r:12px;--r-lg:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;min-height:100vh;padding-bottom:80px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
.screen{display:none;animation:fadeUp .25s ease both}
.screen.active{display:block}
.container{width:100%;max-width:680px;margin:0 auto;padding:0 16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:10px}
.card--highlight{border-color:var(--primary);box-shadow:0 0 0 1px rgba(79,140,255,.12)}
.card--gold{border-color:rgba(212,175,55,.3)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;border-radius:var(--r);font-weight:600;font-size:.88rem;min-height:48px;width:100%;margin-bottom:8px}
.btn--primary{background:var(--primary);color:#fff}
.btn--ghost{background:transparent;color:var(--text-soft);border:1px solid var(--border)}
.btn--sm{padding:10px 14px;font-size:.78rem;min-height:40px;width:auto}
.btn:active{transform:scale(.97)}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:1000;background:rgba(18,24,38,.96);backdrop-filter:blur(20px);border-top:1px solid var(--border);height:64px}
.nav__inner{display:flex;align-items:center;justify-content:space-around;max-width:680px;margin:0 auto;height:64px}
.nav__item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;color:var(--text-muted);text-decoration:none}
.nav__item.active{color:var(--primary)}
.nav__icon{font-size:1.15rem}
.nav__label{font-size:.55rem;font-weight:600;text-transform:uppercase}
.topbar{position:sticky;top:0;z-index:100;background:rgba(11,15,20,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 16px}
.topbar__inner{display:flex;align-items:center;justify-content:space-between;max-width:680px;margin:0 auto}
.topbar__brand{font-weight:700;font-size:1rem}
.topbar__brand span{color:var(--primary)}
h1{font-size:1.5rem;font-weight:700;margin-bottom:6px}
h2{font-size:1.2rem;font-weight:700;margin-bottom:8px}
h3{font-size:1rem;font-weight:600;margin-bottom:6px}
p{font-size:.9rem;color:var(--text-soft);margin-bottom:10px}
.text-muted{color:var(--text-muted)}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}
.flex{display:flex}.items-center{align-items:center}.gap-8{gap:8px}.gap-12{gap:12px}
.justify-between{justify-content:space-between}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:.65rem;font-weight:600;text-transform:uppercase}
.tag--primary{background:rgba(79,140,255,.1);color:var(--primary)}
.tag--success{background:rgba(0,208,132,.1);color:var(--success)}
.tag--gold{background:rgba(212,175,55,.1);color:var(--gold)}
.prog{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog__fill{height:100%;background:var(--primary);border-radius:2px;transition:width .4s}
.list-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;cursor:pointer}
.list-item:active{border-color:var(--primary)}
.list-item__icon{width:40px;height:40px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;background:rgba(79,140,255,.1)}
.list-item__body{flex:1;min-width:0}
.list-item__title{font-weight:600;font-size:.88rem;margin-bottom:2px}
.list-item__sub{font-size:.72rem;color:var(--text-muted)}
.hook{background:linear-gradient(135deg,rgba(79,140,255,.07),rgba(0,208,132,.04));border:1px solid rgba(79,140,255,.12);border-radius:var(--r-lg);padding:18px;margin-bottom:14px}
.hook__label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--primary);margin-bottom:6px}
.hook__text{font-size:1rem;font-weight:600;line-height:1.35}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-weight:700;font-size:.9rem}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="screen-home">
<div class="topbar"><div class="topbar__inner">
  <span class="topbar__brand">Singer<span>'s</span> Conservatory</span>
  <span id="home-xp" style="font-size:.78rem;font-weight:600;color:var(--gold)">0 XP</span>
</div></div>
<div class="container" style="padding-top:16px" id="home-content"></div>
</div>

<!-- LEARN -->
<div class="screen" id="screen-learn">
<div class="topbar"><div class="topbar__inner">
  <span class="topbar__brand">Learn</span>
  <span class="text-muted" style="font-size:.78rem" id="learn-stage-label">Stage 1/10</span>
</div></div>
<div class="container" style="padding-top:16px" id="learn-content"></div>
</div>

<!-- PRACTICE -->
<div class="screen" id="screen-practice">
<div class="topbar"><div class="topbar__inner"><span class="topbar__brand">Practice</span></div></div>
<div class="container" style="padding-top:16px" id="practice-content"></div>
</div>

<!-- SONGS -->
<div class="screen" id="screen-songs">
<div class="topbar"><div class="topbar__inner"><span class="topbar__brand">Songs</span></div></div>
<div class="container" style="padding-top:16px" id="songs-content"></div>
</div>

<!-- PROGRESS -->
<div class="screen" id="screen-progress">
<div class="topbar"><div class="topbar__inner"><span class="topbar__brand">Progress</span></div></div>
<div class="container" style="padding-top:16px" id="progress-content"></div>
</div>

<!-- SESSION -->
<div class="screen" id="screen-session">
<div class="container" style="padding-top:16px" id="session-content"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
<div class="nav__inner">
  <a class="nav__item active" id="nav-home" href="#" onclick="showScreen('home');return false;"><span class="nav__icon">🏠</span><span class="nav__label">Home</span></a>
  <a class="nav__item" id="nav-learn" href="#" onclick="showScreen('learn');return false;"><span class="nav__icon">📖</span><span class="nav__label">Learn</span></a>
  <a class="nav__item" id="nav-practice" href="#" onclick="showScreen('practice');return false;"><span class="nav__icon">🎯</span><span class="nav__label">Practice</span></a>
  <a class="nav__item" id="nav-songs" href="#" onclick="showScreen('songs');return false;"><span class="nav__icon">🎵</span><span class="nav__label">Songs</span></a>
  <a class="nav__item" id="nav-progress" href="#" onclick="showScreen('progress');return false;"><span class="nav__icon">📊</span><span class="nav__label">Progress</span></a>
</div>
</nav>

<script>
// ═══ STATE ═══
var U={name:'Singer',xp:0,level:1,stage:1,sessions:0,completed:[],skills:{airflow:0,source:0,resonance:0,articulation:0},badges:[]};
try{var d=localStorage.getItem('sc_state');if(d){var p=JSON.parse(d);if(p&&p.skills&&p.stage)for(var k in p)U[k]=p[k];}}catch(e){}
function saveState(){try{localStorage.setItem('sc_state',JSON.stringify(U))}catch(e){}}

var STAGES=[
  {id:1,name:'Awakening',desc:'Your first vocal win'},
  {id:2,name:'Control',desc:'Basic coordination'},
  {id:3,name:'Athleticism',desc:'Range, agility, endurance'},
  {id:4,name:'Musicianship',desc:'Rhythm, harmony, melody'},
  {id:5,name:'Ear Mastery',desc:'Advanced aural perception'},
  {id:6,name:'Performance',desc:'Mind, emotion, stage'},
  {id:7,name:'Genre System',desc:'Any style'},
  {id:8,name:'Fusion',desc:'Cross-genre blending'},
  {id:9,name:'Production',desc:'Record and release'},
  {id:10,name:'Market Mastery',desc:'Turn voice into income'}
];

var VOCAL_SYSTEMS={
  airflow:{name:'Airflow',desc:'Breath pressure and flow',color:'primary'},
  source:{name:'Source',desc:'Vocal fold closure',color:'success'},
  resonance:{name:'Resonance',desc:'Vocal tract shaping',color:'gold'},
  articulation:{name:'Articulation',desc:'Consonant and vowel shaping',color:'primary'}
};

var SONG_DB=[
  {id:'s1',title:'Lean On Me',artist:'Bill Withers',diff:1,sys:['airflow','source']},
  {id:'s2',title:'Amazing Grace',artist:'Traditional',diff:1,sys:['airflow']},
  {id:'s3',title:'Hallelujah',artist:'Leonard Cohen',diff:3,sys:['source','resonance']},
  {id:'s4',title:'Thinking Out Loud',artist:'Ed Sheeran',diff:3,sys:['articulation','resonance']},
  {id:'s5',title:'Fight Song',artist:'Rachel Platten',diff:4,sys:['source','airflow']},
  {id:'s6',title:'Someone Like You',artist:'Adele',diff:5,sys:['source','resonance','airflow']},
  {id:'s7',title:'Take Me to the King',artist:'Tamela Mann',diff:5,sys:['source','resonance','airflow']},
  {id:'s8',title:'Essence',artist:'Wizkid ft. Tems',diff:2,sys:['articulation','source']}
];

// ═══ NAVIGATION ═══
function showScreen(id){
  var screens=document.querySelectorAll('.screen');
  for(var i=0;i<screens.length;i++)screens[i].classList.remove('active');
  document.getElementById('screen-'+id).classList.add('active');
  var items=document.querySelectorAll('.nav__item');
  for(var j=0;j<items.length;j++)items[j].classList.remove('active');
  var navItem=document.getElementById('nav-'+id);
  if(navItem)navItem.classList.add('active');
  window.scrollTo({top:0,behavior:'instant'});
  if(id==='home')renderHome();
  if(id==='learn')renderLearn();
  if(id==='practice')renderPractice();
  if(id==='songs')renderSongs();
  if(id==='progress')renderProgress();
}

// ═══ RENDER: HOME ═══
function renderHome(){
  var c=document.getElementById('home-content');
  document.getElementById('home-xp').textContent=U.xp+' XP';
  var h='';
  h+='<div class="hook mb-12">';
  h+='<div class="hook__label">Welcome back</div>';
  h+='<div class="hook__text">'+U.name+', your voice is waiting. Stage '+U.stage+'/10</div>';
  h+='</div>';
  h+='<div class="card card--highlight mb-12" onclick="startDiagnosis()">';
  h+='<div class="flex items-center gap-12">';
  h+='<div class="list-item__icon" style="background:rgba(212,175,55,.1)">🎤</div>';
  h+='<div class="list-item__body">';
  h+='<div class="list-item__title">Voice Diagnostic</div>';
  h+='<div class="list-item__sub">Answer questions about your voice. Get a targeted exercise.</div>';
  h+='</div>';
  h+='<span class="btn btn--primary btn--sm">Start</span>';
  h+='</div></div>';
  var weakest=null,lowest=99;
  for(var k in U.skills){if(U.skills[k]<lowest){lowest=U.skills[k];weakest=k;}}
  if(!weakest)weakest='source';
  h+='<div class="card card--gold mb-12" onclick="startDiagnosis()">';
  h+='<div class="flex items-center gap-12">';
  h+='<div class="list-item__icon" style="background:rgba(212,175,55,.1)">🎯</div>';
  h+='<div class="list-item__body">';
  h+='<div class="list-item__title">Train: '+VOCAL_SYSTEMS[weakest].name+'</div>';
  h+='<div class="list-item__sub">Skill: '+U.skills[weakest]+'/10 — '+VOCAL_SYSTEMS[weakest].desc+'</div>';
  h+='</div>';
  h+='<span class="btn btn--primary btn--sm">Go</span>';
  h+='</div></div>';
  h+='<div class="sec-header"><span class="sec-title">Voice Systems</span></div>';
  var systems=['airflow','source','resonance','articulation'];
  for(var s=0;s<systems.length;s++){
    var sys=systems[s],lvl=U.skills[sys],pct=lvl*10;
    h+='<div class="flex items-center gap-8 mb-8">';
    h+='<span style="font-size:.8rem;width:80px">'+VOCAL_SYSTEMS[sys].name+'</span>';
    h+='<div class="prog" style="flex:1"><div class="prog__fill" style="width:'+pct+'%"></div></div>';
    h+='<span class="text-muted" style="font-size:.75rem;width:20px;text-align:right">'+lvl+'</span>';
    h+='</div>';
  }
  h+='<button class="btn btn--ghost mt-12" onclick="showScreen(\'practice\')">Go to Practice →</button>';
  c.innerHTML=h;
}

// ═══ RENDER: LEARN ═══
function renderLearn(){
  var c=document.getElementById('learn-content');
  document.getElementById('learn-stage-label').textContent='Stage '+U.stage+'/10';
  var h='';
  h+='<h2 style="margin-bottom:4px">Your Vocal Journey</h2>';
  h+='<p class="text-muted mb-16">10 stages to vocal mastery.</p>';
  for(var i=0;i<STAGES.length;i++){
    var st=STAGES[i],locked=(i+1)>U.stage,current=(i+1)===U.stage;
    var op=locked?'0.4':'1';
    var border=current?'card--highlight':'';
    h+='<div class="card '+border+'" style="opacity:'+op+';margin-bottom:8px;cursor:'+(locked?'default':'pointer')+'" '+(locked?'':'onclick="openStage('+(i+1)+')"')+'>';
    h+='<div class="flex items-center justify-between">';
    h+='<div><div style="font-weight:600;font-size:.88rem">Stage '+st.id+': '+st.name+'</div>';
    h+='<div class="text-muted" style="font-size:.72rem;margin-top:2px">'+st.desc+'</div></div>';
    if(current)h+='<span class="tag tag--primary">Current</span>';
    if(locked)h+='<span class="tag" style="background:rgba(255,255,255,.05);color:var(--text-muted)">🔒</span>';
    h+='</div></div>';
  }
  c.innerHTML=h;
}

function openStage(id){
  var c=document.getElementById('session-content');
  var st=STAGES[id-1];
  var h='';
  h+='<h2>Stage '+st.id+': '+st.name+'</h2>';
  h+='<p class="text-muted mb-16">'+st.desc+'</p>';
  h+='<div class="hook mb-12"><div class="hook__label">Lesson</div>';
  h+='<div class="hook__text">Welcome to '+st.name+'. This stage focuses on building your vocal foundation step by step.</div></div>';
  h+='<div class="card mb-12"><h3>What You Will Learn</h3>';
  h+='<p>• Core techniques for this stage</p>';
  h+='<p>• Practical exercises to build skill</p>';
  h+='<p>• Song application to test your growth</p></div>';
  h+='<button class="btn btn--primary" onclick="startStageDrill('+id+')">Start Training →</button>';
  h+='<button class="btn btn--ghost" onclick="showScreen(\'learn\')">Back to Stages</button>';
  c.innerHTML=h;
  showScreen('session');
}

function startStageDrill(stageId){
  var c=document.getElementById('session-content');
  var h='';
  h+='<h2>Stage '+stageId+' Drill</h2>';
  h+='<p class="text-muted mb-16">Complete this exercise to earn XP and level up.</p>';
  h+='<div class="card card--highlight text-center mb-12" style="padding:32px">';
  h+='<div style="font-size:3rem;margin-bottom:12px">🎵</div>';
  h+='<h3>Exercise: Sustained Tone</h3>';
  h+='<p class="text-muted">Take a deep breath. Sing "ah" on a comfortable pitch. Hold it steady for 8 seconds. Repeat 3 times.</p>';
  h+='</div>';
  h+='<button class="btn btn--primary" onclick="completeDrill('+stageId+')">I Did It ✓</button>';
  h+='<button class="btn btn--ghost" onclick="showScreen(\'learn\')">Back</button>';
  c.innerHTML=h;
  showScreen('session');
}

function completeDrill(stageId){
  U.xp+=25;
  U.sessions++;
  var sys=['airflow','source','resonance','articulation'][Math.floor(Math.random()*4)];
  U.skills[sys]=Math.min(10,U.skills[sys]+1);
  if(U.xp>=U.level*100)U.level++;
  saveState();
  var c=document.getElementById('session-content');
  var h='';
  h+='<div class="card card--gold text-center" style="padding:32px">';
  h+='<div style="font-size:3rem;margin-bottom:12px">⭐</div>';
  h+='<h2>Complete!</h2>';
  h+='<p class="text-muted">+25 XP. '+VOCAL_SYSTEMS[sys].name+' skill increased to '+U.skills[sys]+'/10.</p>';
  h+='</div>';
  h+='<button class="btn btn--primary" onclick="showScreen(\'home\')">Back to Home</button>';
  c.innerHTML=h;
  showScreen('session');
}

// ═══ RENDER: PRACTICE ═══
function renderPractice(){
  var c=document.getElementById('practice-content');
  var h='';
  h+='<h2 style="margin-bottom:4px">Practice</h2>';
  h+='<p class="text-muted mb-16">Drills and exercises to sharpen your voice.</p>';
  h+='<div class="card card--highlight mb-12" onclick="startDiagnosis()">';
  h+='<div class="flex items-center gap-12">';
  h+='<div class="list-item__icon" style="background:rgba(79,140,255,.1)">🔍</div>';
  h+='<div class="list-item__body">';
  h+='<div class="list-item__title">Voice Check</div>';
  h+='<div class="list-item__sub">Quick diagnostic. Answer 3 questions. Get a targeted drill.</div>';
  h+='</div></div></div>';
  h+='<div class="sec-header"><span class="sec-title">Quick Drills</span></div>';
  var drills=[
    {icon:'💨',name:'Breath Control',desc:'Sustain "sss" for 20 seconds',sys:'airflow'},
    {icon:'🎵',name:'Pitch Hold',desc:'Sing one note, hold steady for 10 sec',sys:'source'},
    {icon:'🗣️',name:'Articulation',desc:'"ma-me-mi-mo-mu" x5, crisp and clear',sys:'articulation'},
    {icon:'🔔',name:'Resonance',desc:'Hum on "ng", feel the buzz',sys:'resonance'}
  ];
  for(var i=0;i<drills.length;i++){
    var d=drills[i];
    h+='<div class="list-item mb-8" onclick="runQuickDrill(\''+d.sys+'\')">';
    h+='<div class="list-item__icon">'+d.icon+'</div>';
    h+='<div class="list-item__body">';
    h+='<div class="list-item__title">'+d.name+'</div>';
    h+='<div class="list-item__sub">'+d.desc+'</div>';
    h+='</div></div>';
  }
  c.innerHTML=h;
}

function runQuickDrill(sys){
  var c=document.getElementById('session-content');
  var h='';
  h+='<h2>'+VOCAL_SYSTEMS[sys].name+' Drill</h2>';
  h+='<p class="text-muted mb-16">Follow the instructions below.</p>';
  h+='<div class="card card--highlight text-center mb-12" style="padding:32px">';
  h+='<div style="font-size:3rem;margin-bottom:12px">🎤</div>';
  h+='<h3>Exercise</h3>';
  h+='<p class="text-muted">'+VOCAL_SYSTEMS[sys].desc+'. Practice this for 2 minutes.</p>';
  h+='</div>';
  h+='<button class="btn btn--primary" onclick="finishDrill(\''+sys+'\')">Done ✓</button>';
  h+='<button class="btn btn--ghost" onclick="showScreen(\'practice\')">Back</button>';
  c.innerHTML=h;
  showScreen('session');
}

function finishDrill(sys){
  U.xp+=10;
  U.skills[sys]=Math.min(10,U.skills[sys]+1);
  U.sessions++;
  saveState();
  var c=document.getElementById('session-content');
  var h='';
  h+='<div class="card card--gold text-center" style="padding:32px">';
  h+='<div style="font-size:3rem;margin-bottom:12px">✅</div>';
  h+='<h2>Done!</h2>';
  h+='<p class="text-muted">+10 XP. '+VOCAL_SYSTEMS[sys].name+' is now '+U.skills[sys]+'/10.</p>';
  h+='</div>';
  h+='<button class="btn btn--primary" onclick="showScreen(\'practice\')">Back to Practice</button>';
  c.innerHTML=h;
  showScreen('session');
}

// ═══ RENDER: SONGS ═══
function renderSongs(){
  var c=document.getElementById('songs-content');
  var h='';
  h+='<h2 style="margin-bottom:4px">Song Library</h2>';
  h+='<p class="text-muted mb-16">'+SONG_DB.length+' songs matched to your training.</p>';
  for(var i=0;i<SONG_DB.length;i++){
    var s=SONG_DB[i];
    h+='<div class="list-item mb-8" onclick="openSong(\''+s.id+'\')">';
    h+='<div class="list-item__icon">🎵</div>';
    h+='<div class="list-item__body">';
    h+='<div class="list-item__title">'+s.title+'</div>';
    h+='<div class="list-item__sub">'+s.artist+' • Difficulty '+s.diff+'/6 • Trains: '+s.sys.join(', ')+'</div>';
    h+='</div></div>';
  }
  c.innerHTML=h;
}

function openSong(id){
  var song=null;
  for(var i=0;i<SONG_DB.length;i++)if(SONG_DB[i].id===id)song=SONG_DB[i];
  if(!song)return;
  var c=document.getElementById('session-content');
  var h='';
  h+='<h2>'+song.title+'</h2>';
  h+='<p class="text-muted mb-16">'+song.artist+'</p>';
  h+='<div class="card mb-12"><h3>Song Info</h3>';
  h+='<p>Difficulty: '+song.diff+'/6</p>';
  h+='<p>Trains: '+song.sys.map(function(s){return VOCAL_SYSTEMS[s].name}).join(', ')+'</p></div>';
  h+='<button class="btn btn--primary" onclick="practiceSong(\''+song.id+'\')">Practice This Song →</button>';
  h+='<button class="btn btn--ghost" onclick="showScreen(\'songs\')">Back to Songs</button>';
  c.innerHTML=h;
  showScreen('session');
}

function practiceSong(id){
  var song=null;
  for(var i=0;i<SONG_DB.length;i++)if(SONG_DB[i].id===id)song=SONG_DB[i];
  var c=document.getElementById('session-content');
  var h='';
  h+='<h2>Practicing: '+song.title+'</h2>';
  h+='<p class="text-muted mb-16">Sing through the song. Focus on the techniques below.</p>';
  h+='<div class="card card--highlight mb-12"><h3>Focus Areas</h3>';
  for(var i=0;i<song.sys.length;i++){
    h+='<p>• '+VOCAL_SYSTEMS[song.sys[i]].name+': '+VOCAL_SYSTEMS[song.sys[i]].desc+'</p>';
  }
  h+='</div>';
  h+='<button class="btn btn--primary" onclick="finishSong(\''+song.id+'\')">I Sang It ✓</button>';
  h+='<button class="btn btn--ghost" onclick="showScreen(\'songs\')">Back</button>';
  c.innerHTML=h;
  showScreen('session');
}

function finishSong(id){
  var song=null;
  for(var i=0;i<SONG_DB.length;i++)if(SONG_DB[i].id===id)song=SONG_DB[i];
  U.xp+=50;
  U.sessions++;
  for(var i=0;i<song.sys.length;i++){
    U.skills[song.sys[i]]=Math.min(10,U.skills[song.sys[i]]+1);
  }
  if(U.completed.indexOf(id)===-1)U.completed.push(id);
  saveState();
  var c=document.getElementById('session-content');
  var h='';
  h+='<div class="card card--gold text-center" style="padding:32px">';
  h+='<div style="font-size:3rem;margin-bottom:12px">🏆</div>';
  h+='<h2>Song Complete!</h2>';
  h+='<p class="text-muted">+50 XP. Skills improved. Song added to your completed list.</p>';
  h+='</div>';
  h+='<button class="btn btn--primary" onclick="showScreen(\'songs\')">Back to Songs</button>';
  c.innerHTML=h;
  showScreen('session');
}

// ═══ RENDER: PROGRESS ═══
function renderProgress(){
  var c=document.getElementById('progress-content');
  var h='';
  h+='<h2 style="margin-bottom:4px">Your Progress</h2>';
  h+='<p class="text-muted mb-16">Track your vocal growth.</p>';
  h+='<div class="card card--gold text-center mb-12" style="padding:24px">';
  h+='<div style="font-size:2.5rem;margin-bottom:8px">⭐</div>';
  h+='<h2>'+U.xp+' XP</h2>';
  h+='<p class="text-muted">Level '+U.level+' • '+U.sessions+' sessions • '+U.completed.length+' songs</p>';
  h+='</div>';
  h+='<div class="sec-header"><span class="sec-title">Skills</span></div>';
  var systems=['airflow','source','resonance','articulation'];
  for(var s=0;s<systems.length;s++){
    var sys=systems[s],lvl=U.skills[sys],pct=lvl*10;
    h+='<div class="flex items-center gap-8 mb-8">';
    h+='<span style="font-size:.8rem;width:80px">'+VOCAL_SYSTEMS[sys].name+'</span>';
    h+='<div class="prog" style="flex:1"><div class="prog__fill" style="width:'+pct+'%"></div></div>';
    h+='<span class="text-muted" style="font-size:.75rem;width:20px;text-align:right">'+lvl+'</span>';
    h+='</div>';
  }
  h+='<div class="sec-header mt-16"><span class="sec-title">Songs Completed</span></div>';
  if(U.completed.length===0){
    h+='<p class="text-muted">No songs completed yet. Go to Songs to start.</p>';
  }else{
    for(var i=0;i<U.completed.length;i++){
      var song=null;
      for(var j=0;j<SONG_DB.length;j++)if(SONG_DB[j].id===U.completed[i])song=SONG_DB[j];
      if(song)h+='<div class="card mb-8"><strong>'+song.title+'</strong> — '+song.artist+'</div>';
    }
  }
  h+='<div class="sec-header mt-16"><span class="sec-title">Stage</span></div>';
  h+='<div class="card card--highlight text-center" style="padding:24px">';
  h+='<h2>Stage '+U.stage+': '+STAGES[U.stage-1].name+'</h2>';
  h+='<p class="text-muted">'+STAGES[U.stage-1].desc+'</p>';
  var pct=Math.round((U.stage-1)/10*100);
  h+='<div class="prog mt-12"><div class="prog__fill" style="width:'+pct+'%"></div></div>';
  h+='<p class="text-muted mt-8" style="font-size:.75rem">'+pct+'% complete</p>';
  h+='</div>';
  h+='<button class="btn btn--ghost mt-12" onclick="resetProgress()">Reset Progress</button>';
  c.innerHTML=h;
}

function resetProgress(){
  U={name:'Singer',xp:0,level:1,stage:1,sessions:0,completed:[],skills:{airflow:0,source:0,resonance:0,articulation:0},badges:[]};
  saveState();
  showScreen('home');
}

// ═══ DIAGNOSTIC ═══
function startDiagnosis(){
  var c=document.getElementById('session-content');
  var symptoms=['pitch_instability','strain','breathiness','lack_of_power','break_in_registers','fatigue','nasality','loss_of_control'];
  var labels={
    pitch_instability:'My pitch wavers or drifts',
    strain:'My voice feels tight or painful',
    breathiness:'Air escapes, tone lacks focus',
    lack_of_power:'My voice lacks volume',
    break_in_registers:'My voice cracks or flips',
    fatigue:'My voice tires quickly',
    nasality:'My tone sounds pinched or nasal',
    loss_of_control:'I cannot control pitch or volume'
  };
  var h='';
  h+='<h2>Voice Check</h2>';
  h+='<p class="text-muted mb-16">Select all that apply to your singing right now.</p>';
  for(var i=0;i<symptoms.length;i++){
    var s=symptoms[i];
    h+='<div class="list-item mb-8" id="sym-'+s+'" onclick="toggleSym(\''+s+'\')" style="border-color:var(--border)">';
    h+='<div style="width:24px;height:24px;border:2px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center" id="chk-'+s+'"></div>';
    h+='<span style="font-size:.88rem">'+labels[s]+'</span>';
    h+='</div>';
  }
  h+='<button class="btn btn--primary mt-12" onclick="submitDiagnosis()">Get My Exercise →</button>';
  h+='<button class="btn btn--ghost" onclick="showScreen(\'home\')">Cancel</button>';
  c.innerHTML=h;
  showScreen('session');
}

var selectedSymptoms=[];
function toggleSym(s){
  var idx=selectedSymptoms.indexOf(s);
  var chk=document.getElementById('chk-'+s);
  var card=document.getElementById('sym-'+s);
  if(idx===-1){
    selectedSymptoms.push(s);
    chk.innerHTML='✓';
    chk.style.background='var(--primary)';
    chk.style.borderColor='var(--primary)';
    card.style.borderColor='var(--primary)';
  }else{
    selectedSymptoms.splice(idx,1);
    chk.innerHTML='';
    chk.style.background='transparent';
    chk.style.borderColor='var(--border)';
    card.style.borderColor='var(--border)';
  }
}

function submitDiagnosis(){
  if(selectedSymptoms.length===0){alert('Select at least one symptom.');return;}
  var sysScores={airflow:0,source:0,resonance:0,articulation:0};
  var map={
    pitch_instability:['source','airflow'],strain:['source'],breathiness:['source','airflow'],
    lack_of_power:['airflow'],break_in_registers:['source'],fatigue:['airflow','source'],
    nasality:['resonance'],loss_of_control:['airflow','source']
  };
  for(var i=0;i<selectedSymptoms.length;i++){
    var systems=map[selectedSymptoms[i]];
    if(systems)for(var j=0;j<systems.length;j++)sysScores[systems[j]]++;
  }
  var primary='source',max=0;
  for(var k in sysScores)if(sysScores[k]>max){max=sysScores[k];primary=k;}
  var c=document.getElementById('session-content');
  var h='';
  h+='<h2>Your Result</h2>';
  h+='<div class="hook mb-12"><div class="hook__label">Primary Focus</div>';
  h+='<div class="hook__text">'+VOCAL_SYSTEMS[primary].name+'</div></div>';
  h+='<div class="card mb-12"><h3>What This Means</h3>';
  h+='<p>'+VOCAL_SYSTEMS[primary].desc+'. This is the area that needs the most attention right now.</p></div>';
  h+='<div class="card card--highlight mb-12"><h3>Prescribed Exercise</h3>';
  h+='<p id="exercise-text">Loading...</p></div>';
  h+='<button class="btn btn--primary" onclick="finishDrill(\''+primary+'\')">I Did The Exercise ✓</button>';
  h+='<button class="btn btn--ghost" onclick="showScreen(\'home\')">Back to Home</button>';
  c.innerHTML=h;
  showScreen('session');
  var exercises={
    airflow:'Blow air through loose lips (lip trills) for 5 seconds. Repeat 5 times. Focus on steady, even airflow.',
    source:'Hum on "ng" for 5 seconds. Feel the buzz in your nose. Repeat 5 times. Focus on clean, balanced tone.',
    resonance:'Hum on "m" and feel the buzz in your lips. Open to "ah" keeping the forward placement. Repeat 5 times.',
    articulation:'Speak "ma-me-mi-mo-mu" slowly and clearly. Feel each consonant. Repeat 5 times. Then sing it on one pitch.'
  };
  document.getElementById('exercise-text').textContent=exercises[primary];
  selectedSymptoms=[];
}

// ═══ INIT ═══
showScreen('home');
</script>
</body>
</html>
