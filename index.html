<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>Singer OS — Vocal Training System</title>
<style>
:root{
  --bg:#080808;--surf:#111;--card:#181818;--bd:#282828;
  --pri:#6366f1;--sec:#8b5cf6;--ok:#22c55e;--warn:#f59e0b;--err:#ef4444;--gold:#eab308;
  --tx:#f0f0f0;--tx2:#a0a0a0;--tx3:#6a6a6a;
  --r:12px;--rl:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);line-height:1.6;overflow-x:hidden;min-height:100vh;padding-bottom:80px;font-size:15px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit;outline:none}
a{color:inherit;text-decoration:none}
input,textarea,select{font-family:inherit;font-size:15px;border:none;outline:none;background:none;color:var(--tx)}
screen{display:none;min-height:calc(100vh - 80px)}screen.active{display:block}
.sp{padding:20px 16px 40px}
.tb{position:sticky;top:0;z-index:100;background:rgba(8,8,8,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.tb-t{font-size:1rem;font-weight:700;letter-spacing:-.02em}
.tb-s{font-size:.65rem;color:var(--tx3);margin-top:1px}
.tb-r{font-size:.8rem;font-weight:600;color:var(--gold)}
.bn{position:fixed;bottom:0;left:0;right:0;z-index:1000;background:rgba(17,17,17,.97);backdrop-filter:blur(20px);border-top:1px solid var(--bd);height:68px;padding-bottom:env(safe-area-inset-bottom,0)}
.bn-in{display:flex;align-items:center;justify-content:space-around;height:100%;max-width:500px;margin:0 auto}
.bn-i{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;color:var(--tx3);border-radius:var(--r);min-width:52px;font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.bn-i.on{color:var(--pri)}
.bn-i:active{background:rgba(99,102,241,.07)}
.bn-ic{font-size:1.2rem;line-height:1}
.c{background:var(--card);border:1px solid var(--bd);border-radius:var(--rl);padding:18px;margin-bottom:10px}
.c:active{border-color:#3a3a3a}
.c-a{border-color:rgba(99,102,241,.3);background:linear-gradient(135deg,rgba(99,102,241,.05),transparent)}
.c-g{border-color:rgba(234,179,8,.3)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:var(--r);font-weight:600;font-size:.9rem;min-height:48px;width:100%;border:2px solid transparent;transition:transform .1s;margin-bottom:8px}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--pri);color:#fff;border-color:var(--pri)}
.btn-g{background:transparent;color:var(--tx2);border-color:var(--bd)}
.btn-g:active{border-color:#3a3a3a;color:var(--tx)}
.btn-s{background:var(--ok);color:#000;border-color:var(--ok)}
.btn-sm{padding:8px 14px;font-size:.75rem;min-height:36px;width:auto}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.tag-p{background:rgba(99,102,241,.12);color:var(--pri)}
.tag-s{background:rgba(34,197,94,.12);color:var(--ok)}
.tag-g{background:rgba(234,179,8,.12);color:var(--gold)}
.tag-w{background:rgba(245,158,11,.12);color:var(--warn)}
.pr{height:5px;background:var(--bd);border-radius:3px;overflow:hidden}
.pr-f{height:100%;background:var(--pri);border-radius:3px;transition:width .5s}
.pr-s .pr-f{background:var(--ok)}.pr-g .pr-f{background:var(--gold)}
.li{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:6px;cursor:pointer}
.li:active{border-color:#3a3a3a}
.li-ic{width:40px;height:40px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;background:rgba(99,102,241,.08)}
.li-b{flex:1;min-width:0}
.li-t{font-weight:600;font-size:.88rem;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:.7rem;color:var(--tx3)}
.sec{margin-bottom:24px}.sec:last-child{margin-bottom:0}
.sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-t{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3)}
.hero{padding:20px 0 16px}
.hero h1{font-size:1.5rem;font-weight:800;letter-spacing:-.03em;line-height:1.15;margin-bottom:4px}
.hero p{color:var(--tx2);font-size:.85rem}
.qo{display:flex;align-items:center;gap:10px;padding:14px;background:var(--card);border:2px solid var(--bd);border-radius:var(--r);margin-bottom:6px;cursor:pointer}
.qo:active{border-color:#3a3a3a}
.qo.sel{border-color:var(--pri);background:rgba(99,102,241,.05)}
.qo.ok{border-color:var(--ok);background:rgba(34,197,94,.05)}
.qo.bad{border-color:var(--err);background:rgba(239,68,68,.05)}
.qr{width:18px;height:18px;border-radius:50%;border:2px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.qo.sel .qr{border-color:var(--pri);background:var(--pri)}
.qo.sel .qr::after{content:'';width:7px;height:7px;background:#fff;border-radius:50%}
.es{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--bd)}.es:last-child{border-bottom:0}
.esn{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;background:rgba(99,102,241,.1);color:var(--pri);flex-shrink:0;margin-top:2px}
.est{flex:1}.est h4{font-size:.85rem;font-weight:600;margin-bottom:3px}.est p{font-size:.78rem;color:var(--tx3)}
.ft{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-130%);background:var(--surf);border:1px solid var(--bd);border-left:3px solid var(--pri);border-radius:var(--r);padding:12px 18px;z-index:9999;font-size:.8rem;font-weight:500;max-width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.7);transition:transform .3s}
.ft.show{transform:translateX(-50%) translateY(0)}
.ft-s{border-left-color:var(--ok)}.ft-g{border-left-color:var(--gold)}
.bdg{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.15);border-radius:var(--r);margin-bottom:6px;font-size:.75rem}
@keyframes fin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}screen.active{animation:fin .2s ease both}
</style>
</head>
<body>

<screen class="active" id="s-home">
<div class="tb"><div><div class="tb-t">Singer OS</div><div class="tb-s">Adaptive Vocal Training</div></div><div class="tb-r" id="h-xp">0 XP</div></div>

<nav class="bn"><div class="bn-in">
  <a class="bn-i on" id="n-home" href="#" onclick="go('home');return false;"><span class="bn-ic">🏠</span>Home</a>
  <a class="bn-i" id="n-learn" href="#" onclick="go('learn');return false;"><span class="bn-ic">📖</span>Learn</a>
  <a class="bn-i" id="n-practice" href="#" onclick="go('practice');return false;"><span class="bn-ic">🎯</span>Practice</a>

<script>
// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
var U={
  name:'Singer',email:'',xp:0,level:1,stage:1,sessions:0,
  skills:{airflow:0,source:0,resonance:0,articulation:0,ear:0,mix:0,performance:0},
  completed:[],completedSongs:[],badges:[],
  vocalLoad:0,maxLoad:100,lastPractice:null,
  weaknessHistory:[],diagnosticResults:[],
  preferences:{practiceReminder:false,weeklyReport:false}
};
try{var _d=localStorage.getItem('singerOS');if(_d){var p=JSON.parse(d);if(p&&p.skills)for(var k in p)U[k]=p[k];}}catch(e){}
function save(){try{localStorage.setItem('singerOS',JSON.stringify(U))}catch(e){}}

// ═══════════════════════════════════════════════════
// COACH TOBY PERSONALITY SYSTEM
// Every message, nudge, and interaction carries Toby's voice
// Warm. Direct. No fluff. Believes in you before you do.
// ═══════════════════════════════════════════════════
var TOBY={
  // Toby's voice characteristics:
  // - Second person ("you") — direct, personal
  // - Short sentences. Punchy. No corporate speak.
  // - Uses "we" for partnership, "you" for accountability
  // — Celebrates effort, not just results
  // — Calls out BS gently but firmly
  // — References specific things the user did (personalization)
  // — Occasionally uses humor to deflate tension

  greetings:[
    "Hey {name}. Let us get to work.",
    "Good to see you, {name}. What are we fixing today?",
    "{name}. I have been thinking about your voice. Let us talk.",
    "Welcome back, {name}. I know you did not practice yesterday. That is fine. Today is what matters.",
    "{name}. Your voice is waiting. It does not judge. It just responds."
  ],

  encouragement:[
    "That is the sound I have been waiting to hear from you.",
    "You just did something most singers cannot do. You know that, right?",
    "I am not going to lie — that was good. Really good.",
    "You are closer than you think. Much closer.",
    "That struggle you just went through? That is the sound of growth.",
    "I have seen hundreds of singers. You have something most of them do not. You show up.",
    "Stop overthinking. Your voice already knows what to do. Trust it.",
    "That was not perfect. But it was REAL. And real is what moves people."
  ],

  corrections:[
    "Okay, stop. I hear what is happening. {issue}. Here is the fix: {fix}",
    "I know this feels weird. That is because your muscles are learning something new. Give it 3 days.",
    "You are working too hard on this. The fix is actually easier than what you are doing. {fix}",
    "I am going to say this with love: you are overthinking this. {fix}",
    "This is the part where most singers quit. Do not be most singers. {fix}",
    "Your ear is ahead of your voice right now. That is a good problem. It means you can hear what you want. Now we just train the muscles to catch up."
  ],

  plateauMessages:[
    "{name}, I have been watching your progress. You have been stuck on {skill} for a while now. This is exactly where a coach saves you months. I can see what you cannot. Let us fix this together.",
    "You know what I love about you, {name}? You do not quit. But right now, you are trying to figure out {skill} alone. You do not have to. I am here.",
    "{name}, I am going to be honest with you. {skill} is not going to fix itself with more YouTube videos. You need someone who can hear what you cannot. That is literally what I do.",
    "I see you grinding on {skill}. Respect. But I have helped 200+ singers through this exact wall. Let me show you the shortcut."
  ],

  breakthroughMessages:[
    "{name}. WHAT. That is a breakthrough. I am not exaggerating — that is the moment everything changes. You just proved to yourself that {skill} is possible. Now we build on it.",
    "I just heard your {skill} data. You have no idea how big this is. This is the thing that separates singers from artists. You are crossing that line.",
    "Stop everything. You just did {skill} at a level most singers never reach. I am genuinely proud of you. What is next? We go deeper."
  ],

  dailyNudges:[
    "{name}, 5 minutes. That is all I am asking. One exercise. One phrase. One moment of focus. That is how voices are built — one focused minute at a time.",
    "I know you are busy. Your voice does not care about your schedule. 5 minutes. Go.",
    "{name}, the difference between you and the singer you want to be is about 10 minutes a day. That is it. That is the whole secret.",
    "Your voice is a muscle. Muscles do not grow from thinking about them. 5 minutes. Now.",
    "I am not going to guilt you. But I will say this: your future self will thank you for 5 minutes today."
  ],

  // Generates a personalized message based on user state
  speak:function(type,data){
    var msgs=this[type]||this.greetings;
    var msg=msgs[Math.floor(Math.random()*msgs.length)];
    msg=msg.replace(/{name}/g,U.name||"Singer");
    if(data){
      for(var k in data){msg=msg.replace(new RegExp("{"+k+"}","g"),data[k]);}
    }
    return msg;
  },

  // The "Coach Toby says..." overlay that appears at key moments
  showMoment:function(type,data){
    var msg=this.speak(type,data);
    var c=document.getElementById("v-c");
    var h="";
    h+='<div style="text-align:center;padding:28px 20px;margin-bottom:16px;background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(139,92,246,.04));border:1px solid rgba(99,102,241,.2);border-radius:var(--rl)">';
    h+='<div style="font-size:2.5rem;margin-bottom:12px">🗣️</div>';
    h+='<div style="font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--pri);margin-bottom:8px">Coach Toby says</div>';
    h+='<div style="font-size:1rem;line-height:1.6;color:var(--tx)">'+msg+'</div>';
    h+='</div>';
    return h;
  },

  // WhatsApp handoff — the bridge from app to human
  // This is the MOMENT where they realize Toby is real
  handoff:function(reason,skill){
    var name=U.name||"Singer";
    var messages={
      welcome:"Hey "+name+"! This is Coach Toby. I have been watching your progress in Singer OS and I am impressed. You are serious about this. What is your biggest vocal challenge right now? Reply and I will send you a personalized exercise.",

      plateau:name+", I have been tracking your "+skill+" progress in Singer OS. You have been working hard but you have hit a wall. This is exactly where most singers waste months trying to figure it out alone. I can fix this in one session. Book a 1-on-1 with me: https://wa.me/"+WHATSAPP.number+"?text=Hi%20Toby%2C%20I%20need%20help%20with%20"+encodeURIComponent(skill),

      breakthrough:name+", you just had a "+skill+" breakthrough in Singer OS! That is a big deal. I want to help you build on this momentum before it fades. Book a session: https://wa.me/"+WHATSAPP.number+"?text=Hi%20Toby%2C%20I%20just%20had%20a%20breakthrough%20with%20"+encodeURIComponent(skill)+"%20and%20want%20to%20go%20deeper",

      stuck:name+", I can see you have been struggling with "+skill+" in Singer OS. I am not going to let you waste months on this. I have helped hundreds of singers through this exact issue. Let me help you. Book here: https://wa.me/"+WHATSAPP.number+"?text=Hi%20Toby%2C%20I%20am%20stuck%20on%20"+encodeURIComponent(skill)+"%20and%20need%20your%20help",

      fatigue:name+", your vocal load data in Singer OS shows you have been pushing hard. I am proud of the work ethic. But I need you to rest. Your voice needs recovery, not more training. When you are ready, book a session and I will show you how to train smarter: https://wa.me/"+WHATSAPP.number+"?text=Hi%20Toby%2C%20I%20need%20help%20with%20vocal%20recovery%20and%20training%20smarter",

      completion:name+", you just completed the "+skill+" module in Singer OS! That is real growth. Most people do not finish what they started. You did. Ready for the next level? Book a session: https://wa.me/"+WHATSAPP.number+"?text=Hi%20Toby%2C%20I%20completed%20"+encodeURIComponent(skill)+"%20and%20I%20am%20ready%20for%20what%20is%20next"
    };
    return messages[reason]||messages.welcome;
  }
};



// ═══════════════════════════════════════════════════
// CURRICULUM — All 11 Systems
// ═══════════════════════════════════════════════════
var CURRICULUM={

// ── 1. VOCAL MECHANICS ──
mechanics:{
  name:"Vocal Mechanics",icon:"⚙️",color:"pri",
  lessons:[
    {
      id:"vm1",title:"How Your Voice Works",type:"lesson",
      content:"<p>Your voice has four physical systems:</p><p><strong>Airflow</strong> — the breath engine. Not your diaphragm directly (you cannot control that), but the muscles around your lungs: abs, intercostals, lower back.</p><p><strong>Source</strong> — your vocal folds. Two small muscles that vibrate. Faster vibration = higher pitch. Clean closure = clear sound. Leaky closure = breathy.</p><p><strong>Resonance</strong> — your vocal tract shapes the raw sound. Throat, mouth, nasal passages. Forward placement = clear and projecting. Throat-dwelling = dark but swallowed.</p><p><strong>Articulation</strong> — tongue, lips, jaw shape words. Most singers have jaw tension. The fix: let lips and tongue work, jaw stays relaxed.</p><p><strong>The NYVC principle:</strong> These systems work independently AND together. Great singers train each one separately, then coordinate them under pressure.</p>",
      quiz:[
        {q:"Which system is the vocal folds?",options:["Airflow","Source","Resonance","Articulation"],answer:1},
        {q:"You can directly control your diaphragm.",options:["True — it is a muscle you flex","False — it is involuntary, you control the muscles around it","True — all muscles are voluntary","False — only your brain controls it"],answer:1},
        {q:"Forward resonance feels like buzz in your:",options:["Throat","Chest","Lips and cheekbones","Back of neck"],answer:2}
      ]
    },
    {
      id:"vm2",title:"Breath: Appoggio Method",type:"lesson",
      content:"<p>The myth: 'Sing from your diaphragm.' The reality: you cannot directly control your diaphragm. It is an involuntary muscle.</p><p><strong>What you CAN control:</strong> the muscular cage around your lungs — abdominal wall, intercostal muscles (between ribs), lower back muscles.</p><p><strong>Appoggio</strong> (Italian for 'lean') is the NYVC gold standard. It means: expand your lower ribs on the inhale, then MAINTAIN that expansion while you sing. Do not let your chest collapse. Do not squeeze.</p><p>Think of it like holding a balloon open while air slowly leaks out. The balloon stays expanded — you are not squeezing it.</p><p><strong>Why this matters:</strong> When ribs stay open, air escapes slowly and evenly. Your vocal folds get steady pressure. Tone becomes supported and free.</p>",
      exercise:{name:"Appoggio Expansion Drill",
        steps:["Stand tall, hands on lower ribcage (sides of torso)","Breathe in through nose for 4 counts — feel ribs push hands outward","Pause — feel the expansion. Shoulders stay down.","Now hiss 'sss' while keeping ribs open as long as possible","Goal: 20 seconds of hiss with ribs still expanded at the end","The moment your ribs collapse, the air rushes out — that is what we are training against",
        "Repeat 5 times. Each time, beat your previous duration"],
        monitor:"Ribs expanded? Air flowing evenly? No chest heaving?",
        skill:"airflow",xp:15}
    },
    {
      id:"vm3",title:"Vocal Fold Closure: The Source",type:"lesson",
      content:"<p>Your vocal folds are two small muscles inside your larynx. Air passes through, they vibrate, sound is made.</p><p><strong>Three states of closure:</strong></p><p>💨 <strong>Breathy</strong> — folds not closing fully. Air wastes. Tone is weak, airy, lacks core. Most common in beginners.</p><p>🔒 <strong>Strained/Pressed</strong> — folds squeezing too hard. Sounds tight, pushed, effortful. Leads to fatigue and potential damage.</p><p>✅ <strong>Balanced</strong> — clean closure, no excess air, no excess squeeze. Tone is clear, free, sustainable. This is the target.</p><p><strong>The onset</strong> (how you start a note) reveals your closure quality:</p><p>Breathy onset = 'haaa' (air before tone)</p><p>Glottal onset = 'uh-oh' (hard closure before tone)</p><p>Balanced onset = clean 'ah' (tone and air start together)</p>",
      exercise:{name:"Balanced Onset Finder",
        steps:["Say 'ah' — notice if there is a breathy 'h' at the start",
        "Now say 'ah' with a slight glottal stop — like 'uh-oh' in the middle — too hard",
        "Now find the middle: clean 'ah' with no extra breath and no squeeze",
        "Hum on 'm' for 5 seconds — that easy buzz IS balanced closure",
        "Practice: hum 5 sec, open to 'ah' keeping the same easy feeling",
        "Record yourself — can you hear the difference between breathy and balanced?"],
        monitor:"Is your onset clean? No breathiness, no glottal attack?",
        skill:"source",xp:15}
    },
    {
      id:"vm4",title:"Resonance & Placement",type:"lesson",
      content:"<p>Your vocal folds make a tiny buzz. Your <strong>resonators</strong> (throat, mouth, nasal passages) amplify and shape it into your unique voice.</p><p><strong>Forward placement</strong> (buzz in lips, cheekbones, 'mask' of face) = clear, bright, projecting tone. This is what carries over a band, fills a room, cuts through a mix.</p><p><strong>Throat resonance</strong> (buzz in throat) = darker, warmer tone but can sound swallowed or stuck. Common in self-taught singers.</p><p><strong>NYVC key insight:</strong> Resonance is about WHERE the vibration is felt, not how loud you sing. A softly sung note with forward placement will carry better than a loud note stuck in the throat.</p>",
      exercise:{name:"Forward Placement Trainer",
        steps:["Hum on 'm' — feel the buzz in your lips and nose",
        "Keep that buzzing feeling, open to 'mah' — the buzz should stay forward, not drop to your throat",
        "Slide up and down on 'mee' — keep lip/cheekbone buzz throughout",
        "If you feel the buzz drop to your throat, stop and start over",
        "Now sing a short phrase from a known song — can you keep that forward feeling?",
        "Advanced: try the phrase very softly while keeping forward placement"],
        monitor:"Where is the buzz? Forward in face = good. Dropped to throat = restart.",
        skill:"resonance",xp:15}
    },
    {
      id:"vm5",title:"Articulation Without Tension",type:"lesson",
      content:"<p>Singing is sustained speech. If your words are unclear, the emotion does not land — no matter how beautiful your tone.</p><p><br><strong>The jaw problem:</strong> Most singers open their mouth too wide and lock the jaw. This creates tension, distorts vowels, and limits range.</p><p><br><strong>The fix:</strong> Let your lips and tongue do the work. Your jaw stays relaxed and only opens as much as needed. Think of speaking clearly, then sustain the words.</p><p><br><strong>Key consonants:</strong> 'm', 'n', 'ng' (nasal — lips/tongue). 't', 'd', 'l' (tongue tip). 'k', 'g' (back of tongue). 'p', 'b', 'f', 'v' (lips).</p>",
      exercise:{name:"Consonant Clarity Builder",
        steps:["Speak slowly: 'ma-me-mi-mo-mu' — feel every consonant",
        "Now say it twice as fast — keep every single consonant crisp",

    {

      content:"<p><strong>The myth:</strong> You have chest voice, head voice, and a 'break' between them. You switch from one to the other.</p><p><p><strong>NYVC reality:</strong> Your voice is a <strong>continuous gradient</strong>. Chest and head are not separate registers — they are two ends of a spectrum. The 'break' is not a wall — it is a coordination your muscles have not learned to maintain through that range.</p><p><a><strong>What is mix?</strong> It is the balance between two sets of muscles: TA (thickens folds — chest) and CT (stretches folds — head). In mix, both are engaged. You can slide this balance smoothly across your entire range.</p>",

ear:{

      content:"<p>Ear training is not about having a 'gift.' It is a trainable skill. Every great singer practiced matching pitch deliberately.</p><p><strong>How to practice:</strong></p><p>1. Play or imagine a note</p><p>2. Hear it in your mind first (do not guess)</p><p>3. Sing it — match the exact pitch</p><p>4. Listen to yourself — are you above, below, or on it?</p><p>5. Adjust — do not sing louder to compensate, adjust pitch directly</p><p><strong>The key:</strong> listen BEFORE you sing. Most beginners sing then listen. Reverse that order.</p>",
      exercise:{name:"Pitch Match Drill",
        steps:["Think of a note you can sing comfortably",
        "Sing it. Hold it steady for 4 seconds",
        "Without changing your voice, imagine that same note going slightly higher",
        "Now sing that slightly higher note — how close were you?",
        "Keep the original note in your mind — go back to it",
        "Practice going between two neighboring notes — low to high and back",

    {
      id:"et2",title:"Interval Recognition",type:"lesson",
      content:"<p>An <strong>interval</strong> is the distance between two notes. Your voice needs to learn these distances as muscle memory — how much to 'jump' from one note to another.</p><p><strong>Start here:</strong></p><p><p>• 2 half steps (minor 2nd) — very close, tense sound</p><p>• 2 whole steps (major 2nd) — do-re</p><p>• 3 half steps (minor 3rd) — sad/happy turning point</p><p>• 4 half steps (major 3rd) — bright, open</p><p>• 5 half steps (perfect 4th) — stable, strong</p><p>• 7 half steps (perfect 5th) — hollow, powerful</p><strong>Practice tip:</strong> Associate intervals with songs you know. 'Twinkle Twinkle' starts with a perfect 5th. 'Happy Birthday' starts with a major 2nd.</p>",

psychology:{

      id:"ps1",title:"Fear of the High Note",type:"lesson",
      content:"<p>Almost every singer has a note they are afraid of. The closer they get, the more tension they create — and the tension guarantees they will crack or strain.</p><p><strong>What is happening physically:</strong> Your brain senses 'danger' (the high note) and triggers a stress response. Larynx rises. Jaw tightens. Breath holding. All of these make the note HARDER to sing.</p><p><strong>The NYVC fix:</strong> You must retrain your nervous system to associate high notes with <strong>ease</strong>, not danger.</p><p>Practice the note BELOW your fear threshold until it feels boring. Then go one half step higher. Boring again. One more.</p><p><strong>The mantra:</strong> 'High notes are not harder — they are different. Less air, more forward, same ease.'</p>",
      exercise:{name:"Fear Threshold Training",
        steps:["Find the highest note you can sing easily with no tension",
        "Sing it 5 times. Feel how easy it is.",
        "Go one half step higher. Sing it softly. If tension appears, stop.",
        "Go back down to the easy note. Then try the higher one again.",
        "The goal is NOT to belt it. The goal is to sing it with ZERO fear response.",
        "Over days, your threshold will rise — not because you pushed through fear, but because you removed it"],
        skill:"mix",xp:20}
    }
  ]
},

// ADAPTIVE ENGINE — Diagnosis → Prescription
// ═══════════════════════════════════════════════════
var ADAPTIVE={
  diagnose:function(){
    // Find weakest skill
    var weakest=null,lowest=99;
    for(var k in U.skills){if(U.skills[k]<lowest){lowest=U.skills[k];weakest=k;}}
    if(!weakest)weakest="source";
    // Find the lesson that trains this skill
    var allLessons=ADAPTIVE.getAllLessons();
    var prescribed=null;
    for(var i=0;i<allLessons.length;i++){
      if(allLessons[i].exercise&&allLessons[i].exercise.skill===weakest){
        if(U.completed.indexOf(allLessons[i].id)===-1){prescribed=allLessons[i];break;}
      }
    }
    // If all skill lessons done, find any incomplete
    if(!prescribed){for(var i=0;i<allLessons.length;i++){if(U.completed.indexOf(allLessons[i].id)===-1){prescribed=allLessons[i];break;}}
    }
    // Find matching song
    var song=null;
    for(var i=0;i<SONGS.length;i++){
      if(SONGS[i].stage<=U.stage&&U.completedSongs.indexOf(SONGS[i].id)===-1){song=SONGS[i];break;}
      if(song===null&&SONGS[i].stage<=U.stage)song=SONGS[i];
    }
    return {weakest:weakest,skillName:ADAPTIVE.skillName(weakest),lesson:prescribed,song:song};
  },
  getAllLessons:function(){
    var out=[];
    var sys=CURRICULUM;
    var keys=["mechanics","ear","theory","songsSystem","performance","genre","psychology","production","career","identity","osLayer","vocalLoad"];
    for(var k=0;k<keys.length;k++){
      if(sys[keys[k]]&&sys[keys[k]].lessons){out=out.concat(sys[keys[k]].lessons);}    }
    return out;
  },
  skillName:function(k){
    var n={airflow:"Airflow",source:"Source",resonance:"Resonance",articulation:"Articulation",ear:"Ear Training",mix:"Mix Voice",performance:"Performance"};
    return n[k]||k;
  },
  skillDesc:function(k){
    var d={airflow:"The foundation. Controlled airflow gives you phrase length, power, and stability.",
      source:"Vocal fold closure. Clean onset, clear tone, no breathiness.",
      resonance:"Tone shaping. Forward placement gives you projection and clarity.",
      articulation:"Clear diction. Every word lands. No jaw tension.",
      ear:"Pitch accuracy and musical awareness. You cannot sing what you cannot hear.",
      mix:"The bridge between chest and head. Smooth transitions across your full range.",
      performance:"Stage presence. Emotional delivery. Owning the room."};
    return d[k]||"";
  },
  trackVocalLoad:function(minutes){
    U.vocalLoad+=minutes;
    U.lastPractice=new Date().toISOString();
    if(U.vocalLoad>=U.maxLoad*0.8)ADAPTIVE.warnLoad();
  },
  warnLoad:function(){
    toast("Vocal load high ("+Math.round(U.vocalLoad/U.maxLoad*100)+"%). Consider resting before next practice.","warn");
  },
  resetLoad:function(){U.vocalLoad=0;save();},
  shouldSuggestBreak:function(){return U.vocalLoad>=U.maxLoad*0.6;}
};

function go(id){

}

}

var curLesson=null,quizAns=[];

function openLesson(id){
  var lesson=null;
  var allSys=["mechanics","ear","theory","songsSystem","performance","genre","psychology","production","career","identity","osLayer","vocalLoad"];
  for(var s=0;s<allSys.length;s++){
    var sys=CURRICULUM[allSys[s]];
    if(sys&&sys.lessons){for(var l=0;l<sys.lessons.length;l++){if(sys.lessons[l].id===id){lesson=sys.lessons[l];break;}}}
    if(lesson)break;
  }
  if(!lesson)return;
  curLesson=lesson;
  var c=document.getElementById("v-c");
  var h='';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">';
  h+='<button class="btn btn-g btn-sm" onclick="go(\'learn\')">← Back</button>';
  h+='<span class="tag tag-p">'+lesson.type+'</span></div>';
  h+='<h1 style="font-size:1.3rem;margin-bottom:16px">'+lesson.title+'</h1>';
  h+='<div style="background:var(--card);border:1px solid var(--bd);border-radius:var(--rl);padding:18px;margin-bottom:16px;font-size:.9rem;line-height:1.7">';
  h+=lesson.content+'</div>';
  if(lesson.quiz&&lesson.quiz.length>0){h+='<button class="btn btn-p" onclick="startQuiz()">Take Quiz →</button>';}
  else if(lesson.exercise){h+='<button class="btn btn-p" onclick="startExerciseView()">Start Exercise →</button>';}
  else{h+='<button class="btn btn-s" onclick="finishLesson()">Mark Complete ✓</button>';}
  showSession();
  if(typeof renderSession==="function")renderSession();
}

function renderSession(){
  var c=document.getElementById("v-c");
  c.scrollTop=0;
}

function startQuiz(){
  if(!curLesson||!curLesson.quiz)return;
  quizAns=[];
  var c=document.getElementById("v-c");
  var h='';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">';
  h+='<button class="btn btn-g btn-sm" onclick="openLesson(\''+curLesson.id+'\')">← Back</button>';
  h+='<span class="tag tag-g">Quiz</span></div>';
  h+='<h2 style="margin-bottom:16px">Check Your Understanding</h2>';
  for(var q=0;q<curLesson.quiz.length;q++){
    var qq=curLesson.quiz[q];
    h+='<div style="margin-bottom:16px" id="qb-'+q+'">';
    h+='<p style="font-weight:600;margin-bottom:8px">'+(q+1)+'. '+qq.q+'</p>';
    for(var o=0;o<qq.options.length;o++){
      h+='<div class="qo" id="q-'+q+'-'+o+'" onclick="pickAns('+q+','+o+','+qq.answer+')">';
      h+='<div class="qr"></div><span style="font-size:.85rem">'+qq.options[o]+'</span></div>';
    }
    h+='</div>';
  }
  h+='<button class="btn btn-p" id="q-sub" style="opacity:.5;pointer-events:none" onclick="submitQuiz()">Submit</button>';
  c.innerHTML=h;
}

function pickAns(q,o,cor){
  var block=document.getElementById("qb-"+q);
  var opts=block.querySelectorAll(".qo");
  for(var i=0;i<opts.length;i++)opts[i].classList.remove("sel");
  document.getElementById("q-"+q+"-"+o).classList.add("sel");
  quizAns[q]={sel:o,cor:cor};
  var all=true;
  for(var i=0;i<curLesson.quiz.length;i++){if(!quizAns[i]){all=false;break;}}
  var btn=document.getElementById("q-sub");
  if(all){btn.style.opacity="1";btn.style.pointerEvents="auto";}
}

function submitQuiz(){
  var cor=0,tot=curLesson.quiz.length;
  for(var q=0;q<tot;q++){
    var block=document.getElementById("qb-"+q);
    var opts=block.querySelectorAll(".qo");
    for(var o=0;o<opts.length;o++){
      opts[o].style.pointerEvents="none";
      if(o===quizAns[q].cor)opts[o].classList.add("ok");
      if(o===quizAns[q].sel&&o!==quizAns[q].cor)opts[o].classList.add("bad");
    }
    if(quizAns[q].sel===quizAns[q].cor)cor++;
  }
  var passed=cor>=Math.ceil(tot*0.5);
  var xp=passed?20:5;
  U.xp+=xp;U.sessions++;save();
  var c=document.getElementById("v-c");
  var h='';
  h+='<div class="c '+(passed?"c-g":"c-a")+'" style="text-align:center;padding:28px;margin-bottom:16px">';
  h+='<div style="font-size:2.5rem;margin-bottom:8px">'+(passed?"🎉":"📚")+'</div>';
  h+='<h2>'+(passed?"Passed":"Keep Learning")+'</h2>';
  h+='<p style="color:var(--tx3)">'+cor+'/'+tot+' correct. +'+xp+' XP</p></div>';
  if(passed){h+='<button class="btn btn-s" onclick="finishLesson()">Continue →</button>';}
  else{h+='<button class="btn btn-p" onclick="startQuiz()">Try Again</button>';
  h+='<button class="btn btn-g" onclick="openLesson(\''+curLesson.id+'\')">Review</button>';}
  c.innerHTML=h;
}

function startExerciseView(){
  if(!curLesson||!curLesson.exercise)return;
  var ex=curLesson.exercise;
  var c=document.getElementById("v-c");
  var h='';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">';
  h+='<button class="btn btn-g btn-sm" onclick="openLesson(\''+curLesson.id+'\')">← Back</button>';
  h+='<span class="tag tag-g">Exercise • +'+ex.xp+' XP</span></div>';
  h+='<h1 style="font-size:1.2rem;margin-bottom:6px">'+ex.name+'</h1>';
  h+='<p style="color:var(--tx3);margin-bottom:20px">Follow each step. Take your time.</p>';
  for(var s=0;s<ex.steps.length;s++){
    h+='<div class="es"><div class="esn">'+(s+1)+'</div>';
    h+='<div class="est"><h4>Step '+(s+1)+'</h4><p>'+ex.steps[s]+'</p></div></div>';

  if(ex.monitor){

  h+='<button class="btn btn-s" style="margin-top:16px" onclick="finishExercise()">I Completed This ✓</button>';

function finishExercise(){
  var ex=curLesson.exercise;
  U.xp+=ex.xp;
  U.skills[ex.skill]=Math.min(10,U.skills[ex.skill]+1);
  U.sessions++;
  ADAPTIVE.trackVocalLoad(5);
  save();
  toast("Exercise complete! +"+ex.xp+" XP","s");
  finishLesson();
}

function finishLesson(){
  if(U.completed.indexOf(curLesson.id)===-1)U.completed.push(curLesson.id);
  var ax=ADAPTIVE.diagnose();
  if(U.skills[ax.weakest]>=8&&ax.weakest!=="performance"){
    // Toby celebrates breakthroughs
    toast(TOBY.speak("breakthroughMessages",{name:U.name,skill:ax.skillName}),"g");
    // After celebration, offer human coaching
    setTimeout(function(){
      var c=document.getElementById("v-c");
      c.innerHTML+=TOBY.showMoment("breakthroughMessages",{name:U.name,skill:ax.skillName});
      c.innerHTML+='<button class="btn btn-p" style="margin-top:12px" onclick="showTobyHandoff(\x27breakthrough\x27,"+ax.weakest+")">Talk to Toby about what is next →</button>';
    },1500);
  }
  save();
  go("learn");
}

function submitDiag(){

  var scores={airflow:0,source:0,resonance:0,articulation:0};

  for(var i=0;i<diagSel.length;i++){
    var s=map[diagSel[i]];
    if(s)for(var j=0;j<s.length;j++)scores[s[j]]++;

  var primary="source",mx=0;
  for(var k in scores)if(scores[k]>mx){mx=scores[k];primary=k;}
  U.diagnosticResults.push({date:new Date().toISOString(),primary:primary,symptoms:diagSel});

  var exercises={
    airflow:{name:"Appoggio & Air Efficiency",steps:["Hands on lower ribs. Breathe in — ribs push out.","Hiss 'sss' while holding ribs open. Goal: 20 sec.","Sing a phrase — ribs stay open throughout.","Practice: 5 phrases, all with maintained expansion.","Self-check: did your chest collapse on any phrase? Redo those."],skill:"airflow",xp:20},

// 1. FATIGUE + LOAD TRACKING SYSTEM
// ═══════════════════════════════════════════════════
var FATIGUE={
  levels:[
    {min:0,max:25,label:"Fresh",color:"ok",advice:"You are good to go. Full practice session available."},
    {min:25,max:50,label:"Warming Up",color:"ok",advice:"Good to practice. Stay mindful of tension."},
    {min:50,max:75,label:"Working",color:"warn",advice:"You have been at it. Consider wrapping up in 10 minutes."},
    {min:75,max:90,label:"Fatigued",color:"warn",advice:"Vocal load is high. Do a gentle cooldown, then rest."},
    {min:90,max:100,label:"Overload",color:"err",advice:"STOP. Rest your voice. No more singing today."}
  ],
  getLevel:function(){
    var load=U.vocalLoad||0;
    var max=U.maxLoad||100;
    var pct=Math.min(100,Math.round(load/max*100));
    for(var i=0;i<this.levels.length;i++){
      if(pct>=this.levels[i].min&&pct<this.levels[i].max)return this.levels[i];
    }
    return this.levels[this.levels.length-1];
  },
  addLoad:function(minutes){
    var intensity=1;
    if(minutes>10)intensity=1.5;
    if(minutes>20)intensity=2;
    U.vocalLoad=Math.min(U.maxLoad,U.vocalLoad+minutes*intensity);
    U.lastPractice=new Date().toISOString();
    this.check();
  },
  check:function(){
    var lvl=this.getLevel();
    if(lvl.min>=75){
      toast("Vocal load: "+lvl.label+". "+lvl.advice,lvl.color==="ok"?"s":"w");
    }
    if(lvl.min>=90){
      WHATSAPP.handoff("stuck","vocal fatigue — need recovery guidance");
    }
  },
  dailyReset:function(){
    var last=U.lastPractice?new Date(U.lastPractice):null;
    var now=new Date();
    if(!last||now.getDate()!==last.getDate()){
      U.vocalLoad=0;
      save();
    }
  },
  getRecoveryTime:function(){
    var lvl=this.getLevel();
    if(lvl.min<50)return 0;
    if(lvl.min<75)return 2;
    if(lvl.min<90)return 4;
    return 12;
  }
};

// ═══════════════════════════════════════════════════
// 2. REAL-TIME CORRECTION LOGIC ENGINE
// ═══════════════════════════════════════════════════
var CORRECT={
  // Maps detected problems to precise physiological corrections
  rules:[
    {
      id:"breathy_onset",
      detect:function(report){
        return report.symptoms&&report.symptoms.indexOf("breathy")!==-1;
      },
      correct:function(){
        return {
          issue:"Breathy onset — air escaping before tone starts",
          root:"Incomplete vocal fold closure at phonation start",
          fix:[
            "Hum on 'm' for 5 seconds — feel the buzz (this IS clean closure)",
            "Keep that buzz, open to 'ah' — the tone should start instantly, no 'h' sound",
            "Practice: say 'uh-oh' — the clean start of the second syllable is your target onset",
            "Advanced: sing a phrase, but start every note with that 'uh-oh' clean attack",
            "Self-check: record yourself. Can you hear air before the note? If yes, go back to humming."
          ],
          skill:"source",xp:15
        };
      }
    },
    {
      id:"strained_belt",
      detect:function(report){
        return report.symptoms&&report.symptoms.indexOf("strain")!==-1;
      },
      correct:function(){
        return {
          issue:"Strained belt — too much subglottal pressure",
          root:"Vocal folds over-closing under high pressure. CT muscles not engaging to thin folds.",
          fix:[
            "Stop singing the note. Hum on 'ng' — feel the easy buzz",
            "The problem: you are pushing air THROUGH tightly-closed folds. The fix is NOT less air — it is thinner folds.",
            "Sing the note on 'ee' instead of 'ah' — 'ee' naturally thins the folds",
            "If 'ee' works but 'ah' does not: the issue is fold thickness, not breath support",
            "Practice: slide from 'ee' to 'ah' on the same note — find where strain starts, back off",
            "Long-term: this is a mix voice coordination issue. Work the 'Smoothing the Break' exercise daily."
          ],
          skill:"mix",xp:20
        };
      }
    },
    {
      id:"pitch_drift",
      detect:function(report){
        return report.symptoms&&report.symptoms.indexOf("pitch")!==-1;
      },
      correct:function(){
        return {
          issue:"Pitch drifting — cannot hold steady pitch",
          root:"Either: (a) breath pressure inconsistent, or (b) fold tension not stabilized",
          fix:[
            "Diagnosis test: hum a note. If pitch wavers = breath issue. If hum is stable but singing drags = fold issue.",
            "If breath issue: practice sustained 'zzz' — the airflow must be perfectly even",
            "If fold issue: the note is in your 'break zone' — sing it on 'ng' to keep folds connected",
            "Practice: sing a 5-note scale, hold the top note for 8 seconds. Record. Is it steady?",
            "If you drift sharp: you are pushing too much air. Reduce pressure.",
            "If you drift flat: your folds are loosening. Add gentle forward placement (hum first)."
          ],
          skill:"source",xp:15
        };
      }
    },
    {
      id:"register_break",
      detect:function(report){
        return report.symptoms&&report.symptoms.indexOf("crack")!==-1;
      },
      correct:function(){
        return {
          issue:"Voice cracking between registers",
          root:"Sudden shift from TA-dominant (chest) to CT-dominant (head) coordination. The muscles are 'flipping' instead of 'sliding'.",
          fix:[
            "Find your break: slide up slowly from chest voice. Note where it flips.",
            "That note is your transition zone. It is NOT a wall — it is a coordination you have not learned yet.",
            "Sing that exact note on 'ng' — this keeps TA and CT both engaged",
            "Slide up and down through the zone on 'ng' — smooth, no flip",
            "Now try 'mee' through the zone — the 'ee' vowel helps thin the folds gradually",
            "Practice daily: 5 minutes of sliding through your break zone. It will smooth out in 2-4 weeks."
          ],
          skill:"mix",xp:20
        };
      }
    },
    {
      id:"nasality",
      detect:function(report){
        return report.symptoms&&report.symptoms.indexOf("nasal")!==-1;
      },
      correct:function(){
        return {
          issue:"Nasal tone — too much resonance in nasal cavity",
          root:"Soft palate is lowered, allowing air into nasal cavity. Can be structural or habitual.",
          fix:[
            "Test: hum, then pinch your nose. If sound changes dramatically = too much nasal resonance",
            "The fix: raise your soft palate (the back of the roof of your mouth). Imagine a yawn starting.",
            "Practice: sing 'ah' while imagining the inside of your mouth is a tall, open dome",
            "Try singing with a slight smile — this naturally raises the soft palate",
            "If only some notes are nasal: those notes need more forward placement, less throat",
            "Record: compare 'ah' with a yawn-feel vs. normal. Hear the difference?"
          ],
          skill:"resonance",xp:15
        };
      }
    },
    {
      id:"jaw_tension",
      detect:function(report){
        return report.symptoms&&report.symptoms.indexOf("strain")!==-1&&report.area==="articulation";
      },
      correct:function(){
        return {
          issue:"Jaw tension — jaw clenching while singing",
          root:"Jaw is compensating for weak tongue/lip articulation. Also common in singers who open too wide.",
          fix:[
            "Speak the lyrics with your hand gently holding your jaw — feel when it clenches",
            "The rule: your jaw should open no more than two fingers width for most singing",
            "Practice: sing a phrase while keeping your teeth slightly apart — lips and tongue do the work",
            "Massage your jaw muscles (the big ones on the sides of your face) before and after singing",
            "If you cannot sing without jaw tension: the note may be too high for your current mix. Work lower first."
          ],
          skill:"articulation",xp:15
        };
      }
    }
  ],
  analyze:function(report){
    var corrections=[];
    for(var i=0;i<this.rules.length;i++){
      if(this.rules[i].detect(report)){
        corrections.push(this.rules[i].correct());
      }
    }
    if(corrections.length===0){
      corrections.push({
        issue:"No specific issue detected",
        root:"General development needed",
        fix:["Continue with your current practice plan","Focus on the weakest skill area","Record yourself weekly to track progress"],
        skill:"source",xp:10
      });
    }
    return corrections;
  },
  generateReport:function(){
    var dx=ADAPTIVE.diagnose();
    var report={
      weakest:dx.weakest,
      skillName:dx.skillName,
      level:U.skills[dx.weakest],
      symptoms:U.diagnosticResults.length>0?U.diagnosticResults[U.diagnosticResults.length-1].symptoms:[],
      vocalLoad:FATIGUE.getLevel(),
      totalXP:U.xp,
      sessions:U.sessions
    };
    var corrections=CORRECT.analyze(report);
    return {report:report,corrections:corrections};
  }
};

  assess:function(){
    // Compare user current skills to each style profile
    var results=[];
    var styles=STYLE.profiles;
    for(var key in styles){
      var s=styles[key];
      var match=0,total=0;
      for(var sk in s.ratios){
        var userLevel=U.skills[sk]||0;
        var required=s.ratios[sk]*10;
        var diff=Math.abs(userLevel-required);
        match+=Math.max(0,10-diff);
        total+=10;
      }
      results.push({style:key,name:s.name,icon:s.icon,pct:Math.round(match/total*100),desc:s.description});
    }
    results.sort(function(a,b){return b.pct-a.pct;});
    return results;
  },
  getTrainingPlan:function(targetStyle){
    var s=STYLE.profiles[targetStyle];
    if(!s)return null;
    var gaps=[];
    for(var sk in s.ratios){
      var userLevel=U.skills[sk]||0;
      var required=s.ratios[sk]*10;
      if(userLevel<required-1){
        gaps.push({skill:sk,current:userLevel,required:Math.round(required),gap:Math.round(required-userLevel)});
      }
    }
    gaps.sort(function(a,b){return b.gap-a.gap;});
    return {style:s,gaps:gaps,topPriority:gaps.length>0?gaps[0].skill:"balanced"};
  }
};

      fix:"Practice crescendo on one note: 4 seconds soft → 4 seconds loud → 4 seconds soft. The tone should stay the same — only volume changes."},
    {id:"vocal_stamina",label:"Vocal stamina (sustained singing)",
      check:function(){return U.vocalLoad<70;},

  runCheck:function(){
    var results={passed:[],failed:[]};
    for(var i=0;i<this.checkpoints.length;i++){
      var cp=this.checkpoints[i];
      if(cp.check()){results.passed.push(cp.label);}
      else{results.failed.push({label:cp.label,fail:cp.fail,fix:cp.fix});}
    }
    return results;
  },
  getReadinessScore:function(){
    var passed=0;
    for(var i=0;i<this.checkpoints.length;i++){
      if(this.checkpoints[i].check())passed++;
    }
    return Math.round(passed/this.checkpoints.length*100);
  },
  getCoachingMoment:function(){
    // Returns the single most important thing to work on right now
    var results=this.runCheck();
    if(results.failed.length===0)return {type:"success",msg:"All systems green. You are ready for a full practice session."};
    var top=results.failed[0];
    return {type:"correction",msg:top.fail,fix:top.fix};
  }
};
