<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Toby Carousel Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #08080c;
    color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #a78bfa, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    color: #7878a0;
    font-size: 0.85rem;
    margin-bottom: 24px;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .controls button {
    background: #18181f;
    color: #e8e8f0;
    border: 1px solid #1e1e2e;
    padding: 10px 20px;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .controls button:hover {
    background: #a78bfa;
    color: #fff;
    border-color: #a78bfa;
  }

  .controls button.active {
    background: linear-gradient(135deg, #a78bfa, #818cf8);
    color: #fff;
    border-color: transparent;
  }

  .carousel-container {
    display: flex;
    gap: 24px;
    overflow-x: auto;
    padding: 24px 0;
    max-width: 100%;
    scroll-snap-type: x mandatory;
  }

  .slide {
    flex-shrink: 0;
    width: 360px;
    height: 360px;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    scroll-snap-align: center;
    border: 2px solid #1e1e2e;
  }

  /* ═══ TEMPLATE 1: QUOTE SLIDE ═══ */
  .t1-bg {
    background: linear-gradient(145deg, #08080c 0%, #101018 50%, #1a1025 100%);
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 36px 32px;
    position: relative;
  }
  .t1-bg::before {
    content: '"';
    position: absolute;
    top: 16px; left: 24px;
    font-size: 80px;
    font-weight: 900;
    color: #a78bfa;
    opacity: 0.15;
    line-height: 1;
  }
  .t1-quote {
    font-size: 1.15rem;
    font-weight: 600;
    line-height: 1.6;
    text-align: center;
    color: #e8e8f0;
    margin-bottom: 20px;
  }
  .t1-author {
    font-size: 0.8rem;
    color: #7878a0;
    font-weight: 500;
  }
  .t1-author span {
    color: #a78bfa;
    font-weight: 700;
  }
  .t1-badge {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    color: #7878a0;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ═══ TEMPLATE 2: TIP/VALUE SLIDE ═══ */
  .t2-bg {
    background: linear-gradient(180deg, #101018 0%, #08080c 100%);
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 36px 28px;
    position: relative;
  }
  .t2-number {
    font-size: 3.5rem;
    font-weight: 900;
    background: linear-gradient(135deg, #a78bfa, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    margin-bottom: 16px;
  }
  .t2-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #e8e8f0;
    text-align: center;
    margin-bottom: 12px;
  }
  .t2-body {
    font-size: 0.82rem;
    color: #7878a0;
    text-align: center;
    line-height: 1.7;
  }
  .t2-cta {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #a78bfa, #818cf8);
    color: #fff;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ═══ TEMPLATE 3: STORY/EPIPHANY ═══ */
  .t3-bg {
    background: linear-gradient(160deg, #0d0d14 0%, #151020 60%, #08080c 100%);
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 36px 32px;
    position: relative;
  }
  .t3-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #d4a853;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .t3-headline {
    font-size: 1.25rem;
    font-weight: 800;
    color: #e8e8f0;
    text-align: center;
    line-height: 1.4;
    margin-bottom: 16px;
  }
  .t3-body {
    font-size: 0.8rem;
    color: #7878a0;
    text-align: center;
    line-height: 1.7;
  }
  .t3-line {
    width: 40px;
    height: 2px;
    background: linear-gradient(135deg, #a78bfa, #818cf8);
    margin: 16px 0;
  }

  /* ═══ TEMPLATE 4: OFFER/CTA ═══ */
  .t4-bg {
    background: linear-gradient(145deg, #08080c 0%, #1a1025 50%, #101018 100%);
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 36px 32px;
    position: relative;
  }
  .t4-headline {
    font-size: 1.3rem;
    font-weight: 800;
    color: #e8e8f0;
    text-align: center;
    line-height: 1.3;
    margin-bottom: 12px;
  }
  .t4-sub {
    font-size: 0.82rem;
    color: #7878a0;
    text-align: center;
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .t4-features {
    list-style: none;
    margin-bottom: 20px;
  }
  .t4-features li {
    font-size: 0.78rem;
    color: #e8e8f0;
    padding: 4px 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .t4-features li::before {
    content: '✓';
    color: #a78bfa;
    font-weight: 700;
    font-size: 0.85rem;
  }
  .t4-cta {
    background: linear-gradient(135deg, #a78bfa, #818cf8);
    color: #fff;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 12px 28px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .t4-wa {
    font-size: 0.65rem;
    color: #7878a0;
    margin-top: 12px;
  }

  /* ═══ TEMPLATE 5: BEFORE/AFTER ═══ */
  .t5-bg {
    background: #08080c;
    width: 100%; height: 100%;
    display: flex;
    padding: 28px 24px;
    gap: 16px;
    position: relative;
  }
  .t5-side {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
    padding: 20px 16px;
  }
  .t5-before {
    background: #101018;
    border: 1px solid #1e1e2e;
  }
  .t5-after {
    background: linear-gradient(145deg, #1a1025, #151020);
    border: 1px solid #a78bfa33;
  }
  .t5-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .t5-before .t5-label { color: #f87171; }
  .t5-after .t5-label { color: #34d399; }
  .t5-text {
    font-size: 0.75rem;
    color: #7878a0;
    text-align: center;
    line-height: 1.6;
  }
  .t5-arrow {
    display: flex;
    align-items: center;
    font-size: 1.5rem;
    color: #a78bfa;
    padding: 0 4px;
  }
  .t5-cta {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.6rem;
    color: #7878a0;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ═══ TEMPLATE 6: COVER SLIDE ═══ */
  .t6-bg {
    background: linear-gradient(160deg, #08080c 0%, #151020 40%, #1a1025 100%);
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 36px 32px;
    position: relative;
    overflow: hidden;
  }
  .t6-bg::before {
    content: '';
    position: absolute;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, #a78bfa22 0%, transparent 70%);
    top: -40px;
    right: -40px;
    border-radius: 50%;
  }
  .t6-bg::after {
    content: '';
    position: absolute;
    width: 150px;
    height: 150px;
    background: radial-gradient(circle, #818cf818 0%, transparent 70%);
    bottom: -30px;
    left: -30px;
    border-radius: 50%;
  }
  .t6-emoji {
    font-size: 2.5rem;
    margin-bottom: 16px;
  }
  .t6-headline {
    font-size: 1.4rem;
    font-weight: 900;
    color: #e8e8f0;
    text-align: center;
    line-height: 1.3;
    margin-bottom: 10px;
  }
  .t6-sub {
    font-size: 0.8rem;
    color: #7878a0;
    text-align: center;
    line-height: 1.6;
  }
  .t6-line {
    width: 50px;
    height: 3px;
    background: linear-gradient(135deg, #a78bfa, #818cf8);
    border-radius: 3px;
    margin: 16px 0;
  }
  .t6-handle {
    font-size: 0.7rem;
    color: #a78bfa;
    font-weight: 600;
  }

  .download-hint {
    margin-top: 20px;
    font-size: 0.75rem;
    color: #7878a0;
    text-align: center;
  }
</style>
</head>
<body>

<h1>🎤 Coach Toby Carousel Generator</h1>
<p class="subtitle">6 templates · Brand-consistent · Screenshot each slide at 1080×1080</p>

<div class="controls">
  <button onclick="showSet(1)" id="b1" class="active">Set 1: Quote</button>
  <button onclick="showSet(2)" id="b2">Set 2: Tips</button>
  <button onclick="showSet(3)" id="b3">Set 3: Story</button>
  <button onclick="showSet(4)" id="b4">Set 4: Offer</button>
  <button onclick="showSet(5)" id="b5">Set 5: Before/After</button>
  <button onclick="showSet(6)" id="b6">Set 6: Cover</button>
</div>

<div class="carousel-container" id="carousel">
  <!-- Slides injected by JS -->
</div>

<p class="download-hint">💡 Open in browser → screenshot each slide at 1080×1080px for Instagram</p>

<script>
const slides = {
  1: [ // Quote set
    { type: 1, quote: "I went from singing in the shower to performing on stage in 90 days. Toby didn't just teach me technique — he taught me to believe I deserved to be heard.", author: "Sarah K.", detail: "Vocal Coaching Student" },
    { type: 1, quote: "Before Toby, I had a voice I was ashamed of. Now I have a voice people lean in to hear.", author: "Michael T.", detail: "3-month student" },
    { type: 1, quote: "The best investment I made wasn't in equipment. It was in someone who believed in my voice before I did.", author: "Amaka O.", detail: "Vocal Coaching Graduate" },
  ],
  2: [ // Tips set
    { type: 2, number: "01", title: "Warm Up Before You Sing", body: "5 minutes of humming and lip trills before every session. Your vocal cords are muscles — treat them like one." },
    { type: 2, number: "02", title: "Record Everything", body: "You can't improve what you can't hear. Record every practice session. Listen back. Find the gaps." },
    { type: 2, number: "03", title: "Breathe From Your Diaphragm", body: "Shallow breathing = weak voice. Deep belly breathing = power, control, and range. Master this first." },
    { type: 2, number: "04", title: "Consistency Beats Talent", body: "15 minutes daily beats 2 hours once a week. Your voice is built in the reps, not the marathon." },
  ],
  3: [ // Story set
    { type: 3, label: "My Story", headline: "I Almost Gave Up Singing Forever", body: "At 19, a music teacher told me I had 'no natural talent.' I believed him for 3 years.\n\nThen I met a coach who didn't care about 'talent.' He cared about technique, mindset, and showing up.\n\nThat changed everything." },
    { type: 3, label: "The Turning Point", headline: "One Session Changed My Voice", body: "It wasn't magic. It was a mirror.\n\nMy coach showed me what I was doing wrong — and more importantly, what I was doing RIGHT.\n\nI just needed someone to see it." },
    { type: 3, label: "Why I Coach", headline: "I Became the Coach I Needed", body: "Every singer has a voice worth hearing.\n\nMost just need someone to help them find it.\n\nThat's what I do. That's why I do it." },
  ],
  4: [ // Offer set
    { type: 4, headline: "Vocal Coaching", sub: "1-on-1 sessions tailored to your voice, your goals, your pace.", features: ["Weekly 1-on-1 sessions", "Personalized vocal exercises", "Performance prep & mindset", "WhatsApp support between sessions"], cta: "Book Now", wa: "wa.me/2349160106084" },
    { type: 4, headline: "Life Coaching", sub: "For young people figuring out direction, purpose, and focus.", features: ["Clarity & goal setting", "Accountability check-ins", "Mindset reprogramming", "Weekly strategy calls"], cta: "Apply Now", wa: "wa.me/2349160106084" },
    { type: 4, headline: "The Transformation", sub: "Not a course. Not a playlist. A direct line to someone who's done it.", features: ["Direct access to Toby", "Custom action plans", "Real-time feedback", "Results in 30 days or less"], cta: "Get Started", wa: "wa.me/2349160106084" },
  ],
  5: [ // Before/After set
    { type: 5, before: "Scared to sing in front of anyone", after: "Performing confidently on stage", cta: "Vocal Coaching" },
    { type: 5, before: "No clear direction in life", after: "Crystal clear purpose & plan", cta: "Life Coaching" },
    { type: 5, before: "Voice cracks & pitch issues", after: "Controlled, powerful vocals", cta: "Vocal Coaching" },
  ],
  6: [ // Cover set
    { type: 6, emoji: "🎤", headline: "Find Your Voice", sub: "Vocal coaching for singers who are ready to stop hiding and start performing.", handle: "@coachtoby" },
    { type: 6, emoji: "🔥", headline: "Level Up Your Life", sub: "Life coaching for young people who want clarity, direction, and results.", handle: "@coachtoby" },
    { type: 6, emoji: "🎯", headline: "Your Voice Matters", sub: "The world doesn't need another copy. It needs YOUR voice. Let's find it together.", handle: "@coachtoby" },
  ],
};

function renderSlide(s) {
  if (s.type === 1) return `<div class="slide"><div class="t1-bg"><div class="t1-quote">${s.quote}</div><div class="t1-author">— <span>${s.author}</span><br>${s.detail}</div><div class="t1-badge">Sessions with Toby</div></div></div>`;
  if (s.type === 2) return `<div class="slide"><div class="t2-bg"><div class="t2-number">${s.number}</div><div class="t2-title">${s.title}</div><div class="t2-body">${s.body}</div><div class="t2-cta">Follow for more →</div></div></div>`;
  if (s.type === 3) return `<div class="slide"><div class="t3-bg"><div class="t3-label">${s.label}</div><div class="t3-headline">${s.headline}</div><div class="t3-line"></div><div class="t3-body">${s.body.replace(/\n/g, '<br>')}</div></div></div>`;
  if (s.type === 4) return `<div class="slide"><div class="t4-bg"><div class="t4-headline">${s.headline}</div><div class="t4-sub">${s.sub}</div><ul class="t4-features">${s.features.map(f => `<li>${f}</li>`).join('')}</ul><div class="t4-cta">${s.cta}</div><div class="t4-wa">${s.wa}</div></div></div>`;
  if (s.type === 5) return `<div class="slide"><div class="t5-bg"><div class="t5-side t5-before"><div class="t5-label">Before</div><div class="t5-text">${s.before}</div></div><div class="t5-arrow">→</div><div class="t5-side t5-after"><div class="t5-label">After</div><div class="t5-text">${s.after}</div></div><div class="t5-cta">${s.cta}</div></div></div>`;
  if (s.type === 6) return `<div class="slide"><div class="t6-bg"><div class="t6-emoji">${s.emoji}</div><div class="t6-headline">${s.headline}</div><div class="t6-line"></div><div class="t6-sub">${s.sub}</div><div class="t6-handle">${s.handle}</div></div></div>`;
}

function showSet(n) {
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('b' + n).classList.add('active');
  const container = document.getElementById('carousel');
  container.innerHTML = slides[n].map(renderSlide).join('');
}

// Init
showSet(1);
</script>
</body>
</html>
