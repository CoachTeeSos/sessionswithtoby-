<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Certificate — Vocal Mastery Academy</title>
<meta name="theme-color" content="#0a0a10">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="assets/vma-engine.js"></script>
<style>
:root{--bg:#0a0a10;--surface:#0f0f16;--surface2:#16161f;--border:#1c1c28;--text:#e8e8f0;--text-soft:#a0a0b4;--muted:#5a5a70;--gold:#d4a843;--gold-light:#e8c46a;--mint:#00d4a0;--blue:#4a9eff;--purple:#a06eff;--orange:#ff8a4a;--red:#e05555;--radius:14px;--radius-sm:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.6}
.wrap{width:100%;max-width:640px;margin:0 auto;padding:0 16px}
@keyframes VMAfadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.anim-up{animation:VMAfadeIn .4s ease both}
.nav{position:sticky;top:0;z-index:100;background:rgba(10,10,16,.94);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.95rem;color:var(--text);text-decoration:none;letter-spacing:-.02em}
.nav-brand span{color:var(--gold)}
.nav-links{display:flex;gap:4px;align-items:center}
.nav-link{font-size:.72rem;color:var(--muted);text-decoration:none;padding:6px 10px;border-radius:var(--radius-sm);transition:all .15s}
.nav-link:hover{color:var(--text);background:var(--surface)}
.nav-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--mint));display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--bg);cursor:pointer}
.cert-wrap{display:flex;align-items:center;justify-content:center;min-height:80vh;padding:40px 0}
.cert{background:linear-gradient(135deg,var(--surface),var(--surface2));border:2px solid var(--gold);border-radius:20px;padding:48px 40px;text-align:center;max-width:560px;width:100%;position:relative;overflow:hidden}
.cert::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--gold),var(--mint),var(--gold))}
.cert-icon{font-size:3rem;margin-bottom:16px}
.cert h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.6rem;letter-spacing:-.02em;margin-bottom:8px;background:linear-gradient(135deg,var(--gold),var(--mint));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cert h2{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.2em;color:var(--muted);margin-bottom:24px}
.cert-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.8rem;color:var(--gold);margin-bottom:8px}
.cert-desc{color:var(--text-soft);font-size:.9rem;line-height:1.7;margin-bottom:24px}
.cert-details{display:flex;justify-content:center;gap:32px;margin-bottom:24px}
.cert-detail{text-align:center}
.cert-detail-label{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin-bottom:4px}
.cert-detail-value{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;color:var(--text)}
.cert-badges{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.cert-badge{padding:4px 10px;background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.15);border-radius:12px;font-size:.65rem;color:var(--gold);font-weight:600}
.cert-footer{font-size:.7rem;color:var(--muted)}
.cert-actions{display:flex;gap:12px;justify-content:center;margin-top:24px}
.cert-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.75rem;font-weight:500;color:var(--text);text-decoration:none;cursor:pointer;transition:all .15s;font-family:inherit}
.cert-btn:hover{border-color:var(--gold)}
.no-cert{text-align:center;padding:60px 20px}
.no-cert h2{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.3rem;margin-bottom:8px}
.no-cert p{color:var(--text-soft);font-size:.9rem;margin-bottom:20px}
.footer{padding:32px 0;text-align:center;font-size:.68rem;color:var(--muted);border-top:1px solid var(--border);margin-top:32px}
@media(max-width:480px){.cert{padding:32px 24px}.cert-details{gap:16px}}
</style>
</head>
<body>

<div class="nav">
  <a href="academy.html" class="nav-brand">Vocal<span>Mastery</span></a>
  <div class="nav-links">
    <a href="academy.html#modules" class="nav-link">Modules</a>
    <a href="dashboard.html" class="nav-link">Progress</a>
    <div class="nav-avatar" id="navAvatar">S</div>
  </div>
</div>

<div class="wrap">
  <div id="certContent"></div>
  <div class="footer">Vocal Mastery Academy · Sessions with Toby · © 2026</div>
</div>

<script>
(function(){
  var s=VMA.getStudent();
  if(!s){window.location.href='academy.html';return;}
  document.getElementById('navAvatar').textContent=(s.name||'S').charAt(0).toUpperCase();
  var allDone=true;for(var i=0;i<7;i++){if(!s.quizzes||s.quizzes[i+1]<80){allDone=false;break;}}
  var el=document.getElementById('certContent');
  if(!allDone){
    el.innerHTML='<div class="no-cert anim-up"><h2>Complete all 7 modules to earn your certificate</h2><p>Finish all module quizzes with 80% or higher.</p><a href="academy.html" class="cert-btn">Continue Training →</a></div>';
    return;
  }
  var badges=s.badges||[];
  var badgeHTML='';
  var badgeLabels={'foundations':'🏗️ Foundations','technique':'🎯 Technique','theory':'📐 Theory','repertoire':'🎵 Repertoire','performance':'🎤 Performance','articulation':'🗣️ Articulation','complete':'🏆 Graduate'};
  for(var b=0;b<badges.length;b++){badgeHTML+='<span class="cert-badge">'+(badgeLabels[badges[b]]||badges[b])+'</span>';}
  var date=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  el.innerHTML='<div class="cert-wrap anim-up"><div class="cert"><div class="cert-icon">🏆</div><h2>Vocal Mastery Academy</div><h1>Certificate of Completion</h1><div class="cert-name">'+s.name+'</div><div class="cert-desc">has successfully completed all 7 modules of the Vocal Mastery Academy program, demonstrating proficiency in vocal technique, music theory, song selection, performance, and articulation using the NYVC method and IPA system.</div><div class="cert-details"><div class="cert-detail"><div class="cert-detail-label">Total XP</div><div class="cert-detail-value">'+s.xp+'</div></div><div class="cert-detail"><div class="cert-detail-label">Level</div><div class="cert-detail-value">'+VMA.getLevel(s.xp)+'</div></div><div class="cert-detail"><div class="cert-detail-label">Date</div><div class="cert-detail-value">'+date+'</div></div></div><div class="cert-badges">'+badgeHTML+'</div><div class="cert-footer">Sessions with Toby · Vocal Mastery Academy · © 2026</div><div class="cert-actions"><a class="cert-btn" href="dashboard.html">View Progress</a><a class="cert-btn" href="academy.html">Back to Academy</a><button class="cert-btn" onclick="window.print()">Print Certificate</button></div></div></div>';
})();
</script>

</body>
</html>
