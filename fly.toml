app = "coach-toby"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[env]
  HERMES_HOME = "/opt/data"
  HERMES_WRITE_SAFE_ROOT = "/opt/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
